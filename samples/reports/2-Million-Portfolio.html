/* Returns annual IRMAA surcharge for numPeople Medicare-eligible (age>=65) */
function calcIRMAA(magi,filing,numPeople){
  if(numPeople<=0||magi<=0) return 0;
  const brackets=filing==='mfj'?IRMAA_BRACKETS_MFJ:IRMAA_BRACKETS_SINGLE;
  for(const b of brackets){
    if(magi<=b.magi) return (b.partB+b.partD)*12*numPeople;
  }
  const last=brackets[brackets.length-1];
  return (last.partB+last.partD)*12*numPeople;
}

/* Social Security benefit scaling relative to FRA (age 67 = 100%) */
const SS_AGE_FACTOR={62:0.70,63:0.75,64:0.80,65:0.867,66:0.933,67:1.00,68:1.08,69:1.16,70:1.24};

/* Social Security taxation — IRS Publication 915 worksheet
   Combined income = other ordinary income + 50% of SS benefits
   MFJ: base=$32,000, upper=$44,000 | Single: base=$25,000, upper=$34,000
   Tier 1 (base–upper): taxable = min(50% of SS, 50% of (combined − base))
   Tier 2 (>upper): taxable = min(85% of SS, tier1 + 85% of (combined − upper)) */
function calcSSTaxableAmount(ssIncome,otherOrdinaryIncome,filing){
  const combined=otherOrdinaryIncome+ssIncome*0.5;
  const base=filing==='mfj'?32000:25000;
  const upper=filing==='mfj'?44000:34000;
  if(combined<=base) return 0;
  /* Tier1 is capped at the base-to-upper range per IRS Pub 915 worksheet */
  const tier1=Math.min(ssIncome*0.50, 0.50*Math.min(combined-base, upper-base));
  if(combined<=upper) return tier1;
  return Math.min(ssIncome*0.85, tier1+0.85*(combined-upper));
}

function calcTax(ordinaryIncome,brackets){
  if(ordinaryIncome<=0) return 0;
  let tax=0,prev=0;
  for(const b of brackets){
    if(ordinaryIncome<=prev) break;
    const taxable=Math.min(ordinaryIncome,b.limit)-prev;
    if(taxable>0) tax+=taxable*b.rate;
    prev=b.limit;
  }
  return tax;
}

/* ---- Monte Carlo Simulation Engine ---- */
/* Box-Muller transform for normal random numbers */
function randNormal(){
  let u=0,v=0;
  while(u===0) u=Math.random();
  while(v===0) v=Math.random();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
}
/* Statistical percentile (linear interpolation) */
function percentile(arr,p){
  if(!arr||arr.length===0) return 0;
  const sorted=[...arr].sort((a,b)=>a-b);
  const idx=(p/100)*(sorted.length-1);
  const lo=Math.floor(idx),hi=Math.ceil(idx);
  return lo===hi?sorted[lo]:sorted[lo]*(hi-idx)+sorted[hi]*(idx-lo);
}

function runMonteCarlo(params){
  const {nSims,yearsInRetirement,yearsToRetire,retAge,retPct,inflPct,vol,filing,
    bTaxableInit,bDeferredInit,bRothInit,bHSAInit,totalAtRetire,
    ssAnnualFRA,ssStartAge,spSSAnnualFRA,spSSStartAge,hasSpouse,
    spAgeOffset,lifeExp,spLifeExp,curAge,spAge,iraBasis,
    rothConvStrategy,convBracketLimit,convStartAge,convEndAge,brackets,RMD_START_AGE,spendingPhases,hasPhases,glideSchedule,oneTimeByAge}=params;

  /* Guard against NaN/Infinity in critical numeric inputs */
  const criticalNums=[nSims,yearsInRetirement,retPct,inflPct,vol,
    bTaxableInit,bDeferredInit,bRothInit,bHSAInit,
    yearsToRetire,retAge];
  if(criticalNums.some(v=>!Number.isFinite(v))||Number.isNaN(convBracketLimit)){
    return {bands:[[],[],[],[],[]],pctiles:[10,25,50,75,90],endingBalances:[0],survivedFlags:[false],successRate:0,nSims:nSims||0};
  }
  if(spendingPhases && spendingPhases.some(p=>!Number.isFinite(p.amount)||!Number.isFinite(p.age))){
    return {bands:[[],[],[],[],[]],pctiles:[10,25,50,75,90],endingBalances:[0],survivedFlags:[false],successRate:0,nSims:nSims||0};
  }
  if(oneTimeByAge && Object.values(oneTimeByAge).some(v=>!Number.isFinite(v))){
    return {bands:[[],[],[],[],[]],pctiles:[10,25,50,75,90],endingBalances:[0],survivedFlags:[false],successRate:0,nSims:nSims||0};
  }

  const fallbackMC=totalAtRetire*0.04;
  const safeRetPct=Math.max(-0.99,retPct); /* prevent Math.log(<=0) */
  const mu=Math.log(1+safeRetPct)-vol*vol/2; /* log-normal drift */
  const mcConvStart=Number.isFinite(convStartAge)?convStartAge:retAge;
  const mcConvEnd=Number.isFinite(convEndAge)?convEndAge:(RMD_START_AGE-1);

  /* Storage: per-year arrays of portfolio totals across all sims */
  const yearTotals=Array.from({length:yearsInRetirement},()=>[]);
  const endingBalances=[];
  const survivedFlags=[];
  let successCount=0;

  for(let sim=0;sim<nSims;sim++){
    let bT=bTaxableInit,bD=bDeferredInit,bR=bRothInit,bH=bHSAInit;
    let depletedEver=false;
    let remainingBasis=iraBasis||0;
    const magiHistory=[];

    for(let yr=0;yr<yearsInRetirement;yr++){
      const age=retAge+yr;
      const spouseAge=hasSpouse?(age+spAgeOffset):0;
      const stdDedMC=getStdDeduction(filing,age,spouseAge,hasSpouse,yr>0&&magiHistory[yr-1]!=null?magiHistory[yr-1]:null);
      const inflMult=Math.pow(1+inflPct,yr+yearsToRetire);
      /* Random return for this year (log-normal) */
      let yrMu=mu,yrVol=vol;
      if(glideSchedule){
        const gs=getReturnForAge(glideSchedule,retAge+yr,retPct);
        const safeRet=Math.max(-0.99,gs.ret);
        yrMu=Math.log(1+safeRet)-gs.vol*gs.vol/2;
        yrVol=gs.vol;
      }
      const yearReturn=Math.exp(yrMu+yrVol*randNormal())-1;

      /* SS income (same logic as deterministic) */
      let yourSS=0,spouseSS=0;
      if(ssAnnualFRA>0&&age>=ssStartAge&&age<=lifeExp)
        yourSS=ssAnnualFRA*(SS_AGE_FACTOR[ssStartAge]||1)*inflMult;
      if(hasSpouse&&spSSAnnualFRA>0&&spouseAge>=spSSStartAge&&spouseAge<=spLifeExp)
        spouseSS=spSSAnnualFRA*(SS_AGE_FACTOR[spSSStartAge]||1)*inflMult;
      const ssIncome=yourSS+spouseSS;

      /* Post-retirement side income (from Income & Savings Streams) */
      const mcPostRet=params.getContribForAge?params.getContribForAge(age):{c401k:0,match:0,ira:0,taxable:0,hsa:0};
      const mcPostRetIncome=(mcPostRet.c401k+mcPostRet.match+mcPostRet.taxable)*inflMult;
      const mcPostRetRothContrib=mcPostRet.ira*inflMult;
      const mcPostRetHSAContrib=mcPostRet.hsa*inflMult;

      const curTotal=bT+bD+bR+bH;
      if(curTotal<=0){ depletedEver=true; bT=bD=0; bR=mcPostRetRothContrib; bH=mcPostRetHSAContrib; yearTotals[yr].push(bR+bH); const mcDepSSTax=ssIncome>0?calcSSTaxableAmount(ssIncome,mcPostRetIncome,filing):0; magiHistory.push(mcPostRetIncome+mcDepSSTax); continue; }

      /* Spending need (phase-based or 4% rule with guardrails) */
      const phaseExp=getAnnualExpenseForAge(age,spendingPhases);
      const mcUsingPhases=hasPhases;
      const mcBase=mcUsingPhases?phaseExp:fallbackMC;
      let need=mcUsingPhases?mcBase*inflMult:mcBase*Math.pow(1+inflPct,yr);
      if(!mcUsingPhases) need=Math.max(curTotal*0.035,Math.min(curTotal*0.055,need));
      /* Add one-time spendings */
      const mcOts=oneTimeByAge?oneTimeByAge[age]:0;
      if(mcOts>0) need+=mcOts*inflMult;
      const ssSurplus=Math.max(0,ssIncome+mcPostRetIncome-need); /* excess SS+side income reinvested into taxable */
      let target=Math.max(0,need-ssIncome-mcPostRetIncome);
      target=Math.min(target,curTotal);

      /* RMD */
      let rmd=0;
      if(age>=RMD_START_AGE&&bD>0){
        const div=RMD_TABLE[age]??(age>120?2:Math.max(2,120-age));
        rmd=bD/div;
      }

      /* Simplified tax-efficient sequencing */
      let wT=0,wD=0,wR=0,wH=0,rem=target;
      const annMed=age>=65?5000*inflMult:0;
      if(age>=65&&bH>0){ const med=Math.min(annMed,bH,rem); wH=med; rem-=med; }
      if(age>=RMD_START_AGE){
        wD=Math.min(rmd,bD); rem-=wD;
        if(rem>0){ const f=Math.min(rem,bT); wT=f; rem-=f; }
        if(rem>0){ const m=Math.min(rem,bD-wD); wD+=m; rem-=m; }
        if(rem>0){ const f=Math.min(rem,bR); wR=f; rem-=f; }
      } else {
        const f=Math.min(rem,bT); wT=f; rem-=f;
        if(rem>0){ const bracketLim=(filing==='mfj'?206700:103350)+stdDedMC; const d=Math.min(rem,bracketLim,bD); wD=d; rem-=d; }
        if(rem>0){ const f2=Math.min(rem,bR); wR=f2; rem-=f2; }
        if(rem>0){ const m=Math.min(rem,bD-wD); wD+=m; rem-=m; }
      }
      /* Last resort: drain remaining HSA */
      if(rem>0&&bH>wH){ const moreH=Math.min(rem,bH-wH); wH+=moreH; rem-=moreH; }

      /* Simplified Roth conversion in MC — fill bracket room in pre-RMD years */
      let mcRothConv=0,mcTaxableConv=0;
      if(rothConvStrategy&&rothConvStrategy!=='none'&&age>=mcConvStart&&age<=mcConvEnd&&age<RMD_START_AGE&&bD>wD){
        const mcOrdBeforeConv=wD+Math.max(0,(wH||0)-(age>=65?5000*inflMult:0))+mcPostRetIncome;
        const mcSSBeforeConv=ssIncome>0?calcSSTaxableAmount(ssIncome,mcOrdBeforeConv+wT,filing):0;
        const totalIRA=bD;
        const basisFraction=totalIRA>0?Math.min(1,remainingBasis/totalIRA):0;
        const mcBracketRoom=Math.max(0,convBracketLimit+stdDedMC-mcOrdBeforeConv-mcSSBeforeConv);
        const mcEffectiveRoom=basisFraction<1?mcBracketRoom/(1-basisFraction):Infinity;
        mcRothConv=Math.min(mcEffectiveRoom,bD-wD);
        if(mcRothConv>0){
          mcTaxableConv=mcRothConv*(1-basisFraction);
          remainingBasis=Math.max(0,remainingBasis-mcRothConv*basisFraction);
        }
      }

      /* Simplified tax estimation for MC — gross up withdrawal to cover taxes */
      const hsaNonMed=Math.max(0,wH-annMed);
      const ordIncMC=wD+hsaNonMed+mcTaxableConv+mcPostRetIncome;
      const agiMC=ordIncMC+wT;
      const ssTaxMC=ssIncome>0?calcSSTaxableAmount(ssIncome,agiMC,filing):0;
      const taxableIncMC=Math.max(0,ordIncMC+ssTaxMC-stdDedMC);
      const mcTotalOrd=ordIncMC+ssTaxMC;
      const mcLtcgAdj=Math.min(wT,Math.max(0,mcTotalOrd+wT-stdDedMC));
      const mcTaxBase=calcTax(taxableIncMC,brackets)+calcLTCG(mcLtcgAdj,taxableIncMC,filing)+((age<65&&hsaNonMed>0)?hsaNonMed*0.20:0);
      const mcNumMedicare=(age>=65&&age<=lifeExp?1:0)+(hasSpouse&&spouseAge>=65&&spouseAge<=spLifeExp?1:0);
      const mcIrmaaMagi=yr>=2&&magiHistory[yr-2]!=null?magiHistory[yr-2]:(agiMC+ssTaxMC);
      const mcIrmaa=mcNumMedicare>0?calcIRMAA(mcIrmaaMagi,filing,mcNumMedicare):0;
      const mcTax=mcTaxBase+mcIrmaa+(params.stateTaxPct>0?taxableIncMC*params.stateTaxPct:0);
      /* Store MAGI for future IRMAA lookback */
      magiHistory.push(agiMC+ssTaxMC);
      /* Reinvest RMD surplus + SS surplus into taxable */
      const rmdSurplus=Math.max(0,wT+wD+wR+wH-target);
      const mcReinvest=rmdSurplus+ssSurplus;
      /* Tax drain: cascade across accounts (taxable → deferred → roth → HSA) */
      let mcTaxRem=mcTax;
      const mDrT=Math.min(mcTaxRem,Math.max(0,bT-wT+mcReinvest)); mcTaxRem-=mDrT;
      const mDrD=Math.min(mcTaxRem,Math.max(0,bD-wD-mcRothConv)); mcTaxRem-=mDrD;
      const mDrR=Math.min(mcTaxRem,Math.max(0,bR-wR+mcRothConv)); mcTaxRem-=mDrR;
      const mDrH=Math.min(mcTaxRem,Math.max(0,bH-wH));

      /* Grow balances with randomized return + post-retirement contributions */
      bT=Math.max(0,(bT-wT-mDrT+mcReinvest)*(1+yearReturn));
      bD=Math.max(0,(bD-wD-mcRothConv-mDrD)*(1+yearReturn));
      bR=Math.max(0,(bR-wR+mcRothConv-mDrR)*(1+yearReturn)+mcPostRetRothContrib);
      bH=Math.max(0,(bH-wH-mDrH)*(1+yearReturn)+mcPostRetHSAContrib);
      yearTotals[yr].push(bT+bD+bR+bH);
    }
    const survived=!depletedEver&&((bT+bD+bR+bH)>0);
    const endBal=bT+bD+bR+bH;
    endingBalances.push(endBal);
    survivedFlags.push(survived);
    if(survived) successCount++;
  }

  /* Compute percentiles per year */
  const pctiles=[10,25,50,75,90];
  const bands=pctiles.map(p=>yearTotals.map(yt=>percentile(yt,p)));
  const successRate=(successCount/nSims*100);

  return {bands,pctiles,endingBalances,survivedFlags,successRate,nSims};
}

function runHistoricalBacktest(params){

  }

  const horizon=Math.max(0,parseInt(yearsInRetirement,10)||0);

  HIST_RETURNS.forEach(r=>{ histMap[r[0]]={stocks:r[1],bonds:r[2],infl:r[3]}; });

  const startYears=[];
  for(let startYr=firstHistYear;startYr<=lastHistYear-horizon+1;startYr++) startYears.push(startYr);

  const results=[];
  const yearTotals=Array.from({length:horizon},()=>[]);
  const pctiles=[10,25,50,75,90];
  const inflStart=Math.pow(1+(inflPct||0),Math.max(0,yearsToRetire||0));
  const fallbackMC=Math.max(0,totalAtRetire||(bTaxableInit+bDeferredInit+bRothInit+bHSAInit))*0.04;
  const histConvStart=Number.isFinite(params.convStartAge)?params.convStartAge:retAge;
  const histConvEnd=Number.isFinite(params.convEndAge)?params.convEndAge:(RMD_START_AGE-1);

  for(let si=0;si<startYears.length;si++){
    const startYr=startYears[si];
    let bT=bTaxableInit,bD=bDeferredInit,bR=bRothInit,bH=bHSAInit;
    let depletedEver=false;
    let remainingBasis=iraBasis||0;
    const magiHistory=[];
    const yearlyBalances=[];
    let depletedAge=null;
    let fundedYears=horizon;
    let histInflFactor=inflStart;

    for(let yr=0;yr<horizon;yr++){
      const age=retAge+yr;
      const spouseAge=hasSpouse?(age+spAgeOffset):0;
      const stdDedHist=getStdDeduction(filing,age,spouseAge,hasSpouse,yr>0&&magiHistory[yr-1]!=null?magiHistory[yr-1]:null);
      const h=histMap[startYr+yr]||{stocks:0.07,bonds:0.04,infl:0.03};
      let eqShare=0.60;
      if(glideSchedule){
        const gs=getReturnForAge(glideSchedule,age,retPct);
        if(gs&&gs.eqPct!=null) eqShare=Math.max(0,Math.min(100,gs.eqPct))/100;
      }
      const yearReturn=eqShare*h.stocks+(1-eqShare)*h.bonds;

      let yourSS=0,spouseSS=0;
      if(ssAnnualFRA>0&&age>=ssStartAge&&age<=lifeExp)
        yourSS=ssAnnualFRA*(SS_AGE_FACTOR[ssStartAge]||1)*histInflFactor;
      if(hasSpouse&&spSSAnnualFRA>0&&spouseAge>=spSSStartAge&&spouseAge<=spLifeExp)
        spouseSS=spSSAnnualFRA*(SS_AGE_FACTOR[spSSStartAge]||1)*histInflFactor;
      const ssIncome=yourSS+spouseSS;

      const histPostRet=getContribForAge?getContribForAge(age):{c401k:0,match:0,ira:0,taxable:0,hsa:0};
      const histPostRetIncome=(histPostRet.c401k+histPostRet.match+histPostRet.taxable)*histInflFactor;
      const histPostRetRothContrib=histPostRet.ira*histInflFactor;
      const histPostRetHSAContrib=histPostRet.hsa*histInflFactor;

      const curTotal=bT+bD+bR+bH;
      if(curTotal<=0){
        depletedEver=true;
        bT=bD=0;
        bR=histPostRetRothContrib;
        bH=histPostRetHSAContrib;
        yearlyBalances.push(bR+bH);
        yearTotals[yr].push(bR+bH);
        if(depletedAge==null&&(bR+bH)<=0){ depletedAge=age; fundedYears=yr; }
        const histDepSSTax=ssIncome>0?calcSSTaxableAmount(ssIncome,histPostRetIncome,filing):0;
        magiHistory.push(histPostRetIncome+histDepSSTax);
        histInflFactor*=1+h.infl;
        continue;
      }

      const phaseExp=getAnnualExpenseForAge(age,spendingPhases);
      const histBase=hasPhases?phaseExp:fallbackMC;
      let need=hasPhases?histBase*histInflFactor:histBase*(histInflFactor/Math.max(inflStart,1e-9));
      if(!hasPhases) need=Math.max(curTotal*0.035,Math.min(curTotal*0.055,need));
      /* Add one-time spendings */
      const histOts=oneTimeByAge?oneTimeByAge[age]:0;
      if(histOts>0) need+=histOts*histInflFactor;
      const ssSurplus=Math.max(0,ssIncome+histPostRetIncome-need);
      let target=Math.max(0,need-ssIncome-histPostRetIncome);
      target=Math.min(target,curTotal);

      let rmd=0;
      if(age>=RMD_START_AGE&&bD>0){
        const div=RMD_TABLE[age]??(age>120?2:Math.max(2,120-age));
        rmd=bD/div;
      }

      let wT=0,wD=0,wR=0,wH=0,rem=target;
      const annMed=age>=65?5000*histInflFactor:0;
      if(age>=65&&bH>0){ const med=Math.min(annMed,bH,rem); wH=med; rem-=med; }
      if(age>=RMD_START_AGE){
        wD=Math.min(rmd,bD); rem-=wD;
        if(rem>0){ const f=Math.min(rem,bT); wT=f; rem-=f; }
        if(rem>0){ const m=Math.min(rem,bD-wD); wD+=m; rem-=m; }
        if(rem>0){ const f=Math.min(rem,bR); wR=f; rem-=f; }
      } else {
        const f=Math.min(rem,bT); wT=f; rem-=f;
        if(rem>0){ const bracketLim=(filing==='mfj'?206700:103350)+stdDedHist; const d=Math.min(rem,bracketLim,bD); wD=d; rem-=d; }
        if(rem>0){ const f2=Math.min(rem,bR); wR=f2; rem-=f2; }
        if(rem>0){ const m=Math.min(rem,bD-wD); wD+=m; rem-=m; }
      }
      if(rem>0&&bH>wH){ const moreH=Math.min(rem,bH-wH); wH+=moreH; rem-=moreH; }

      let histRothConv=0,histTaxableConv=0;
      if(rothConvStrategy&&rothConvStrategy!=='none'&&convBracketLimit>0&&age>=histConvStart&&age<=histConvEnd&&age<RMD_START_AGE&&bD>wD){
        const histOrdBeforeConv=wD+Math.max(0,(wH||0)-(age>=65?5000*histInflFactor:0))+histPostRetIncome;
        const histSSBeforeConv=ssIncome>0?calcSSTaxableAmount(ssIncome,histOrdBeforeConv+wT,filing):0;
        const totalIRA=bD;
        const basisFraction=totalIRA>0?Math.min(1,remainingBasis/totalIRA):0;
        const histBracketRoom=Math.max(0,convBracketLimit+stdDedHist-histOrdBeforeConv-histSSBeforeConv);
        const histEffectiveRoom=basisFraction<1?histBracketRoom/(1-basisFraction):Infinity;
        histRothConv=Math.min(histEffectiveRoom,bD-wD);
        if(histRothConv>0){
          histTaxableConv=histRothConv*(1-basisFraction);
          remainingBasis=Math.max(0,remainingBasis-histRothConv*basisFraction);
        }
      }

      const hsaNonMed=Math.max(0,wH-annMed);
      const ordInc=wD+hsaNonMed+histTaxableConv+histPostRetIncome;
      const agi=ordInc+wT;
      const ssTax=ssIncome>0?calcSSTaxableAmount(ssIncome,agi,filing):0;
      const taxableInc=Math.max(0,ordInc+ssTax-stdDedHist);
      const totalOrd=ordInc+ssTax;
      const ltcgAdj=Math.min(wT,Math.max(0,totalOrd+wT-stdDedHist));
      const taxBase=calcTax(taxableInc,brackets)+calcLTCG(ltcgAdj,taxableInc,filing)+((age<65&&hsaNonMed>0)?hsaNonMed*0.20:0);
      const numMedicare=(age>=65&&age<=lifeExp?1:0)+(hasSpouse&&spouseAge>=65&&spouseAge<=spLifeExp?1:0);
      const irmaaMagi=yr>=2&&magiHistory[yr-2]!=null?magiHistory[yr-2]:(agi+ssTax);
      const irmaa=numMedicare>0?calcIRMAA(irmaaMagi,filing,numMedicare):0;
      const histTax=taxBase+irmaa+(stateTaxPct>0?taxableInc*stateTaxPct:0);
      magiHistory.push(agi+ssTax);

      const rmdSurplus=Math.max(0,wT+wD+wR+wH-target);
      const histReinvest=rmdSurplus+ssSurplus;
      let histTaxRem=histTax;
      const drT=Math.min(histTaxRem,Math.max(0,bT-wT+histReinvest)); histTaxRem-=drT;
      const drD=Math.min(histTaxRem,Math.max(0,bD-wD-histRothConv)); histTaxRem-=drD;
      const drR=Math.min(histTaxRem,Math.max(0,bR-wR+histRothConv)); histTaxRem-=drR;
      const drH=Math.min(histTaxRem,Math.max(0,bH-wH));

      bT=Math.max(0,(bT-wT-drT+histReinvest)*(1+yearReturn));
      bD=Math.max(0,(bD-wD-histRothConv-drD)*(1+yearReturn));
      bR=Math.max(0,(bR-wR+histRothConv-drR)*(1+yearReturn)+histPostRetRothContrib);
      bH=Math.max(0,(bH-wH-drH)*(1+yearReturn)+histPostRetHSAContrib);

      const endBal=bT+bD+bR+bH;
      yearlyBalances.push(endBal);
      yearTotals[yr].push(endBal);
      if(endBal<=0&&depletedAge==null){ depletedAge=age; fundedYears=yr+1; }

      histInflFactor*=1+h.infl;
    }

    const endingBalance=yearlyBalances.length?yearlyBalances[yearlyBalances.length-1]:(bT+bD+bR+bH);
    const survived=!depletedEver&&endingBalance>0;
    results.push({
      startYear:startYr,
      endYear:startYr+horizon-1,
      survived,
      depletedAge,
      fundedYears:survived?horizon:fundedYears,
      endingBalance,
      yearlyBalances
    });
  }

  const bands=pctiles.map(p=>yearTotals.map(yt=>percentile(yt,p)));
  const successCount=results.filter(r=>r.survived).length;
  const successRate=results.length?(successCount/results.length*100):0;
  const endingBalances=results.map(r=>r.endingBalance);
  const sorted=[...results].sort((a,b)=>a.endingBalance-b.endingBalance);
  const worst5=sorted.slice(0,5);
  const best=sorted.length?sorted[sorted.length-1]:null;

  return {
    nPeriods:results.length,
    pctiles,
    successRate,
    successCount,
    bands,
    endingBalances,
    worst5,
    best,
    median:percentile(endingBalances,50),
    p10:percentile(endingBalances,10),
    p90:percentile(endingBalances,90),
    results
  };
}

function buildSimulationFanChart(opts){
  const {bands,yearsInRetirement,retAge,totalAtRetire,deterministicSeries,title,deterministicLabel}=opts||{};
  if(!bands||bands.length<5||!yearsInRetirement) return '';
  const fmtK=v=>v>=1e6?'$'+(v/1e6).toFixed(2)+'M':v>=1e3?'$'+(v/1e3).toFixed(0)+'K':'$'+Math.round(v);
  const svgW=1400,svgH=200,padL=60,padR=20,padT=10,padB=30;
  const plotW=svgW-padL-padR,plotH=svgH-padT-padB;
  const bandVals=bands.flat();
  const detVals=Array.isArray(deterministicSeries)?deterministicSeries:[];
  const maxVal=Math.max(1,totalAtRetire||0,...bandVals,...detVals);
  const xScale=yr=>padL+(yr/Math.max(yearsInRetirement-1,1))*plotW;
  const yScale=v=>padT+plotH-(v/maxVal)*plotH;
  const p10=bands[0],p25=bands[1],p50=bands[2],p75=bands[3],p90=bands[4];

  let html=`<div style="margin:16px 0"><div style="font-weight:600;font-size:0.88em;margin-bottom:8px">${title||'Portfolio Balance Percentile Bands'}</div>`;
  html+=`<svg viewBox="0 0 ${svgW} ${svgH}" class="mc-fan" preserveAspectRatio="xMidYMid meet">`;
  for(let g=0;g<=4;g++){
    const gy=padT+plotH*g/4;
    const gv=maxVal*(1-g/4);
    html+=`<line x1="${padL}" y1="${gy}" x2="${svgW-padR}" y2="${gy}" stroke="var(--border)" stroke-width="0.5"/>`;
    html+=`<text x="${padL-6}" y="${gy+4}" text-anchor="end" font-size="9" fill="var(--text-muted)">${fmtK(gv)}</text>`;
  }
  for(let yr=0;yr<yearsInRetirement;yr+=5){
    html+=`<text x="${xScale(yr)}" y="${svgH-4}" text-anchor="middle" font-size="9" fill="var(--text-muted)">${retAge+yr}</text>`;
  }
  if(yearsInRetirement>5) html+=`<text x="${xScale(yearsInRetirement-1)}" y="${svgH-4}" text-anchor="middle" font-size="9" fill="var(--text-muted)">${retAge+yearsInRetirement-1}</text>`;

  let outerPath=`M${xScale(0)},${yScale(p90[0])}`;
  for(let yr=1;yr<yearsInRetirement;yr++) outerPath+=` L${xScale(yr)},${yScale(p90[yr])}`;
  for(let yr=yearsInRetirement-1;yr>=0;yr--) outerPath+=` L${xScale(yr)},${yScale(p10[yr])}`;
  outerPath+=' Z';
  html+=`<path d="${outerPath}" class="mc-band" fill="var(--mc-color)"/>`;

  let innerPath=`M${xScale(0)},${yScale(p75[0])}`;
  for(let yr=1;yr<yearsInRetirement;yr++) innerPath+=` L${xScale(yr)},${yScale(p75[yr])}`;
  for(let yr=yearsInRetirement-1;yr>=0;yr--) innerPath+=` L${xScale(yr)},${yScale(p25[yr])}`;
  innerPath+=' Z';
  html+=`<path d="${innerPath}" class="mc-band-inner" fill="var(--mc-color)"/>`;

  let medPath=`M${xScale(0)},${yScale(p50[0])}`;
  for(let yr=1;yr<yearsInRetirement;yr++) medPath+=` L${xScale(yr)},${yScale(p50[yr])}`;
  html+=`<path d="${medPath}" class="mc-median"/>`;

  if(detVals.length){
    let detPath=`M${xScale(0)},${yScale(detVals[0]||0)}`;
    for(let yr=1;yr<Math.min(detVals.length,yearsInRetirement);yr++) detPath+=` L${xScale(yr)},${yScale(detVals[yr]||0)}`;
    html+=`<path d="${detPath}" class="mc-determ"/>`;
  }

  html+=`</svg>`;
  html+=`<div style="display:flex;gap:16px;font-size:0.75em;color:var(--text-muted);margin-top:4px;flex-wrap:wrap">`;
  html+=`<span><span style="display:inline-block;width:24px;height:3px;background:var(--mc-color);vertical-align:middle;border-radius:2px;opacity:0.25;margin-right:4px"></span>10th–90th percentile</span>`;
  html+=`<span><span style="display:inline-block;width:24px;height:3px;background:var(--mc-color);vertical-align:middle;border-radius:2px;opacity:0.5;margin-right:4px"></span>25th–75th percentile</span>`;
  html+=`<span><span style="display:inline-block;width:24px;height:3px;background:var(--mc-median);vertical-align:middle;border-radius:2px;margin-right:4px"></span>Median (50th)</span>`;
  if(detVals.length) html+=`<span><span style="display:inline-block;width:24px;height:3px;background:var(--warning);vertical-align:middle;border-radius:2px;border-top:1px dashed var(--warning);margin-right:4px"></span>${deterministicLabel||'Deterministic'}</span>`;
  html+=`</div></div>`;
  return html;
}

/* Get all retirement-eligible accounts (excludes 529/UTMA) — for account selector */
function getAllRetirementAccounts(){
  const seen=new Map();
  DATA.forEach(d=>{
    d.accounts.forEach(a=>{
      const t=a.type||'Other';
      if(t==='529 College Savings'||t==='Custodial (UTMA)') return;
      const key=a.num;
      if(seen.has(key)){
        seen.get(key).val+=a.tickers.reduce((s,tk)=>s+tk.val,0);
      } else {
        seen.set(key,{num:a.num,name:a.name,type:t,val:a.tickers.reduce((s,tk)=>s+tk.val,0)});
      }
    });
  });
  const arr=Array.from(seen.values());
  const typeOrder=['Tax-Deferred 401(k)','Tax-Deferred IRA','Tax-Deferred DCP','Tax-Deferred Savings','Roth','HSA','Taxable Investment'];
  arr.sort((a,b)=>{
    const ia=typeOrder.indexOf(a.type),ib=typeOrder.indexOf(b.type);
    const oa=ia===-1?99:ia,ob=ib===-1?99:ib;
    return oa!==ob?oa-ob:b.val-a.val;
  });
  return arr;
}

/* Classify accounts into tax buckets from portfolio DATA */
function getAccountBuckets(selectedNums){
  const taxable={label:'Taxable',total:0,color:'#f59e0b',accounts:[]};
  const deferred={label:'Tax-Deferred',total:0,color:'#3b82f6',accounts:[]};
  const roth={label:'Roth (Tax-Free)',total:0,color:'#10b981',accounts:[]};
  const hsa={label:'HSA',total:0,color:'#ec4899',accounts:[]};

  DATA.forEach(d=>{
    d.accounts.forEach(a=>{
      const t=a.type||'Other';
      if(selectedNums&&!selectedNums.has(a.num)) return;
      const val=a.tickers.reduce((s,tk)=>s+tk.val,0);
      const info={num:a.num,name:a.name,type:t,val};
      if(t==='Roth') { roth.total+=val; roth.accounts.push(info); }
      else if(t==='HSA') { hsa.total+=val; hsa.accounts.push(info); }
      else if(t==='529 College Savings'||t==='Custodial (UTMA)') { /* exclude non-retirement accounts */ }
      else if(TAX_DEFERRED_TYPES.includes(t)||t==='Tax-Deferred Savings') {
        deferred.total+=val; deferred.accounts.push(info);
      } else if(t==='Taxable Investment'||t.includes('Individual')||t.includes('Joint')) {
        taxable.total+=val; taxable.accounts.push(info);
      } else { taxable.total+=val; taxable.accounts.push(info); }
    });
  });
  return {taxable,deferred,roth,hsa};
}

function setGlideDisplayAttribute(el,usingGlide){
  if(!el) return;
  if(usingGlide){
    if(el.dataset) el.dataset.glideDisplay='true';
    el.setAttribute?.('data-glide-display','true');
  }else{
    if(el.dataset) delete el.dataset.glideDisplay;
    el.removeAttribute?.('data-glide-display');
  }
}
function isWdGlideEnabled(){
  return document.getElementById('wdGlideToggle')?.checked||false;
}
function getEffectiveWdGlideMode(){
  return isWdGlideEnabled()?(document.getElementById('wdGlideMode')?.value||'glidepath'):'fixed';
}
function saveSettings(){
  try{
    /* Merge with existing settings so fields from non-visible tabs are preserved */
    const existing=JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}');
    const s=Object.assign({},existing);
    SETTINGS_FIELDS.forEach(f=>{
      const el=document.getElementById(f.id);
      if(el) s[f.id]=f.type==='checkbox'?el.checked:el.value;
    });
    if(getEffectiveWdGlideMode()==='fixed'){
      const retEl=document.getElementById('wdReturn');
      const volEl=document.getElementById('wdVol');
      if(retEl){ window._savedFixedReturn=retEl.value; retEl.setAttribute('data-fixed-return',retEl.value); }
      if(volEl){ window._savedFixedVol=volEl.value; volEl.setAttribute('data-fixed-vol',volEl.value); }
    } else {
      /* When glide is active, also persist data attributes from current window values */
      const retEl=document.getElementById('wdReturn');
      const volEl=document.getElementById('wdVol');
      if(retEl&&window._savedFixedReturn!=null) retEl.setAttribute('data-fixed-return',window._savedFixedReturn);
      if(volEl&&window._savedFixedVol!=null) volEl.setAttribute('data-fixed-vol',window._savedFixedVol);
    }
    if(window._savedFixedReturn!=null) s._savedFixedReturn=window._savedFixedReturn;
    if(window._savedFixedVol!=null) s._savedFixedVol=window._savedFixedVol;
    s._activeTab=_activeTab;
    s._activeSubPivot=_activeSubPivot;
    const phases=getSpendPhases();
    if(phases.length>0||document.getElementById('spendPhasesContainer')) s._spendPhases=phases;
    /* Save contribution mode + year-by-year schedule */
    const contribModeEl=document.getElementById('wdContribMode');
    if(contribModeEl){
      s._contribMode=contribModeEl.value;
      const schedule=getContribSchedule();
      if(schedule) s._contribSchedule=schedule;
    }
    /* Save one-time spendings */
    const otsRows=document.querySelectorAll('#oneTimeSpendRows .ots-row');
    if(otsRows.length>0||document.getElementById('oneTimeSpendRows')) s._oneTimeSpendings=getOneTimeSpendSchedule();
    /* Save selected accounts */
    const acctCbs=document.querySelectorAll('.acct-sel-cb');
    if(acctCbs.length>0){
      const sel=[];acctCbs.forEach(cb=>{if(cb.checked) sel.push(cb.value);});
      s._selectedAccounts=sel;
    }
    /* Save glide path waypoints */
    const wpEls=document.querySelectorAll('#glideWpContainer .glide-wp-row');
    if(wpEls.length>0){
      s._glideWaypoints=[];
      wpEls.forEach(row=>{
        const age=row.querySelector('.glide-wp-age')?.value;
        const eq=row.querySelector('.glide-wp-eq')?.value;
        if(age&&eq) s._glideWaypoints.push({age:+age,eqPct:+eq});
      });
    }
    const interpEl=document.getElementById('wdGlideInterp');
    if(interpEl) s._glideInterp=interpEl.value;
    /* Save scenario fields if on Scenarios tab */
    const scNameEl=document.getElementById('scName0');
    if(scNameEl){
      /* Save shared profile fields */
      const sharedIds=['scSharedAge','scSharedFiling','scSharedVol','scSharedGlide','scSharedSpAge','scSharedSpLife','scSharedSpSS','scSharedSpSSAge'];
      sharedIds.forEach(id=>{const el=document.getElementById(id);if(el) s[id]=el.type==='checkbox'?el.checked:el.value;});
      const spCb=document.getElementById('scSharedSpouse');
      if(spCb) s.scSharedSpouse=spCb.checked;

      const scKeys=['retire','life','ssAge','ss','ret','infl','conv','stax','Name','customPct','convStart','convEnd'];
      const scData=[];
      for(let i=0;i<3;i++){
        const sc={};
        scKeys.forEach(k=>{const el=document.getElementById('sc'+k+i);if(el) sc[k]=el.value;});
        /* Save spending phases */
        const phAges=document.querySelectorAll(`#scPhasesList${i} .sc-phase-age`);
        const phAmts=document.querySelectorAll(`#scPhasesList${i} .sc-phase-amt`);
        if(phAges.length>0){
          sc.phases=[];
          phAges.forEach((el,pi)=>sc.phases.push({age:el.value||'55',amount:phAmts[pi]?.value||'0'}));
        }
        scData.push(sc);
      }
      /* Preserve spending-suggestion metadata used for stale-cache validation */
      if(existing._scenarios){
        scData.forEach((sc,idx)=>{
          if(existing._scenarios[idx]&&existing._scenarios[idx]._target!==undefined){
            sc._target=existing._scenarios[idx]._target;
            sc._targetMonthly=existing._scenarios[idx]._targetMonthly;
            sc._fp=existing._scenarios[idx]._fp;
          }
        });
      }
      s._scenarios=scData;
    }
    /* Persist panel UI state alongside settings */
    s._wdUIState=window._wdUIState||{panels:{},charts:{}};
    localStorage.setItem(SETTINGS_KEY,JSON.stringify(s));
    /* Theme is stored separately in localStorage but also echoed into settings for export */
    s._theme=localStorage.getItem('portfolioTheme')||'blue';
    localStorage.setItem(SETTINGS_KEY,JSON.stringify(s));
  }catch(e){}
}
function loadSettings(){
  try{
    /* Hydrate sub-panel collapse state from persisted UI state before using it */
    window._wdSubCollapsed=Object.assign({},window._wdUIState?.subCollapsed||{});
    const raw=localStorage.getItem(SETTINGS_KEY);
    if(!raw) return;
    const s=JSON.parse(raw);
    SETTINGS_FIELDS.forEach(f=>{
      const el=document.getElementById(f.id);
      if(el&&s[f.id]!=null){
        if(f.type==='checkbox') el.checked=s[f.id];
        else el.value=s[f.id];
      }
    });
    if(s._savedFixedReturn!=null){
      window._savedFixedReturn=s._savedFixedReturn;
      const retEl=document.getElementById('wdReturn');
      if(retEl) retEl.setAttribute('data-fixed-return',s._savedFixedReturn);
    }
    else if(s.wdReturn!=null&&!(s.wdGlideToggle===true||s.wdGlideToggle==='true')) window._savedFixedReturn=s.wdReturn;
    if(s._savedFixedVol!=null){
      window._savedFixedVol=s._savedFixedVol;
      const volEl=document.getElementById('wdVol');
      if(volEl) volEl.setAttribute('data-fixed-vol',s._savedFixedVol);
    }
    else if(s.wdVol!=null&&!(s.wdGlideToggle===true||s.wdGlideToggle==='true')) window._savedFixedVol=s.wdVol;
    const savedGlideToggle=s.wdGlideToggle===true||s.wdGlideToggle==='true';
    window._currentWdGlideMode=savedGlideToggle?(s.wdGlideMode||'glidepath'):'fixed';
    /* Show/hide spouse panel (respect sub-collapse) */
    const spPanel=document.getElementById('wdSpousePanel');
    if(spPanel) spPanel.style.display=(s.wdSpouseToggle&&!window._wdSubCollapsed['wdSpousePanel'])?'block':'none';
    const spCh=document.querySelector('[data-sub-panel="wdSpousePanel"]');
    if(spCh){ spCh.textContent=(!s.wdSpouseToggle||window._wdSubCollapsed['wdSpousePanel'])?'▸':'▾'; if(s.wdSpouseToggle) spCh.classList.remove('disabled'); else spCh.classList.add('disabled'); }
    /* Show/hide income & savings panel (respect sub-collapse) */
    const contribPanel=document.getElementById('wdContribPanel');
    if(contribPanel) contribPanel.style.display=(s.wdContribToggle&&!window._wdSubCollapsed['wdContribPanel'])?'block':'none';
    const cCh=document.querySelector('[data-sub-panel="wdContribPanel"]');
    if(cCh){ cCh.textContent=(!s.wdContribToggle||window._wdSubCollapsed['wdContribPanel'])?'▸':'▾'; if(s.wdContribToggle) cCh.classList.remove('disabled'); else cCh.classList.add('disabled'); }
    /* Show/hide glide path panel (respect sub-collapse) */
    const glidePanel=document.getElementById('wdGlidePanel');
    if(glidePanel) glidePanel.style.display=(savedGlideToggle&&!window._wdSubCollapsed['wdGlidePanel'])?'block':'none';
    const gCh=document.querySelector('[data-sub-panel="wdGlidePanel"]');
    if(gCh){ gCh.textContent=(!savedGlideToggle||window._wdSubCollapsed['wdGlidePanel'])?'▸':'▾'; if(savedGlideToggle) gCh.classList.remove('disabled'); else gCh.classList.add('disabled'); }
    if(savedGlideToggle) {
      const glideModeEl=document.getElementById('wdGlideMode');
      if(glideModeEl){
        glideModeEl.value=s.wdGlideMode==='custom'?'custom':'glidepath';
        onGlideModeChange(glideModeEl.value);
      }
    }
    /* Theme is NOT restored here — it uses its own localStorage key (portfolioTheme)
       and is only applied on import via importSettingsFromFile(). */
    /* Show/hide custom pct field */
    const cpWrap=document.getElementById('wdCustomPctWrap');
    if(cpWrap) cpWrap.style.display=s.wdRothConv==='custom'?'flex':'none';
    /* Show/hide conversion age fields */
    const convAgeWrap=document.getElementById('wdConvAgeWrap');
    const convEndWrap=document.getElementById('wdConvEndWrap');
    if(convAgeWrap) convAgeWrap.style.display=s.wdRothConv&&s.wdRothConv!=='none'?'flex':'none';
    if(convEndWrap) convEndWrap.style.display=s.wdRothConv&&s.wdRothConv!=='none'?'flex':'none';
    /* Restore spending phases */
    if(s._spendPhases&&Array.isArray(s._spendPhases)){
      const container=document.getElementById('spendPhasesContainer');
      if(container){
        container.innerHTML='';
        if(s._spendPhases.length===0) addSpendPhase(); /* default empty row */
        else s._spendPhases.forEach(p=>addSpendPhase(p.age||65,p.amount));
      }
    }
    /* Restore contribution mode + year-by-year schedule */
    if(s._contribMode){
      const modeEl=document.getElementById('wdContribMode');
      if(modeEl){ modeEl.value=s._contribMode; setContribMode(s._contribMode); }
    }
    if(s._contribSchedule&&Array.isArray(s._contribSchedule)){
      const container=document.getElementById('contribYearlyRows');
      if(container){
        container.innerHTML='';
        s._contribSchedule.forEach(r=>addContribYear(r.year,r.age,r.c401k,r.match,r.ira,r.taxable,r.hsa));
      }
    }
    /* Restore one-time spendings */
    if(s._oneTimeSpendings&&Array.isArray(s._oneTimeSpendings)){
      const otsContainer=document.getElementById('oneTimeSpendRows');
      if(otsContainer){
        otsContainer.innerHTML='';
        s._oneTimeSpendings.forEach(r=>addOneTimeSpend(r.year,r.amount,r.desc));
      }
    }
    /* Show/hide one-time spend panel (respect sub-collapse) */
    const otsPanelEl=document.getElementById('wdOneTimeSpendPanel');
    if(otsPanelEl) otsPanelEl.style.display=(s.wdOneTimeSpendToggle&&!window._wdSubCollapsed['wdOneTimeSpendPanel'])?'block':'none';
    const otsCh=document.querySelector('[data-sub-panel="wdOneTimeSpendPanel"]');
    if(otsCh){ otsCh.textContent=(!s.wdOneTimeSpendToggle||window._wdSubCollapsed['wdOneTimeSpendPanel'])?'▸':'▾'; if(s.wdOneTimeSpendToggle) otsCh.classList.remove('disabled'); else otsCh.classList.add('disabled'); }
    /* Restore selected accounts */
    if(s._selectedAccounts&&Array.isArray(s._selectedAccounts)){
      const savedSet=new Set(s._selectedAccounts);
      const cbs=document.querySelectorAll('.acct-sel-cb');
      if(cbs.length>0){
        const hasMatch=[...cbs].some(cb=>savedSet.has(cb.value));
        if(hasMatch) cbs.forEach(cb=>{cb.checked=savedSet.has(cb.value);});
        /* else: keep all checked (stale data from different report) */
        onAcctSelChange();
      }
    }
    /* Restore glide path */
    if(s.wdGlideMode){
      const modeEl=document.getElementById('wdGlideMode');
      if(modeEl) modeEl.value=s.wdGlideMode==='fixed'?'glidepath':s.wdGlideMode;
    }
    if(s._glideWaypoints&&Array.isArray(s._glideWaypoints)){
      const container=document.getElementById('glideWpContainer');
      if(container){
        container.innerHTML='';
        s._glideWaypoints.forEach(wp=>addGlideWaypoint(wp.age,wp.eqPct));
        renderGlideMiniChart();
        saveSettings();
      }
    }
    if(s._glideInterp){
      const interpEl=document.getElementById('wdGlideInterp');
      if(interpEl) interpEl.value=s._glideInterp;
      setGlideInterp(s._glideInterp);
    }
    /* Restore holdings sub-pivot */
    if(s._activeSubPivot){
      _activeSubPivot=s._activeSubPivot;
      const subBtn=document.querySelector(`.sub-pivot-tab[data-sub="${_activeSubPivot}"]`);
      if(subBtn){
        document.querySelectorAll('.sub-pivot-tab').forEach(b=>b.classList.remove('active'));
        subBtn.classList.add('active');
      }
    }
    /* Restore panel collapse/expand state — prefer dedicated key (fresher) over settings blob */
    if(s._wdUIState){
      const fresh=localStorage.getItem(_WD_UI_KEY);
      if(fresh){
        window._wdUIState=_wdSanitizeUIState(JSON.parse(fresh));
      } else {
        window._wdUIState=_wdSanitizeUIState(s._wdUIState);
        _wdPersistUIState();
      }
    }
  }catch(e){}
}

/* ---- Settings File Export / Import ---- */
function exportSettingsToFile(){
  /* Ensure current DOM state is flushed to localStorage first */
  saveSettings();
  const raw=localStorage.getItem(SETTINGS_KEY);
  const data=raw?JSON.parse(raw):{};
  data._exportedAt=new Date().toISOString();
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  const ts=new Date().toISOString().replace(/[:T]/g,'-').replace(/\..*/,'');
  a.download=`portfolio-settings-${ts}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Settings exported successfully', 'success');
}

function importSettingsFromFile(file){
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(typeof data!=='object'||data===null) throw new Error('Invalid settings file');
      /* Write to localStorage */
      localStorage.setItem(SETTINGS_KEY,JSON.stringify(data));
      window._scenResultsCache=''; /* invalidate scenario cache on settings import */
      /* Restore theme from imported file */
      if(data._theme) setTheme(data._theme);
      /* Apply to current UI */
      loadSettings();
      /* Re-render current tab to pick up restored settings */
      const activeBtn=document.querySelector('.pivot-tab.active');
      if(activeBtn) activeBtn.click();
      showToast('Settings loaded successfully', 'success');
    }catch(err){
      showToast('Failed to load settings: '+err.message, 'error');
    }
  };
  reader.readAsText(file);
}

document.addEventListener('DOMContentLoaded',function(){
  const gearBtn=document.getElementById('settingsGearBtn');
  const dropdown=document.getElementById('settingsDropdown');
  const saveBtn=document.getElementById('saveSettingsBtn');
  const loadBtn=document.getElementById('loadSettingsBtn');
  const fileInput=document.getElementById('settingsFileInput');

  if(gearBtn&&dropdown){
    gearBtn.addEventListener('click',function(e){
      e.stopPropagation();
      dropdown.classList.toggle('open');
    });
    document.addEventListener('click',function(){ dropdown.classList.remove('open'); });
    dropdown.addEventListener('click',function(e){ e.stopPropagation(); });
  }
  if(saveBtn) saveBtn.addEventListener('click',function(){
    dropdown.classList.remove('open');
    exportSettingsToFile();
  });
  if(loadBtn) loadBtn.addEventListener('click',function(){
    dropdown.classList.remove('open');
    fileInput.click();
  });
  const exportDataBtn=document.getElementById('exportDataBtn');
  if(exportDataBtn) exportDataBtn.addEventListener('click',function(){
    dropdown.classList.remove('open');
    exportCSV();
  });
  if(fileInput) fileInput.addEventListener('change',function(){
    if(fileInput.files.length>0){
      importSettingsFromFile(fileInput.files[0]);
      fileInput.value=''; /* reset so same file can be re-selected */
    }
  });
  /* Restore theme radio from localStorage */
  const savedTheme=localStorage.getItem('portfolioTheme')||'blue';
  const themeRadio=document.querySelector('input[name="themeChoice"][value="'+savedTheme+'"]');
  if(themeRadio) themeRadio.checked=true;

  const helpBtn=document.getElementById('helpBtn');
  if(helpBtn) helpBtn.addEventListener('click',function(){
    dropdown.classList.remove('open');

  });
});

/* ==== Snapshot Diff ==== */
const SD_STORAGE_KEY='portfolioSnapshotCSV';

/* --- CSV Parser (RFC 4180 compliant) --- */
function _sdParseCSVLine(line){
  const result=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(inQ){
      if(ch==='"'&&line[i+1]==='"'){cur+='"';i++;}
      else if(ch==='"') inQ=false;
      else cur+=ch;
    } else {
      if(ch==='"') inQ=true;
      else if(ch===','){result.push(cur);cur='';}
      else cur+=ch;
    }
  }
  result.push(cur);
  return result;
}

function _sdParseCSVText(text){
  const lines=text.split(/\r?\n/);
  if(lines.length<2) return [];
  const headers=_sdParseCSVLine(lines[0]);
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const line=lines[i].trim();
    if(!line) continue;
    const vals=_sdParseCSVLine(line);
    if(vals.length<headers.length) continue;
    const row={};
    headers.forEach((h,idx)=>{ row[h.trim()]=vals[idx]||''; });
    rows.push(row);
  }
  return rows;
}

function _sdParseCurrency(str){
  if(!str) return null;
  str=str.trim();
  if(!str||str==='N/A'||str==='n/a'||str==='--') return null;
  const neg=/^\(/.test(str)||/^-/.test(str)||/^\$-/.test(str)||/^-\$/.test(str);
  const v=parseFloat(str.replace(/[$,() +\-]/g,''));
  if(isNaN(v)) return null;
  return neg?-v:v;
}

/* Category classification — mirrors main.ps1 $CategoryMap.
   Plan-specific symbols (e.g. 59515R401) may not exist in your portfolio;
   unknown symbols fall through to heuristic classification. */
const _SD_CAT_MAP={
  'FXAIX':'US Index Funds','FSKAX':'US Index Funds','SCHD':'US Index Funds',
  'FTIHX':'International Funds','FZILX':'International Funds','VFWSX':'International Funds',
  'FXNAX':'Bond Funds','FSPTX':'Tech Sector Fund',
  'TQQQ':'Growth / Leveraged ETFs','VOOG':'Growth / Leveraged ETFs','PBW':'Growth / Leveraged ETFs',
  'SPAXX**':'Cash / Money Market','FDRXX**':'Cash / Money Market','CORE**':'Cash / Money Market','FZDXX':'Cash / Money Market',
  'NHFSMKX98':'US Index Funds','59515R401':'US Index Funds','31617E471':'US Index Funds',
  'INTL GROWTH ACCOUNT':'International Funds','SMID CAP GROWTH ACCT':'US Index Funds',
  'Various':'Unspecified'
};
function _sdClassify(sym,desc){
  if(_SD_CAT_MAP[sym]) return _SD_CAT_MAP[sym];
  if(/^BROKERAGELINK/i.test(sym)) return 'Cash / Money Market';
  if(/certificate.of.deposit|^CD\b|\bCD$|brokered\s*cd/i.test(desc||'')) return 'Cash / Money Market';
  if(/^[A-Z]{1,5}$/.test(sym)&&!/\*/.test(sym)) return 'Individual Stocks';
  return 'Other';
}

/* Account type inference — mirrors main.ps1 Get-AccountType */
function _sdInferAcctType(name){
  const n=(name||'').trim();
  if(/roth/i.test(n)) return 'Roth';
  if(/health\s*savings|^HSA/i.test(n)) return 'HSA';
  if(/college\s*savings|529/i.test(n)) return '529 College Savings';
  if(/UTMA|Uniform\s*Transfers?\s*to\s*Minor/i.test(n)) return 'Custodial (UTMA)';
  if(/403\s*\(?b\)?/i.test(n)) return 'Tax-Deferred 403(b)';
  if(/457\s*\(?b\)?/i.test(n)) return 'Tax-Deferred 457(b)';
  if(/\bTSP\b|thrift\s*savings/i.test(n)) return 'Tax-Deferred TSP';
  if(/401[Kk]/i.test(n)) return 'Tax-Deferred 401(k)';
  if(/brokeragelink/i.test(n)) return 'Tax-Deferred 401(k)';
  if(/DCP|deferred\s*comp/i.test(n)) return 'Tax-Deferred DCP';
  if(/rollover\s*ira|traditional\s*ira|sep\s*ira|simple\s*ira/i.test(n)) return 'Tax-Deferred IRA';
  if(/self.employed\s*401/i.test(n)) return 'Tax-Deferred 401(k)';
  if(/\bira\b/i.test(n)) return 'Tax-Deferred IRA';
  if(/individual|joint|wros|trust|living\s*trust|revocable/i.test(n)) return 'Taxable Investment';
  return 'Other';
}

/* Parse a Fidelity CSV export text into {holdings[], total} */
function sdParseFidelityCSV(text){
  const rows=_sdParseCSVText(text);
  if(!rows.length) return {holdings:[],total:0};
  const hasAcctType=Object.prototype.hasOwnProperty.call(rows[0],'Account Type');
  const map=new Map();
  for(const row of rows){
    let sym=(row['Symbol']||'').trim();
    const acctNum=(row['Account Number']||'').trim();
    const acctName=(row['Account Name']||'').trim();
    const desc=(row['Description']||'').trim();
    const valStr=(row['Current Value']||'').trim();
    if(!acctNum||!valStr||valStr==='N/A'||valStr==='n/a'||valStr==='--') continue;
    if(!sym&&!desc) continue;
    if(/pending\s*activity/i.test(desc)||/pending\s*activity/i.test(sym)) continue;
    if(/(401K|403B|457B?|TSP)\s*PLAN$/i.test(acctName)&&/BROKERAGELINK/i.test(desc)) continue;
    const val=_sdParseCurrency(valStr);
    if(val===null) continue;
    if(!sym) sym=desc;
    const acctType=hasAcctType?((row['Account Type']||'').trim()||_sdInferAcctType(acctName)):_sdInferAcctType(acctName);
    const gl=_sdParseCurrency(row['Total Gain/Loss Dollar']);
    const cb=_sdParseCurrency(row['Cost Basis Total']);
    const cat=_sdClassify(sym,desc);
    const key=acctNum+'|'+sym;
    if(map.has(key)){
      const e=map.get(key);
      e.value+=val;
      if(e.gainLoss!==null&&gl!==null) e.gainLoss+=gl;
      else if(gl!==null) e.gainLoss=gl;
      if(e.costBasis!==null&&cb!==null) e.costBasis+=cb;
      else if(cb!==null) e.costBasis=cb;
    } else {
      map.set(key,{accountNumber:acctNum,accountName:acctName,accountType:acctType,
        symbol:sym,description:desc,value:val,category:cat,gainLoss:gl,costBasis:cb});
    }
  }
  const holdings=Array.from(map.values());
  holdings.forEach(h=>{
    h.gainLossPct=(h.costBasis&&h.costBasis>0&&h.gainLoss!==null)?Math.round(h.gainLoss/h.costBasis*10000)/100:null;
  });
  return {holdings,total:holdings.reduce((s,h)=>s+h.value,0)};
}

/* Flatten the baked-in DATA into the same format for comparison */
function sdFlattenCurrentData(){
  const holdings=[];
  DATA.forEach(d=>{
    d.accounts.forEach(a=>{
      a.tickers.forEach(t=>{
        holdings.push({accountNumber:a.num,accountName:a.name,accountType:a.type,
          symbol:t.sym,description:t.name,value:t.val,category:d.cat,
          gainLoss:t.gl,gainLossPct:t.glPct,costBasis:t.cb});
      });
    });
  });
  return {holdings,total:GRAND};
}

/* Compute the full diff between two parsed snapshots */
function sdComputeDiff(before,after){
  const bMap=new Map(),aMap=new Map();
  before.holdings.forEach(h=>bMap.set(h.accountNumber+'|'+h.symbol,h));
  after.holdings.forEach(h=>aMap.set(h.accountNumber+'|'+h.symbol,h));

  const newPos=[],closedPos=[],changed=[];
  aMap.forEach((aH,key)=>{
    if(!bMap.has(key)){newPos.push(aH);}
    else{
      const bH=bMap.get(key);
      const chg=aH.value-bH.value;
      const chgPct=bH.value!==0?(chg/Math.abs(bH.value)*100):(chg!==0?100:0);
      changed.push({...aH,beforeValue:bH.value,change:chg,changePct:chgPct,
        beforeGainLoss:bH.gainLoss,beforeCostBasis:bH.costBasis});
    }
  });
  bMap.forEach((bH,key)=>{if(!aMap.has(key)) closedPos.push(bH);});

  /* Category-level diff */
  const bByCat={},aByCat={};
  before.holdings.forEach(h=>{bByCat[h.category]=(bByCat[h.category]||0)+h.value;});
  after.holdings.forEach(h=>{aByCat[h.category]=(aByCat[h.category]||0)+h.value;});
  const allCats=new Set([...Object.keys(bByCat),...Object.keys(aByCat)]);
  const catDiff=[];
  allCats.forEach(cat=>{
    const bv=bByCat[cat]||0,av=aByCat[cat]||0;
    const bPct=before.total>0?bv/before.total*100:0;
    const aPct=after.total>0?av/after.total*100:0;
    catDiff.push({category:cat,beforeValue:bv,afterValue:av,beforePct:bPct,afterPct:aPct,
      change:av-bv,drift:aPct-bPct});
  });
  catDiff.sort((a,b)=>Math.abs(b.drift)-Math.abs(a.drift));

  /* Account-level diff */
  const bByAcct={},aByAcct={};
  before.holdings.forEach(h=>{
    if(!bByAcct[h.accountNumber]) bByAcct[h.accountNumber]={name:h.accountName,type:h.accountType,value:0};
    bByAcct[h.accountNumber].value+=h.value;
  });
  after.holdings.forEach(h=>{
    if(!aByAcct[h.accountNumber]) aByAcct[h.accountNumber]={name:h.accountName,type:h.accountType,value:0};
    aByAcct[h.accountNumber].value+=h.value;
  });
  const allAccts=new Set([...Object.keys(bByAcct),...Object.keys(aByAcct)]);
  const acctDiff=[];
  allAccts.forEach(num=>{
    const b=bByAcct[num]||{name:'',type:'',value:0};
    const a=aByAcct[num]||{name:'',type:'',value:0};
    acctDiff.push({accountNumber:num,accountName:a.name||b.name,accountType:a.type||b.type,
      beforeValue:b.value,afterValue:a.value,change:a.value-b.value,
      changePct:b.value!==0?((a.value-b.value)/Math.abs(b.value)*100):(a.value!==0?100:0)});
  });
  acctDiff.sort((a,b)=>Math.abs(b.change)-Math.abs(a.change));

  /* Build hierarchical data: Category → Account → Holdings (mirrors renderCards pattern) */
  /* Merge ALL holdings (new, closed, changed) into one unified list with status flags */
  const allHoldings=[];
  newPos.forEach(h=>allHoldings.push({...h,status:'new',beforeValue:0,change:h.value,changePct:100}));
  closedPos.forEach(h=>allHoldings.push({...h,status:'closed',afterValue:0,change:-h.value,changePct:-100,
    value:0,beforeValue:h.value}));
  changed.forEach(h=>allHoldings.push({...h,status:'changed'}));

  /* Group by category, then by account within category */
  const catMap=new Map();
  allHoldings.forEach(h=>{
    const cat=h.category||'Other';
    if(!catMap.has(cat)) catMap.set(cat,new Map());
    const acctMap=catMap.get(cat);
    const acctKey=h.accountNumber;
    if(!acctMap.has(acctKey)) acctMap.set(acctKey,{name:h.accountName,type:h.accountType,num:h.accountNumber,holdings:[]});
    acctMap.get(acctKey).holdings.push(h);
  });

  const hierarchy=[];
  catMap.forEach((acctMap,cat)=>{
    const accounts=[];
    let catBefore=0,catAfter=0,catNewCount=0,catClosedCount=0;
    acctMap.forEach(acctData=>{
      let acctBefore=0,acctAfter=0;
      acctData.holdings.forEach(h=>{
        acctBefore+=(h.beforeValue||0);
        acctAfter+=(h.status==='closed'?0:h.value);
      });
      acctData.holdings.sort((a,b)=>Math.abs(b.change)-Math.abs(a.change));
      accounts.push({...acctData,beforeValue:acctBefore,afterValue:acctAfter,
        change:acctAfter-acctBefore});
      catBefore+=acctBefore;catAfter+=acctAfter;
      acctData.holdings.forEach(h=>{
        if(h.status==='new') catNewCount++;
        if(h.status==='closed') catClosedCount++;
      });
    });
    accounts.sort((a,b)=>Math.abs(b.change)-Math.abs(a.change));
    const bPct=before.total>0?catBefore/before.total*100:0;
    const aPct=after.total>0?catAfter/after.total*100:0;
    hierarchy.push({category:cat,accounts,beforeValue:catBefore,afterValue:catAfter,
      change:catAfter-catBefore,beforePct:bPct,afterPct:aPct,drift:aPct-bPct,
      newCount:catNewCount,closedCount:catClosedCount});
  });
  hierarchy.sort((a,b)=>Math.abs(b.change)-Math.abs(a.change));

  /* Build account-level hierarchy: Account → Holdings (for the Account Summary drilldown) */
  const acctHierMap=new Map();
  allHoldings.forEach(h=>{
    const key=h.accountNumber;
    if(!acctHierMap.has(key)) acctHierMap.set(key,{name:h.accountName,type:h.accountType,num:h.accountNumber,holdings:[]});
    acctHierMap.get(key).holdings.push(h);
  });
  const accountHierarchy=[];
  acctHierMap.forEach(acctData=>{
    let bv=0,av=0,nc=0,cc=0;
    acctData.holdings.forEach(h=>{
      bv+=(h.beforeValue||0);
      av+=(h.status==='closed'?0:h.value);
      if(h.status==='new') nc++;
      if(h.status==='closed') cc++;
    });
    acctData.holdings.sort((a,b)=>Math.abs(b.change)-Math.abs(a.change));
    accountHierarchy.push({...acctData,beforeValue:bv,afterValue:av,
      change:av-bv,changePct:bv!==0?((av-bv)/Math.abs(bv)*100):(av!==0?100:0),
      newCount:nc,closedCount:cc});
  });
  accountHierarchy.sort((a,b)=>Math.abs(b.change)-Math.abs(a.change));

  return {
    totalBefore:before.total,totalAfter:after.total,
    totalChange:after.total-before.total,
    totalChangePct:before.total>0?((after.total-before.total)/before.total*100):0,
    newPositions:newPos.sort((a,b)=>b.value-a.value),
    closedPositions:closedPos.sort((a,b)=>b.value-a.value),
    changedPositions:changed.sort((a,b)=>Math.abs(b.change)-Math.abs(a.change)),
    categoryDiff:catDiff,accountDiff:acctDiff,hierarchy,accountHierarchy
  };
}

/* Extract date from Fidelity CSV filename */
function sdExtractDate(filename){
  const m=(filename||'').match(/(\w{3})-(\d{1,2})-(\d{4})/);
  return m?m[1]+' '+m[2]+', '+m[3]:null;
}

/* Compute day span between two date strings like "Mar 12, 2026" */
function sdDaySpan(d1,d2){
  try{
    const a=new Date(d1),b=new Date(d2);
    if(isNaN(a)||isNaN(b)) return null;
    return Math.round(Math.abs(b-a)/(1000*60*60*24));
  }catch(e){return null;}
}

/* Helper: format change value with sign and color */
function _sdFmtChg(v){
  if(v==null) return '';
  const cls=v>0?'sd-pos':v<0?'sd-neg':'';
  const sign=v>0?'+':'';
  return `<span class="${cls}">${sign}${fmt(v)}</span>`;
}
function _sdFmtChgPct(v){
  if(v==null) return '';
  const cls=v>0?'sd-pos':v<0?'sd-neg':'';
  const sign=v>0?'+':'';
  return `<span class="${cls}">${sign}${v.toFixed(2)}%</span>`;
}

/* ---------- Main render function ---------- */
function renderSnapshotDiff(){
  const el=document.getElementById('drilldown');
  const allocEl=document.getElementById('allocOverview');
  const insEl=document.querySelector('.insights');
  allocEl.style.display='none';
  if(insEl) insEl.style.display='none';

  /* Check if we have a cached snapshot */
  let cachedCSV=null,cachedName=null;
  try{
    const raw=localStorage.getItem(SD_STORAGE_KEY);
    if(raw){const parsed=JSON.parse(raw);cachedCSV=parsed.csv;cachedName=parsed.name;}
  }catch(e){}

  if(!cachedCSV){
    /* Show upload zone */
    el.innerHTML=`
      <div style="max-width:600px;margin:40px auto">
        <div class="sd-upload-zone" id="sdUploadZone">
          <div class="sd-upload-icon">&#128202;</div>
          <div class="sd-upload-title">Upload a Previous Portfolio CSV</div>
          <div class="sd-upload-sub">Drop a Fidelity <code>Portfolio_Positions_*.csv</code> file here, or click to browse.<br>
            The current report will be compared against this earlier snapshot.</div>
          <input type="file" id="sdFileInput" accept=".csv" style="display:none">
        </div>
      </div>`;
    const zone=document.getElementById('sdUploadZone');
    const inp=document.getElementById('sdFileInput');
    zone.addEventListener('click',()=>inp.click());
    zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('dragover');});
    zone.addEventListener('dragleave',()=>zone.classList.remove('dragover'));
    zone.addEventListener('drop',e=>{
      e.preventDefault();zone.classList.remove('dragover');
      if(e.dataTransfer.files.length>0) _sdHandleFile(e.dataTransfer.files[0]);
    });
    inp.addEventListener('change',()=>{if(inp.files.length>0) _sdHandleFile(inp.files[0]);});
    return;
  }

  /* We have CSV data — parse and render diff */
  _sdRenderResults(cachedCSV,cachedName);
}

function _sdHandleFile(file){
  const reader=new FileReader();
  reader.onload=function(e){
    const text=e.target.result;
    /* Validate it looks like a Fidelity CSV */
    const firstLine=(text.split(/\r?\n/)[0]||'');
    if(!/Account Number/i.test(firstLine)||!/Current Value/i.test(firstLine)){
      showToast('This does not appear to be a Fidelity Portfolio Positions CSV.', 'error');
      return;
    }
    /* Store in localStorage */
    try{
      localStorage.setItem(SD_STORAGE_KEY,JSON.stringify({csv:text,name:file.name}));
    }catch(err){
      showToast('File too large to store in browser storage.', 'error');
      return;
    }
    _sdRenderResults(text,file.name);
  };
  reader.readAsText(file);
}

function _sdRenderResults(csvText,fileName){
  const el=document.getElementById('drilldown');
  const before=sdParseFidelityCSV(csvText);
  const after=sdFlattenCurrentData();

  if(before.holdings.length===0){
    el.innerHTML='<div style="padding:40px;text-align:center;color:var(--text-muted)">No valid holdings found in the uploaded CSV.</div>';
    return;
  }

  const diff=sdComputeDiff(before,after);
  const beforeDate=sdExtractDate(fileName)||'Previous';
  const currentDateEl=document.querySelector('.header .subtitle');
  let currentDate='Current';
  if(currentDateEl){
    const dm=currentDateEl.textContent.match(/·\s*([A-Za-z]{3}\s+\d{1,2},?\s+\d{4})/);
    if(dm) currentDate=dm[1].replace(',','');
  }
  const days=sdDaySpan(beforeDate,currentDate);
  const chgCls=diff.totalChange>=0?'sd-pos':'sd-neg';
  const chgBgCls=diff.totalChange>=0?'sd-pos-bg':'sd-neg-bg';

  let html='';

  /* Toolbar */
  html+=`<div class="sd-toolbar">
    <div style="font-size:0.85em;color:var(--text-muted)">Comparing <strong>${esc(fileName)}</strong> against current report</div>

/* ---- Spending Phases (age-based, tied to primary participant) ---- */
const PHASE_TAGS=[
  {max:74,label:'Go-Go',color:'var(--success)',bg:'var(--success-bg)'},
  {max:84,label:'Slow-Go',color:'var(--warning-dark)',bg:'var(--warning-bg-light)'},
  {max:999,label:'No-Go',color:'var(--danger)',bg:'var(--danger-bg)'}
];
function getPhaseTag(age){
  if(!age) return '';
  for(const t of PHASE_TAGS) if(age<=t.max) return `<span class="sp-tag" style="color:${t.color};background:${t.bg}">${t.label}</span>`;
  return '';
}

function addSpendPhase(age,amount){
  const container=document.getElementById('spendPhasesContainer');
  if(!container) return;
  const idx=container.children.length;
  const defaultAge=idx===0?65:(parseInt(container.lastElementChild?.querySelector('.sp-age')?.value||65)+10);
  const row=document.createElement('div');
  row.className='spend-phase-row';
  row.innerHTML=`<span class="sp-label">From age</span>`+
    `<input type="number" class="sp-age" value="${age!=null?age:defaultAge}" min="30" max="120" step="1" onchange="updatePhaseTag(this)">`+
    `<span class="sp-label" style="min-width:40px">spend</span>`+
    `<span style="font-size:0.85em;color:var(--text-muted)">$</span>`+
    `<input type="number" class="sp-amt" value="${amount!=null?amount:''}" min="0" max="100000" step="500" placeholder="$/mo (0 = SS only)">`+
    `<span class="sp-label" style="min-width:20px">/mo</span>`+
    `<span class="sp-phase-tag">${getPhaseTag(age!=null?age:defaultAge)}</span>`+
    `<button type="button" class="spend-phase-del" onclick="this.parentElement.remove();saveSettings()" title="Remove phase">\u00D7</button>`;
  container.appendChild(row);
  /* Attach save listeners to dynamically added inputs */
  row.querySelectorAll('input').forEach(inp=>inp.addEventListener('change',saveSettings));
}

function updatePhaseTag(input){
  const tag=input.closest('.spend-phase-row').querySelector('.sp-phase-tag');
  if(tag) tag.innerHTML=getPhaseTag(parseInt(input.value));
}

function getSpendPhases(){
  const rows=document.querySelectorAll('#spendPhasesContainer .spend-phase-row');
  const phases=[];
  rows.forEach(r=>{
    const age=Math.max(30,Math.min(120,parseInt(r.querySelector('.sp-age').value)));
    const amount=Math.max(0,parseFloat(r.querySelector('.sp-amt').value)||0);
    if(!isNaN(age)) phases.push({age,amount});
  });
  phases.sort((a,b)=>a.age-b.age);
  return phases;
}

/* ---- One-Time Spendings (year-based lump sums) ---- */
function addOneTimeSpend(year,amount,desc){
  const container=document.getElementById('oneTimeSpendRows');
  if(!container) return;
  const curYear=new Date().getFullYear();
  const maxY=container.children.length>0?Math.max(...Array.from(container.querySelectorAll('.ots-year')).map(e=>parseInt(e.value)||curYear)):curYear;
  const safeYear=parseInt(year)||maxY+1;
  const safeAmt=parseFloat(amount)||'';
  const row=document.createElement('div');
  row.className='ots-row';
  row.dataset.year=safeYear;
  row.innerHTML=`<input type="number" class="ots-year" value="${safeYear}" min="${curYear}" max="${curYear+80}" step="1" style="width:70px" title="Calendar year for this expense">`+
    `<span style="font-size:0.85em;color:var(--text-muted)">$</span>`+
    `<input type="number" class="ots-amount" value="${safeAmt}" min="0" step="1000" placeholder="Amount" style="width:110px" title="One-time expense in today's dollars (inflation-adjusted in simulations)">`+
    `<input type="text" class="ots-desc" value="${desc!=null?esc(desc):''}" placeholder="Description" style="width:180px;font-size:0.85em" title="Optional description">`+
    `<button type="button" class="spend-phase-del" onclick="this.parentElement.remove();saveSettings()" title="Remove">\u00D7</button>`;
  /* Insert sorted by year */
  let inserted=false;
  for(const child of container.children){
    const childYear=parseInt(child.querySelector('.ots-year')?.value)||0;
    if(childYear>safeYear){container.insertBefore(row,child);inserted=true;break;}
  }
  if(!inserted) container.appendChild(row);
  row.querySelectorAll('input').forEach(inp=>{inp.addEventListener('change',saveSettings);inp.addEventListener('input',saveSettings);});
}

function getOneTimeSpendSchedule(){
  const rows=document.querySelectorAll('#oneTimeSpendRows .ots-row');
  const items=[];
  rows.forEach(r=>{
    const year=parseInt(r.querySelector('.ots-year')?.value);
    const amount=Math.max(0,parseFloat(r.querySelector('.ots-amount')?.value)||0);
    const desc=(r.querySelector('.ots-desc')?.value||'').trim();
    if(Number.isFinite(year)&&amount>0) items.push({year,amount,desc});
  });
  items.sort((a,b)=>a.year-b.year);
  return items;
}

function buildOneTimeSpendByAge(schedule,curAge,curYear){
  const byAge={};
  if(!schedule||!schedule.length) return byAge;
  for(const s of schedule){
    const age=curAge+(s.year-curYear);
    if(Number.isFinite(age)) byAge[age]=(byAge[age]||0)+(s.amount||0);
  }
  return byAge;
}
/* Detailed one-time items preserving descriptions, keyed by age */
function buildOneTimeItemsByAge(schedule,curAge,curYear){
  const byAge={};
  if(!schedule||!schedule.length) return byAge;
  for(const s of schedule){
    const age=curAge+(s.year-curYear);
    if(Number.isFinite(age)&&(s.amount||0)>0){
      if(!byAge[age]) byAge[age]=[];
      byAge[age].push({desc:s.desc||'One-time expense',amount:s.amount});
    }
  }
  return byAge;
}

function blendGlideAllocation(eqPct){
  const eq=Math.max(0,Math.min(100,parseFloat(eqPct)||0))/100;
  const bond=1-eq;
  return {
    eqPct:eq*100,
    ret:eq*CMA.equity.ret+bond*CMA.bonds.ret,
    vol:Math.sqrt((eq*eq*CMA.equity.vol*CMA.equity.vol)+(bond*bond*CMA.bonds.vol*CMA.bonds.vol))
  };
}
function buildGlideSchedule(retAge,lifeExp,mode,waypoints,curAge,interp){
  const glideMode=(mode||'fixed').toLowerCase();
  if(glideMode==='fixed') return null;
  const startAge=Math.max(0,parseInt(curAge,10)||parseInt(retAge,10)||0);
  const endAge=Math.max(startAge,parseInt(lifeExp,10)||startAge);
  let sortedWps=(Array.isArray(waypoints)?waypoints:[])
    .map(wp=>({age:parseInt(wp.age,10),eqPct:Math.max(0,Math.min(100,parseFloat(wp.eqPct)))}))
    .filter(wp=>Number.isFinite(wp.age)&&Number.isFinite(wp.eqPct))
    .sort((a,b)=>a.age-b.age);
  if(glideMode==='custom'&&sortedWps.length===0) sortedWps=[{age:55,eqPct:60},{age:75,eqPct:30}];
  const schedule=[];
  for(let age=startAge;age<=endAge;age++){
    let eqPct=0;
    if(glideMode==='glidepath'){
      eqPct=Math.max(20,Math.min(80,110-age));
    } else if(glideMode==='custom'){
      if(sortedWps.length===1) eqPct=sortedWps[0].eqPct;
      else if(age<=sortedWps[0].age) eqPct=sortedWps[0].eqPct;
      else if(age>=sortedWps[sortedWps.length-1].age) eqPct=sortedWps[sortedWps.length-1].eqPct;
      else {
        for(let i=0;i<sortedWps.length-1;i++){
          const a=sortedWps[i],b=sortedWps[i+1];
          if(age>=a.age&&age<=b.age){
            const span=Math.max(1,b.age-a.age);
            if((interp||'linear')==='step'){
              eqPct=a.eqPct;
            } else {
              const t=(age-a.age)/span;
              eqPct=a.eqPct+(b.eqPct-a.eqPct)*t;
            }
            break;
          }
        }
      }
    } else {
      return null;
    }
    const blended=blendGlideAllocation(eqPct);
    schedule.push({age,eqPct:blended.eqPct,ret:blended.ret,vol:blended.vol});
  }

}
function getReturnForAge(schedule,age,fallbackRetPct){
  if(!schedule) return fallbackRetPct;
  if(!schedule.length) return {age,eqPct:null,ret:fallbackRetPct||0,vol:0};
  if(age<=schedule[0].age) return schedule[0];
  if(age>=schedule[schedule.length-1].age) return schedule[schedule.length-1];
  return schedule.find(entry=>entry.age===age)||schedule[schedule.length-1];
}
function buildContribForAge(settings){
  const zeroContrib=()=>({c401k:0,match:0,ira:0,taxable:0,hsa:0});
  const saved=settings&&typeof settings==='object'?settings:{};
  const contribEnabled=saved.wdContribToggle===true||saved.wdContribToggle==='true';
  if(!contribEnabled) return function(){ return zeroContrib(); };
  const contribMode=saved._contribMode||saved.wdContribMode||'flat';
  if(contribMode==='yearly'){
    const contribByAge={};
    if(Array.isArray(saved._contribSchedule)){
      saved._contribSchedule.forEach(row=>{
        const age=parseInt(row?.age,10);
        if(!Number.isFinite(age)) return;
        contribByAge[age]={
          c401k:parseFloat(row?.c401k)||0,
          match:parseFloat(row?.match)||0,
          ira:parseFloat(row?.ira)||0,
          taxable:parseFloat(row?.taxable)||0,
          hsa:parseFloat(row?.hsa)||0
        };
      });
    }
    return function(age){
      const ageKey=parseInt(age,10);
      return Number.isFinite(ageKey)&&contribByAge[ageKey]?{...contribByAge[ageKey]}:zeroContrib();
    };
  }
  const curAge=parseInt(saved.wdAge,10);
  const retAge=parseInt(saved.wdRetire,10);
  const contribStartAge=Number.isFinite(parseInt(saved.wdContribStartAge,10))?parseInt(saved.wdContribStartAge,10):(Number.isFinite(curAge)?curAge:55);
  const contribEndAge=Number.isFinite(parseInt(saved.wdContribEndAge,10))?parseInt(saved.wdContribEndAge,10):(Number.isFinite(retAge)?retAge:65);
  const flatContrib={
    c401k:parseFloat(saved.wdContrib401k)||0,
    match:parseFloat(saved.wdContribMatch)||0,
    ira:parseFloat(saved.wdContribIRA)||0,
    taxable:parseFloat(saved.wdContribTaxable)||0,
    hsa:parseFloat(saved.wdContribHSA)||0
  };
  return function(age){
    const ageNum=parseInt(age,10);
    if(Number.isFinite(ageNum)&&ageNum>=contribStartAge&&ageNum<=contribEndAge) return {...flatContrib};
    return zeroContrib();
  };
}
function buildContribForAgeFromSettings(savedSettings){
  let saved=savedSettings;
  if(!saved){
    try{ saved=JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}'); }
    catch(e){ saved={}; }
  }

}

function getGlideWaypoints(){

function onGlideToggleChange(checked){

function onGlideModeChange(mode){
  const glideMode=(mode||'fixed').toLowerCase();
  const priorMode=window._currentWdGlideMode||'fixed';
  const usingGlide=glideMode!=='fixed';
  const autoDesc=document.getElementById('glideAutoDesc');
  const custom=document.getElementById('glideCustomWaypoints');
  const retEl=document.getElementById('wdReturn');
  const volEl=document.getElementById('wdVol');
  const wpContainer=document.getElementById('glideWpContainer');
  if(priorMode==='fixed'&&usingGlide){
    if(retEl) window._savedFixedReturn=retEl.value;
    if(volEl) window._savedFixedVol=volEl.value;
  }
  if(priorMode!=='fixed'&&glideMode==='fixed'){
    const rVal=window._savedFixedReturn||retEl?.getAttribute('data-fixed-return')||retEl?.defaultValue;
    const vVal=window._savedFixedVol||volEl?.getAttribute('data-fixed-vol')||volEl?.defaultValue;
    if(retEl&&rVal!=null){ retEl.value=rVal; retEl.title=''; }
    if(volEl&&vVal!=null){ volEl.value=vVal; volEl.title=''; }
  }
  if(autoDesc) autoDesc.style.display=glideMode==='glidepath'?'block':'none';
  if(custom) custom.style.display=glideMode==='custom'?'block':'none';
  if(retEl){
    retEl.readOnly=usingGlide;
    retEl.title=usingGlide?'Auto-calculated from Glide Path. Disable Glide Path to edit manually.':'';
    setGlideDisplayAttribute(retEl,usingGlide);
  }
  if(volEl){
    volEl.readOnly=usingGlide;
    volEl.title=usingGlide?'Auto-calculated from Glide Path. Disable Glide Path to edit manually.':'';
    setGlideDisplayAttribute(volEl,usingGlide);
  }
  if(glideMode==='fixed'){
    const scGlideEl=document.getElementById('scSharedGlide');
    if(scGlideEl&&scGlideEl.value==='inherit'){
      scGlideEl.value='fixed';
      if(typeof window._scGlideChanged==='function') window._scGlideChanged();
    }
    try{
      const raw=localStorage.getItem(SETTINGS_KEY);
      const saved=raw?JSON.parse(raw):{};
      if(saved.scSharedGlide==='inherit'){
        saved.scSharedGlide='fixed';
        localStorage.setItem(SETTINGS_KEY,JSON.stringify(saved));
      }
    }catch(e){}
  }
  if(glideMode==='custom'&&wpContainer&&wpContainer.children.length===0){
    [{age:55,eqPct:60},{age:75,eqPct:30}].forEach(wp=>addGlideWaypoint(wp.age,wp.eqPct));

  saveSettings();
