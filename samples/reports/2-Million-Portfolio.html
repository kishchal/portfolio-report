function _scenarioSim(p){
  const {curAge,retAge,lifeExp,retPct,inflPct,filing,ssMonthly,ssStartAge,
    rothConvStrategy,convStartAge,convEndAge,bTaxableInit,bDeferredInit,bRothInit,bHSAInit,
    hasSpouse,spAge,spLifeExp,spSSMonthly,spSSStartAge,spendPhases,customBracketLimit,iraBasis,glideSchedule,oneTimeByAge}=p;
  if(oneTimeByAge && Object.values(oneTimeByAge).some(v=>!Number.isFinite(v))){
    return {rows:[],cumTax:0,totalConversions:0,cumConvTax:0};
  }
  const brackets=filing==='mfj'?TAX_BRACKETS_MFJ:TAX_BRACKETS_SINGLE;
  const birthYear=(new Date()).getFullYear()-curAge;
  const RMD_AGE=birthYear>=1960?75:(birthYear<=1950?72:73);
  const yearsToRetire=retAge-curAge;
  const planEndAge=hasSpouse?Math.max(lifeExp,curAge+(spLifeExp-spAge)):lifeExp;
  const yearsInRetirement=planEndAge-retAge+1;
  const CONV_LIMITS={none:0,conservative:filing==='mfj'?96950:48475,moderate:filing==='mfj'?206700:103350,aggressive:filing==='mfj'?394600:197300};
  const convLimit=rothConvStrategy==='custom'?(customBracketLimit||0):(CONV_LIMITS[rothConvStrategy]||0);
  const ssAnnualFRA=ssMonthly*12;
  const spSSAnnualFRA=(spSSMonthly||0)*12;
  const spAgeOffset=hasSpouse?(spAge-curAge):0;
  const hasPhases=spendPhases&&spendPhases.some(ph=>ph.amount>0);
  const totalAtRetire=bTaxableInit+bDeferredInit+bRothInit+bHSAInit;
  const fallbackW=totalAtRetire*0.04;
  let bT=bTaxableInit,bD=bDeferredInit,bR=bRothInit,bH=bHSAInit;
  let remainingBasis=iraBasis||0;
  const rows=[];let cumTax=0,totalConversions=0,cumConvTax=0;
  for(let yr=0;yr<yearsInRetirement;yr++){
    const age=retAge+yr;
    const spouseAge=hasSpouse?(age+spAgeOffset):0;
    const stdDed=getStdDeduction(filing,age,spouseAge,hasSpouse,yr>0?rows[yr-1]._magi:null);
    const inflMult=Math.pow(1+inflPct,yr+yearsToRetire);
    const yrRet=glideSchedule?getReturnForAge(glideSchedule,age,retPct).ret:retPct;
    let yourSS=0;
    if(ssAnnualFRA>0&&age>=ssStartAge&&age<=lifeExp) yourSS=ssAnnualFRA*(SS_AGE_FACTOR[ssStartAge]||1.0)*inflMult;
    let spSS=0;
    if(hasSpouse&&spSSAnnualFRA>0&&spouseAge>=(spSSStartAge||67)&&spouseAge<=spLifeExp) spSS=spSSAnnualFRA*(SS_AGE_FACTOR[spSSStartAge||67]||1.0)*inflMult;
    const ssIncome=yourSS+spSS;
    /* Post-retirement side income plus any continued Roth/HSA contributions */
    const _gcfa=p.getContribForAge||function(){return{c401k:0,match:0,ira:0,taxable:0,hsa:0};};
    const _postC=_gcfa(age);
    const postRetIncome=(_postC.c401k+_postC.match+_postC.taxable)*inflMult;
    const postRetRothContrib=_postC.ira*inflMult;
    const postRetHSAContrib=_postC.hsa*inflMult;
    const phaseExp=getAnnualExpenseForAge(age,spendPhases||[]);
    const baseW=hasPhases?phaseExp:fallbackW;
    let totalNeed=hasPhases?baseW*inflMult:baseW*Math.pow(1+inflPct,yr);
    const curTot=bT+bD+bR+bH;
    if(curTot<=0){
      /* Portfolio depleted — still tax SS and side income */
      const depOrdIncome=postRetIncome;
      const depSTax=ssIncome>0?calcSSTaxableAmount(ssIncome,depOrdIncome,filing):0;
      const depTI=Math.max(0,depOrdIncome+depSTax-stdDed);
      let depTax=(depOrdIncome+depSTax)>0?calcTax(depTI,brackets):0;
      if(p.stateTaxPct>0&&depTI>0) depTax+=depTI*p.stateTaxPct;
      const depNMed=(age>=65&&age<=lifeExp?1:0)+(hasSpouse&&spouseAge>=65&&spouseAge<=spLifeExp?1:0);
      const depMagi=depOrdIncome+depSTax;
      const depIrmaaMagi=yr>=2&&rows[yr-2]?rows[yr-2]._magi:depMagi;
      if(depNMed>0) depTax+=calcIRMAA(depIrmaaMagi,filing,depNMed);
      cumTax+=depTax;
      bR=postRetRothContrib; bH=postRetHSAContrib;
      rows.push({age,spouseAge,afterTax:ssIncome+postRetIncome-depTax,tax:depTax,bTaxable:0,bDeferred:0,bRoth:bR,bHSA:bH,totalIncome:ssIncome+postRetIncome,_magi:depMagi,yrRet});
      continue;
    }
    if(!hasPhases){totalNeed=Math.max(curTot*0.035,Math.min(curTot*0.055,totalNeed));}
    /* Add one-time spendings */
    const scnOts=oneTimeByAge?oneTimeByAge[age]:0;
    if(scnOts>0) totalNeed+=scnOts*inflMult;
    const incomeSurplus=Math.max(0,ssIncome+postRetIncome-totalNeed);
    let target=Math.max(0,Math.min(totalNeed-ssIncome-postRetIncome,curTot));
    let rmd=0;
    if(age>=RMD_AGE&&bD>0){const div=RMD_TABLE[age]??(age>120?2:Math.max(2,120-age));rmd=bD/div;}
    let wTx=0,wDf=0,wRo=0,wHs=0,rem=target;
    const annMed=age>=65?5000*Math.pow(1+inflPct,age-curAge):0;
    if(age>=65&&bH>0){wHs=Math.min(annMed,bH,rem);rem-=wHs;}
    if(age>=RMD_AGE){wDf=Math.min(rmd,bD);rem-=wDf;if(rem>0){const ft=Math.min(rem,bT);wTx=ft;rem-=ft;}if(rem>0){const md=Math.min(rem,bD-wDf);wDf+=md;rem-=md;}if(rem>0){const fr=Math.min(rem,bR);wRo=fr;rem-=fr;}}
    else{const ft=Math.min(rem,bT);wTx=ft;rem-=ft;if(rem>0){const bl=(filing==='mfj'?206700:103350)+stdDed;const dt=Math.min(rem,bl,bD);wDf=dt;rem-=dt;}if(rem>0){const fr=Math.min(rem,bR);wRo=fr;rem-=fr;}if(rem>0){const md=Math.min(rem,bD-wDf);wDf+=md;rem-=md;}}
    if(rem>0&&bH>wHs){const mh=Math.min(rem,bH-wHs);wHs+=mh;rem-=mh;}
    let rothConv=0,taxableConvAmt=0;
    const hsaNM=Math.max(0,wHs-annMed);
    if(rothConvStrategy!=='none'&&age>=convStartAge&&age<=convEndAge&&bD>wDf&&convLimit>0){
      const stFC=ssIncome>0?calcSSTaxableAmount(ssIncome,wDf+wTx+hsaNM+postRetIncome,filing):0;
      const ordBC=wDf+postRetIncome+stFC+hsaNM;
      /* IRA basis pro-rata — size conversion correctly for basis */
      const totalIRA=bD;
      const basisFr=totalIRA>0?Math.min(1,remainingBasis/totalIRA):0;
      const room=Math.max(0,convLimit+stdDed-ordBC);
      const effectiveRoom=basisFr<1?room/(1-basisFr):Infinity;
      rothConv=Math.min(effectiveRoom,bD-wDf);
      if(rothConv>0){
        const taxableConv=rothConv*(1-basisFr);
        taxableConvAmt=taxableConv;
        remainingBasis=Math.max(0,remainingBasis-rothConv*basisFr);
        totalConversions+=rothConv;
        /* Estimate conv tax using differential method with SS re-taxation */
        const ordBase=wDf+hsaNM+postRetIncome;
        const ssWithout=ssIncome>0?calcSSTaxableAmount(ssIncome,ordBase+wTx,filing):0;
        const txWithout=calcTax(Math.max(0,ordBase+ssWithout-stdDed),brackets);
        const ssWithConv=ssIncome>0?calcSSTaxableAmount(ssIncome,ordBase+taxableConv+wTx,filing):0;
        const txWith=calcTax(Math.max(0,ordBase+taxableConv+ssWithConv-stdDed),brackets);
        cumConvTax+=(txWith-txWithout)+taxableConv*(p.stateTaxPct||0);
      }
    }
    const hsaPen=(age<65&&hsaNM>0)?hsaNM*0.20:0;
    const ordInc=wDf+taxableConvAmt+hsaNM+postRetIncome;
    const agiSS=ordInc+wTx;
    const ssTxAmt=ssIncome>0?calcSSTaxableAmount(ssIncome,agiSS,filing):0;
    const totOrd=ordInc+ssTxAmt;
    const txInc=Math.max(0,totOrd-stdDed);
    const incTax=calcTax(txInc,brackets);
    const capTax=calcLTCG(Math.min(wTx,Math.max(0,totOrd+wTx-stdDed)),txInc,filing);
    const magi=agiSS+ssTxAmt;
    const irmaaMagi=yr>=2&&rows[yr-2]?rows[yr-2]._magi:magi;
    const nMed=(age>=65&&age<=lifeExp?1:0)+(hasSpouse&&spouseAge>=65&&spouseAge<=spLifeExp?1:0);
    const irmaa=nMed>0?calcIRMAA(irmaaMagi,filing,nMed):0;
    const totTax=incTax+capTax+hsaPen+irmaa+(p.stateTaxPct>0?txInc*p.stateTaxPct:0);
    const totalW=wTx+wDf+wRo+wHs+ssIncome+postRetIncome;
    const afterTax=totalW-totTax;
    cumTax+=totTax;
    const surplus=Math.max(0,-(target-wTx-wDf-wRo-wHs));
    const reinvestCash=surplus+incomeSurplus;
    /* Tax drain cascade: subtract taxes from accounts (taxable→deferred→roth→HSA) */
    let txRem=totTax;
    const drT=Math.min(txRem,Math.max(0,bT-wTx+reinvestCash));txRem-=drT;
    const drD=Math.min(txRem,Math.max(0,bD-wDf-rothConv));txRem-=drD;
    const drR=Math.min(txRem,Math.max(0,bR-wRo+rothConv));txRem-=drR;
    const drH=Math.min(txRem,Math.max(0,bH-wHs));
    bT=Math.max(0,(bT-wTx-drT+reinvestCash)*(1+yrRet));
    bD=Math.max(0,(bD-wDf-rothConv-drD)*(1+yrRet));
    bR=Math.max(0,(bR-wRo+rothConv-drR)*(1+yrRet)+postRetRothContrib);
    bH=Math.max(0,(bH-wHs-drH)*(1+yrRet)+postRetHSAContrib);
    rows.push({age,spouseAge,afterTax,tax:totTax,bTaxable:bT,bDeferred:bD,bRoth:bR,bHSA:bH,totalIncome:totalW,rothConv,_magi:magi,yrRet});
  }
  return {rows,cumTax,totalConversions,cumConvTax};
}

/* Compute bracket limit for custom percentage Roth conversion */
function _computeCustomBracketLimit(pct, filing){
  const brackets=filing==='mfj'?TAX_BRACKETS_MFJ:TAX_BRACKETS_SINGLE;
  /* Match the approach used in the Withdrawals tab: find largest rate <= pct */
  const rate=pct/100;
  let customLimit=brackets[0].limit;
  for(const b of brackets){ if(b.rate<=rate+0.001&&isFinite(b.limit)) customLimit=b.limit; }
  return customLimit;
}

function runScenarioComparison(){
  const resultsEl=document.getElementById('scenResults');
  if(!resultsEl) return;
  resultsEl.innerHTML='<div style="text-align:center;padding:40px;color:var(--text-muted)"><div style="font-size:2em">⏳</div>Running 3 scenarios (1,000 Monte Carlo sims + historical backtests each)...</div>';

  setTimeout(()=>{
    /* Clear stale scenario chart entries from registry */
    if(window._chartRegistry){ Object.keys(window._chartRegistry).forEach(k=>{if(k.startsWith('sc-chart-')) delete window._chartRegistry[k];}); }
    const raw=localStorage.getItem(SETTINGS_KEY);
    let saved={};try{saved=raw?JSON.parse(raw):{};}catch(e){saved={};}
    /* Get selected accounts: prefer DOM checkboxes if present, else use saved selection, else all */
    let selectedNums=null;
    const acctCbs=document.querySelectorAll('.acct-sel-cb');
    if(acctCbs.length>0){ selectedNums=getSelectedAccountNums(); }
    else if(saved._selectedAccounts&&saved._selectedAccounts.length>0){ selectedNums=new Set(saved._selectedAccounts); }
    let buckets=getAccountBuckets(selectedNums);
    /* If saved selection yields zero balances (e.g., stale account numbers from a different report), fall back to all accounts */
    if(selectedNums&&(buckets.taxable.total+buckets.deferred.total+buckets.roth.total+buckets.hsa.total)<=0){
      selectedNums=null;
      buckets=getAccountBuckets(null);
    }
    if(!buckets||((buckets.taxable.total+buckets.deferred.total+buckets.roth.total+buckets.hsa.total)<=0)){resultsEl.innerHTML='<p style="color:var(--danger)">Error: No retirement account balances found. Ensure your portfolio has accounts with holdings.</p>';return;}

    const results=[];
    const colors=['#2563eb','#7c3aed','#ea580c'];

    for(let i=0;i<3;i++){
      const retire=parseInt(document.getElementById('scretire'+i)?.value)||65;
      const life=parseInt(document.getElementById('sclife'+i)?.value)||95;
      const ssAge=parseInt(document.getElementById('scssAge'+i)?.value)||67;
      const ret=parseFloat(document.getElementById('scret'+i)?.value)||7;
      const infl=parseFloat(document.getElementById('scinfl'+i)?.value)||3;
      const conv=document.getElementById('scconv'+i)?.value||'none';
      const stax=parseFloat(document.getElementById('scstax'+i)?.value)||0;
      const customPct=parseFloat(document.getElementById('sccustomPct'+i)?.value)||15;
      const convStartIn=parseInt(document.getElementById('scconvStart'+i)?.value);
      const convEndIn=parseInt(document.getElementById('scconvEnd'+i)?.value);
      const name=document.getElementById('scName'+i)?.value||'Scenario '+'ABC'[i];

      /* Read spending phases for this scenario */
      const phAges=document.querySelectorAll(`#scPhasesList${i} .sc-phase-age`);
      const phAmts=document.querySelectorAll(`#scPhasesList${i} .sc-phase-amt`);
      let phases=[];
      phAges.forEach((el,pi)=>{
        const a=parseInt(el.value), m=parseInt(phAmts[pi]?.value);
        if(!isNaN(a)&&!isNaN(m)) phases.push({age:a,amount:m});
      });
      if(phases.length===0) phases=[{age:retire,amount:5000}];
      /* Sort phases by age */
      phases.sort((a,b)=>a.age-b.age);
      const spend=phases[0].amount;

      const age=parseInt(document.getElementById('scSharedAge')?.value)||55;
      if(age>retire){results.push({name:name,color:colors[i],error:'Current age ('+age+') must be ≤ retirement age ('+retire+').'});continue;}
      if(life<retire){results.push({name:name,color:colors[i],error:'Life expectancy ('+life+') must be ≥ retirement age ('+retire+').'});continue;}
      const ss=parseFloat(document.getElementById('scss'+i)?.value)||0;
      const filing=document.getElementById('scSharedFiling')?.value||'mfj';
      const hasSpouse=document.getElementById('scSharedSpouse')?.checked||false;
      const spAge=parseInt(document.getElementById('scSharedSpAge')?.value)||age;
      const spLife=parseInt(document.getElementById('scSharedSpLife')?.value)||life;
      const spSS=parseFloat(document.getElementById('scSharedSpSS')?.value)||0;
      const spSSAge=parseInt(document.getElementById('scSharedSpSSAge')?.value)||67;
      const yearsToRetire=retire-age;
      const retPct=ret/100;
      const planEndAge=hasSpouse?Math.max(life,age+(spLife-spAge)):life;
      let scSharedGlideMode=document.getElementById('scSharedGlide')?.value||'fixed';
      const inheritedGlideEnabled=saved.wdGlideToggle===true||saved.wdGlideToggle==='true'||document.getElementById('wdGlideToggle')?.checked||false;
      const inheritedGlideMode=inheritedGlideEnabled?(saved.wdGlideMode||document.getElementById('wdGlideMode')?.value||'glidepath'):'fixed';
      const inheritedWaypoints=saved._glideWaypoints||getGlideWaypoints();
      let scenarioGlideSchedule=scSharedGlideMode==='inherit'
        ?buildGlideSchedule(retire,planEndAge,inheritedGlideMode,inheritedWaypoints,age,saved._glideInterp||'linear')
        :null;
      if(scSharedGlideMode==='inherit'&&!scenarioGlideSchedule){
        scSharedGlideMode='fixed';
        saved.scSharedGlide='fixed';
        try{ localStorage.setItem(SETTINGS_KEY,JSON.stringify(saved)); }catch(e){}
        const scGlideEl=document.getElementById('scSharedGlide');
        if(scGlideEl) scGlideEl.value='fixed';
        if(typeof window._scGlideChanged==='function') window._scGlideChanged();
      }

      let bTI=buckets.taxable.total,bDI=buckets.deferred.total,bRI=buckets.roth.total,bHI=buckets.hsa.total;
      const scenarioContribForAge=window._wdCtx?.getContribForAge||buildContribForAgeFromSettings(saved);
      /* Build one-time spend map: prefer live _wdCtx if ages match, fallback to saved settings */
      const _scenOtsByAge=(function(){
        if(window._wdCtx?.oneTimeByAge && window._wdCtx.curAge===age) return window._wdCtx.oneTimeByAge;
        const otsOn=saved.wdOneTimeSpendToggle===true||saved.wdOneTimeSpendToggle==='true';
        if(!otsOn||!saved._oneTimeSpendings||!saved._oneTimeSpendings.length) return {};
        return buildOneTimeSpendByAge(saved._oneTimeSpendings,age,new Date().getFullYear());
      })();
      for(let y=0;y<yearsToRetire;y++){
        const simAge=age+y;
        const inflMult=Math.pow(1+infl/100,y);
        const contrib=scenarioContribForAge?scenarioContribForAge(simAge):{c401k:0,match:0,ira:0,taxable:0,hsa:0};
        const yrRet=scenarioGlideSchedule?getReturnForAge(scenarioGlideSchedule,simAge,retPct).ret:retPct;
        bTI=bTI*(1+yrRet)+contrib.taxable*inflMult;
        bDI=bDI*(1+yrRet)+(contrib.c401k+contrib.match)*inflMult;
        bRI=bRI*(1+yrRet)+contrib.ira*inflMult;
        bHI=bHI*(1+yrRet)+contrib.hsa*inflMult;
        /* Subtract one-time spendings during accumulation */
        const scOtsAccum=_scenOtsByAge[simAge]||0;
        if(scOtsAccum>0){
          const otsInfl=scOtsAccum*inflMult;
          const ft=Math.min(otsInfl,Math.max(0,bTI)); bTI-=ft; let oRem=otsInfl-ft;
          if(oRem>0){ const fd=Math.min(oRem,Math.max(0,bDI)); bDI-=fd; oRem-=fd; }
          if(oRem>0){ const fr=Math.min(oRem,Math.max(0,bRI)); bRI-=fr; oRem-=fr; }
          if(oRem>0){ bHI=Math.max(0,bHI-oRem); }
        }
      }

      /* Compute custom bracket limit for custom strategy */
      const birthYr=(new Date()).getFullYear()-age;
      const dynRmdAge=birthYr>=1960?75:(birthYr<=1950?72:73);
      const customBracketLimitVal=conv==='custom'?_computeCustomBracketLimit(customPct,filing):0;
      const scConvStart=conv==='custom'&&!isNaN(convStartIn)?convStartIn:retire;
      const scConvEnd=conv==='custom'&&!isNaN(convEndIn)?convEndIn:(dynRmdAge-1);

      try{
        const sim=_scenarioSim({
          curAge:age,retAge:retire,lifeExp:life,retPct:retPct,inflPct:infl/100,filing:filing,
          ssMonthly:ss,ssStartAge:ssAge,rothConvStrategy:conv==='custom'?'custom':conv,
          convStartAge:scConvStart,
          convEndAge:Math.min(scConvEnd,dynRmdAge-1),
          bTaxableInit:bTI,bDeferredInit:bDI,bRothInit:bRI,bHSAInit:bHI,
          hasSpouse:hasSpouse,spAge:spAge,spLifeExp:spLife,
          spSSMonthly:spSS,spSSStartAge:spSSAge,spendPhases:phases,
          stateTaxPct:stax/100,
          customBracketLimit:customBracketLimitVal,
          iraBasis:parseFloat(saved.wdIRABasis||document.getElementById('wdIRABasis')?.value||'0'),
          getContribForAge:scenarioContribForAge,
          glideSchedule:scenarioGlideSchedule,
          oneTimeByAge:_scenOtsByAge,
        });

        const rows=sim.rows;
        const totalAfterTax=rows.reduce((s,r)=>s+(r.afterTax||0),0);
        const totalTax=sim.cumTax;
        const depleteAge=rows.find(r=>(r.bTaxable+r.bDeferred+r.bRoth+r.bHSA)<=0);
        const lastRow=rows[rows.length-1];
        const endBal=lastRow?(lastRow.bTaxable+lastRow.bDeferred+lastRow.bRoth+lastRow.bHSA):0;
        const yr1=rows.find(r=>r.age===retire);
        const effRate=yr1&&yr1.totalIncome>0?(yr1.tax/yr1.totalIncome*100):0;

        /* Run Monte Carlo for this scenario */
        const vol=parseFloat(document.getElementById('scSharedVol')?.value)||12;
        const birthYear=(new Date()).getFullYear()-age;
        const mcRMD=birthYear>=1960?75:(birthYear<=1950?72:73);
        const brackets=filing==='mfj'?TAX_BRACKETS_MFJ:TAX_BRACKETS_SINGLE;
        const CONV_LIMITS={none:0,conservative:filing==='mfj'?96950:48475,moderate:filing==='mfj'?206700:103350,aggressive:filing==='mfj'?394600:197300};
        const mcConvLimit=conv==='custom'?customBracketLimitVal:(CONV_LIMITS[conv]||0);
        const totalAtRetire=bTI+bDI+bRI+bHI;
        const simParams={
          nSims:1000, yearsInRetirement:planEndAge-retire+1, yearsToRetire:yearsToRetire,
          retAge:retire, retPct:retPct, inflPct:infl/100, vol:vol/100, filing:filing,
          bTaxableInit:bTI, bDeferredInit:bDI, bRothInit:bRI, bHSAInit:bHI, totalAtRetire:totalAtRetire,
          ssAnnualFRA:ss*12, ssStartAge:ssAge, spSSAnnualFRA:spSS*12, spSSStartAge:spSSAge,
          hasSpouse:hasSpouse, spAgeOffset:hasSpouse?(spAge-age):0, lifeExp:life, spLifeExp:spLife,
          curAge:age, spAge:spAge, iraBasis:parseFloat(saved.wdIRABasis||document.getElementById('wdIRABasis')?.value||'0'),
          rothConvStrategy:conv, convBracketLimit:mcConvLimit, convStartAge:scConvStart, convEndAge:Math.min(scConvEnd,dynRmdAge-1), brackets:brackets,
          RMD_START_AGE:mcRMD, spendingPhases:phases, hasPhases:phases.some(p=>p.amount>0),
          stateTaxPct:stax/100, getContribForAge:scenarioContribForAge, glideSchedule:scenarioGlideSchedule,
          oneTimeByAge:_scenOtsByAge,
        };
        const mc=runMonteCarlo(simParams);
        const hist=runHistoricalBacktest(simParams);

        /* MC percentile data */
        const mcEndSorted=[...mc.endingBalances].sort((a,b)=>a-b);
        function scPctile(arr,p){ const n=arr.length; if(!n) return 0; const idx=(n-1)*p; const lo=Math.floor(idx); const hi=Math.ceil(idx); return lo===hi?arr[lo]:arr[lo]*(hi-idx)+arr[hi]*(idx-lo); }
        let mcMedian=scPctile(mcEndSorted,0.5), mc10=scPctile(mcEndSorted,0.1), mc90=scPctile(mcEndSorted,0.9);
        const scPvFactor=1/Math.pow(1+infl/100,planEndAge-age);

        /* If this scenario came from Spending Suggestions, use the target for ending balance
           so the values match exactly between views (no MC randomness).
           Also recompute MC success rate using the same formula as the popup:
           DWZ (target=0): success = endBal > 0  |  Legacy (target>0): success = endBal >= targetFV */
        const _scMeta=saved._scenarios&&saved._scenarios[i];
        const _scTarget=_scMeta&&_scMeta._target;
        const _scTargetMonthly=_scMeta&&_scMeta._targetMonthly;
        const _phaseFp=JSON.stringify((phases||[]).map(p=>[parseInt(p.age)||0,Math.round((parseFloat(p.amount)||0)*100)/100]));
        const _metaPhaseFp=_scMeta&&_scMeta.phases?JSON.stringify(_scMeta.phases.map(p=>[parseInt(p.age)||0,Math.round((parseFloat(p.amount)||0)*100)/100])):'';
        const _popup=window._suggestionScenarios&&window._suggestionScenarios[i];
        const _scenGlideFp=scenarioGlideSchedule?JSON.stringify(scenarioGlideSchedule.map(g=>[g.age,Math.round(g.eqPct||0)])):'fixed';
        const _scenContribFp=saved._contribSchedule?JSON.stringify(saved._contribSchedule.map(r=>[r.year,r.age,r.c401k,r.match,r.ira,r.taxable,r.hsa])):'flat';
        const _scenFp=[ret,infl,ss,ssAge,conv,retire,life,stax,
          age,filing,vol,hasSpouse?1:0,spAge,spLife,spSS,spSSAge,
          customPct,scConvStart,Math.min(scConvEnd,dynRmdAge-1),saved.wdIRABasis||document.getElementById('wdIRABasis')?.value||'0',
          saved.wdContribToggle?1:0,saved.wdContribMode||'flat',saved.wdContribStartAge||'',saved.wdContribEndAge||'',
          saved.wdContrib401k||'',saved.wdContribMatch||'',saved.wdContribIRA||'',saved.wdContribTaxable||'',saved.wdContribHSA||'',
          _scenContribFp,bTI,bDI,bRI,bHI,_phaseFp,_scenGlideFp].join('|');
        /* Only apply target override when spending phases and assumptions still match the original suggestion */
        const _hasTarget=_scTarget!==undefined&&_scTarget!==null&&_scTargetMonthly&&Math.abs(_scTargetMonthly-spend)<1&&_metaPhaseFp===_phaseFp&&_scMeta&&_scMeta._fp===_scenFp;
        const _targetFV=_hasTarget?_scTarget*Math.pow(1+infl/100,planEndAge-age):0;
        const scEndBal=_hasTarget?_targetFV:endBal;
        let mcSuccessRate=mc.successRate;
        if(_hasTarget&&_scTarget>0){
          const tgtSuccesses=mc.endingBalances.filter(b=>b>=_targetFV).length;
          mcSuccessRate=(tgtSuccesses/mc.nSims)*100;
        }

        /* Use cached popup metrics so ALL display values match exactly between
           Spending Suggestions popup and What-If Scenarios comparison.
           The in-memory global window._suggestionScenarios is set by the popup and
           survives the tab switch. Spending amount is validated to detect stale cache. */
        const _useCache=_popup&&Math.abs(_popup.monthly-spend)<1&&_popup._phaseFp===_phaseFp&&_popup._fp===_scenFp;
        results.push({
          name:name, color:colors[i], retire:retire, life:life, spend:spend, ss:ss, ssAge:ssAge,
          ret:ret, infl:infl, conv:conv, stax:stax, phases:phases,
          usesInheritedGlide:scSharedGlideMode==='inherit',
          _fromSuggestions:!!_useCache||!!_hasTarget,
          depleteAge:_useCache?(_popup.depleted!=null?_popup.depleted:life+'+'):(depleteAge?depleteAge.age:life+'+'),
          endBal:_useCache?_popup.endBal:scEndBal,
          totalAfterTax:_useCache?_popup.totalAfterTax:totalAfterTax,
          totalTax:_useCache?_popup.lifetimeTax:totalTax,
          effRate:_useCache?_popup.effRate:effRate,
          mcSuccess:_useCache?_popup.mcSuccess:mcSuccessRate,
          historicalSuccess:hist.nPeriods>0?hist.successRate:null,
          historicalPeriods:hist.nPeriods,
          yr1Income:_useCache?_popup.yr1Income:(yr1?(yr1.afterTax):0),
          mcMedian:_useCache?_popup.mcMedian:mcMedian, mc10:_useCache?_popup.mc10:mc10, mc90:_useCache?_popup.mc90:mc90,
          pvFactor:_useCache?_popup.pvFactor:scPvFactor,
          rows:rows,
          betr:_useCache?_popup.betr:(sim.totalConversions>0?sim.cumConvTax/sim.totalConversions:0),
          totalConversions:_useCache?_popup.totalConversions:(sim.totalConversions||0),
          cumConvTax:_useCache?_popup.cumConvTax:(sim.cumConvTax||0),
        });
      }catch(e){
        results.push({name:name,color:colors[i],error:e.message});
      }
    }

    // Build comparison output
    let out=``;

    // Comparison table (collapsible)
    out+=`<div id="sc-compare-panel" style="border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:16px;overflow:hidden">`;
    out+=`<div onclick="_scTogglePanel(this)" class="sc-compare-hdr" style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--th-bg);cursor:pointer;user-select:none">`;
    out+=`<h3 style="margin:0;font-size:1.05em">\u{1F4CA} Side-by-Side Comparison</h3>`;
    out+=`<span class="sc-chev" style="font-size:0.85em;color:var(--text-muted)">▼</span></div>`;
    out+=`<div class="sc-compare-body">`;
    out+=`<div style="overflow-x:auto;padding:12px"><table class="wd-tbl" style="font-size:0.9em"><thead><tr><th style="min-width:200px">Metric</th>`;
    results.forEach(r=>out+=`<th style="text-align:center;background:${r.color};color:white">${esc(r.name)}</th>`);
    out+=`</tr></thead><tbody>`;

    const _scFmt=(v,pvf)=>`<span class="sc-pv" data-fv="${v}" data-pvf="${pvf}">${fmt2(v)}</span>`;
    const metrics=[
      {label:'⚠️ Status',               fn:r=>r.error?'<span style="color:var(--danger);font-size:0.85em">'+esc(r.error)+'</span>':'✅ OK'},
      {label:'Retirement Age',          fn:r=>r.error?'—':r.retire},
      {label:'Life Expectancy',          fn:r=>r.error?'—':r.life},
      {label:'Spending Plan',           fn:r=>{if(r.error)return '—';if(!r.phases||r.phases.length<=1)return '$'+r.spend.toLocaleString()+'/mo';return r.phases.map(p=>'Age '+p.age+': $'+p.amount.toLocaleString()+'/mo').join('<br>');}},
      {label:'SS Claiming Age',         fn:r=>r.error?'—':r.ssAge},
      {label:'Monthly SS Income',       fn:r=>r.error?'—':'$'+r.ss.toLocaleString()},
      {label:'Annual Return',           fn:r=>r.error?'—':(r.usesInheritedGlide?'Inherited glide path':r.ret+'%') },
      {label:'Inflation',               fn:r=>r.error?'—':r.infl+'%'},
      {label:'Roth Strategy',           fn:r=>r.error?'—':(r.conv==='custom'?'Custom':r.conv)},
      {label:'State Tax Rate',           fn:r=>r.error?'—':r.stax+'%'},
      {label:'Portfolio Lasts Until',   fn:r=>r.error?'Error':'Age '+r.depleteAge, best:'max'},
      {label:'Monte Carlo Success',     fn:r=>r.error?'—':r.mcSuccess.toFixed(0)+'%', best:'max'},
      {label:'Historical Survival',     fn:r=>r.error||r.historicalSuccess==null?'—':r.historicalSuccess.toFixed(0)+'% <span style="color:var(--text-muted);font-size:0.85em">('+r.historicalPeriods+' periods)</span>', best:'max', numFn:r=>r.historicalSuccess},
      {label:'🎯 Ending Balance',       fn:r=>r.error?'—':_scFmt(r.endBal,r.pvFactor)+(r._fromSuggestions?' <span style="color:var(--success);font-size:0.75em">✓ from suggestions</span>':''), best:'max'},
      {label:'Year 1 After-Tax Income', fn:r=>r.error?'—':fmt2(r.yr1Income), best:'max'},
      {label:'Lifetime After-Tax Income',fn:r=>r.error?'—':_scFmt(r.totalAfterTax,r.pvFactor), best:'max'},
      {label:'Lifetime Taxes Paid',     fn:r=>r.error?'—':_scFmt(r.totalTax,r.pvFactor), best:'min'},
      {label:'Effective Tax Rate (Yr 1)',fn:r=>r.error?'—':r.effRate.toFixed(1)+'%', best:'min'},
      {label:'Total Roth Converted',    fn:r=>r.error||!r.totalConversions?'—':_scFmt(r.totalConversions,r.pvFactor)},
      {label:'Conversion Tax Paid',     fn:r=>r.error||!r.totalConversions?'—':_scFmt(r.cumConvTax,r.pvFactor), best:'min', numFn:r=>r.totalConversions?r.cumConvTax:null},
      {label:'📊 BETR (Break-Even Rate)',fn:r=>r.error||!r.betr?'—':'<span style="color:var(--success-text);font-weight:600">'+(r.betr*100).toFixed(1)+'%</span>', best:'min', numFn:r=>r.totalConversions?r.betr:null},
      {section:'📊 Monte Carlo Distribution'},
      {label:'MC Median Ending',        fn:r=>r.error?'—':_scFmt(r.mcMedian,r.pvFactor), best:'max', numFn:r=>r.mcMedian},
      {label:'MC Pessimistic (10th)',   fn:r=>r.error?'—':_scFmt(r.mc10,r.pvFactor), best:'max', numFn:r=>r.mc10},
      {label:'MC Optimistic (90th)',    fn:r=>r.error?'—':_scFmt(r.mc90,r.pvFactor), best:'max', numFn:r=>r.mc90},
    ];

    metrics.forEach(m=>{
      if(m.section){
        out+=`<tr><td colspan="${results.length+1}" style="font-weight:600;background:var(--th-bg);padding:8px 12px;font-size:0.85em;color:var(--text-muted);border-top:2px solid var(--border)">${m.section}</td></tr>`;
        return;
      }
      out+=`<tr><td style="font-weight:500">${m.label}</td>`;
      /* Find best value for highlighting */
      let bestIdx=-1;
      if(m.best){
        const numVals=results.map((r,i)=>{
          if(r.error) return null;
          if(m.numFn) return m.numFn(r);
          if(m.best==='max') return m.label.includes('Lasts')?(typeof r.depleteAge==='string'?Infinity:r.depleteAge):m.label.includes('Monte Carlo')?r.mcSuccess:m.label.includes('Yr 1 After')?r.yr1Income:m.label.includes('Lifetime After')?r.totalAfterTax:m.label.includes('Ending')?r.endBal:0;
          else return m.label.includes('Taxes')?r.totalTax:m.label.includes('Eff')?r.effRate:0;
        });
        let bestVal=null;
        numVals.forEach((v,i)=>{
          if(v===null) return;
          if(bestVal===null||(m.best==='max'?v>bestVal:v<bestVal)){bestVal=v;bestIdx=i;}
        });
      }
      results.forEach((r,i)=>{
        const v=m.fn(r);
        const isBest=bestIdx===i&&!r.error;
        const style=r.error?'color:var(--danger)':(isBest?'background:var(--success-bg-deep);font-weight:600':'');
        out+=`<td style="text-align:center;${style}">${v}</td>`;
      });
      out+=`</tr>`;
    });
    out+=`</tbody></table></div></div></div>`;

    // Per-scenario interactive metric charts
    const validResults=results.filter(r=>!r.error && r.rows && r.rows.length>0);
    if(validResults.length>0){
      /* Global vs Individual chart control toggle (collapsible) */
      const chartLabels=['Account Balances','Total Balance','Annual Taxes','After-Tax Income'];
      out+=`<div id="sc-charts-panel" style="border:1px solid var(--border);border-radius:var(--radius-sm);margin-top:16px;overflow:hidden">`;
      out+=`<div onclick="_scTogglePanel(this)" class="sc-charts-hdr" style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--th-bg);cursor:pointer;user-select:none">`;
      out+=`<h3 style="margin:0;font-size:1.05em">\u{1F4CA} Charts &amp; Controls</h3>`;
      out+=`<span class="sc-chev" style="font-size:0.85em;color:var(--text-muted)">▼</span></div>`;
      out+=`<div class="sc-charts-body" style="padding:12px">`;
      out+=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;flex-wrap:wrap">`;
      out+=`<button id="sc-global-btn" onclick="_scToggleGlobalCharts(true)" style="padding:4px 14px;border-radius:4px;border:1px solid var(--border);font-size:0.82em;font-weight:600;cursor:pointer;background:var(--primary);color:white">Apply to All</button>`;
      out+=`<button id="sc-indiv-btn" onclick="_scToggleGlobalCharts(false)" style="padding:4px 14px;border-radius:4px;border:1px solid var(--border);font-size:0.82em;font-weight:600;cursor:pointer;background:var(--card);color:var(--text-muted)">Individual</button>`;
      out+=`</div>`;
      /* Global controls (shown by default — Apply to All is default) */
      out+=`<div id="sc-global-chart-ctrl" style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:12px;padding:10px 14px;background:var(--th-bg);border-radius:6px;border:1px solid var(--border)">`;
      out+=`<span style="font-size:0.8em;font-weight:600;color:var(--text-muted)">Chart:</span>`;
      chartLabels.forEach((lbl,idx)=>{
        out+=`<button class="sc-global-tab" onclick="_scGlobalSwitchChart(${idx})" style="padding:4px 12px;border-radius:4px;border:none;font-size:0.78em;font-weight:600;cursor:pointer;background:${idx===0?'var(--primary)':'var(--border)'};color:${idx===0?'white':'var(--text-muted)'}">${lbl}</button>`;
      });
      out+=`</div>`;

      /* Per-scenario interactive metric charts */
      validResults.forEach((r,ri)=>{
        const scAge=parseInt(document.getElementById('scSharedAge')?.value)||55;
        const scYearsToRetire=r.retire-scAge;
        const scInflPct=r.infl/100;
        const scSeries=[
          {type:'stacked',label:'Account Balances',stack:[
            {key:'bTaxable',label:'Taxable',color:'#f59e0b'},
            {key:'bDeferred',label:'Deferred',color:'#3b82f6'},
            {key:'bRoth',label:'Roth',color:'#10b981'},
            {key:'bHSA',label:'HSA',color:'#ec4899'},
          ]},
          {key:row=>row.bTaxable+row.bDeferred+row.bRoth+row.bHSA,label:'Total Balance',color:r.color,type:'line'},
          {key:'tax',label:'Annual Taxes',color:'#dc2626',type:'bar',cumTotal:true},
          {key:'afterTax',label:'After-Tax Income',color:'#059669',type:'line',cumTotal:true},
        ];
        out+=`<div style="margin-top:20px"><h4 style="margin-bottom:6px;color:${r.color}">\u{1F4CA} ${esc(r.name)} — Detailed Charts</h4>`;
        /* Add note when scenario came from spending suggestions */
        if(r._fromSuggestions){
          const isZero=r.endBal===0;
          out+=`<div style="background:${isZero?'var(--warning-bg)':'var(--highlight-bg)'};border:1px solid ${isZero?'var(--warning)':'var(--primary)'};border-radius:6px;padding:8px 12px;margin-bottom:10px;font-size:0.82em;color:var(--text)">`;
          if(isZero) out+=`<strong>\u{1F3AF} Die with Zero:</strong> Spending of $${r.spend.toLocaleString()}/mo is calibrated so your portfolio reaches $0 at age ${r.life} on the expected ${r.ret}% return path. Monte Carlo shows a ${r.mcSuccess.toFixed(0)}% chance of not running out of money before then.`;
          else out+=`<strong>\u{1F3AF} Legacy Target:</strong> Spending of $${r.spend.toLocaleString()}/mo is calibrated for ~${r.mcSuccess.toFixed(0)}% Monte Carlo confidence. The chart shows a deterministic ${r.ret}% fixed return path.`;
          out+=`</div>`;
        }
        const chartHtml=buildMetricCharts(r.rows,scInflPct,r.retire,scYearsToRetire,'sc-chart-'+ri,scSeries);
        /* Target line registry removed — no longer drawn */
        /* Wrap the FV/PV + tabs controls in sc-per-chart-ctrl for global toggle */
        const containerIdx=chartHtml.indexOf('<div id="sc-chart-'+ri+'-label"');
        if(containerIdx>0){
          out+=`<div class="sc-per-chart-ctrl" style="display:none">${chartHtml.substring(0,containerIdx)}</div>${chartHtml.substring(containerIdx)}`;
        } else {
          out+=chartHtml;
        }
        out+=`</div>`;
      });
      out+=`</div></div>`; /* close sc-charts-body + sc-charts-panel */
    }

    // Strategy notes
    out+=`<div style="background:var(--th-bg);border-radius:8px;padding:16px;margin-top:24px;font-size:0.85em;color:var(--text-muted)">`;
    out+=`<strong>Notes:</strong> Each scenario independently projects your portfolio using its own parameters. `;
    out+=`Monte Carlo runs 1,000 simulations per scenario. Historical backtest replays the same retirement plan across every rolling period in the 1926–2024 return dataset. Tax calculations use 2025 federal brackets. `;
    if(document.getElementById('scSharedGlide')?.value==='inherit') out+=`Scenario return and volatility inputs are disabled while inherited glide path is active, because calculations use the Withdrawals tab age-based glide schedule instead. `;
    out+=`Roth conversion window runs from retirement age to RMD age (custom strategies use the ages you specify). `;
    out+=`Spending amounts are in today's dollars and inflation-adjusted forward.`;
    out+=`</div>`;

    /* Data-driven methodology */
    const methScen=[];
    const scenSummary=[];
    scenSummary.push(`Compared <strong>${validResults.length} scenario${validResults.length!==1?'s':''}</strong>: ${validResults.map(r=>`<strong style="color:${r.color}">${r.name}</strong>`).join(', ')}.`);
    validResults.forEach(r=>{
      scenSummary.push(`<strong style="color:${r.color}">${r.name}</strong>: Retire ${r.retire}, live to ${r.life}, spend ${_fmtD(r.spend)}/mo, return ${(r.ret*100).toFixed(1)}%, inflation ${(r.infl*100).toFixed(1)}%. MC success: <strong>${r.mcSuccess.toFixed(0)}%</strong>. Ending balance: <strong>${_fmtK(r.endBal)}</strong>.`);
    });
    methScen.push({heading:'Scenario Overview', items:scenSummary});
    /* Find best-in-class for key metrics */
    const compItems=[];
    if(validResults.length>1){
      const bestMC=validResults.reduce((a,b)=>b.mcSuccess>a.mcSuccess?b:a);
      const bestIncome=validResults.reduce((a,b)=>b.totalAfterTax>a.totalAfterTax?b:a);
      const bestEndBal=validResults.reduce((a,b)=>b.endBal>a.endBal?b:a);
      const lowestTax=validResults.reduce((a,b)=>b.effRate<a.effRate?b:a);
      compItems.push(`<strong>Highest MC success rate:</strong> ${bestMC.name} at ${bestMC.mcSuccess.toFixed(0)}% — most likely to sustain through retirement.`);
      compItems.push(`<strong>Highest lifetime after-tax income:</strong> ${bestIncome.name} at ${_fmtK(bestIncome.totalAfterTax)} — maximizes spendable cash.`);
      compItems.push(`<strong>Highest ending balance:</strong> ${bestEndBal.name} at ${_fmtK(bestEndBal.endBal)} — best for legacy planning.`);
      compItems.push(`<strong>Lowest effective tax rate:</strong> ${lowestTax.name} at ${lowestTax.effRate.toFixed(1)}% — most tax-efficient strategy.`);
      if(bestMC.name!==bestIncome.name) compItems.push(`⚡ Trade-off: ${bestMC.name} is safest but ${bestIncome.name} produces more income. Balance safety vs spending based on your priorities.`);
    } else {
      compItems.push('Add more scenarios to see comparative analysis — vary spending, return assumptions, or Roth conversion strategies to find your optimal plan.');
    }
    methScen.push({heading:'Comparative Analysis', items:compItems});
    const noteItems=[];
    noteItems.push('Each scenario runs an independent deterministic simulation + 1,000 Monte Carlo trials with its own assumptions.');
    noteItems.push('All scenarios share the same starting portfolio, account buckets, and filing status from the Withdrawals tab.');
    noteItems.push('Higher after-tax income with acceptable MC success rate (≥80%) is generally the optimal choice. Ending balance matters primarily for estate planning.');
    methScen.push({heading:'How to Interpret', items:noteItems});
    out+=buildMethodologyPanel('Scenario Comparison — Your Results',methScen);

    resultsEl.innerHTML=out;
    /* Show PV toggle */
    const pvTog=document.getElementById('sc-pv-toggle');
    if(pvTog) pvTog.style.display='flex';
    /* Render per-scenario metric charts */
    const _cacheFP=window._scenFP?window._scenFP():''; /* capture fingerprint synchronously before any async delay */
    setTimeout(()=>{
      validResults.forEach((r,ri)=>_renderChart('sc-chart-'+ri));
      /* Cache results for tab persistence */
      setTimeout(()=>{const r=document.getElementById('scenResults');if(r){window._scenResultsCache=r.innerHTML;window._scenCacheFP=_cacheFP;}},100);
    },0);
  },50);
}

/* ---- Tab switching with state caching ---- */
const _tabCache={};
const _renderedTabs=new Set();
function _saveTab(key){
  /* Don't cache tabs with interactive elements — they break when restored via innerHTML */
  if(key==='withdrawals'||key==='scenarios'||key==='snapshot'||key==='holdings'||!_renderedTabs.has(key)) return;
  _tabCache[key]={
    drill:document.getElementById('drilldown').innerHTML,
    alloc:document.getElementById('allocOverview').style.display,
    insights:(document.querySelector('.insights')||{}).style?.display||'',
    allocBar:document.getElementById('allocBar').innerHTML,
    legend:document.getElementById('legend').innerHTML
  };
}
function _restoreTab(key){
  const c=_tabCache[key];
  document.getElementById('drilldown').innerHTML=c.drill;
  document.getElementById('allocOverview').style.display=c.alloc;
  const insEl=document.querySelector('.insights');
  if(insEl) insEl.style.display=c.insights;
  document.getElementById('allocBar').innerHTML=c.allocBar;
  document.getElementById('legend').innerHTML=c.legend;
  if(key==='withdrawals') document.querySelectorAll('#drilldown input, #drilldown select').forEach(el=>{el.addEventListener('change',saveSettings);el.addEventListener('input',saveSettings);});
}
let _activeTab='holdings';

document.querySelectorAll('.pivot-tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    /* Save settings while elements still exist in DOM */
    if(_activeTab==='withdrawals'||_activeTab==='scenarios') saveSettings();
    /* Save current tab state */
    _saveTab(_activeTab);
    document.querySelectorAll('.pivot-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const newTab=btn.dataset.pivot;

    /* Show/hide sub-pivot bar */
    document.getElementById('holdingsSubPivot').style.display=(newTab==='holdings')?'flex':'none';
    document.getElementById('xrayContent').style.display='none';
    document.getElementById('rebalanceContent').style.display='none';
    document.getElementById('expensesContent').style.display='none';
    document.getElementById('suggestionsContent').style.display='none';
    document.getElementById('taxlossContent').style.display='none';

    /* Restore visibility of all main panels (xray hides drilldown + allocOverview + insights) */
    document.getElementById('drilldown').style.display='';
    const insSwitch=document.querySelector('.insights');
    if(insSwitch) insSwitch.style.display='';
    document.getElementById('allocOverview').style.display='';
    if(_tabCache[newTab]){
      _restoreTab(newTab);
    } else {
      if(newTab==='holdings') _renderHoldingsSubPivot();
      else if(newTab==='withdrawals') renderWithdrawals();
      else if(newTab==='scenarios') renderScenarios();
      else if(newTab==='snapshot') renderSnapshotDiff();
    }
    _renderedTabs.add(newTab);
    _activeTab=newTab;
    saveSettings();
  });
});

/* ---- Portfolio Risk Insights Engine ---- */
function computeInsights(pivot){
  const insights = [];
  const p = v => (v/GRAND*100).toFixed(1);
  const fmt2 = v => '$'+(v/1e3).toFixed(0)+'K';

  // Flatten all tickers
  const allHoldings = [];
  DATA.forEach(d => d.accounts.forEach(a => a.tickers.forEach(t => {
    allHoldings.push({...t, acctName:a.name, acctNum:a.num, acctType:a.type, cat:d.cat});
  })));
  const bySymbol = {};
  allHoldings.forEach(h => { bySymbol[h.sym] = (bySymbol[h.sym]||0) + h.val; });
  const sorted = Object.entries(bySymbol).sort((a,b) => b[1]-a[1]);

  /* ==========================================================
     SHARED — Concentration Risk (shown for both pivots)
     ========================================================== */
  const concItems = [];
  const top5 = sorted.slice(0,5), top5total = top5.reduce((s,x)=>s+x[1],0);
  const top10 = sorted.slice(0,10), top10total = top10.reduce((s,x)=>s+x[1],0);
  if(top5total/GRAND > 0.3) concItems.push(`Top 5 holdings represent <strong>${p(top5total)}%</strong> of portfolio (${top5.map(x=>esc(x[0])).join(', ')}) — significant concentration risk.`);
  if(top10total/GRAND > 0.5) concItems.push(`Top 10 holdings represent <strong>${p(top10total)}%</strong> of portfolio.`);
  sorted.filter(x => x[1]/GRAND > 0.10).forEach(([sym,val]) => {
    concItems.push(`<strong>${esc(sym)}</strong> alone is ${p(val)}% of total portfolio (${fmt2(val)}) — consider if this aligns with your risk tolerance.`);
  });
  if(concItems.length) insights.push({title:'Concentration Risk', icon:'⚠️', sev:'high', items:concItems});

  /* ==========================================================
     BY ACCOUNT TYPE pivot — tax efficiency, per-type risk
     ========================================================== */
  if(pivot === 'acctType') {
    // Tax Efficiency
    const acctItems = [];
    const typeTotals = {};
    ACCT_DATA.forEach(g => { typeTotals[g.type] = g.total; });
    const taxablePct = ((typeTotals['Taxable Investment']||0)+(typeTotals['Custodial (UTMA)']||0))/GRAND*100;
    const taxDefPct = (typeTotals['Tax-Deferred Savings']||0)/GRAND*100;
    const rothPct = (typeTotals['Roth']||0)/GRAND*100;
    const hsaPct = (typeTotals['HSA']||0)/GRAND*100;

    if(taxablePct > 50) acctItems.push(`Taxable accounts hold <strong>${taxablePct.toFixed(1)}%</strong> — majority of portfolio is in tax-inefficient wrappers. Distributions, dividends, and capital gains are taxed annually.`);
    if(rothPct < 10) acctItems.push(`Roth accounts are only <strong>${rothPct.toFixed(1)}%</strong> — consider maximizing Roth contributions for tax-free growth and withdrawals.`);
    if(taxDefPct > 60) acctItems.push(`Tax-deferred accounts hold <strong>${taxDefPct.toFixed(1)}%</strong> — heavy RMD obligations after age 73–75 (SECURE 2.0). Consider Roth conversion ladder strategy.`);
    else if(taxDefPct > 40) acctItems.push(`Tax-deferred accounts hold <strong>${taxDefPct.toFixed(1)}%</strong> — be mindful of future RMD obligations starting at age 73–75 (SECURE 2.0).`);
    if(hsaPct > 0) acctItems.push(`HSA at <strong>${hsaPct.toFixed(1)}%</strong> — triple tax advantage. Maximize contributions ($4,300 individual / $8,550 family for 2026).`);
    if(acctItems.length) insights.push({title:'Tax Efficiency', icon:'🏦', sev:'med', items:acctItems});

    // Per Account Type — risk & allocation
    const typeItems = [];
    ACCT_DATA.forEach(g => {
      const tickers = [];
      g.accounts.forEach(a => a.tickers.forEach(t => tickers.push(t)));
      const riskBuckets = {};
      tickers.filter(t=>t.risk).forEach(t => { riskBuckets[t.risk] = (riskBuckets[t.risk]||0)+t.val; });
      const tTotal = tickers.reduce((s,t)=>s+t.val,0);
      const hrVal = riskBuckets['High Risk / Speculative']||0;
      const hrP = hrVal/tTotal*100;
      const grVal = riskBuckets['Growth']||0;
      const grP = grVal/tTotal*100;

      if(g.type === 'Taxable Investment' || g.type.startsWith('Tax-Deferred')) {
        if(hrP > 10) typeItems.push(`<strong>${esc(g.type)}</strong>: ${hrP.toFixed(1)}% in High Risk/Speculative (${fmt2(hrVal)}) — consider keeping speculative bets in Roth accounts where losses don\u0027t waste tax advantages.`);
        if(grP > 60) typeItems.push(`<strong>${esc(g.type)}</strong>: ${grP.toFixed(1)}% in Growth stocks — heavy growth tilt; tax-inefficient due to low dividends and potential high capital gains.`);
      }
      if(g.type === 'Roth') {
        if(hrP < 5 && grP < 30) typeItems.push(`<strong>Roth</strong>: Only ${(hrP+grP).toFixed(1)}% in Growth + High Risk — Roth is ideal for aggressive/high-growth holdings since gains are tax-free. Consider moving growth stocks here.`);
      }
    });
    if(typeItems.length) insights.push({title:'Account Type Optimization', icon:'🔄', sev:'med', items:typeItems});

    // Account Dominance
    const domItems = [];
    const acctByVal = {};
    DATA.forEach(d=>d.accounts.forEach(a=>{ acctByVal[a.num]=(acctByVal[a.num]||{name:a.name,val:0}); acctByVal[a.num].val+=a.val; }));
    Object.entries(acctByVal).sort((a,b)=>b[1].val-a[1].val).forEach(([num,o])=>{
      if(o.val/GRAND>0.20) domItems.push(`Account <strong>${esc(o.name)}</strong> (#${esc(num)}) holds ${p(o.val)}% — if this account has limited beneficiary protections, consider diversifying across accounts.`);
    });
    if(domItems.length) insights.push({title:'Account Concentration', icon:'📋', sev:'low', items:domItems});
  }

  /* ==========================================================
     BY CATEGORY pivot — allocation benchmarks & recommendations
     ========================================================== */
  if(pivot === 'category') {
    const catTotals = {};
    DATA.forEach(d => { catTotals[d.cat] = d.total; });

    // Compute actual %
    const actual = {};
    const cats = ['Individual Stocks','US Index Funds','International Funds','Bond Funds','Tech Sector Fund','Growth / Leveraged ETFs','Target-Date / Balanced','Cash / Money Market'];
    cats.forEach(c => { actual[c] = (catTotals[c]||0)/GRAND*100; });
    const equityPct = (actual['Individual Stocks']||0)+(actual['US Index Funds']||0)+(actual['Tech Sector Fund']||0)+(actual['Growth / Leveraged ETFs']||0);
    const intlPct = actual['International Funds']||0;
    const bondPct = actual['Bond Funds']||0;
    const cashPct = actual['Cash / Money Market']||0;
    const tdPct = actual['Target-Date / Balanced']||0;
    const sectorPct = (actual['Tech Sector Fund']||0)+(actual['Growth / Leveraged ETFs']||0);

    // Recommended ranges (moderate-aggressive growth investor)
    const benchItems = [];
    benchItems.push(`<strong>Your allocation:</strong> Equities ${equityPct.toFixed(1)}% · International ${intlPct.toFixed(1)}% · Bonds ${bondPct.toFixed(1)}% · Cash ${cashPct.toFixed(1)}%`);

    // Equity allocation
    if(equityPct > 80) {
      benchItems.push(`⚠️ <strong>Equities at ${equityPct.toFixed(1)}%</strong> — well above the typical 60-70% recommendation. Excellent for growth but high drawdown risk in corrections. A moderate portfolio targets 60-70% equities.`);
    } else if(equityPct > 70) {
      benchItems.push(`Equities at <strong>${equityPct.toFixed(1)}%</strong> — slightly aggressive but within range for a growth-oriented investor. Recommended: 60-70%.`);
    } else if(equityPct < 50) {
      benchItems.push(`Equities at only <strong>${equityPct.toFixed(1)}%</strong> — below recommended 60-70%. May limit long-term growth potential.`);
    } else {
      benchItems.push(`✅ Equities at <strong>${equityPct.toFixed(1)}%</strong> — within the recommended 60-70% range for a balanced growth portfolio.`);
    }

    // Individual stocks vs funds
    if(actual['Individual Stocks'] > 30) {
      benchItems.push(`⚠️ <strong>Individual stocks at ${actual['Individual Stocks'].toFixed(1)}%</strong> — most advisors recommend ≤20% in individual stocks vs diversified funds. High idiosyncratic risk.`);
    } else if(actual['Individual Stocks'] > 20) {
      benchItems.push(`Individual stocks at <strong>${actual['Individual Stocks'].toFixed(1)}%</strong> — at the upper end of the recommended ≤20% guideline.`);
    } else if(actual['Individual Stocks'] > 0) {
      benchItems.push(`✅ Individual stocks at <strong>${actual['Individual Stocks'].toFixed(1)}%</strong> — within the recommended ≤20% range.`);
    }

    // International
    if(intlPct < 10) {
      benchItems.push(`⚠️ <strong>International at ${intlPct.toFixed(1)}%</strong> — well below the recommended 15-25%. US-only portfolios miss global diversification. Consider broad international index funds.`);
    } else if(intlPct < 15) {
      benchItems.push(`International at <strong>${intlPct.toFixed(1)}%</strong> — slightly below the recommended 15-25% of total portfolio. Consider increasing for geographic diversification.`);
    } else if(intlPct <= 25) {
      benchItems.push(`✅ International at <strong>${intlPct.toFixed(1)}%</strong> — within the recommended 15-25% range.`);
    } else {
      benchItems.push(`International at <strong>${intlPct.toFixed(1)}%</strong> — above the typical 15-25% range. Adds diversification but introduces currency and geopolitical risk.`);
    }

    // Bonds
    if(bondPct < 5) {
      benchItems.push(`⚠️ <strong>Bonds at ${bondPct.toFixed(1)}%</strong> — well below the recommended 15-30%. Very limited downside protection. In a market crash, bonds provide critical ballast.`);
    } else if(bondPct < 15) {
      benchItems.push(`⚠️ <strong>Bonds at ${bondPct.toFixed(1)}%</strong> — below the recommended 15-30%. Consider increasing for stability and income, especially as retirement approaches.`);
    } else if(bondPct <= 30) {
      benchItems.push(`✅ Bonds at <strong>${bondPct.toFixed(1)}%</strong> — within the recommended 15-30% range for a growth portfolio.`);
    } else {
      benchItems.push(`Bonds at <strong>${bondPct.toFixed(1)}%</strong> — above 30% is conservative. Fine for capital preservation but may limit long-term growth.`);
    }

    // Cash
    if(cashPct > 10) {
      benchItems.push(`⚠️ <strong>Cash at ${cashPct.toFixed(1)}%</strong> — above the recommended 3-5%. Significant drag on returns. Consider deploying into index funds or bonds.`);
    } else if(cashPct > 5) {
      benchItems.push(`Cash at <strong>${cashPct.toFixed(1)}%</strong> — slightly above the typical 3-5% recommendation. Provides flexibility but has opportunity cost.`);
    } else if(cashPct >= 2) {
      benchItems.push(`✅ Cash at <strong>${cashPct.toFixed(1)}%</strong> — within the recommended 3-5% liquidity buffer.`);
    } else {
      benchItems.push(`Cash at only <strong>${cashPct.toFixed(1)}%</strong> — below the recommended 3-5% minimum. May want to maintain an emergency buffer.`);
    }

    insights.push({title:'Asset Allocation vs Recommended Ranges', icon:'📊', sev: (equityPct>80||bondPct<5)?'high':'med', items:benchItems});

    // Per-category deep dive
    const catDeep = [];
    // US Index Funds
    if(actual['US Index Funds']>0) {
      const pct = actual['US Index Funds'];
      if(pct > 40) catDeep.push(`<strong>US Index Funds</strong> at ${pct.toFixed(1)}% — heavy reliance on US equities. Provides strong growth exposure but may be correlated with your individual stock picks.`);
      else catDeep.push(`<strong>US Index Funds</strong> at ${pct.toFixed(1)}% — provides broad US market exposure through diversified funds.`);
    }
    // Sector/Thematic (Tech Sector + Growth/Leveraged)
    if(sectorPct>0) {
      if(sectorPct > 10) catDeep.push(`⚠️ <strong>Sector/Thematic</strong> at ${sectorPct.toFixed(1)}% — above recommended ≤10%. Concentrated sector bets amplify volatility.`);
      else catDeep.push(`✅ <strong>Sector/Thematic</strong> at ${sectorPct.toFixed(1)}% — within the recommended ≤10% allocation.`);
    }
    // Target-Date
    if(tdPct > 0) {
      catDeep.push(`<strong>Target-Date/Balanced</strong> at ${tdPct.toFixed(1)}% — these auto-rebalance over time. Watch for overlap with your other holdings which could create unintended overweights.`);
    }
    if(catDeep.length) insights.push({title:'Category Deep Dive', icon:'🔍', sev:'low', items:catDeep});

    // Risk profile within stocks category
    const riskItems = [];
    const riskTotals = {};
    const stockTotal = allHoldings.filter(h=>h.risk).reduce((s,h)=>s+h.val,0);
    allHoldings.filter(h=>h.risk).forEach(h => { riskTotals[h.risk]=(riskTotals[h.risk]||0)+h.val; });
    if(stockTotal > 0) {
      const hr = (riskTotals['High Risk / Speculative']||0)/stockTotal*100;
      const gr = (riskTotals['Growth']||0)/stockTotal*100;
      const dv = (riskTotals['Dividend / Value']||0)/stockTotal*100;
      const bc = (riskTotals['Blue Chip / Core']||0)/stockTotal*100;

      riskItems.push(`<strong>Stock risk breakdown:</strong> Growth ${gr.toFixed(1)}% · Blue Chip ${bc.toFixed(1)}% · Dividend/Value ${dv.toFixed(1)}% · High Risk ${hr.toFixed(1)}%`);
      if(gr > 50) riskItems.push(`⚠️ Growth stocks dominate at <strong>${gr.toFixed(1)}%</strong> — recommended: ≤40% Growth for balanced risk. Vulnerable to interest rate hikes and market rotation.`);
      if(hr > 10) riskItems.push(`⚠️ High Risk/Speculative at <strong>${hr.toFixed(1)}%</strong> — recommended: ≤10%. Consider trimming speculative positions.`);
      if(dv < 15) riskItems.push(`Dividend/Value at only <strong>${dv.toFixed(1)}%</strong> — recommended: ≥20% for income stability and downside protection.`);
      if(bc < 20) riskItems.push(`Blue Chip/Core at <strong>${bc.toFixed(1)}%</strong> — recommended: ≥25% for portfolio stability.`);

      // Sector concentration
      const sectorSyms = {tech:['MSFT','AAPL','NVDA','AVGO','AMD','META','GOOGL','GOOG','AMZN','NFLX','CRM','ORCL','NOW','ADBE','INTU'],
        finance:['JPM','GS','BAC','WFC','MS','C','BLK','SCHW','COF','USB','PNC','AXP','MA','V','ICE','MCO']};
      const techVal = sorted.filter(([s])=>sectorSyms.tech.includes(s)).reduce((sum,[,v])=>sum+v,0);
      const finVal = sorted.filter(([s])=>sectorSyms.finance.includes(s)).reduce((sum,[,v])=>sum+v,0);
      const techP = techVal/GRAND*100, finP = finVal/GRAND*100;
      if(techP > 20) riskItems.push(`⚠️ Tech mega-caps alone are <strong>${techP.toFixed(1)}%</strong> of total portfolio — recommended sector cap: ≤20%. High correlation risk.`);
      if(finP > 15) riskItems.push(`Financials at <strong>${finP.toFixed(1)}%</strong> — monitor for interest rate sensitivity and credit cycle exposure.`);
    }
    if(riskItems.length) insights.push({title:'Stock Risk Profile', icon:'🔴', sev:'med', items:riskItems});
  }

  /* ==========================================================
     SHARED — Diversification (shown for both pivots)
     ========================================================== */
  const divItems = [];
  const uniqueStocks = sorted.filter(([s])=> !s.endsWith('**') && s.length<=5).length;
  if(uniqueStocks > 150) divItems.push(`Portfolio holds <strong>${uniqueStocks} individual stocks</strong> — very broad but may be difficult to monitor. Consider consolidating into index funds for similar exposure with less management overhead.`);
  if(divItems.length) insights.push({title:'Diversification', icon:'📋', sev:'low', items:divItems});

  // Render
  const el = document.getElementById('insightsContainer');
  const label = pivot==='acctType' ? 'By Account Type' : pivot==='acctName' ? 'By Account' : 'By Investment Category';
  if(!insights.length){ el.innerHTML='<div class="insight-card"><p style="color:var(--text-muted);font-size:0.88em">No significant risk flags detected.</p></div>'; return; }
  el.innerHTML = insights.map(ins => `
    <div class="insight-card insight-sev-${ins.sev}">
      <h3><span class="icon">${ins.icon}</span>${ins.title}</h3>
      <ul class="insight-items">${ins.items.map(i=>`<li>${i}</li>`).join('')}</ul>
    </div>`).join('');
}
</script>
<div class="toast-container" id="toastContainer"></div>
</body>
</html>
