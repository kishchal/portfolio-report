/* ---- Fund X-Ray: Computation Engine ---- */
function computeFundXRay(){
  /* Flatten all holdings from DATA */
  const holdings=[]; /* {sym, name, val, fundSym, acctName} */
  DATA.forEach(d=>{
    d.accounts.forEach(a=>{
      a.tickers.forEach(t=>{
        if(t.val>0) holdings.push({sym:t.sym,name:t.name,val:t.val,acctName:a.name,acctNum:a.num});
      });
    });
  });

  /* Classify: fund (has DB entry with holdings) vs individual stock vs unknown fund vs bond/other */
  const CASH_RE=/^(SPAXX|FDRXX|FZFXX|VMFXX|SWVXX|CORE)\*?\*?$/i;
  const fundPositions=[]; /* positions that are funds with known holdings */
  const stockPositions=[]; /* individual stocks or positions without fund data */
  const noDataFunds=[]; /* funds that look like funds but aren't in DB */
  const coveredValue={total:0,covered:0};

  holdings.forEach(h=>{
    if(CASH_RE.test(h.sym)) return; /* skip money market */
    const db=FUND_HOLDINGS_DB[h.sym.replace(/\*+$/,'')];
    if(db && Object.keys(db.h).length>0){
      fundPositions.push({...h,db});
      coveredValue.covered+=h.val;
    } else if(db && Object.keys(db.h).length===0){
      /* Bond/commodity fund — no equity holdings to decompose */
      stockPositions.push(h);
    } else {
      /* Could be individual stock or unknown fund */
      stockPositions.push(h);
    }
    coveredValue.total+=h.val;
  });

  /* 1. Compute effective stock exposure across all funds */
  const stockExposure={}; /* sym -> {name, totalVal, sources:[{fundSym, fundName, pct, val}]} */
  /* Add individual stock positions directly */
  stockPositions.forEach(h=>{
    const sym=h.sym.replace(/\*+$/,'');
    if(!stockExposure[sym]) stockExposure[sym]={name:h.name||sym,totalVal:0,sources:[]};
    stockExposure[sym].totalVal+=h.val;
    stockExposure[sym].sources.push({fundSym:'Direct',fundName:'Individual Stock',pct:100,val:h.val});
  });
  /* Decompose fund positions */
  fundPositions.forEach(h=>{
    const fundSym=h.sym.replace(/\*+$/,'');
    Object.entries(h.db.h).forEach(([stock,pct])=>{
      const effectiveVal=h.val*pct/100;
      if(!stockExposure[stock]) stockExposure[stock]={name:stock,totalVal:0,sources:[]};
      stockExposure[stock].totalVal+=effectiveVal;
      stockExposure[stock].sources.push({fundSym,fundName:h.db.n,pct,val:effectiveVal});
    });
  });
  const topStocks=Object.entries(stockExposure)
    .map(([sym,d])=>({sym,...d,pctOfPortfolio:d.totalVal/GRAND*100}))
    .filter(s=>s.totalVal>100)
    .sort((a,b)=>b.totalVal-a.totalVal);

  /* 2. Compute pairwise fund overlap */
  const fundSyms=[...new Set(fundPositions.map(h=>h.sym.replace(/\*+$/,'')))].sort();
  const overlap={};
  fundSyms.forEach(a=>{
    overlap[a]={};
    const aH=FUND_HOLDINGS_DB[a].h;
    fundSyms.forEach(b=>{
      if(a===b){ overlap[a][b]=100; return; }
      const bH=FUND_HOLDINGS_DB[b].h;
      /* Overlap = sum of min(weight_a, weight_b) for each common stock */
      let shared=0;
      Object.keys(aH).forEach(s=>{ if(bH[s]) shared+=Math.min(aH[s],bH[s]); });
      overlap[a][b]=Math.round(shared*10)/10;
    });
  });

  /* 3. Generate alerts */
  const alerts=[];
  /* High concentration alerts */
  topStocks.filter(s=>s.pctOfPortfolio>=5 && s.sources.length>1).forEach(s=>{
    const drop20=s.totalVal*0.2;
    const symLink=`<a href="https://finance.yahoo.com/quote/${encodeURIComponent(s.sym)}" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline">${s.sym}</a>`;
    alerts.push({type:'danger',
      msg:`<strong>${symLink} concentration: ${s.pctOfPortfolio.toFixed(1)}%</strong> ($${Math.round(s.totalVal).toLocaleString()}) — Found in ${s.sources.filter(x=>x.fundSym!=='Direct').length} funds${s.sources.some(x=>x.fundSym==='Direct')?' + direct holding':''}. A 20% drop would reduce your portfolio by ~$${Math.round(drop20).toLocaleString()}.`});
  });
  /* High overlap alerts */
  const seen=new Set();
  fundSyms.forEach(a=>{
    fundSyms.forEach(b=>{
      if(a>=b) return;
      const k=a+'|'+b;
      if(seen.has(k)) return; seen.add(k);
      const ov=overlap[a]?.[b]||0;
      if(ov>=60){
        const aLink=`<a href="https://finance.yahoo.com/quote/${encodeURIComponent(a)}" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline">${a}</a>`;
        const bLink=`<a href="https://finance.yahoo.com/quote/${encodeURIComponent(b)}" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline">${b}</a>`;
        alerts.push({type:'warn',
          msg:`<strong>${aLink} ↔ ${bLink}: ${ov}% overlap</strong> — These funds hold many of the same stocks. Consider consolidating into one to reduce redundancy and simplify your portfolio.`});
      }
    });
  });
  /* Diversification positive */
  const intlFunds=fundSyms.filter(s=>{const d=FUND_HOLDINGS_DB[s]; return d&&d.n&&/intl|international|emerging|ex-us|eafe|world/i.test(d.n);});
  if(intlFunds.length>0){
    const maxOverlapWithUS=Math.max(...intlFunds.map(i=>fundSyms.filter(u=>u!==i&&!intlFunds.includes(u)).map(u=>overlap[i]?.[u]||0)).flat(),0);
    if(maxOverlapWithUS<10) alerts.push({type:'ok', msg:`<strong>International funds provide genuine diversification</strong> — Less than 10% overlap with your US holdings. Good geographic spread.`});
  }
  /* No data coverage note */
  if(noDataFunds.length>0){
    alerts.push({type:'info', msg:`<strong>${noDataFunds.length} fund(s) without composition data</strong> — ${noDataFunds.map(f=>f.sym).join(', ')}. These are not included in the overlap analysis.`});
  }

  return {topStocks, fundSyms, overlap, alerts, fundPositions, coveredValue, noDataFunds};
}

/* ---- Fund Overlap Detail Modal ---- */
function showOverlapDetail(symA,symB){
  const xray=window._xrayResult;
  if(!xray) return;
  const dbA=FUND_HOLDINGS_DB[symA], dbB=FUND_HOLDINGS_DB[symB];
  if(!dbA||!dbB) return;
  const hA=dbA.h, hB=dbB.h;
  const ov=xray.overlap[symA]?.[symB]||0;
  const yfl=s=>`<a href="https://finance.yahoo.com/quote/${encodeURIComponent(s)}" target="_blank" rel="noopener" style="color:var(--primary);text-decoration:none;font-weight:600">${esc(s)}</a>`;

  /* Build common holdings sorted by overlap contribution */
  const common=[];
  Object.keys(hA).forEach(s=>{
    if(hB[s]) common.push({sym:s, wA:hA[s], wB:hB[s], shared:Math.min(hA[s],hB[s])});
  });
  common.sort((a,b)=>b.shared-a.shared);
  const totalShared=common.reduce((s,c)=>s+c.shared,0);

  /* Stocks unique to each fund */
  const onlyA=Object.keys(hA).filter(s=>!hB[s]).sort((a,b)=>hB[b]||hA[b]-hA[a]);
  const onlyB=Object.keys(hB).filter(s=>!hA[s]).sort((a,b)=>hB[b]-hB[a]||0);

  let mh=`<div class="sugg-modal" style="max-width:900px">`;
  mh+=`<button class="sugg-modal-close" onclick="_closeOverlapModal()" title="Close">&times;</button>`;
  mh+=`<div style="margin-bottom:16px"><span style="font-size:1.3em;font-weight:700">Fund Overlap Detail</span></div>`;

  /* Summary */
  const ovColor=ov>=60?'var(--danger)':ov>=30?'var(--warning-dark)':'var(--success-bright)';
  mh+=`<div style="display:flex;gap:24px;margin-bottom:20px;flex-wrap:wrap">`;
  mh+=`<div style="flex:1;min-width:200px;background:var(--card);border-radius:var(--radius);padding:16px;border:1px solid var(--border)">`;
  mh+=`<div style="font-size:0.8em;color:var(--text-muted);margin-bottom:4px">${yfl(symA)}</div>`;
  mh+=`<div style="font-weight:600">${esc(dbA.n)}</div>`;
  mh+=`<div style="color:var(--text-muted);font-size:0.85em;margin-top:4px">${Object.keys(hA).length} holdings tracked</div></div>`;
  mh+=`<div style="flex:0 0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center">`;
  mh+=`<div style="font-size:2em;font-weight:800;color:${ovColor}">${ov}%</div>`;
  mh+=`<div style="font-size:0.8em;color:var(--text-muted)">overlap</div></div>`;
  mh+=`<div style="flex:1;min-width:200px;background:var(--card);border-radius:var(--radius);padding:16px;border:1px solid var(--border)">`;
  mh+=`<div style="font-size:0.8em;color:var(--text-muted);margin-bottom:4px">${yfl(symB)}</div>`;
  mh+=`<div style="font-weight:600">${esc(dbB.n)}</div>`;
  mh+=`<div style="color:var(--text-muted);font-size:0.85em;margin-top:4px">${Object.keys(hB).length} holdings tracked</div></div>`;
  mh+=`</div>`;

  /* Common holdings table */
  if(common.length>0){
    mh+=`<div style="margin-bottom:8px;font-weight:600;font-size:0.95em">${common.length} Common Holdings <span style="color:var(--text-muted);font-weight:400">(${totalShared.toFixed(1)}% total shared weight)</span></div>`;
    mh+=`<div style="overflow-x:auto;max-height:400px;overflow-y:auto;margin-bottom:16px"><table style="width:100%;border-collapse:collapse;font-size:0.85em">`;
    mh+=`<thead style="position:sticky;top:0;background:var(--card);z-index:1"><tr style="border-bottom:2px solid var(--border)">`;
    mh+=`<th style="text-align:left;padding:8px">Stock</th>`;
    mh+=`<th style="text-align:right;padding:8px">${esc(symA)} Weight</th>`;
    mh+=`<th style="text-align:right;padding:8px">${esc(symB)} Weight</th>`;
    mh+=`<th style="text-align:right;padding:8px">Overlap</th>`;
    mh+=`<th style="padding:8px;width:120px">Contribution</th>`;
    mh+=`</tr></thead><tbody>`;
    common.forEach(c=>{
      const pctOfOverlap=totalShared>0?(c.shared/totalShared*100):0;
      const barW=Math.min(pctOfOverlap/Math.max(common[0].shared/totalShared*100,1)*100,100);
      mh+=`<tr style="border-bottom:1px solid var(--border)">`;
      mh+=`<td style="padding:8px">${yfl(c.sym)}</td>`;
      mh+=`<td style="text-align:right;padding:8px;font-variant-numeric:tabular-nums">${c.wA.toFixed(2)}%</td>`;
      mh+=`<td style="text-align:right;padding:8px;font-variant-numeric:tabular-nums">${c.wB.toFixed(2)}%</td>`;
      mh+=`<td style="text-align:right;padding:8px;font-weight:600;font-variant-numeric:tabular-nums">${c.shared.toFixed(2)}%</td>`;
      mh+=`<td style="padding:8px"><div style="display:flex;align-items:center;gap:6px">`;
      mh+=`<div style="flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden"><div style="height:100%;width:${barW}%;background:${ovColor};border-radius:3px"></div></div>`;
      mh+=`<span style="font-size:0.8em;color:var(--text-muted);min-width:32px;text-align:right">${pctOfOverlap.toFixed(0)}%</span></div></td>`;
      mh+=`</tr>`;
    });
    mh+=`</tbody></table></div>`;
  }

  /* Unique holdings */
  if(onlyA.length>0||onlyB.length>0){
    mh+=`<div style="display:flex;gap:16px;flex-wrap:wrap">`;
    if(onlyA.length>0){
      mh+=`<div style="flex:1;min-width:200px"><div style="font-weight:600;font-size:0.9em;margin-bottom:6px">Only in ${esc(symA)} <span style="color:var(--text-muted);font-weight:400">(${onlyA.length})</span></div>`;
      mh+=`<div style="display:flex;flex-wrap:wrap;gap:4px">`;
      onlyA.slice(0,30).forEach(s=>{mh+=`<span style="background:var(--primary-light);color:var(--primary);padding:2px 8px;border-radius:10px;font-size:0.78em">${yfl(s)}</span>`;});
      if(onlyA.length>30) mh+=`<span style="color:var(--text-muted);font-size:0.78em;padding:2px 4px">+${onlyA.length-30} more</span>`;
      mh+=`</div></div>`;
    }
    if(onlyB.length>0){
      mh+=`<div style="flex:1;min-width:200px"><div style="font-weight:600;font-size:0.9em;margin-bottom:6px">Only in ${esc(symB)} <span style="color:var(--text-muted);font-weight:400">(${onlyB.length})</span></div>`;
      mh+=`<div style="display:flex;flex-wrap:wrap;gap:4px">`;
      onlyB.slice(0,30).forEach(s=>{mh+=`<span style="background:var(--warning-bg);color:var(--warning-text);padding:2px 8px;border-radius:10px;font-size:0.78em">${yfl(s)}</span>`;});
      if(onlyB.length>30) mh+=`<span style="color:var(--text-muted);font-size:0.78em;padding:2px 4px">+${onlyB.length-30} more</span>`;
      mh+=`</div></div>`;
    }
    mh+=`</div>`;
  }

  mh+=`<div style="text-align:right;margin-top:20px"><button onclick="_closeOverlapModal()" style="background:var(--card);color:var(--text-muted);border:1px solid var(--border);padding:8px 20px;border-radius:var(--radius);cursor:pointer">Close</button></div>`;
  mh+=`</div>`;

  /* Create overlay */
  const overlay=document.createElement('div');
  overlay.className='sugg-overlay';
  overlay.id='overlap-overlay';
  overlay.innerHTML=mh;
  document.body.appendChild(overlay);
  overlay.addEventListener('click',e=>{if(e.target===overlay)_closeOverlapModal();});
  window._overlapEscHandler=function(e){if(e.key==='Escape')_closeOverlapModal();};
  document.addEventListener('keydown',window._overlapEscHandler);
}
function _closeOverlapModal(){const el=document.getElementById('overlap-overlay');if(el)el.remove();document.removeEventListener('keydown',window._overlapEscHandler);}

/* ---- Fund X-Ray: Renderer ---- */
function renderFundXRay(){
  /* Hide normal holdings views, show xray container */
  document.getElementById('allocOverview').style.display='none';
  document.getElementById('drilldown').style.display='none';
  const insEl=document.querySelector('.insights');
  if(insEl) insEl.style.display='none';
  const xc=document.getElementById('xrayContent');
  xc.style.display='';

  const xray=computeFundXRay();
  window._xrayResult=xray; /* expose for heatmap click handler */
  const fmtD=v=>'$'+Math.round(v).toLocaleString();
  const fmtPct=v=>v.toFixed(1)+'%';

  h+=`<h3>\u{1F50D} Fund X-Ray Analysis</h3>`;
  h+=`<p class="wd-desc">This analysis looks <em>inside</em> your ETFs and mutual funds to reveal hidden stock concentration and fund overlap. `;
  if(xray.coveredValue.total>0){
    const covPct=(xray.coveredValue.covered/xray.coveredValue.total*100);
    h+=`Coverage: <strong>${fmtPct(covPct)}</strong> of equity value (${fmtD(xray.coveredValue.covered)} of ${fmtD(xray.coveredValue.total)}) has fund composition data. `;
  }

  h+=`</p></div>`;

  /* Summary metric cards */
  const covPctVal=xray.coveredValue.total>0?(xray.coveredValue.covered/xray.coveredValue.total*100):0;
  const highRiskCount=xray.topStocks.filter(s=>s.pctOfPortfolio>=5).length;
  const overlapPairs=[];
  xray.fundSyms.forEach((a,i)=>xray.fundSyms.forEach((b,j)=>{ if(j>i&&(xray.overlap[a]?.[b]||0)>=30) overlapPairs.push(xray.overlap[a][b]); }));
  h+=`<div style="display:flex;gap:12px;flex-wrap:wrap;margin:16px 0">`;
  h+=`<div class="sugg-card" style="padding:14px 18px;flex:1;min-width:140px"><div style="font-size:0.72em;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:4px">Unique Stocks</div><div style="font-size:1.5em;font-weight:700;color:var(--primary)">${xray.topStocks.length.toLocaleString()}</div><div style="font-size:0.78em;color:var(--text-muted)">across all funds</div></div>`;
  h+=`<div class="sugg-card" style="padding:14px 18px;flex:1;min-width:140px"><div style="font-size:0.72em;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:4px">Data Coverage</div><div style="font-size:1.5em;font-weight:700;color:${covPctVal>=80?'var(--success)':'var(--warning-dark)'}">${fmtPct(covPctVal)}</div><div style="font-size:0.78em;color:var(--text-muted)">${xray.fundSyms.length} funds analyzed</div></div>`;
  h+=`<div class="sugg-card" style="padding:14px 18px;flex:1;min-width:140px"><div style="font-size:0.72em;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:4px">High-Risk Stocks</div><div style="font-size:1.5em;font-weight:700;color:${highRiskCount>0?'var(--danger)':'var(--success)'}">${highRiskCount}</div><div style="font-size:0.78em;color:var(--text-muted)">${highRiskCount>0?'stocks ≥ 5% exposure':'no concentration risk'}</div></div>`;
  h+=`<div class="sugg-card" style="padding:14px 18px;flex:1;min-width:140px"><div style="font-size:0.72em;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:4px">High Overlap Pairs</div><div style="font-size:1.5em;font-weight:700;color:${overlapPairs.length>0?'var(--warning-dark)':'var(--success)'}">${overlapPairs.length}</div><div style="font-size:0.78em;color:var(--text-muted)">${overlapPairs.length>0?'fund pairs ≥ 30% overlap':'good diversification'}</div></div>`;
  h+=`</div>`;

  /* Panel 1: Top Stock Exposure */
  h+=`<div class="wd-panel">`;
  h+=`<h3>\u{1F4CA} Hidden Stock Concentration</h3>`;
  h+=`<p class="wd-desc" style="margin-bottom:14px">Your largest single-stock exposures across all funds combined. Stocks appearing in multiple funds create hidden concentration risk.</p>`;
  if(xray.topStocks.length===0){
    h+=`<div class="xray-no-data">No fund composition data available for your holdings.</div>`;
  } else {
    const showCount=25;
    h+=`<div style="overflow-x:auto"><table class="xray-conc-tbl"><thead><tr>`;
    h+=`<th>#</th><th>Stock</th><th class="r">Effective Value</th><th class="r">% of Portfolio</th><th>Exposure</th><th>Found In</th><th>Risk</th>`;
    h+=`</tr></thead><tbody>`;
    xray.topStocks.slice(0,showCount).forEach((s,i)=>{
      const riskCls=s.pctOfPortfolio>=5?'xray-risk-high':s.pctOfPortfolio>=3?'xray-risk-mod':'xray-risk-low';
      const riskLabel=s.pctOfPortfolio>=5?'\u{1F534} High':s.pctOfPortfolio>=3?'\u{1F7E1} Moderate':'\u{1F7E2} Low';
      const barPct=Math.min(s.pctOfPortfolio/Math.max(xray.topStocks[0].pctOfPortfolio,1)*100,100);
      const barColor=s.pctOfPortfolio>=5?'var(--danger-bright)':s.pctOfPortfolio>=3?'var(--warning)':'var(--success-bright)';
      const fundList=s.sources.filter((src,idx,arr)=>arr.findIndex(x=>x.fundSym===src.fundSym)===idx)
        .map(src=>src.fundSym==='Direct'?'<span class="xray-tag" style="background:var(--primary-light);color:var(--primary)">Direct</span>'
          :`<a href="https://finance.yahoo.com/quote/${encodeURIComponent(src.fundSym)}" target="_blank" rel="noopener" class="xray-tag" style="background:var(--th-bg);color:var(--text);text-decoration:none">${src.fundSym}</a>`).join(' ');
      h+=`<tr><td class="r" style="color:var(--text-muted)">${i+1}</td>`;
      h+=`<td>${yfl(s.sym)}</td>`;

      h+=`<td class="r"><div style="display:flex;align-items:center;gap:8px;justify-content:flex-end">`;
      h+=`<div class="xray-conc-bar" style="width:80px"><div class="xray-conc-fill" style="width:${barPct}%;background:${barColor}"></div></div>`;
      h+=`<span style="min-width:42px;text-align:right">${fmtPct(s.pctOfPortfolio)}</span></div></td>`;
      h+=`<td>${s.sources.length>1?s.sources.filter((src,idx,arr)=>arr.findIndex(x=>x.fundSym===src.fundSym)===idx).length+' sources':s.sources[0].fundSym==='Direct'?'Direct':'1 fund'}</td>`;
      h+=`<td style="max-width:300px">${fundList}</td>`;
      h+=`<td class="${riskCls}">${riskLabel}</td></tr>`;
    });
    h+=`</tbody>`;
    /* Expandable rows in same table for alignment */
    if(xray.topStocks.length>showCount){
      h+=`<tbody id="xrayExtraRows" style="display:none">`;
      xray.topStocks.slice(showCount).forEach((s,i)=>{
        const riskCls=s.pctOfPortfolio>=5?'xray-risk-high':s.pctOfPortfolio>=3?'xray-risk-mod':'xray-risk-low';
        const riskLabel=s.pctOfPortfolio>=5?'\u{1F534} High':s.pctOfPortfolio>=3?'\u{1F7E1} Moderate':'\u{1F7E2} Low';
        const barPct=Math.min(s.pctOfPortfolio/Math.max(xray.topStocks[0].pctOfPortfolio,1)*100,100);
        const barColor=s.pctOfPortfolio>=5?'var(--danger-bright)':s.pctOfPortfolio>=3?'var(--warning)':'var(--success-bright)';

  h+=`</div>`;

  /* Panel 2: Fund Overlap Heatmap */
  if(xray.fundSyms.length>=2){
    h+=`<div class="wd-panel">`;
    h+=`<h3>\u{1F5FA}\uFE0F Fund Overlap Heatmap</h3>`;
    h+=`<p class="wd-desc" style="margin-bottom:14px">Each cell shows the percentage of common holdings (by weight) between two funds. Higher overlap means more redundancy.</p>`;
    h+=`<div class="xray-heatmap"><table class="xray-hm-tbl"><thead><tr><th></th>`;
    xray.fundSyms.forEach(s=>{ h+=`<th>${yfl(s)}</th>`; });

        h+=`<td style="background:${bg};color:${fg};cursor:pointer" onclick="showOverlapDetail('${esc(a)}','${esc(b)}')" title="Click to see overlap detail between ${esc(a)} and ${esc(b)}">${ov}%</td>`;
      });
      h+=`</tr>`;
    });
    h+=`</tbody></table></div></div>`;
  }

  /* Panel 3: Alerts */
  if(xray.alerts.length>0){
    h+=`<div class="wd-panel">`;
    h+=`<h3>\u{26A0}\uFE0F Redundancy & Concentration Alerts</h3>`;
    xray.alerts.forEach(a=>{
      const cls=a.type==='danger'?'xray-alert-danger':a.type==='warn'?'xray-alert-warn':a.type==='ok'?'xray-alert-ok':'xray-alert-info';
      const icon=a.type==='danger'?'\u{1F6A8}':a.type==='warn'?'\u{26A0}\uFE0F':a.type==='ok'?'\u2705':'\u{2139}\uFE0F';
      h+=`<div class="xray-alert ${cls}">${icon} ${a.msg}</div>`;
    });
    h+=`</div>`;
  }

  /* Data-driven methodology */
  const methXray=[];
  const xrayFundCount=xray.fundSyms.length;
  const xrayStockCount=xray.topStocks.length;
  const xrayHighConc=xray.topStocks.filter(s=>s.pctOfPortfolio>=5);
  const xrayModConc=xray.topStocks.filter(s=>s.pctOfPortfolio>=3&&s.pctOfPortfolio<5);
  const covPct=xray.coveredValue.total>0?(xray.coveredValue.covered/xray.coveredValue.total*100):0;
  /* Overlap stats */
  const overlapHigh=[];
  xray.fundSyms.forEach((a,i)=>{
    xray.fundSyms.forEach((b,j)=>{
      if(j>i&&xray.overlap[a]&&xray.overlap[a][b]>=30) overlapHigh.push({a,b,pct:xray.overlap[a][b]});
    });
  });
  const analysisItems=[];
  analysisItems.push(`Analyzed <strong>${xrayFundCount} funds/ETFs</strong>, covering <strong>${covPct.toFixed(0)}%</strong> of analyzable portfolio value (${_fmtK(xray.coveredValue.covered)} of ${_fmtK(xray.coveredValue.total)}).`);
  analysisItems.push(`Identified <strong>${xrayStockCount} unique underlying stocks</strong> across all fund holdings.`);
  if(xrayHighConc.length>0) analysisItems.push(`🚨 <strong>${xrayHighConc.length} stock${xrayHighConc.length>1?'s':''} exceed${xrayHighConc.length===1?'s':''} 5% concentration</strong>: ${xrayHighConc.slice(0,3).map(s=>`${s.sym} (${s.pctOfPortfolio.toFixed(1)}%)`).join(', ')}${xrayHighConc.length>3?' + '+(xrayHighConc.length-3)+' more':''}.`);
  else if(xrayModConc.length>0) analysisItems.push(`${xrayModConc.length} stock${xrayModConc.length>1?'s':''} between 3-5% concentration — moderate risk. Largest: ${xrayModConc[0].sym} at ${xrayModConc[0].pctOfPortfolio.toFixed(1)}%.`);
  else analysisItems.push('✅ No single stock exceeds 5% of portfolio — good diversification at the individual stock level.');
  if(overlapHigh.length>0) analysisItems.push(`⚠️ <strong>${overlapHigh.length} fund pair${overlapHigh.length>1?'s':''} with ≥30% overlap</strong>: ${overlapHigh.slice(0,3).map(p=>`${p.a}↔${p.b} (${p.pct}%)`).join(', ')}${overlapHigh.length>3?' + '+(overlapHigh.length-3)+' more':''}. Consider consolidating overlapping funds to reduce redundancy.`);
  else analysisItems.push('✅ No fund pairs with ≥30% overlap — holdings are well-differentiated.');
  methXray.push({heading:'X-Ray Analysis Results', items:analysisItems});
  const alertItems=[];
  const dangerAlerts=xray.alerts.filter(a=>a.type==='danger').length;
  const warnAlerts=xray.alerts.filter(a=>a.type==='warn').length;
  const okAlerts=xray.alerts.filter(a=>a.type==='ok').length;
  alertItems.push(`<strong>${xray.alerts.length} alerts generated</strong>: ${dangerAlerts} critical, ${warnAlerts} warnings, ${okAlerts} all-clear.`);
  alertItems.push('Fund holdings sourced from an embedded database of ~80 popular ETFs and mutual funds, cross-referenced with Yahoo Finance SEC filing data.');
  alertItems.push('Overlap is measured as the percentage of shared underlying stocks weighted by position size. Two funds holding the same stocks in similar weights have high overlap.');
  methXray.push({heading:'How It Works', items:alertItems});
  h+=buildMethodologyPanel('Fund X-Ray Analysis — Your Portfolio',methXray);

  xc.innerHTML=h;
}

function selectRebalModel(key){
  document.getElementById('rebalModel').value=key;
  document.querySelectorAll('.rebal-model-btn').forEach(b=>{
    const active=b.dataset.model===key;
    b.style.border=active?'2px solid var(--primary)':'2px solid var(--border)';
    b.style.background=active?'var(--highlight-bg)':'var(--card)';
    b.querySelectorAll('div')[2].style.color=active?'var(--primary)':'var(--text)';
  });
  document.getElementById('rebalCustom').style.display=key==='custom'?'':'none';
  if(key==='custom') updateRebalCustomSum();
  renderRebalResult();
}

function updateRebalCustomSum(){
  const ids=['eq','intl','bond','cash','reit','alt'];
  const sum=ids.reduce((s,id)=>s+(parseFloat(document.getElementById('rebalC_'+id).value)||0),0);
  const el=document.getElementById('rebalCustomSum');
  if(el) el.innerHTML=sum===100?`<span style="color:var(--success);font-weight:600">\u2705 ${sum}%</span>`:`<span style="color:var(--danger);font-weight:600">\u26A0\uFE0F ${sum}% (need 100%)</span>`;
}

function _rebalDonut(data,size,label){
  const r=size/2, cx=r, cy=r, ir=r*0.6;
  let svg=`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">`;
  let cumAngle=-Math.PI/2;
  const total=data.reduce((s,d)=>s+d.val,0)||1;
  data.forEach(d=>{
    if(d.val<=0) return;
    const angle=(d.val/total)*2*Math.PI;
    const x1=cx+r*Math.cos(cumAngle), y1=cy+r*Math.sin(cumAngle);
    cumAngle+=angle;
    const x2=cx+r*Math.cos(cumAngle), y2=cy+r*Math.sin(cumAngle);
    const ix1=cx+ir*Math.cos(cumAngle), iy1=cy+ir*Math.sin(cumAngle);
    const ix2=cx+ir*Math.cos(cumAngle-angle), iy2=cy+ir*Math.sin(cumAngle-angle);
    const lg=angle>Math.PI?1:0;
    svg+=`<path d="M${x1},${y1} A${r},${r} 0 ${lg},1 ${x2},${y2} L${ix1},${iy1} A${ir},${ir} 0 ${lg},0 ${ix2},${iy2} Z" fill="${d.color}" opacity="0.85"><title>${d.label}: ${d.val.toFixed(1)}%</title></path>`;
  });
  svg+=`<text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="11" font-weight="700" fill="var(--text)">${label}</text>`;
  svg+=`<text x="${cx}" y="${cy+12}" text-anchor="middle" font-size="9" fill="var(--text-muted)">allocation</text>`;
  svg+=`</svg>`;
  return svg;
}

function renderRebalResult(){
  const modelKey=document.getElementById('rebalModel').value;

  let target;
  if(modelKey==='custom'){
    const ids=['eq','intl','bond','cash','reit','alt'];
    target={};
    ids.forEach(id=>{ target[id]=parseFloat(document.getElementById('rebalC_'+id).value)||0; });
    const sum=Object.values(target).reduce((a,b)=>a+b,0);
    if(Math.abs(sum-100)>0.5){
      document.getElementById('rebalTrades').innerHTML=`<div class="wd-note wd-note-warn" style="margin:16px 0"><h3>\u26A0\uFE0F Percentages must sum to 100%</h3></div>`;
      document.getElementById('rebalBars').innerHTML='';
      return;
    }
  } else {
    const model=MODELS[modelKey];
    if(!model) return;
    target={eq:0,intl:0,bond:0,cash:0,reit:0,alt:0};
    model.alloc.forEach(a=>{
      const ac=FUND_META[a.t]?.ac||'';
      if(ac==='US Equity') target.eq+=a.pct;
      else if(ac==='International Equity') target.intl+=a.pct;
      else if(ac==='Bonds') target.bond+=a.pct;
      else if(ac==='Real Estate') target.reit+=a.pct;
      else if(ac==='Alternatives') target.alt+=a.pct;
    });
  }

  const cur=computeCurrentAlloc();
  const curPcts={eq:cur.eq/GRAND*100,intl:cur.intl/GRAND*100,bond:cur.bond/GRAND*100,cash:cur.cash/GRAND*100,reit:cur.reit/GRAND*100,alt:cur.alt/GRAND*100};
  const fmtD=v=>'$'+Math.round(v).toLocaleString();
  const fmtK=v=>v>=1000?'$'+(v/1000).toFixed(1)+'k':fmtD(v);
  const catInfo=[{k:'eq',l:'US Equity',c:ALLOC_COLORS.eq},{k:'intl',l:'International',c:ALLOC_COLORS.intl},{k:'bond',l:'Bonds',c:ALLOC_COLORS.bond},{k:'cash',l:'Cash',c:ALLOC_COLORS.cash},{k:'reit',l:'Real Estate',c:ALLOC_COLORS.reit},{k:'alt',l:'Alternatives',c:ALLOC_COLORS.alt}];
  let totalDrift=0;
  catInfo.forEach(ci=>{ totalDrift+=Math.abs((curPcts[ci.k]||0)-(target[ci.k]||0)); });
  totalDrift/=2;

  /* ─── Allocation Comparison Panel ─── */
  let bh=`<div class="wd-panel" style="margin-top:16px">`;
  bh+=`<h3>\u{1F4CA} Allocation Comparison</h3>`;

  /* Side-by-side donuts + detail table */
  bh+=`<div style="display:flex;gap:24px;flex-wrap:wrap;align-items:flex-start;margin:12px 0">`;
  const curDonutData=catInfo.map(ci=>({val:curPcts[ci.k]||0,color:ci.c,label:ci.l}));
  const tgtDonutData=catInfo.map(ci=>({val:target[ci.k]||0,color:ci.c,label:ci.l}));
  bh+=`<div style="text-align:center">${_rebalDonut(curDonutData,130,'Current')}</div>`;
  bh+=`<div style="text-align:center">${_rebalDonut(tgtDonutData,130,'Target')}</div>`;

  /* Drift detail table */
  bh+=`<div style="flex:1;min-width:260px">`;
  bh+=`<table style="width:100%;border-collapse:collapse;font-size:0.85em"><thead><tr style="border-bottom:2px solid var(--border)">`;
  bh+=`<th style="text-align:left;padding:6px 8px">Category</th><th class="r" style="padding:6px 8px">Current</th><th class="r" style="padding:6px 8px">Target</th><th class="r" style="padding:6px 8px">Drift</th><th class="r" style="padding:6px 8px">Amount</th>`;
  bh+=`</tr></thead><tbody>`;
  catInfo.forEach(ci=>{
    const c=curPcts[ci.k]||0, t=target[ci.k]||0, diff=t-c, amt=diff/100*GRAND;
    if(c<0.5&&t<0.5) return;
    const driftCol=Math.abs(diff)<1?'var(--text-muted)':diff>0?'var(--success)':'var(--danger)';
    const arrow=Math.abs(diff)<1?'':diff>0?'\u25B2 ':'\u25BC ';
    bh+=`<tr style="border-bottom:1px solid var(--border)">`;
    bh+=`<td style="padding:6px 8px"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${ci.c};margin-right:6px"></span>${ci.l}</td>`;
    bh+=`<td class="r" style="padding:6px 8px">${c.toFixed(1)}%</td>`;
    bh+=`<td class="r" style="padding:6px 8px;font-weight:600">${t.toFixed(1)}%</td>`;
    bh+=`<td class="r" style="padding:6px 8px;color:${driftCol};font-weight:600">${arrow}${Math.abs(diff).toFixed(1)}%</td>`;
    bh+=`<td class="r" style="padding:6px 8px;color:${driftCol}">${amt>=0?'+':''}${fmtK(amt)}</td>`;
    bh+=`</tr>`;
  });
  bh+=`</tbody></table></div>`;
  bh+=`</div>`;

  /* Stacked bars */
  bh+=`<div class="sugg-legend" style="margin:10px 0 6px">`;
  catInfo.forEach(ci=>{ bh+=`<span><span class="sugg-legend-dot" style="background:${ci.c}"></span>${ci.l}</span>`; });
  bh+=`</div><div class="sugg-bars">`;
  [{label:'Current',d:curPcts},{label:'Target',d:target}].forEach(r=>{
    const items=catInfo.map(ci=>({val:r.d[ci.k]||0,color:ci.c,label:ci.l}));
    bh+=`<div class="sugg-bar-row"><div class="sugg-bar-label">${r.label}</div>${allocBar(items,100)}<div class="sugg-bar-pct">100%</div></div>`;
  });
  bh+=`</div></div>`;
  document.getElementById('rebalBars').innerHTML=bh;

  /* ─── Generate Trades ─── */
  const trades=generateRebalTrades(target,curPcts);
  const sells=trades.filter(t=>t.action==='SELL');
  const buys=trades.filter(t=>t.action==='BUY');
  const held=trades._held||[];
  const estTaxImpact=sells.filter(t=>t.taxable).reduce((s,t)=>s+Math.max(0,t.amount)*0.15,0);
  const totalMoved=trades.reduce((s,t)=>s+Math.abs(t.amount),0)/2;

  let th='';

  /* Summary cards */
  th+=`<div style="display:flex;gap:12px;flex-wrap:wrap;margin:16px 0">`;
  const driftColor=totalDrift<5?'var(--success)':totalDrift<15?'var(--warning-dark)':'var(--danger)';
  const driftLabel=totalDrift<5?'Well Aligned':totalDrift<15?'Moderate Drift':'Significant Drift';
  const driftIcon=totalDrift<5?'\u2705':totalDrift<15?'\u{1F7E1}':'\u{1F534}';
  th+=`<div class="sugg-card" style="padding:14px 18px;flex:1;min-width:140px"><div style="font-size:0.72em;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:4px">Portfolio Drift</div><div style="font-size:1.4em;font-weight:700;color:${driftColor}">${driftIcon} ${totalDrift.toFixed(1)}%</div><div style="font-size:0.78em;color:${driftColor}">${driftLabel}</div></div>`;
  th+=`<div class="sugg-card" style="padding:14px 18px;flex:1;min-width:140px"><div style="font-size:0.72em;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:4px">Trades Needed</div><div style="font-size:1.4em;font-weight:700">${trades.length}</div><div style="font-size:0.78em;color:var(--text-muted)">${sells.length} sell \u00B7 ${buys.length} buy${held.length?' \u00B7 '+held.length+' held':''}</div></div>`;
  th+=`<div class="sugg-card" style="padding:14px 18px;flex:1;min-width:140px"><div style="font-size:0.72em;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:4px">Capital to Move</div><div style="font-size:1.4em;font-weight:700">${fmtD(totalMoved)}</div><div style="font-size:0.78em;color:var(--text-muted)">${(totalMoved/GRAND*100).toFixed(1)}% of portfolio</div></div>`;
  th+=`<div class="sugg-card" style="padding:14px 18px;flex:1;min-width:140px"><div style="font-size:0.72em;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:4px">Est. Tax Impact</div><div style="font-size:1.4em;font-weight:700;color:${estTaxImpact>0?'var(--danger)':'var(--success)'}">${estTaxImpact>0?fmtD(estTaxImpact):'$0'}</div><div style="font-size:0.78em;color:var(--text-muted)">${sells.filter(t=>t.taxable).length} taxable sells</div></div>`;
  th+=`</div>`;

  if(trades.length===0){
    th+=`<div class="wd-note" style="background:var(--success-bg);border-color:var(--success-border);margin-top:8px"><h3>\u2705 Portfolio is Well Aligned</h3><p>No trades needed — your allocation is within 1% of the target in all categories.</p></div>`;
  } else {
    /* ─── Category-grouped accordion layout (Betterment/Wealthfront style) ─── */
    const maxAmt=Math.max(...trades.map(t=>Math.abs(t.amount)),1);

    /* Group trades + held by category */
    const catGroups={};
    catInfo.forEach(ci=>{
      const catTrades=trades.filter(t=>t.category===ci.l);
      const catHeld=held.filter(h=>{
        const meta=FUND_META[h.sym];
        const ac=meta?.ac||'';
        const mapped=ac==='US Equity'?'eq':ac==='International Equity'?'intl':ac==='Bonds'?'bond':ac==='Real Estate'?'reit':ac==='Alternatives'?'alt':'eq';
        return mapped===ci.k;
      });
      if(catTrades.length>0||catHeld.length>0){
        const curP=curPcts[ci.k]||0;
        const tgtP=target[ci.k]||0;
        const diff=tgtP-curP;
        const netAmt=catTrades.reduce((s,t)=>t.action==='BUY'?s+t.amount:s-t.amount,0);
        catGroups[ci.k]={label:ci.l,color:ci.c,cur:curP,tgt:tgtP,diff,netAmt,
          sells:catTrades.filter(t=>t.action==='SELL'),
          buys:catTrades.filter(t=>t.action==='BUY'),
          held:catHeld};
      }
    });

    /* Also catch held items not matched by FUND_META */
    const assignedHeld=new Set();
    Object.values(catGroups).forEach(g=>g.held.forEach(h=>assignedHeld.add(h.sym+'|'+h.account)));
    const unassignedHeld=held.filter(h=>!assignedHeld.has(h.sym+'|'+h.account));
    if(unassignedHeld.length>0){
      if(!catGroups.eq) catGroups.eq={label:'US Equity',color:ALLOC_COLORS.eq,cur:curPcts.eq||0,tgt:target.eq||0,diff:0,netAmt:0,sells:[],buys:[],held:[]};
      catGroups.eq.held.push(...unassignedHeld);
    }

    /* Render each category as an accordion */
    const catOrder=['eq','intl','bond','cash','reit','alt'];
    catOrder.forEach(k=>{
      const g=catGroups[k];
      if(!g) return;
      const isOver=g.diff<-1;
      const isUnder=g.diff>1;
      const dirIcon=isOver?'▼':isUnder?'▲':'≈';
      const dirColor=isOver?'var(--danger)':isUnder?'var(--success)':'var(--text-muted)';
      const dirLabel=isOver?'Reduce':isUnder?'Increase':'Balanced';
      const totalItems=g.sells.length+g.buys.length+g.held.length;
      const absDiff=Math.abs(g.diff);
      const driftBar=Math.min(absDiff/20*100,100);

      th+=`<details open style="margin-bottom:12px">`;
      /* Accordion header */
      th+=`<summary style="cursor:pointer;list-style:none;-webkit-appearance:none">`;
      th+=`<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;box-shadow:var(--shadow);border-left:4px solid ${g.color}">`;
      th+=`<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">`;
      /* Color dot + label */
      th+=`<div style="display:flex;align-items:center;gap:8px;min-width:140px">`;
      th+=`<div style="width:12px;height:12px;border-radius:50%;background:${g.color};flex-shrink:0"></div>`;
      th+=`<span style="font-weight:700;font-size:0.95em">${g.label}</span>`;
      th+=`</div>`;
      /* Current → Target with arrow */
      th+=`<div style="display:flex;align-items:center;gap:6px;min-width:160px">`;
      th+=`<span style="font-size:0.85em;color:var(--text-muted)">${g.cur.toFixed(1)}%</span>`;
      th+=`<span style="color:${dirColor};font-size:0.9em">→</span>`;
      th+=`<span style="font-size:0.85em;font-weight:700">${g.tgt.toFixed(1)}%</span>`;
      th+=`<span style="font-size:0.72em;padding:2px 8px;border-radius:10px;background:${isOver?'var(--danger-bg)':isUnder?'var(--success-bg)':'var(--bg-secondary)'};color:${dirColor};font-weight:600">${dirIcon} ${dirLabel} ${absDiff.toFixed(1)}%</span>`;
      th+=`</div>`;
      /* Drift bar */
      th+=`<div style="flex:1;min-width:80px;height:6px;border-radius:3px;background:var(--bg-secondary);overflow:hidden">`;
      th+=`<div style="height:100%;width:${driftBar}%;background:${dirColor};border-radius:3px;transition:width 0.3s"></div>`;
      th+=`</div>`;
      /* Net amount + count */
      th+=`<div style="text-align:right;min-width:120px">`;
      th+=`<span style="font-weight:700;font-size:0.92em;color:${dirColor}">${g.netAmt>=0?'+':''}${fmtK(g.netAmt)}</span>`;
      th+=`<span style="font-size:0.72em;color:var(--text-muted);margin-left:8px">${totalItems} item${totalItems!==1?'s':''}</span>`;
      th+=`</div>`;
      th+=`</div>`;
      th+=`</div>`;
      th+=`</summary>`;

      /* Accordion body: sell rows, buy rows, hold rows */
      th+=`<div style="margin:4px 0 0 16px;border-left:2px solid var(--border);padding-left:16px">`;

      /* Sells */
      if(g.sells.length>0){
        th+=`<div style="margin:8px 0">`;
        th+=`<div style="font-size:0.72em;text-transform:uppercase;letter-spacing:0.5px;color:var(--danger);font-weight:600;margin-bottom:6px">▼ Sell ${g.sells.length} position${g.sells.length!==1?'s':''}</div>`;
        g.sells.forEach(t=>{
          const pctOfPort=(Math.abs(t.amount)/GRAND*100).toFixed(2);
          const meta=FUND_META[t.sym];
          const erLabel=meta?'ER '+meta.er.toFixed(2)+'%':'';
          th+=`<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;margin-bottom:4px;border-radius:var(--radius-sm);background:var(--danger-bg);border:1px solid var(--danger-border);transition:transform 0.1s" onmouseenter="this.style.transform='translateX(4px)'" onmouseleave="this.style.transform=''">`;
          th+=`<div style="background:var(--danger);color:white;font-weight:800;font-size:0.78em;padding:4px 8px;border-radius:6px;min-width:48px;text-align:center;letter-spacing:0.5px">${ylink(t.sym)}</div>`;
          th+=`<div style="flex:1;min-width:0">`;
          th+=`<div style="font-size:0.8em;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(t.name)}</div>`;
          th+=`<div style="font-size:0.68em;color:var(--text-muted)">${esc(t.account).substring(0,30)}${erLabel?' · '+erLabel:''}${t.taxable?' · ⚠ Taxable':''}</div>`;
          th+=`</div>`;
          th+=`<div style="text-align:right;flex-shrink:0">`;
          th+=`<div style="font-weight:700;color:var(--danger);font-size:0.9em">-${fmtD(Math.abs(t.amount))}</div>`;
          th+=`<div style="font-size:0.62em;color:var(--text-muted)">${pctOfPort}%${t.taxNote&&t.taxNote!=='N/A'?' · '+t.taxNote:''}</div>`;
          th+=`</div>`;
          th+=`</div>`;
        });
        th+=`</div>`;
      }

      /* Buys */
      if(g.buys.length>0){
        th+=`<div style="margin:8px 0">`;
        th+=`<div style="font-size:0.72em;text-transform:uppercase;letter-spacing:0.5px;color:var(--success);font-weight:600;margin-bottom:6px">▲ Buy ${g.buys.length} position${g.buys.length!==1?'s':''}</div>`;
        g.buys.forEach(t=>{
          const meta=FUND_META[t.sym];
          const erLabel=meta?'ER '+meta.er.toFixed(2)+'%':'';
          th+=`<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;margin-bottom:4px;border-radius:var(--radius-sm);background:var(--success-bg);border:1px solid var(--success-bg-border);transition:transform 0.1s" onmouseenter="this.style.transform='translateX(4px)'" onmouseleave="this.style.transform=''">`;
          th+=`<div style="background:var(--success);color:white;font-weight:800;font-size:0.78em;padding:4px 8px;border-radius:6px;min-width:48px;text-align:center;letter-spacing:0.5px">${ylink(t.sym)}</div>`;
          th+=`<div style="flex:1;min-width:0">`;
          th+=`<div style="font-size:0.8em;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(t.name)}</div>`;
          th+=`<div style="font-size:0.68em;color:var(--text-muted)">${esc(t.account).substring(0,30)}${erLabel?' · '+erLabel:''}</div>`;
          th+=`</div>`;
          th+=`<div style="text-align:right;flex-shrink:0">`;
          th+=`<div style="font-weight:700;color:var(--success);font-size:0.9em">+${fmtD(t.amount)}</div>`;
          th+=`</div>`;
          th+=`</div>`;
        });
        th+=`</div>`;
      }

      /* Held (deep-loss in tax-advantaged) */
      if(g.held.length>0){
        th+=`<div style="margin:8px 0">`;
        th+=`<div style="font-size:0.72em;text-transform:uppercase;letter-spacing:0.5px;color:var(--hold);font-weight:600;margin-bottom:6px">💎 Hold ${g.held.length} position${g.held.length!==1?'s':''} — recovery potential</div>`;
        g.held.forEach(h=>{
          th+=`<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;margin-bottom:4px;border-radius:var(--radius-sm);background:var(--hold-bg);border:1px solid var(--hold-border);transition:transform 0.1s" onmouseenter="this.style.transform='translateX(4px)'" onmouseleave="this.style.transform=''">`;
          th+=`<div style="background:var(--hold);color:white;font-weight:800;font-size:0.78em;padding:4px 8px;border-radius:6px;min-width:48px;text-align:center;letter-spacing:0.5px">${ylink(h.sym)}</div>`;
          th+=`<div style="flex:1;min-width:0">`;
          th+=`<div style="font-size:0.8em;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(h.name)}</div>`;
          th+=`<div style="font-size:0.68em;color:var(--text-muted)">${esc(h.account).substring(0,30)} · <span style="color:var(--danger)">↘${h.lossPct}% loss</span> · No TLH benefit</div>`;
          th+=`</div>`;
          th+=`<div style="text-align:right;flex-shrink:0">`;
          th+=`<div style="font-weight:700;color:var(--text);font-size:0.9em">${fmtD(h.val)}</div>`;
          th+=`<div style="font-size:0.62em;color:var(--danger)">-${fmtD(Math.abs(h.gain))} unrealized</div>`;
          th+=`</div>`;
          th+=`</div>`;
        });
        th+=`</div>`;
      }

      th+=`</div>`;  /* end accordion body */
      th+=`</details>`;
    });

    /* Copy button + collapsible full trade table (unchanged) */
    th+=`<div style="margin-top:12px;display:flex;justify-content:flex-end">`;
    th+=`<button onclick="copyRebalTrades()" style="padding:8px 18px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card);cursor:pointer;font-size:0.82em;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px">📋 Copy All Trades as TSV</button>`;
    th+=`</div>`;

    th+=`<details style="margin-top:8px"><summary style="cursor:pointer;font-size:0.82em;color:var(--text-muted);padding:8px 0">📋 View Full Trade Table</summary>`;
    th+=`<div class="wd-panel" style="padding:0;overflow:hidden;margin-top:8px">`;
    th+=`<div style="overflow-x:auto"><table class="xray-conc-tbl" style="margin:0;border-radius:0"><thead><tr>`;
    th+=`<th style="width:60px">Action</th><th>Symbol</th><th>Name</th><th>Account</th><th class="r">Amount</th><th>Category</th><th>Reason</th><th>Tax Note</th>`;
    th+=`</tr></thead><tbody>`;
    [...sells,...buys].forEach(t=>{
      const isSell=t.action==='SELL';
      const bg=isSell?'var(--danger-bg)':'var(--success-bg)';
      const fg=isSell?'var(--danger)':'var(--success)';
      const icon=isSell?'▼':'▲';
      th+=`<tr style="background:${bg}">`;
      th+=`<td><span style="color:${fg};font-weight:700;font-size:0.85em">${icon} ${t.action}</span></td>`;
      th+=`<td style="font-weight:600">${ylink(t.sym)}</td>`;
      th+=`<td style="font-size:0.8em;max-width:180px;overflow:hidden;text-overflow:ellipsis">${esc(t.name)}</td>`;
      th+=`<td style="font-size:0.8em">${esc(t.account)}</td>`;
      th+=`<td class="r" style="font-weight:700">${fmtD(Math.abs(t.amount))}</td>`;
      th+=`<td><span style="font-size:0.75em;padding:2px 8px;border-radius:10px;background:var(--bg-secondary)">${t.category}</span></td>`;
      th+=`<td style="font-size:0.8em;color:var(--text-muted)">${t.reason}</td>`;
      th+=`<td style="font-size:0.75em;color:var(--text-muted)">${t.taxNote}</td></tr>`;
    });
    th+=`</tbody></table></div></div></details>`;
  }
  document.getElementById('rebalTrades').innerHTML=th;
}

function generateRebalTrades(targetPcts,curPcts){
  const trades=[];
  const catInfo=[{k:'eq',l:'US Equity'},{k:'intl',l:'International'},{k:'bond',l:'Bonds'},{k:'cash',l:'Cash'},{k:'reit',l:'Real Estate'},{k:'alt',l:'Alternatives'}];

  /* Build per-category, per-account, per-ticker inventory */
  const catMap={}; /* cat -> [{sym,name,val,acctName,acctType,acctNum,gain}] */
  const tickerCat={}; /* sym -> allocCat */
  DATA.forEach(d=>{
    const allocCat=(d.cat==='US Index Funds'||d.cat==='Individual Stocks'||d.cat==='Tech Sector Fund'||d.cat==='Growth / Leveraged ETFs')?'eq'
      :d.cat==='International Funds'?'intl':d.cat==='Bond Funds'?'bond':(d.cat==='Cash / Money Market'||d.cat==='Unspecified')?'cash':'other';
    d.accounts.forEach(a=>{
      a.tickers.forEach(t=>{
        if(t.val<=0) return;
        const ck=allocCat==='other'?'eq':allocCat;
        if(!catMap[ck]) catMap[ck]=[];
        const isTaxable=a.type==='Taxable Investment'||(a.type||'').includes('Individual')||(a.type||'').includes('Joint');
        catMap[ck].push({sym:t.sym,name:t.name,val:t.val,acctName:a.name,acctType:a.type,acctNum:a.num,taxable:isTaxable,gain:t.gl||0,glPct:t.glPct||0,cb:t.cb||0});
        tickerCat[t.sym]=ck;
      });
    });
  });

  /* Determine over/under categories */
  const overCats=[], underCats=[];
  catInfo.forEach(ci=>{
    const diff=(curPcts[ci.k]||0)-(targetPcts[ci.k]||0);
    const diffDollar=diff/100*GRAND;
    if(diff>1) overCats.push({...ci,diff,diffDollar});
    else if(diff<-1) underCats.push({...ci,diff:Math.abs(diff),diffDollar:Math.abs(diffDollar)});
  });

  /* Generate sells from overcategories — smart sort with deep-loss hold rule */
  const held=[];  /* positions skipped: deep losers in tax-advantaged accounts */
  overCats.forEach(oc=>{
    let remaining=oc.diffDollar;
    const holdings=(catMap[oc.k]||[]).slice().sort((a,b)=>{
      /* Priority: 1) taxable losses first (TLH benefit), 2) tax-advantaged winners,
         3) taxable winners last (triggers tax) — skip deep losers in tax-free accts */
      const aDeepLoss=!a.taxable&&a.gain<0&&Math.abs(a.gain)>a.val*0.5;
      const bDeepLoss=!b.taxable&&b.gain<0&&Math.abs(b.gain)>b.val*0.5;
      if(aDeepLoss!==bDeepLoss) return aDeepLoss?1:-1;  /* push deep losers to end */
      /* Taxable losses first (TLH value) */
      if(a.taxable&&a.gain<0&&!(b.taxable&&b.gain<0)) return -1;
      if(b.taxable&&b.gain<0&&!(a.taxable&&a.gain<0)) return 1;
      /* Then tax-advantaged (no tax cost) */
      const aTax=a.taxable?1:0, bTax=b.taxable?1:0;
      if(aTax!==bTax) return aTax-bTax;
      /* Then by gain ascending */
      if(a.gain!==b.gain) return a.gain-b.gain;
      return a.val-b.val;
    });
    for(const h of holdings){
      if(remaining<=0) break;
      /* Deep-loss hold rule: skip positions in tax-advantaged accounts where
         unrealized loss > 50% — no TLH benefit, keep recovery upside */
      const isDeepLoss=!h.taxable && h.gain<0 && h.cb>0 && Math.abs(h.gain)/h.cb>0.5;
      if(isDeepLoss){
        const lossPct=Math.min((Math.abs(h.gain)/h.cb*100),99.9).toFixed(0);
        const acctKind=(h.acctType||'').includes('Roth')?'Roth':(h.acctType||'').includes('401')?'401(k)':'tax-advantaged';
        held.push({sym:h.sym,name:h.name,account:h.acctName,val:h.val,gain:h.gain,cb:h.cb,lossPct,
          reason:`Down ${lossPct}% in ${acctKind} — no TLH benefit, hold for recovery`});
        continue;
      }
      const sellAmt=Math.min(h.val,remaining);
      if(sellAmt<100) continue;
      const gainNote=h.taxable?(h.gain<0?'Tax loss (offset gains)':'Taxable — consider lot selection'):'Tax-free (tax-advantaged acct)';
      trades.push({action:'SELL',sym:h.sym,name:h.name,account:h.acctName,amount:sellAmt,
        category:oc.l,reason:`Reduce ${oc.l} (-${oc.diff.toFixed(1)}%)`,taxNote:gainNote,taxable:h.taxable});
      remaining-=sellAmt;
    }
  });

  /* Post-loop: surface ALL deep losers in tax-advantaged accounts as "held",
     even if the sell loop never reached them (remaining filled early).
     This gives the user explicit reassurance about why these aren't sold. */
  const soldSymAccts=new Set(trades.filter(t=>t.action==='SELL').map(t=>t.sym+'|'+t.account));
  Object.values(catMap).flat().forEach(h=>{
    if(soldSymAccts.has(h.sym+'|'+h.acctName)) return;  /* already being sold */
    if(h.taxable) return;  /* taxable deep losers can TLH — not relevant */
    if(!(h.gain<0 && h.cb>0 && Math.abs(h.gain)/h.cb>0.5)) return;  /* not a deep loss */
    if(h.val<50) return;  /* tiny positions not worth mentioning */
    const lossPct=Math.min((Math.abs(h.gain)/h.cb*100),99.9).toFixed(0);
    const acctKind=(h.acctType||'').includes('Roth')?'Roth':(h.acctType||'').includes('401')?'401(k)':'IRA';
    held.push({sym:h.sym,name:h.name,account:h.acctName,val:h.val,gain:h.gain,cb:h.cb,lossPct,
      reason:`Down ${lossPct}% in ${acctKind} — no TLH benefit, hold for recovery`});
  });
  trades._held=held;  /* attach held list for UI rendering */

  /* Generate buys into undercategories — using model's recommended funds */
  underCats.forEach(uc=>{
    let remaining=uc.diffDollar;
    /* Find the recommended fund for this category from the selected model */
    const modelKey=document.getElementById('rebalModel').value;
    const model=MODELS[modelKey];
    let buyFunds=[];
    if(model){
      model.alloc.forEach(a=>{
        const ac=FUND_META[a.t]?.ac||'';
        const mapped=ac==='US Equity'?'eq':ac==='International Equity'?'intl':ac==='Bonds'?'bond':ac==='Real Estate'?'reit':ac==='Alternatives'?'alt':'other';
        if(mapped===uc.k) buyFunds.push({sym:a.t,pct:a.pct,name:FUND_META[a.t]?.n||a.t});
      });
    }
    if(buyFunds.length===0) buyFunds=[{sym:uc.k==='eq'?'VTI':uc.k==='intl'?'VXUS':uc.k==='bond'?'BND':uc.k==='reit'?'VNQ':'GLD',pct:100,name:''}];

    const totalPct=buyFunds.reduce((s,f)=>s+f.pct,0)||1;
    buyFunds.forEach(bf=>{
      const buyAmt=remaining*bf.pct/totalPct;
      if(buyAmt<100) return;
      /* Prefer tax-advantaged accounts for buys */
      const acctLabel=uc.k==='bond'?'Tax-Deferred (recommended)':uc.k==='reit'?'Roth (recommended)':'Any account';
      trades.push({action:'BUY',sym:bf.sym,name:bf.name||FUND_META[bf.sym]?.n||bf.sym,account:acctLabel,
        amount:buyAmt,category:uc.l,reason:`Increase ${uc.l} (+${uc.diff.toFixed(1)}%)`,taxNote:'N/A',taxable:false});
    });
  });

  return trades;
}

function copyRebalTrades(){
  const rows=document.querySelectorAll('#rebalTrades .xray-conc-tbl tbody tr');
  let text='Action\tSymbol\tName\tAccount\tAmount\tCategory\tReason\n';
  rows.forEach(r=>{
    const cells=r.querySelectorAll('td');
    text+=[...cells].slice(0,7).map(c=>c.textContent.trim()).join('\t')+'\n';
  });
  navigator.clipboard.writeText(text).then(()=>showToast('Trade list copied to clipboard','success'));
}

/* ---- Expenses: Fund Expense Drag Analysis ---- */
/* Map of expensive funds to cheaper alternatives */
const CHEAPER_ALTS={
  FBALX:{sym:'FXAIX',er:0.015,n:'Fidelity 500 Index'},
  FBGRX:{sym:'FXAIX',er:0.015,n:'Fidelity 500 Index'},
  FCNTX:{sym:'FSKAX',er:0.015,n:'Fidelity Total Market'},
  FSELX:{sym:'VGT',er:0.10,n:'Vanguard Info Tech ETF'},
  FSPTX:{sym:'VGT',er:0.10,n:'Vanguard Info Tech ETF'},
  FLPSX:{sym:'VTI',er:0.03,n:'Vanguard Total Stock Market'},
  FOCPX:{sym:'QQQM',er:0.15,n:'Invesco Nasdaq-100'},
  FDGRX:{sym:'QQQM',er:0.15,n:'Invesco Nasdaq-100'},
  EFA:{sym:'VEA',er:0.05,n:'Vanguard Developed Markets'},
  COWZ:{sym:'SCHD',er:0.06,n:'Schwab Dividend Equity'},
  DGRW:{sym:'SCHD',er:0.06,n:'Schwab Dividend Equity'},
  HYG:{sym:'BND',er:0.03,n:'Vanguard Total Bond'},
  TLT:{sym:'VGSH',er:0.04,n:'Vanguard Short-Term Treasury'},
  GLD:{sym:'GLDM',er:0.10,n:'SPDR Gold MiniShares'},
  PDBC:{sym:'GSG',er:0.75,n:'iShares S&P GSCI'},
  TQQQ:{sym:'QQQM',er:0.15,n:'Invesco Nasdaq-100 (unleveraged)'},
};

function renderExpenses(){
  const ec=document.getElementById('expensesContent');
  ec.style.display='';
  const fmtD=v=>'$'+Math.round(v).toLocaleString();
  const fmtK=v=>v>=1000?'$'+(v/1000).toFixed(1)+'k':fmtD(v);

  /* Gather all fund holdings with expense ratios */
  const fundRows=[];
  const seen=new Set();
  DATA.forEach(d=>{
    d.accounts.forEach(a=>{
      a.tickers.forEach(t=>{
        if(t.val<=0) return;
        const sym=t.sym.replace(/\*+$/,'');
        if(seen.has(sym)){ const existing=fundRows.find(f=>f.sym===sym); if(existing) existing.val+=t.val; return; }
        seen.add(sym);
        let er=null, fundName=t.name;
        if(FUND_META[sym]){ er=FUND_META[sym].er; fundName=FUND_META[sym].n; }
        else if(SUGG_METRICS&&SUGG_METRICS.funds&&SUGG_METRICS.funds[sym]){
          const sm=SUGG_METRICS.funds[sym];
          if(sm.er!=null&&sm.er>0) er=sm.er;
        }
        const isCash=CASH_SYMS.includes(t.sym);
        const isFund=!isCash&&(FUND_HOLDINGS_DB[sym]!=null||/^[A-Z]{2,5}X?$/.test(sym)&&!sym.match(/^(AAPL|MSFT|NVDA|AMZN|META|GOOGL|GOOG|TSLA|AVGO|JPM|UNH|LLY|XOM|V|MA|PG|COST|JNJ|HD|BRKB|ABBV|WMT|BAC|PFE|MRK|KO|PEP|CVX|CSCO|TMO|ABT|MCD|CRM|DHR|QCOM|TXN|ORCL|IBM|INTC|AMD|NFLX|ISRG|NOW|ADBE|INTU|AMAT|LRCX)$/));
        if(isCash) er=0;
        else if(er===null&&!isFund) er=0;
        fundRows.push({sym,name:fundName,val:t.val,er,isFund});
      });
    });
  });

  const withER=fundRows.filter(f=>f.er!=null&&f.er>0);
  const totalVal=fundRows.reduce((s,f)=>s+f.val,0);
  const weightedER=totalVal>0?fundRows.reduce((s,f)=>s+(f.er||0)*f.val,0)/totalVal:0;
  const annualCost=fundRows.reduce((s,f)=>s+(f.er||0)/100*f.val,0);
  const tenYearDrag=annualCost*((Math.pow(1.07,10)-1)/0.07);

  /* Classify funds into tiers */
  const actionItems=[]; /* expensive funds with cheaper alternatives */
  const efficient=[];   /* ER < 0.10% */
  const moderate=[];    /* ER 0.10-0.39% */
  const expensive=[];   /* ER >= 0.40% without cheaper alt */
  withER.forEach(f=>{
    const alt=CHEAPER_ALTS[f.sym];
    const hasCheaper=alt&&alt.er<f.er;
    const cost=f.er/100*f.val;
    const savings=hasCheaper?(f.er-alt.er)/100*f.val:0;
    const row={...f,cost,alt:hasCheaper?alt:null,savings};
    if(hasCheaper) actionItems.push(row);
    else if(f.er<0.10) efficient.push(row);
    else if(f.er<0.40) moderate.push(row);
    else expensive.push(row);
  });
  actionItems.sort((a,b)=>b.savings-a.savings);
  const totalSavings=actionItems.reduce((s,f)=>s+f.savings,0);
  const stocksZeroER=fundRows.filter(f=>f.er===0).sort((a,b)=>b.val-a.val);
  const unknownER=fundRows.filter(f=>f.er===null);

  let h='';

  /* Header */
  h+=`<div class="wd-panel" style="margin-bottom:0">`;
  h+=`<h3>\u{1F4B0} Fund Expense Drag Analysis</h3>`;
  h+=`<p class="wd-desc">Every basis point of expense ratio silently erodes your returns. This analysis reveals your total annual cost and flags funds where cheaper index alternatives exist.</p>`;
  h+=`</div>`;

  /* Summary cards */
  h+=`<div style="display:flex;gap:12px;flex-wrap:wrap;margin:16px 0">`;
  h+=`<div class="sugg-card" style="padding:14px 18px;flex:1;min-width:140px"><div style="font-size:0.72em;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:4px">Weighted Avg ER</div><div style="font-size:1.5em;font-weight:700;color:var(--primary)">${weightedER.toFixed(3)}%</div><div style="font-size:0.78em;color:var(--text-muted)">${(weightedER*100).toFixed(1)} basis points</div></div>`;
  h+=`<div class="sugg-card" style="padding:14px 18px;flex:1;min-width:140px"><div style="font-size:0.72em;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:4px">Annual Cost</div><div style="font-size:1.5em;font-weight:700;color:var(--danger)">${fmtD(annualCost)}</div><div style="font-size:0.78em;color:var(--text-muted)">per year in fees</div></div>`;
  h+=`<div class="sugg-card" style="padding:14px 18px;flex:1;min-width:140px"><div style="font-size:0.72em;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:4px">10-Year Drag</div><div style="font-size:1.5em;font-weight:700;color:var(--warning-dark)">${fmtD(tenYearDrag)}</div><div style="font-size:0.78em;color:var(--text-muted)">compounded at 7%</div></div>`;
  if(totalSavings>0){
    h+=`<div class="sugg-card" style="padding:14px 18px;flex:1;min-width:140px;border:2px solid var(--success)"><div style="font-size:0.72em;text-transform:uppercase;letter-spacing:0.5px;color:var(--success);margin-bottom:4px">\u2B07 Potential Savings</div><div style="font-size:1.5em;font-weight:700;color:var(--success)">${fmtD(totalSavings)}/yr</div><div style="font-size:0.78em;color:var(--text-muted)">${actionItems.length} fund swap${actionItems.length!==1?'s':''}</div></div>`;
  }
  h+=`</div>`;

  /* ─── SECTION 1: Action Required — Fund Swap Cards ─── */
  if(actionItems.length>0){
    h+=`<div class="wd-panel">`;
    h+=`<h3 style="color:var(--danger)">\u26A0\uFE0F Action Required \u2014 Switch to Cheaper Alternatives</h3>`;
    h+=`<p class="wd-desc" style="margin-bottom:14px">These funds have lower-cost alternatives that track similar indexes. Switching could save you <strong style="color:var(--success)">${fmtD(totalSavings)}/yr</strong>.</p>`;
    h+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px">`;
    actionItems.forEach(f=>{
      const pctOfCost=annualCost>0?(f.cost/annualCost*100):0;
      h+=`<div style="border:1px solid var(--border);border-radius:var(--radius);padding:16px;background:var(--card);display:flex;flex-direction:column;gap:10px">`;
      /* Top row: symbol + name + value */
      h+=`<div style="display:flex;justify-content:space-between;align-items:flex-start">`;
      h+=`<div><div style="font-weight:700;font-size:1.05em">${ylink(f.sym)}</div><div style="font-size:0.78em;color:var(--text-muted);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(f.name)}</div></div>`;
      h+=`<div style="text-align:right"><div style="font-weight:600">${fmtD(f.val)}</div><div style="font-size:0.75em;color:var(--text-muted)">${pctOfCost.toFixed(0)}% of fees</div></div>`;
      h+=`</div>`;
      /* ER comparison arrow */
      h+=`<div style="display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg-secondary);border-radius:var(--radius-sm)">`;
      h+=`<div style="text-align:center;flex:1"><div style="font-size:0.72em;text-transform:uppercase;color:var(--text-muted)">Current</div><div style="font-size:1.2em;font-weight:700;color:var(--danger)">${f.er.toFixed(3)}%</div><div style="font-size:0.75em;color:var(--text-muted)">${fmtD(f.cost)}/yr</div></div>`;
      h+=`<div style="font-size:1.4em;color:var(--text-muted)">\u2192</div>`;
      h+=`<div style="text-align:center;flex:1"><div style="font-size:0.72em;text-transform:uppercase;color:var(--text-muted)">Switch to</div><div style="font-size:1.2em;font-weight:700;color:var(--success)">${f.alt.er.toFixed(3)}%</div><div style="font-size:0.75em;color:var(--text-muted)">${ylink(f.alt.sym)}</div></div>`;
      h+=`</div>`;
      /* Savings badge */
      h+=`<div style="display:flex;justify-content:space-between;align-items:center">`;
      h+=`<span style="font-size:0.78em;color:var(--text-muted)">${esc(f.alt.n)}</span>`;
      h+=`<span style="background:var(--success-bg-deep);color:var(--success-text);padding:4px 10px;border-radius:12px;font-weight:700;font-size:0.85em">Save ${fmtD(f.savings)}/yr</span>`;
      h+=`</div></div>`;
    });
    h+=`</div></div>`;
  }

  /* ─── SECTION 2: Top Expense Bar Chart ─── */
  if(withER.length>0){
    h+=`<div class="wd-panel">`;
    h+=`<h3>\u{1F4CA} Top Expense Contributors</h3>`;
    const topExp=withER.slice().sort((a,b)=>(b.er/100*b.val)-(a.er/100*a.val)).slice(0,10);
    const maxCost=Math.max(...topExp.map(f=>f.er/100*f.val));
    h+=`<div style="display:flex;flex-direction:column;gap:8px;margin:12px 0">`;
    topExp.forEach(f=>{
      const cost=f.er/100*f.val;
      const barW=maxCost>0?(cost/maxCost*100):0;
      const barColor=f.er>=0.4?'var(--danger-bright)':f.er>=0.15?'var(--warning)':'var(--primary)';
      h+=`<div style="display:flex;align-items:center;gap:10px">`;
      h+=`<div style="min-width:60px;text-align:right;font-weight:700;font-size:0.82em">${ylink(f.sym)}</div>`;
      h+=`<div style="min-width:48px;text-align:right;font-size:0.78em;color:var(--text-muted)">${f.er.toFixed(2)}%</div>`;
      h+=`<div style="flex:1;background:var(--bg-secondary);border-radius:4px;height:24px;overflow:hidden">`;
      h+=`<div style="width:${barW}%;height:100%;background:${barColor};border-radius:4px;min-width:2px;opacity:0.85"></div>`;
      h+=`</div>`;
      h+=`<div style="min-width:80px;font-size:0.85em;font-weight:600;text-align:right">${fmtD(cost)}<span style="color:var(--text-muted);font-weight:400">/yr</span></div>`;
      h+=`</div>`;
    });
    h+=`</div></div>`;
  }

  /* ─── SECTION 3: Tiered Fund Tables ─── */
  const renderTierTable=(title,icon,items,color,startCollapsed)=>{
    if(items.length===0) return '';
    const totalCost=items.reduce((s,f)=>s+f.er/100*f.val,0);
    const tierId='expTier_'+title.replace(/\s/g,'');
    let t=`<div class="wd-panel" style="padding:0;overflow:hidden">`;
    t+=`<div style="padding:12px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none" onclick="var tb=document.getElementById('${tierId}');tb.style.display=tb.style.display==='none'?'':'none';this.querySelector('.exp-arrow').textContent=tb.style.display==='none'?'\u25BC':'\u25B2'">`;
    t+=`<div style="display:flex;align-items:center;gap:8px"><span>${icon}</span><h3 style="margin:0;font-size:0.95em">${title}</h3><span style="background:${color}22;color:${color};padding:2px 8px;border-radius:10px;font-size:0.78em;font-weight:600">${items.length}</span></div>`;
    t+=`<div style="display:flex;align-items:center;gap:12px"><span style="font-size:0.82em;color:var(--text-muted)">${fmtD(totalCost)}/yr</span><span class="exp-arrow" style="color:var(--text-muted)">${startCollapsed?'\u25BC':'\u25B2'}</span></div>`;
    t+=`</div>`;
    t+=`<div id="${tierId}" style="display:${startCollapsed?'none':''}">`;
    t+=`<table class="xray-conc-tbl" style="margin:0;border-radius:0"><thead><tr>`;
    t+=`<th>Symbol</th><th>Name</th><th class="r">Value</th><th class="r">ER</th><th class="r">Annual Cost</th>`;
    t+=`</tr></thead><tbody>`;
    items.sort((a,b)=>(b.er/100*b.val)-(a.er/100*a.val));
    items.forEach(f=>{
      const cost=f.er/100*f.val;
      const erColor=f.er>=0.4?'color:var(--danger)':f.er>=0.15?'color:var(--warning-dark)':'color:var(--success)';
      t+=`<tr>`;
      t+=`<td style="font-weight:600">${ylink(f.sym)}</td>`;
      t+=`<td style="font-size:0.82em;max-width:220px;overflow:hidden;text-overflow:ellipsis">${esc(f.name)}</td>`;
      t+=`<td class="r">${fmtK(f.val)}</td>`;
      t+=`<td class="r" style="font-weight:700;${erColor}">${f.er.toFixed(3)}%</td>`;
      t+=`<td class="r">${fmtD(cost)}/yr</td>`;
      t+=`</tr>`;
    });
    t+=`</tbody></table></div></div>`;
    return t;
  };

  h+=renderTierTable('Expensive Funds (ER \u2265 0.40%)','\u{1F534}',expensive,'var(--danger)',false);
  h+=renderTierTable('Moderate Funds (ER 0.10\u20130.39%)','\u{1F7E1}',moderate,'var(--warning-dark)',moderate.length>8);
  h+=renderTierTable('Efficient Funds (ER < 0.10%)','\u{1F7E2}',efficient,'var(--success)',true);

  /* ─── SECTION 4: Stocks (ER=0) — always collapsed ─── */
  if(stocksZeroER.length>0){
    const stockVal=stocksZeroER.reduce((s,f)=>s+f.val,0);
    h+=`<div class="wd-panel" style="padding:0;overflow:hidden">`;
    h+=`<div style="padding:12px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none" onclick="var tb=document.getElementById('expStocks');tb.style.display=tb.style.display==='none'?'':'none';this.querySelector('.exp-arrow').textContent=tb.style.display==='none'?'\u25BC':'\u25B2'">`;
    h+=`<div style="display:flex;align-items:center;gap:8px"><span>\u{1F4C8}</span><h3 style="margin:0;font-size:0.95em">Individual Stocks (No ER)</h3><span style="background:var(--blue-tag-bg);color:var(--blue-tag-fg);padding:2px 8px;border-radius:10px;font-size:0.78em;font-weight:600">${stocksZeroER.length}</span></div>`;
    h+=`<div style="display:flex;align-items:center;gap:12px"><span style="font-size:0.82em;color:var(--text-muted)">${fmtD(stockVal)} \u00B7 $0/yr fees</span><span class="exp-arrow" style="color:var(--text-muted)">\u25BC</span></div>`;
    h+=`</div>`;
    h+=`<div id="expStocks" style="display:none">`;
    h+=`<div style="display:flex;flex-wrap:wrap;gap:6px;padding:14px 18px">`;
    stocksZeroER.slice(0,60).forEach(f=>{
      h+=`<span style="padding:4px 10px;background:var(--bg-secondary);border-radius:var(--radius-sm);font-size:0.82em;white-space:nowrap">${ylink(f.sym)} <span style="color:var(--text-muted)">${fmtK(f.val)}</span></span>`;
    });
    if(stocksZeroER.length>60) h+=`<span style="padding:4px 10px;font-size:0.82em;color:var(--text-muted)">+${stocksZeroER.length-60} more</span>`;
    h+=`</div></div></div>`;
  }

  /* ─── SECTION 5: Unknown ER ─── */
  if(unknownER.length>0){
    h+=`<div class="wd-panel" style="padding:0;overflow:hidden">`;
    h+=`<div style="padding:12px 18px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none" onclick="var tb=document.getElementById('expUnknown');tb.style.display=tb.style.display==='none'?'':'none';this.querySelector('.exp-arrow').textContent=tb.style.display==='none'?'\u25BC':'\u25B2'">`;
    h+=`<div style="display:flex;align-items:center;gap:8px"><span>\u2753</span><h3 style="margin:0;font-size:0.95em">Unknown Expense Ratio</h3><span style="background:var(--yellow-tag-bg);color:var(--yellow-tag-fg);padding:2px 8px;border-radius:10px;font-size:0.78em;font-weight:600">${unknownER.length}</span></div>`;
    h+=`<span class="exp-arrow" style="color:var(--text-muted)">\u25BC</span>`;
    h+=`</div>`;
    h+=`<div id="expUnknown" style="display:none;padding:14px 18px;border-top:1px solid var(--border)">`;
    h+=`<div style="display:flex;flex-wrap:wrap;gap:6px">`;
    unknownER.forEach(f=>{
      h+=`<span style="padding:4px 10px;background:var(--warning-bg-light);border:1px solid var(--warning-border);border-radius:var(--radius-sm);font-size:0.82em">${ylink(f.sym)} <span style="color:var(--text-muted)">${fmtK(f.val)}</span></span>`;
    });
    h+=`</div></div></div>`;
  }

  /* Data-driven methodology */
  const methExp=[];
  const feeItems=[];
  feeItems.push(`Analyzed <strong>${withER.length} fund${withER.length!==1?'s':''}</strong> with known expense ratios out of ${fundRows.length} total positions.`);
  feeItems.push(`Weighted average expense ratio: <strong>${weightedER.toFixed(3)}%</strong>. ${weightedER<0.1?'Excellent — well below the industry average of ~0.50%.':weightedER<0.25?'Good — below the industry average of ~0.50%.':weightedER<0.5?'Moderate — near the industry average. Room for optimization.':'Above average — significant savings possible by switching to lower-cost index funds.'}`);
  feeItems.push(`Annual fee drag: <strong>${fmtK(annualCost)}</strong>/year. This is deducted daily from fund NAV — you never see a bill, but it reduces returns.`);
  feeItems.push(`Projected 10-year compounding impact: <strong>${fmtK(tenYearDrag)}</strong> (assumes 7% growth). Fees compound against you just like returns compound for you.`);
  methExp.push({heading:'Your Fee Analysis', items:feeItems});
  const optItems=[];
  if(totalSavings>0) optItems.push(`🎯 <strong>Potential annual savings: ${fmtK(totalSavings)}</strong> by switching ${actionItems.length} fund${actionItems.length>1?'s':''} to lower-cost alternatives.`);
  else optItems.push('✅ No significant fee savings identified — your funds are already cost-efficient.');
  optItems.push(`Fund tiers: <strong>${efficient.length}</strong> efficient (<0.10%), <strong>${moderate.length}</strong> moderate (0.10-0.39%), <strong>${expensive.length}</strong> expensive (≥0.40%).`);
  if(stocksZeroER.length>0) optItems.push(`${stocksZeroER.length} individual stock${stocksZeroER.length>1?'s':''} with 0% ER (${fmtK(stocksZeroER.reduce((s,f)=>s+f.val,0))} total) — stocks have no expense ratio.`);
  if(unknownER.length>0) optItems.push(`${unknownER.length} position${unknownER.length>1?'s':''} with unknown ER — these may be unusual securities, options, or cash equivalents.`);
  optItems.push('Expense ratios sourced from Yahoo Finance. Annual cost = value × ER. Weighted average = Σ(value × ER) ÷ total value.');
  methExp.push({heading:'Optimization Opportunities', items:optItems});
  h+=buildMethodologyPanel('Expense Analysis — Your Portfolio',methExp);

  ec.innerHTML=h;
}

/* ---- PDF Export via window.print() ---- */
function exportTabToPDF(tabName){
  /* Collect withdrawal parameters for print header (withdrawals only) */
  if(tabName==='withdrawals'){
    let pp=document.getElementById('wd-print-params');
    if(!pp){pp=document.createElement('div');pp.id='wd-print-params';pp.style.display='none';
      const panel=document.querySelector('.wd-panel');if(panel)panel.appendChild(pp);}
    const glideMode=getEffectiveWdGlideMode();
    const curAge=parseInt(document.getElementById('wdAge')?.value,10)||0;
    const retAge=parseInt(document.getElementById('wdRetire')?.value,10)||curAge;
    const lifeExp=parseInt(document.getElementById('wdLife')?.value,10)||retAge;
    const hasSpouse=document.getElementById('wdSpouseToggle')?.checked||false;
    const spAge=parseInt(document.getElementById('wdSpAge')?.value,10)||curAge;
    const spLife=parseInt(document.getElementById('wdSpLife')?.value,10)||lifeExp;
    const planEndAge=hasSpouse?Math.max(lifeExp,curAge+(spLife-spAge)):lifeExp;
    const glideSchedule=buildGlideSchedule(retAge,planEndAge,glideMode,getGlideWaypoints(),curAge,getGlideInterp());
    const simMode=document.querySelector('input[name="simMode"]:checked')?.value||getSavedSimMode();
    const fields=[
      ['Inflation',document.getElementById('wdInflation')],
      ['State Tax',document.getElementById('wdStateTax')],['IRA Basis',document.getElementById('wdIRABasis')],
      ['Filing',document.getElementById('wdFiling')],['Roth Conv',document.getElementById('wdRothConv')],
      ['Conv Start',document.getElementById('wdConvStartAge')],['Conv End',document.getElementById('wdConvEndAge')],
      ['Your Age',document.getElementById('wdAge')],['Retire Age',document.getElementById('wdRetire')],
      ['Life Exp',document.getElementById('wdLife')],['SS Income',document.getElementById('wdSSIncome')],
      ['SS Age',document.getElementById('wdSSAge')]];
    const sp=document.getElementById('wdSpouseToggle');
    if(sp&&sp.checked){fields.push(['Sp Age',document.getElementById('wdSpAge')],['Sp Retire',document.getElementById('wdSpRetire')],
      ['Sp Life',document.getElementById('wdSpLife')],['Sp SS',document.getElementById('wdSpSSIncome')],['Sp SS Age',document.getElementById('wdSpSSAge')]);}
    let paramHtml='<strong>Parameters:</strong> ';
    if(glideSchedule&&glideSchedule.length){
      const start=getReturnForAge(glideSchedule,retAge);
      const end=getReturnForAge(glideSchedule,planEndAge);
      paramHtml+=`<span><b>Return:</b> Glide Path (equity ${start.eqPct.toFixed(0)}%→${end.eqPct.toFixed(0)}%)</span><span><b>Volatility:</b> Blended by age</span>`;
    } else {
      [['Return',document.getElementById('wdReturn')],['Volatility',document.getElementById('wdVol')]].forEach(f=>{
        const el=f[1];if(!el)return;const v=el.tagName==='SELECT'?el.options[el.selectedIndex].text:el.value;
        paramHtml+=`<span><b>${f[0]}:</b> ${v}</span>`;
      });
    }
    paramHtml+=`<span><b>Simulation:</b> Monte Carlo + Historical Backtest</span>`;
    paramHtml+=fields.map(f=>{
      const el=f[1];if(!el)return'';const v=el.tagName==='SELECT'?el.options[el.selectedIndex].text:el.value;
      return`<span><b>${f[0]}:</b> ${v}</span>`;}).filter(Boolean).join('');
    /* Add spending phases */
    const phases=getSpendPhases().filter(p=>p.amount>0);
    if(phases.length>0) paramHtml+=' <span><b>Spending:</b> '+phases.map(p=>`Age ${p.age}+ $${p.amount}/mo`).join(', ')+'</span>';
    else paramHtml+=' <span><b>Spending:</b> 4% rule</span>';
    /* Add account selection */
    const acctCbs=document.querySelectorAll('.acct-sel-cb');
    if(acctCbs.length>0){
      let checkedCount=0;acctCbs.forEach(cb=>{if(cb.checked)checkedCount++;});

/* ---- CSV Export ---- */
function exportCSV(){
  if(!RAW_CSV||!RAW_CSV.length){showToast('No data available for export','error');return;}
  const headers=Object.keys(RAW_CSV[0]);
  const escCSV=v=>{const s=String(v??'');return(s.includes(',')||s.includes('"')||s.includes('\n'))?'"'+s.replace(/"/g,'""')+'"':s;};
  let csv=headers.map(escCSV).join(',')+'\n';
  RAW_CSV.forEach(row=>{csv+=headers.map(h=>escCSV(row[h])).join(',')+'\n';});
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  /* Derive filename from source */
  let fname='portfolio_export.csv';
  const footerEl=document.querySelector('.footer');
  if(footerEl){const m=footerEl.textContent.match(/Source:\s*(.+)/);if(m) fname=m[1].trim();}
  const ts=new Date().toISOString().replace(/[:T]/g,'-').replace(/\..*/,'');
  fname=fname.replace(/\.csv$/i,'') + '_' + ts + '.csv';
  a.href=url;a.download=fname;document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('CSV exported: '+fname,'success');
}

function computeCurrentAlloc(){
  const cats={};DATA.forEach(d=>{cats[d.cat]=d.total;});
  const eq=(cats['US Index Funds']||0)+(cats['Individual Stocks']||0)+(cats['Tech Sector Fund']||0)+(cats['Growth / Leveraged ETFs']||0);
  const intl=cats['International Funds']||0;
  const bond=cats['Bond Funds']||0;
  const cash=cats['Cash / Money Market']||0;
  const reit=cats['Real Estate']||0;
  const alt=cats['Alternatives']||cats['Commodities']||0;
  const mapped=eq+intl+bond+cash+reit+alt;
  const other=Math.max(0,GRAND-mapped);
  return{eq,intl,bond,cash,reit,alt,other,total:GRAND};
}

function allocBar(items,total){
  let h='<div class="sugg-bar-track">';
  items.forEach(i=>{const p=total>0?i.val/total*100:0;if(p>0.3){const lbl=p>=5?`<span class="sugg-bar-inner">${p.toFixed(0)}%</span>`:'';h+=`<div class="sugg-bar-seg" style="width:${p}%;background:${i.color}"><span class="stip">${i.label}: ${p.toFixed(1)}%</span>${lbl}</div>`;}});
  h+='</div>';return h;
}

let _suggSortCol=-1,_suggSortAsc=true;
function sortSuggTable(th,colIdx){
  _suggSortAsc=(_suggSortCol===colIdx)?!_suggSortAsc:true;
  _suggSortCol=colIdx;
  th.closest('thead').querySelectorAll('.sort-arrow').forEach(s=>s.textContent='');
  th.querySelector('.sort-arrow').textContent=_suggSortAsc?' \u25B2':' \u25BC';
  const tbody=document.getElementById('suggTbody');
  const rows=Array.from(tbody.querySelectorAll('tr'));
  rows.sort((a,b)=>{
    let av=a.cells[colIdx].textContent.trim(),bv=b.cells[colIdx].textContent.trim();
    /* strip $, %, commas for numeric compare */
    const an=parseFloat(av.replace(/[$,%,N\/A]/g,'')),bn=parseFloat(bv.replace(/[$,%,N\/A]/g,''));
    if(!isNaN(an)&&!isNaN(bn)) return _suggSortAsc?an-bn:bn-an;
    return _suggSortAsc?av.localeCompare(bv):bv.localeCompare(av);
  });
  rows.forEach(r=>tbody.appendChild(r));
}

/* 2025 Long-term capital gains rate tiers */
const LTCG_BRACKETS_MFJ=[{limit:96700,rate:0},{limit:600050,rate:0.15},{limit:Infinity,rate:0.20}];
const LTCG_BRACKETS_SINGLE=[{limit:48350,rate:0},{limit:533400,rate:0.15},{limit:Infinity,rate:0.20}];
function calcLTCG(ltcgAmount,taxableIncome,filing){
  /* LTCG is stacked on top of ordinary taxable income for bracket purposes */
  const brackets=filing==='mfj'?LTCG_BRACKETS_MFJ:LTCG_BRACKETS_SINGLE;
  let tax=0,filled=taxableIncome,remaining=ltcgAmount;
  for(const b of brackets){
    if(remaining<=0) break;
    const space=Math.max(0,b.limit-filled);
    const amt=Math.min(remaining,space);
    tax+=amt*b.rate;
    filled+=amt;
    remaining-=amt;
  }
  return tax;
}
/* 2025 Standard Deduction (One Big Beautiful Bill Act) */
const STD_DEDUCTION_MFJ=31500;
const STD_DEDUCTION_SINGLE=15750;
/* Additional standard deduction for age 65+ (IRS permanent provision) */
const EXTRA_STD_DED_MFJ=1600; /* per person, MFJ */
const EXTRA_STD_DED_SINGLE=2000;
/* OBBBA §101 temporary senior deduction 2025-2028: $6,000 per person regardless of filing status */
const OBBBA_SENIOR_DED=6000; /* per person age 65+; phases out at $150K MFJ / $75K single MAGI (6%/$ over threshold) */
const OBBBA_THRESHOLD_MFJ=150000;
const OBBBA_THRESHOLD_SINGLE=75000;
function getStdDeduction(filing,age,spouseAge,hasSpouse,magi){
  let base=filing==='mfj'?STD_DEDUCTION_MFJ:STD_DEDUCTION_SINGLE;
  const extra=filing==='mfj'?EXTRA_STD_DED_MFJ:EXTRA_STD_DED_SINGLE;
  const obbbaThreshold=filing==='mfj'?OBBBA_THRESHOLD_MFJ:OBBBA_THRESHOLD_SINGLE;
  const obbbaPhaseOut=magi!=null?Math.min(OBBBA_SENIOR_DED,Math.max(0,(magi-obbbaThreshold)*0.06)):0;
  const seniorDed=OBBBA_SENIOR_DED-obbbaPhaseOut;
  if(age>=65){ base+=extra; base+=seniorDed; }
  if(filing==='mfj'&&hasSpouse&&spouseAge>=65){ base+=extra; base+=seniorDed; }
  return base;
}
