function renderTaxLoss(){
  const el=document.getElementById('taxlossContent');

  // Gather all positions with gain/loss data across all accounts
  const positions=[];
  DATA.forEach(d=>{
    d.accounts.forEach(a=>{
      const isTaxable=_isTLHTaxable(a.type);
      a.tickers.forEach(t=>{
        if(t.gl!==null && t.gl!==undefined){
          positions.push({sym:t.sym,name:t.name,val:t.val,gl:t.gl,glPct:t.glPct,cb:t.cb,
            acctNum:a.num,acctName:a.name,acctType:a.type,isTaxable:isTaxable,cat:d.cat});
        }
      });
    });
  });

  // Separate taxable losses and gains
  const taxableLosses=positions.filter(p=>p.isTaxable && p.gl<0).sort((a,b)=>a.gl-b.gl);
  const taxableGains=positions.filter(p=>p.isTaxable && p.gl>0).sort((a,b)=>b.gl-a.gl);
  const allLosses=positions.filter(p=>p.gl<0);
  const totalTaxableLoss=taxableLosses.reduce((s,p)=>s+p.gl,0);
  const totalTaxableGain=taxableGains.reduce((s,p)=>s+p.gl,0);
  const netTaxable=totalTaxableGain+totalTaxableLoss;

  // Cross-account wash sale check: same symbol in multiple accounts
  const symAccts={};
  positions.forEach(p=>{
    if(!symAccts[p.sym]) symAccts[p.sym]=new Set();
    symAccts[p.sym].add(p.acctNum);
  });
  const washRiskSyms=new Set();
  taxableLosses.forEach(p=>{if(symAccts[p.sym]&&symAccts[p.sym].size>1) washRiskSyms.add(p.sym);});

  // Tax rate assumptions
  const LTCG_RATE=0.15, ORD_RATE=0.22, ORD_OFFSET=3000;

  // Calculate potential savings (IRS: losses offset gains first, then up to $3K ordinary)
  const harvestable=Math.abs(totalTaxableLoss);
  const ltcgOffset=Math.min(harvestable,totalTaxableGain);
  const ltcgSavings=ltcgOffset*LTCG_RATE;
  const netLossAfterGains=Math.max(0,harvestable-ltcgOffset);
  const ordOffset=Math.min(netLossAfterGains,ORD_OFFSET);
  const ordSavings=ordOffset*ORD_RATE;
  const totalSavings=ordSavings+ltcgSavings;
  const carryover=Math.max(0,netLossAfterGains-ORD_OFFSET);

  let html='';
  html+=`<div class="wd-panel" style="padding:24px">`;
  html+=`<h2 style="margin-bottom:4px">\u{1F4C9} Tax-Loss Harvesting Analysis</h2>`;
  html+=`<p style="color:var(--text-muted);margin-bottom:20px">Identify unrealized losses in taxable accounts that can be harvested to reduce your tax bill. Only <strong>taxable accounts</strong> benefit from tax-loss harvesting — losses in tax-advantaged accounts (IRA, 401k, Roth) have no tax impact.</p>`;

  // Summary metric cards
  html+=`<div class="tl-metrics">`;
  html+=`<div class="tl-metric red"><div class="tl-metric-label">Harvestable Losses</div><div class="tl-metric-value" style="color:var(--danger)">${fmt2(Math.abs(totalTaxableLoss))}</div><div class="tl-metric-sub">${taxableLosses.length} positions in taxable accounts</div></div>`;
  html+=`<div class="tl-metric green"><div class="tl-metric-label">Unrealized Gains (Taxable)</div><div class="tl-metric-value" style="color:var(--success-bright)">${fmt2(totalTaxableGain)}</div><div class="tl-metric-sub">${taxableGains.length} positions</div></div>`;
  html+=`<div class="tl-metric ${netTaxable>=0?'green':'red'}"><div class="tl-metric-label">Net Gain/Loss (Taxable)</div><div class="tl-metric-value" style="color:${netTaxable>=0?'var(--success-bright)':'var(--danger)'}">${netTaxable>=0?'+':''}${fmt2(netTaxable)}</div></div>`;
  html+=`<div class="tl-metric blue"><div class="tl-metric-label">Est. Tax Savings</div><div class="tl-metric-value" style="color:var(--primary)">${fmt2(totalSavings)}</div><div class="tl-metric-sub">at ${(ORD_RATE*100)}% ord / ${(LTCG_RATE*100)}% LTCG</div></div>`;
  html+=`</div>`;

  // Tax savings breakdown
  html+=`<div style="background:var(--bg-secondary);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:24px">`;
  html+=`<div style="font-weight:600;margin-bottom:8px">\u{1F4B0} Tax Savings Breakdown</div>`;
  html+=`<table style="width:100%;border-collapse:collapse;font-size:0.9em">`;
  if(ltcgOffset>0) html+=`<tr><td style="padding:4px 8px">Capital gains offset: ${fmt2(ltcgOffset)} × ${(LTCG_RATE*100)}%</td><td style="text-align:right;font-weight:600">${fmt2(ltcgSavings)}</td></tr>`;
  if(ordOffset>0) html+=`<tr><td style="padding:4px 8px">Ordinary income offset: ${fmt2(ordOffset)} × ${(ORD_RATE*100)}% (up to $3,000/yr)</td><td style="text-align:right;font-weight:600">${fmt2(ordSavings)}</td></tr>`;
  if(ltcgOffset===0&&ordOffset===0) html+=`<tr><td style="padding:4px 8px;color:var(--text-muted)">No harvestable losses in taxable accounts</td><td style="text-align:right">$0</td></tr>`;
  html+=`<tr style="border-top:1px solid var(--border);font-weight:700"><td style="padding:6px 8px">Total estimated tax savings this year</td><td style="text-align:right;color:var(--primary)">${fmt2(totalSavings)}</td></tr>`;
  if(carryover>0) html+=`<tr><td style="padding:4px 8px;color:var(--text-muted)">Remaining losses carry forward to future years</td><td style="text-align:right;color:var(--text-muted)">${fmt2(carryover)}</td></tr>`;
  html+=`</table></div>`;

  // Harvestable positions table
  if(taxableLosses.length>0){
    html+=`<div style="margin-bottom:24px">`;
    html+=`<h3 style="margin-bottom:12px">\u{1F534} Harvestable Loss Positions (Taxable Accounts Only)</h3>`;
    html+=`<div style="overflow-x:auto"><table class="wd-tbl" style="font-size:0.85em"><thead><tr>`;
    html+=`<th title="Stock or fund ticker symbol">Symbol</th><th title="Full name of the security">Description</th><th title="The brokerage account holding this position">Account</th><th style="text-align:right" title="Current market value of the position">Current Value</th><th style="text-align:right" title="Original purchase price (what you paid). This is your tax basis for calculating gains/losses.">Cost Basis</th><th style="text-align:right" title="Current Value minus Cost Basis. Negative means the position is at a loss and potentially harvestable.">Unrealized Loss</th><th style="text-align:right" title="Loss as a percentage of cost basis. Larger negative % = deeper loss.">Loss %</th><th title="Suggested replacement funds that provide similar market exposure without triggering the IRS wash sale rule. These are from different fund families tracking similar indices.">Replacement Fund</th><th title="Shows if this symbol is currently held in multiple accounts. NOTE: Wash sale rules apply across ALL accounts (taxable, IRA, Roth, spouse) for 30 days before/after sale. This column only detects current multi-account holdings, not recent purchase history.">Multi-Acct Holding</th>`;
    html+=`</tr></thead><tbody>`;
    taxableLosses.forEach(p=>{
      const isWash=washRiskSyms.has(p.sym);
      const replacements=TLH_REPLACEMENT_MAP[p.sym];
      const replHtml=replacements?replacements.map(r=>`<a href="https://finance.yahoo.com/quote/${r}/" target="_blank" rel="noopener" style="color:var(--primary);text-decoration:none;font-size:0.85em">${r}</a>`).join(', '):`<span style="color:var(--text-light)">—</span>`;
      html+=`<tr>`;
      html+=`<td style="font-weight:600">${ylink(p.sym)}</td>`;
      html+=`<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.name)}</td>`;
      html+=`<td style="font-size:0.8em;color:var(--text-muted)">${esc(p.acctName)}<br>...${esc(p.acctNum.slice(-4))}</td>`;
      html+=`<td style="text-align:right">${fmt2(p.val)}</td>`;
      html+=`<td style="text-align:right">${p.cb!==null?fmt2(p.cb):'—'}</td>`;
      html+=`<td style="text-align:right;color:var(--danger);font-weight:600">${fmt2(p.gl)}</td>`;
      html+=`<td style="text-align:right;color:var(--danger)">${p.glPct!==null?p.glPct.toFixed(1)+'%':'—'}</td>`;
      html+=`<td>${replHtml}</td>`;
      html+=`<td>${isWash?'<span style="color:var(--warning);font-weight:600" title="This symbol is held in multiple accounts. Selling in one and buying in another within 30 days triggers wash sale rules.">⚠️ Yes</span>':'<span style="color:var(--success-bright)">✓ No</span>'}</td>`;
      html+=`</tr>`;
    });
    html+=`</tbody></table></div></div>`;
  } else {
    const hasTaxable=positions.some(p=>p.isTaxable);
    html+=`<div style="background:var(--success-bg);border:1px solid var(--success-bg-border);border-radius:8px;padding:20px;text-align:center;margin-bottom:24px">`;
    html+=`<div style="font-size:1.2em;margin-bottom:4px">\u{2705} ${hasTaxable?'No harvestable losses':'No taxable accounts detected'}</div>`;
    html+=`<p style="color:var(--text-muted)">${hasTaxable?'All positions in your taxable accounts are currently at a gain. No tax-loss harvesting opportunities at this time.':'Tax-loss harvesting only applies to taxable brokerage accounts (Individual, Joint). Tax-advantaged accounts (IRA, 401k, Roth, HSA) are not eligible.'}</p>`;
    html+=`</div>`;
  }

  // Top gains table (for awareness)
  if(taxableGains.length>0){
    const topGains=taxableGains.slice(0,15);
    html+=`<details style="margin-bottom:24px"><summary style="cursor:pointer;font-weight:600;font-size:1.05em;padding:8px 0">\u{1F7E2} Top ${topGains.length} Unrealized Gains (Taxable) — <span style="color:var(--success-bright)">${fmt2(totalTaxableGain)}</span></summary>`;
    html+=`<div style="overflow-x:auto;margin-top:8px"><table class="wd-tbl" style="font-size:0.85em"><thead><tr>`;
    html+=`<th title="Stock or fund ticker symbol">Symbol</th><th title="Full name of the security">Description</th><th title="The brokerage account holding this position">Account</th><th style="text-align:right" title="Current market value of the position">Current Value</th><th style="text-align:right" title="Original purchase price (your tax basis)">Cost Basis</th><th style="text-align:right" title="Current Value minus Cost Basis. Positive means the position is at a gain — selling triggers capital gains tax.">Unrealized Gain</th><th style="text-align:right" title="Gain as a percentage of cost basis">Gain %</th>`;
    html+=`</tr></thead><tbody>`;
    topGains.forEach(p=>{
      html+=`<tr><td style="font-weight:600">${ylink(p.sym)}</td>`;
      html+=`<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.name)}</td>`;
      html+=`<td style="font-size:0.8em;color:var(--text-muted)">${esc(p.acctName)}<br>...${esc(p.acctNum.slice(-4))}</td>`;
      html+=`<td style="text-align:right">${fmt2(p.val)}</td>`;
      html+=`<td style="text-align:right">${p.cb!==null?fmt2(p.cb):'—'}</td>`;
      html+=`<td style="text-align:right;color:var(--success-bright);font-weight:600">+${fmt2(p.gl)}</td>`;
      html+=`<td style="text-align:right;color:var(--success-bright)">${p.glPct!==null?'+'+p.glPct.toFixed(1)+'%':'—'}</td>`;
      html+=`</tr>`;
    });
    html+=`</tbody></table></div></details>`;
  }

  // Non-taxable losses info
  const nonTaxLosses=allLosses.filter(p=>!p.isTaxable);
  if(nonTaxLosses.length>0){
    const ntTotal=nonTaxLosses.reduce((s,p)=>s+p.gl,0);
    html+=`<details style="margin-bottom:24px"><summary style="cursor:pointer;font-weight:600;font-size:1.05em;padding:8px 0">\u{1F4CB} Losses in Tax-Advantaged Accounts — <span style="color:var(--text-light)">${fmt2(Math.abs(ntTotal))} (not harvestable)</span></summary>`;
    html+=`<p style="color:var(--text-muted);margin:8px 0">Losses in IRAs, 401(k)s, and Roth accounts cannot be harvested for tax purposes. They are shown here for awareness only.</p>`;
    html+=`<div style="overflow-x:auto;margin-top:8px"><table class="wd-tbl" style="font-size:0.85em"><thead><tr>`;
    html+=`<th title="Stock or fund ticker symbol">Symbol</th><th title="The brokerage account holding this position">Account</th><th title="Account type (IRA, 401k, Roth, etc.) — losses in these accounts cannot be harvested">Type</th><th style="text-align:right" title="Current market value">Value</th><th style="text-align:right" title="Unrealized loss amount (not harvestable in tax-advantaged accounts)">Loss</th><th style="text-align:right" title="Loss as a percentage of cost basis">Loss %</th>`;
    html+=`</tr></thead><tbody>`;
    nonTaxLosses.sort((a,b)=>a.gl-b.gl).slice(0,20).forEach(p=>{
      html+=`<tr><td>${ylink(p.sym)}</td><td style="font-size:0.8em">${esc(p.acctName)}</td><td style="font-size:0.8em">${esc(p.acctType)}</td>`;
      html+=`<td style="text-align:right">${fmt2(p.val)}</td><td style="text-align:right;color:var(--danger)">${fmt2(p.gl)}</td>`;
      html+=`<td style="text-align:right;color:var(--danger)">${p.glPct!==null?p.glPct.toFixed(1)+'%':'—'}</td></tr>`;

  // Wash sale rules + strategy notes

  html+=`<div style="font-weight:600;margin-bottom:8px">\u{26A0}\u{FE0F} Wash Sale Rules & Important Notes</div>`;
  html+=`<ul style="margin:0;padding-left:20px;font-size:0.9em;color:var(--warning-text)">`;
  html+=`<li><strong>30-Day Rule:</strong> You cannot buy a "substantially identical" security within 30 days before or after selling at a loss. This applies across ALL accounts (taxable, IRA, Roth, spouse's accounts).</li>`;
  html+=`<li><strong>Replacement Funds:</strong> Swap to a similar but non-identical fund (e.g., FXAIX → VOO — both track S&P 500 but are from different fund families, generally considered non-identical by most tax practitioners).</li>`;
  html+=`<li><strong>$3,000 Ordinary Offset:</strong> Net capital losses can offset up to $3,000 of ordinary income per year. Excess losses carry forward indefinitely.</li>`;
  html+=`<li><strong>Year-End Planning:</strong> Harvesting is most valuable near year-end when you can estimate total gains/losses. But opportunities can arise any time after market declines.</li>`;
  html+=`<li><strong>Cost Basis Reset:</strong> Harvesting resets your cost basis to the current (lower) price. Future gains on the replacement will be larger — you're deferring taxes, not eliminating them.</li>`;
  html+=`</ul></div>`;

  // Disclaimer
  html+=`<div style="background:var(--th-bg);border-radius:8px;padding:16px;font-size:0.85em;color:var(--text-muted)">`;
  html+=`<strong>Disclaimer:</strong> This analysis is for educational purposes only and does not constitute tax advice. Tax-loss harvesting involves complex IRS rules including wash sale regulations, constructive sale rules, and state-specific considerations. Consult a qualified tax professional before executing any tax-loss harvesting strategy. Cost basis data is from your brokerage export and should be verified. <strong>Tax rate assumptions:</strong> Savings are estimated at 15% LTCG and 22% ordinary income rates. Your actual rates may differ based on income level (LTCG could be 0% or 20%). State taxes and the 3.8% Net Investment Income Tax (NIIT) are not included. <strong>Custodial (UTMA) accounts:</strong> While taxable, UTMA accounts are subject to Kiddie Tax rules — consult a tax advisor for accounts held by minors.`;
  html+=`</div>`;

  /* Data-driven methodology */
  const methTLH=[];
  const tlhItems=[];
  tlhItems.push(`Found <strong>${taxableLosses.length} position${taxableLosses.length!==1?'s':''} with harvestable losses</strong> in taxable accounts totaling <strong>${_fmtD(Math.round(harvestable))}</strong>.`);
  if(totalTaxableGain>0) tlhItems.push(`Taxable gains available to offset: <strong>${_fmtD(Math.round(totalTaxableGain))}</strong>. Net taxable position: ${netTaxable>=0?'net gain of '+_fmtD(Math.round(netTaxable)):'net loss of '+_fmtD(Math.round(Math.abs(netTaxable)))}.`);

  if(carryover>0) tlhItems.push(`<strong>${_fmtD(Math.round(carryover))}</strong> in unused losses carry forward indefinitely to future tax years.`);
  if(washRiskSyms.size>0) tlhItems.push(`⚠️ <strong>${washRiskSyms.size} symbol${washRiskSyms.size>1?'s':''}</strong> held in multiple accounts — wash sale risk if sold in one and repurchased (or dividend-reinvested) in another within 30 days.`);
  methTLH.push({heading:'Your Tax-Loss Harvest Analysis', items:tlhItems});
  const stratItems=[];
  stratItems.push('<strong>Wash sale rule:</strong> Cannot buy "substantially identical" security within 30 days of selling at a loss. Replacement funds shown are similar in asset class but different enough to avoid disqualification.');
  stratItems.push('Losses offset capital gains dollar-for-dollar first, then up to <strong>$3,000/year</strong> against ordinary income. Unused losses carry forward indefinitely.');
  stratItems.push('Only taxable account losses provide tax benefits — losses in IRAs/401k/Roth have no tax harvesting value.');
  if(nonTaxLosses.length>0) stratItems.push(`${nonTaxLosses.length} additional loss position${nonTaxLosses.length>1?'s':''} in tax-advantaged accounts — these cannot be harvested for tax purposes.`);
  stratItems.push(`Tax rates assumed: LTCG ${(LTCG_RATE*100).toFixed(0)}%, Ordinary ${(ORD_RATE*100).toFixed(0)}%. Actual rates depend on your total income and filing status.`);
  methTLH.push({heading:'Strategy & Rules', items:stratItems});
  html+=buildMethodologyPanel('Tax-Loss Harvesting — Your Portfolio',methTLH);

  html+=`</div>`;
  el.innerHTML=html;
  /* Update TLH tab badge */
  const tlhBadge=document.getElementById('tlhBadge');
  if(tlhBadge){
    if(taxableLosses.length>0){ tlhBadge.textContent=taxableLosses.length; tlhBadge.style.display=''; }
    else tlhBadge.style.display='none';
  }
}

/* ==================================================================
   SPENDING SUGGESTIONS POPUP
   ================================================================== */
function showWithdrawalSuggestions(){
  /* Prevent duplicate overlays (e.g., double-click) */
  if(document.getElementById('sugg-overlay')) return;

  /* Read current withdrawal context */
  const ctx=window._wdCtx;
  if(!ctx){showToast('Please run Calculate Withdrawal Plan first.','error');return;}

  const raw=localStorage.getItem(SETTINGS_KEY);
  let saved={};try{saved=raw?JSON.parse(raw):{};}catch(e){saved={};}

  const curAge=parseInt(saved.wdAge)||55;
  const retAge=parseInt(saved.wdRetire)||65;
  const lifeExp=parseInt(saved.wdLife)||90;
  const retPct=parseFloat(saved.wdReturn||'7')/100;
  const inflPct=parseFloat(saved.wdInflation||'3')/100;
  const filing=saved.wdFiling||'mfj';
  const ssMonthly=parseFloat(saved.wdSSIncome||'0');
  const ssStartAge=parseInt(saved.wdSSAge||'67');
  const conv=saved.wdRothConv||'none';
  const stax=parseFloat(saved.wdStateTax||'0')/100;
  const iraBasis=parseFloat(saved.wdIRABasis||'0');
  const hasSpouse=saved.wdSpouseToggle===true||saved.wdSpouseToggle==='true';
  const spAge=hasSpouse?parseInt(saved.wdSpAge||curAge):0;
  const spLifeExp=hasSpouse?parseInt(saved.wdSpLife||'92'):0;
  const spSSMonthly=hasSpouse?parseFloat(saved.wdSpSSIncome||'0'):0;
  const spSSStartAge=hasSpouse?parseInt(saved.wdSpSSAge||'67'):67;

  /* Read contribution settings for fingerprinting and solver */
  const contribEnabled=saved.wdContribToggle===true||saved.wdContribToggle==='true';
  const contribMode=saved._contribMode||saved.wdContribMode||'flat';
  const contribStartAge=contribEnabled?parseInt(saved.wdContribStartAge||curAge):curAge;
  const contribEndAge=contribEnabled?parseInt(saved.wdContribEndAge||retAge):retAge;
  const contrib401k=contribEnabled?parseFloat(saved.wdContrib401k||'0'):0;
  const contribMatch=contribEnabled?parseFloat(saved.wdContribMatch||'0'):0;
  const contribIRA=contribEnabled?parseFloat(saved.wdContribIRA||'0'):0;
  const contribTaxable=contribEnabled?parseFloat(saved.wdContribTaxable||'0'):0;
  const contribHSA=contribEnabled?parseFloat(saved.wdContribHSA||'0'):0;
  const contribSchedule=contribEnabled&&Array.isArray(saved._contribSchedule)?saved._contribSchedule:null;

  const yearsToRetire=retAge-curAge;
  const bTI=ctx.bTaxableInit, bDI=ctx.bDeferredInit, bRI=ctx.bRothInit, bHI=ctx.bHSAInit;
  const totalAtRetire=bTI+bDI+bRI+bHI;
  /* Compute planEndAge from fresh localStorage values (not stale ctx) to avoid mismatch
     if user changed life expectancy without recalculating the withdrawal plan */
  const planEndAge=hasSpouse?Math.max(lifeExp,curAge+(spLifeExp-spAge)):lifeExp;
  const yearsInRetirement=planEndAge-retAge+1;

  /* Determine target ending balances (present value) scaled to portfolio size.
     Use percentage-based targets (25% and 50%) so spending is always meaningful —
     absolute targets like "$10M" fail when portfolio is ~$10M (yields $0 spending). */
  const pvTotal=totalAtRetire/Math.pow(1+inflPct,yearsToRetire); /* portfolio in today's dollars */
  const fmtK=v=>v>=1e6?'$'+(v/1e6).toFixed(2)+'M':v>=1e3?'$'+(v/1e3).toFixed(0)+'K':'$'+Math.round(v);
  function _roundNice(v){ if(v>=1e6) return Math.round(v/500000)*500000; if(v>=100000) return Math.round(v/100000)*100000; if(v>=10000) return Math.round(v/10000)*10000; return Math.round(v/1000)*1000; }
  const t2raw=pvTotal*0.25, t3raw=pvTotal*0.50;
  const t2=_roundNice(t2raw), t3=_roundNice(t3raw);
  const targets=[
    {label:'Die with Zero',target:0,color:'var(--danger)',icon:'🎯'},
    {label:'Leave '+fmtK(t2)+' Legacy',target:t2,color:'var(--hold)',icon:'🏠'},
    {label:'Leave '+fmtK(t3)+' Legacy',target:t3,color:'var(--success)',icon:'🏦'},
  ];

  /* Compute custom bracket limit if applicable */
  const customPct=parseFloat(saved.wdCustomPct||'15');
  const customBracketLimitVal=conv==='custom'?_computeCustomBracketLimit(customPct,filing):0;
  const birthYr=(new Date()).getFullYear()-curAge;
  const dynRmdAge=birthYr>=1960?75:(birthYr<=1950?72:73);
  const convStartAge=conv!=='none'?Math.max(retAge,parseInt(saved.wdConvStartAge||retAge)):retAge;
  const convEndAge=conv!=='none'?Math.min(dynRmdAge-1,parseInt(saved.wdConvEndAge||(dynRmdAge-1))):dynRmdAge-1;

  /* MC-aware solver: binary search for spending where ≥80% of Monte Carlo sims
     end with balance ≥ targetFV.  Uses 200 sims during search for speed. */
  const MC_TARGET_RATE=80; /* 80% success threshold */
  const vol=parseFloat(saved.wdVol||'12')/100;
  const brackets=filing==='mfj'?TAX_BRACKETS_MFJ:TAX_BRACKETS_SINGLE;
  const CONV_LIMITS_MC={none:0,conservative:filing==='mfj'?96950:48475,moderate:filing==='mfj'?206700:103350,aggressive:filing==='mfj'?394600:197300};
  const mcConvLimit=conv==='custom'?customBracketLimitVal:(CONV_LIMITS_MC[conv]||0);
  const _mcBaseParams={
    yearsInRetirement,yearsToRetire,retAge,retPct,inflPct,vol,filing,
    bTaxableInit:bTI,bDeferredInit:bDI,bRothInit:bRI,bHSAInit:bHI,totalAtRetire,
    ssAnnualFRA:ssMonthly*12,ssStartAge,spSSAnnualFRA:spSSMonthly*12,spSSStartAge,
    hasSpouse,spAgeOffset:hasSpouse?(spAge-curAge):0,lifeExp,spLifeExp,
    curAge,spAge,iraBasis,
    rothConvStrategy:conv,convBracketLimit:mcConvLimit,convStartAge,convEndAge,brackets,
    RMD_START_AGE:dynRmdAge,stateTaxPct:stax,getContribForAge:ctx.getContribForAge,glideSchedule:ctx.glideSchedule,
    oneTimeByAge:ctx.oneTimeByAge||{},
  };

  function _mcSuccessRate(monthly,targetFV,nSims){
    const phases=[{age:retAge,amount:monthly}];
    const mc=runMonteCarlo({..._mcBaseParams,nSims,spendingPhases:phases,hasPhases:true});
    /* For "Die with Zero" (targetFV=0): success = portfolio didn't deplete (endBal > 0).
       For legacy targets: success = ending balance meets or exceeds target. */
    const successes=mc.endingBalances.filter((b,idx)=>targetFV===0?(mc.survivedFlags?mc.survivedFlags[idx]:b>0):b>=targetFV).length;
    return {rate:(successes/nSims)*100, mc};
  }

  /* Deterministic legacy solver: binary search for spending where _scenarioSim()
     ending balance ≈ targetFV on the expected-return path.  Like the DWZ solver,
     this uses deterministic simulation so results are identical every time the
     popup is opened with the same inputs.  MC is computed separately for display. */
  function solveForSpending(targetPV){
    if(totalAtRetire<=0) return 0;
    const targetFV=targetPV*Math.pow(1+inflPct,planEndAge-curAge);
    const _simP={
      curAge,retAge,lifeExp,retPct,inflPct,filing,
      ssMonthly,ssStartAge,
      rothConvStrategy:conv==='custom'?'custom':conv,
      convStartAge,convEndAge:Math.min(convEndAge,dynRmdAge-1),
      bTaxableInit:bTI,bDeferredInit:bDI,bRothInit:bRI,bHSAInit:bHI,
      hasSpouse,spAge,spLifeExp,spSSMonthly,spSSStartAge,
      stateTaxPct:stax,customBracketLimit:customBracketLimitVal,iraBasis,
      getContribForAge:ctx.getContribForAge,glideSchedule:ctx.glideSchedule,
      oneTimeByAge:ctx.oneTimeByAge||{},
    };
    const _ssBoost=Math.round((ssMonthly||0)+(hasSpouse?(spSSMonthly||0):0));
    let hi=Math.max(Math.round(totalAtRetire*0.12/12),Math.round(totalAtRetire/(Math.max(yearsInRetirement,1)*12)*2))+_ssBoost;
    if(hi<1000) hi=10000;
    let lo=0;
    for(let iter=0;iter<35;iter++){
      const mid=Math.round((lo+hi)/2);
      if(mid<=0) break;
      const sim=_scenarioSim({..._simP,spendPhases:[{age:retAge,amount:mid}]});
      const last=sim.rows[sim.rows.length-1];
      const bal=last?(last.bTaxable+last.bDeferred+last.bRoth+last.bHSA):0;
      if(bal>=targetFV) lo=mid; else hi=mid;
      if(hi-lo<=10) break;
    }
    const raw=(lo+hi)/2;
    if(raw>=500) return Math.round(raw/100)*100;
    if(raw>=50) return Math.round(raw/10)*10;
    return Math.round(raw);
  }

  /* Deterministic DWZ solver: binary search for spending where _scenarioSim()
     ending balance ≈ $0.  This ensures "Die with Zero" spending is consistent
     across the popup, withdrawals page, and scenario comparison charts.
     MC success rate is computed separately as an informational risk metric. */
  function solveForDWZDeterministic(){
    /* Guard: if portfolio is already empty, no spending is possible */
    if(totalAtRetire<=0) return 0;
    const _simP={
      curAge,retAge,lifeExp,retPct,inflPct,filing,
      ssMonthly,ssStartAge,
      rothConvStrategy:conv==='custom'?'custom':conv,
      convStartAge,convEndAge:Math.min(convEndAge,dynRmdAge-1),
      bTaxableInit:bTI,bDeferredInit:bDI,bRothInit:bRI,bHSAInit:bHI,
      hasSpouse,spAge,spLifeExp,spSSMonthly,spSSStartAge,
      stateTaxPct:stax,customBracketLimit:customBracketLimitVal,iraBasis,
      getContribForAge:ctx.getContribForAge,glideSchedule:ctx.glideSchedule,
      oneTimeByAge:ctx.oneTimeByAge||{},
    };
    /* Upper bound: portfolio draw + SS income (SS covers part of spending, so max
       spend can exceed portfolio-only draw rate) */
    const _ssBoost=Math.round((ssMonthly||0)+(hasSpouse?(spSSMonthly||0):0));
    let hi=Math.max(Math.round(totalAtRetire*0.12/12),Math.round(totalAtRetire/(Math.max(yearsInRetirement,1)*12)*2))+_ssBoost;
    if(hi<1000) hi=10000;
    let lo=0;
    for(let iter=0;iter<35;iter++){
      const mid=Math.round((lo+hi)/2);
      if(mid<=0) break;
      const sim=_scenarioSim({..._simP,spendPhases:[{age:retAge,amount:mid}]});
      const last=sim.rows[sim.rows.length-1];
      const bal=last?(last.bTaxable+last.bDeferred+last.bRoth+last.bHSA):0;
      if(bal>0) lo=mid; else hi=mid;
      if(hi-lo<=10) break;
    }
    const raw=(lo+hi)/2;
    if(raw>=500) return Math.round(raw/100)*100;
    if(raw>=50) return Math.round(raw/10)*10;
    return Math.round(raw);
  }

  /* Show loading overlay immediately */
  let overlay=document.createElement('div');
  overlay.className='sugg-overlay';
  overlay.id='sugg-overlay';
  overlay.innerHTML=`<div class="sugg-modal" style="text-align:center;padding:60px"><div style="font-size:2em;margin-bottom:12px">⏳</div><div style="color:var(--text-muted);font-size:1.1em">Calculating optimal spending levels...</div><div style="color:var(--text-light);font-size:0.85em;margin-top:6px">Running simulations for 3 scenarios</div></div>`;
  document.body.appendChild(overlay);
  /* Helper: remove overlay + clean up Escape listener in one place */
  function _closeSuggOverlay(){const el=document.getElementById('sugg-overlay');if(el)el.remove();document.removeEventListener('keydown',window._suggEscHandler);}
  window._closeSuggOverlay=_closeSuggOverlay;
  overlay.addEventListener('click',e=>{if(e.target===overlay)_closeSuggOverlay();});
  /* Escape key closes the modal */
  window._suggEscHandler=function(e){if(e.key==='Escape')_closeSuggOverlay();};
  document.addEventListener('keydown',window._suggEscHandler);

  setTimeout(()=>{
   try{
    /* Solve for each target */
    const results=[];
    targets.forEach(t=>{
      const targetFV=t.target*Math.pow(1+inflPct,planEndAge-curAge);
      /* DWZ uses deterministic solver (ending balance = $0 on the expected-return path).
         Legacy targets use MC solver (80% of random paths meet the target). */
      const monthly=t.target===0?solveForDWZDeterministic():solveForSpending(t.target);
      const phases=[{age:retAge,amount:monthly}];
      try{
        /* Deterministic sim for detailed metrics (taxes, conversions, year-by-year) */
        const sim=_scenarioSim({
          curAge,retAge,lifeExp,retPct,inflPct,filing,
          ssMonthly,ssStartAge,
          rothConvStrategy:conv==='custom'?'custom':conv,
          convStartAge,convEndAge:Math.min(convEndAge,dynRmdAge-1),
          bTaxableInit:bTI,bDeferredInit:bDI,bRothInit:bRI,bHSAInit:bHI,
          hasSpouse,spAge,spLifeExp,spSSMonthly,spSSStartAge,
          spendPhases:phases,stateTaxPct:stax,
          customBracketLimit:customBracketLimitVal,iraBasis,
          getContribForAge:ctx.getContribForAge,glideSchedule:ctx.glideSchedule,
          oneTimeByAge:ctx.oneTimeByAge||{},
        });
        const last=sim.rows[sim.rows.length-1];
        const endBal=last?(last.bTaxable+last.bDeferred+last.bRoth+last.bHSA):0;
        const pvFactor=1/Math.pow(1+inflPct,planEndAge-curAge);
        const totalAfterTax=sim.rows.reduce((s,r)=>s+(r.afterTax||0),0);
        const depleted=sim.rows.find(r=>(r.bTaxable+r.bDeferred+r.bRoth+r.bHSA)<=0);

      /* Final high-quality MC run (500 sims) with custom success threshold */
      const {rate:mcSuccess,mc}=_mcSuccessRate(monthly,targetFV,500);

      /* Compute additional metrics so we can cache EVERYTHING for the scenario tab.
         This ensures exact match between the popup and "Compare in What-If Scenarios". */
      const yr1=sim.rows.find(r=>r.age===retAge);
      const yr1Income=yr1?(yr1.afterTax):0;
      const effRate=yr1&&yr1.totalIncome>0?(yr1.tax/yr1.totalIncome*100):0;
      const betr=sim.totalConversions>0?sim.cumConvTax/sim.totalConversions:0;
      const cumConvTax=sim.cumConvTax||0;
      const mcEndSorted=[...mc.endingBalances].sort((a,b)=>a-b);
      function _pctile(arr,p){ const n=arr.length; if(!n) return 0; const idx=(n-1)*p; const lo=Math.floor(idx); const hi=Math.ceil(idx); return lo===hi?arr[lo]:arr[lo]*(hi-idx)+arr[hi]*(idx-lo); }
      const mcMedian=_pctile(mcEndSorted,0.5), mc10=_pctile(mcEndSorted,0.1), mc90=_pctile(mcEndSorted,0.9);

      results.push({...t,monthly,endBal:targetFV,endBalPV:t.target,totalAfterTax,
        lifetimeTax:sim.cumTax,mcSuccess,depleted:depleted?depleted.age:null,
        totalConversions:sim.totalConversions||0,cumConvTax,
        yr1Income,effRate,betr,mcMedian,mc10,mc90,pvFactor});
      }catch(e){
        results.push({...t,monthly,endBal:0,endBalPV:0,totalAfterTax:0,
          lifetimeTax:0,mcSuccess:0,depleted:null,totalConversions:0,error:e.message});
      }
    });

    /* Current spending for comparison */
    const curPhases=ctx.spendingPhases||[];
    const curSpend=curPhases.length>0?curPhases[0].amount:0;

    /* Build modal HTML */
    let mh=`<div class="sugg-modal">`;
    mh+=`<button class="sugg-modal-close" onclick="_closeSuggOverlay()" title="Close">&times;</button>`;
    mh+=`<h2 style="margin:0 0 4px;font-size:1.3em">\u{1F4A1} Spending Suggestions</h2>`;
    mh+=`<p style="color:var(--text-muted);margin:0 0 6px;font-size:0.9em">Based on your portfolio of <strong>${fmtK(totalAtRetire)}</strong> at retirement (age ${retAge}), here's how much you can spend each month under different legacy goals. All targets use deterministic simulation at ${(retPct*100).toFixed(0)}% return; Monte Carlo success rate shown as a risk indicator.</p>`;
    if(curSpend>0) mh+=`<p style="color:var(--text-muted);margin:0 0 12px;font-size:0.85em">Your current plan: <strong>$${curSpend.toLocaleString()}/mo</strong></p>`;

    /* Scenario cards */
    mh+=`<div class="sugg-scenario-grid">`;
    results.forEach((r,i)=>{
      mh+=`<div class="sugg-scenario-card" style="border-color:${r.color};${i===0?'border-width:3px':''}">`;
      mh+=`<h4 style="color:${r.color}">${r.icon} ${esc(r.label)}</h4>`;
      mh+=`<div class="sugg-spend-highlight" style="color:${r.color}">$${r.monthly.toLocaleString()}<span style="font-size:0.4em;font-weight:400;color:var(--text-muted)">/month</span></div>`;
      if(r.target>0) mh+=`<div style="font-size:0.82em;color:var(--text-muted);margin-bottom:10px">Target: leave ${fmtK(r.target)} (today's $) at age ${planEndAge}</div>`;
      else mh+=`<div style="font-size:0.82em;color:var(--text-muted);margin-bottom:10px">Spend it all by age ${planEndAge}</div>`;

      if(curSpend>0){
        const diff=r.monthly-curSpend;
        const pct=Math.abs(diff/curSpend*100).toFixed(0);
        const arrow=diff>0?'↑':'↓';
        const diffColor=diff>0?'var(--success)':'var(--danger)';
        mh+=`<div style="font-size:0.85em;margin-bottom:10px;padding:4px 8px;background:${diff>0?'var(--success-bg)':'var(--danger-bg)'};border-radius:4px;color:${diffColor};font-weight:600">${arrow} $${Math.abs(diff).toLocaleString()}/mo (${pct}%) vs current plan</div>`;
      }

      mh+=`<div class="sugg-metric"><span class="sugg-metric-label">MC Success Rate</span><span class="sugg-metric-value" style="color:${r.mcSuccess>=90?'var(--success)':r.mcSuccess>=75?'var(--warning-dark)':'var(--danger)'}">${r.mcSuccess.toFixed(0)}%</span></div>`;
      if(r.target===0&&r.mcSuccess<MC_TARGET_RATE) mh+=`<div style="font-size:0.73em;color:var(--warning-dark);margin:-2px 0 4px;padding:2px 6px;background:var(--warning-bg-light);border-radius:3px">⚠️ Calibrated for $0 ending balance — higher spending means more market risk</div>`;
      mh+=`<div class="sugg-metric"><span class="sugg-metric-label">Ending Balance</span><span class="sugg-metric-value">${fmtK(r.endBal)}</span></div>`;
      mh+=`<div class="sugg-metric"><span class="sugg-metric-label">Ending Balance (PV)</span><span class="sugg-metric-value" style="color:var(--hold)">${fmtK(r.endBalPV)}</span></div>`;
      mh+=`<div class="sugg-metric"><span class="sugg-metric-label">Lifetime After-Tax</span><span class="sugg-metric-value">${fmtK(r.totalAfterTax)}</span></div>`;
      mh+=`<div class="sugg-metric"><span class="sugg-metric-label">Lifetime Taxes</span><span class="sugg-metric-value" style="color:var(--danger)">${fmtK(r.lifetimeTax)}</span></div>`;
      mh+=`<div class="sugg-metric"><span class="sugg-metric-label">Portfolio Lasts</span><span class="sugg-metric-value">${r.depleted?'Age '+r.depleted:'✅ Lifetime'}</span></div>`;
      if(r.totalConversions>0) mh+=`<div class="sugg-metric"><span class="sugg-metric-label">Roth Converted</span><span class="sugg-metric-value">${fmtK(r.totalConversions)}</span></div>`;

      mh+=`<div style="margin-top:12px;text-align:center"><button onclick="_applySuggestion(${r.monthly})" style="padding:6px 18px;background:${r.color};color:white;border:none;border-radius:5px;font-size:0.82em;font-weight:600;cursor:pointer">Apply $${r.monthly.toLocaleString()}/mo</button></div>`;
      mh+=`</div>`;
    });
    mh+=`</div>`;

    /* Withdrawal rate context */
    const rates=results.map(r=>({label:r.label,rate:(r.monthly*12/pvTotal*100).toFixed(1)}));
    mh+=`<div style="background:var(--bg-secondary);border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin-top:16px;font-size:0.88em">`;
    mh+=`<strong>📊 Withdrawal Rate Context:</strong> `;
    rates.forEach(r=>mh+=`${r.label}: <strong>${r.rate}%</strong> &nbsp;|&nbsp; `);
    mh+=`<span style="color:var(--text-muted)">Safe zone: 3-4% &nbsp;|&nbsp; Moderate: 4-5% &nbsp;|&nbsp; Aggressive: 5%+</span>`;
    mh+=`</div>`;

    /* AI-Powered Tax Optimization Tips */
    mh+=`<div class="sugg-tips">`;
    mh+=`<h3>🧠 Tax Optimization Tips</h3>`;
    mh+=`<div class="sugg-tip-item"><span class="sugg-tip-icon">🔄</span><div class="sugg-tip-text"><strong>Start Roth Conversions Early (Golden Window):</strong> The years between retirement and Social Security/RMDs are your lowest-tax years. Convert aggressively in this window — your taxable income is minimal, leaving large bracket room. Starting earlier can save $1-3M in lifetime taxes for large portfolios.</div></div>`;
    mh+=`<div class="sugg-tip-item"><span class="sugg-tip-icon">📉</span><div class="sugg-tip-text"><strong>Flatten the Tax Mountain:</strong> Without optimization, taxes spike after age 70 when SS + RMDs + dividends stack up. Spreading conversions across earlier years keeps you in the 22-24% bracket instead of 32-37%. This is the single biggest tax optimization available.</div></div>`;
    mh+=`<div class="sugg-tip-item"><span class="sugg-tip-icon">💰</span><div class="sugg-tip-text"><strong>Spend Taxable First:</strong> Use taxable accounts for living expenses while converting tax-deferred to Roth. This reduces future dividend/capital gains income, lowers AGI, and reduces Medicare IRMAA surcharges and SS taxation.</div></div>`;
    mh+=`<div class="sugg-tip-item"><span class="sugg-tip-icon">⏱️</span><div class="sugg-tip-text"><strong>Stop Conversions Before SS Begins:</strong> Once Social Security starts (especially at 70), your taxable income rises significantly. Continuing conversions then may push you into higher brackets. Aim to finish the bulk of conversions by age 68-69.</div></div>`;
    mh+=`<div class="sugg-tip-item"><span class="sugg-tip-icon">🏥</span><div class="sugg-tip-text"><strong>Watch IRMAA Thresholds:</strong> Medicare surcharges use 2-year-old MAGI. Large conversions near age 63+ can trigger higher Part B/D premiums at 65. Plan conversion amounts to stay below IRMAA cliff thresholds ($206K MFJ / $103K single).</div></div>`;
    mh+=`<div class="sugg-tip-item"><span class="sugg-tip-icon">📋</span><div class="sugg-tip-text"><strong>Optimal Spending Phases:</strong> Consider a "Go-Go, Slow-Go, No-Go" approach: spend more in early retirement (travel, activities), reduce at 75+, and further at 85+. Your portfolio can support higher early spending that declines naturally with age.</div></div>`;
    mh+=`</div>`;

    /* Compare in Scenarios button */
    /* Fingerprint all parameters so cache is invalidated if user changes ANY assumption */
    const _glideFp=ctx.glideSchedule?JSON.stringify(ctx.glideSchedule.map(g=>[g.age,Math.round(g.eqPct||0)])):'fixed';
    const _suggFp=[retPct*100,inflPct*100,ssMonthly,ssStartAge,conv,retAge,lifeExp,stax*100,
      curAge,filing,vol*100,hasSpouse?1:0,spAge,spLifeExp,spSSMonthly,spSSStartAge,
      customPct,convStartAge,convEndAge,iraBasis,
      contribEnabled?1:0,contribMode,contribStartAge,contribEndAge,
      contrib401k,contribMatch,contribIRA,contribTaxable,contribHSA,
      contribSchedule?JSON.stringify(contribSchedule.map(r=>[r.year,r.age,r.c401k,r.match,r.ira,r.taxable,r.hsa])):'flat',
      bTI,bDI,bRI,bHI,_glideFp].join('|');
    window._suggestionScenarios=results.map(r=>({monthly:r.monthly,label:r.label,target:r.target,
      mcSuccess:r.mcSuccess,totalAfterTax:r.totalAfterTax,lifetimeTax:r.lifetimeTax,
      totalConversions:r.totalConversions,cumConvTax:r.cumConvTax,
      depleted:r.depleted,yr1Income:r.yr1Income,effRate:r.effRate,betr:r.betr,
      mcMedian:r.mcMedian,mc10:r.mc10,mc90:r.mc90,pvFactor:r.pvFactor,
      endBal:r.endBal,endBalPV:r.endBalPV,
      _phaseFp:JSON.stringify([[parseInt(retAge)||65,Math.round(r.monthly*100)/100]]),
      _fp:_suggFp}));
    mh+=`<div class="sugg-actions">`;
    mh+=`<button onclick="_applySuggestionsToScenarios()" style="background:#2563eb;color:white;border:none">🔍 Compare in What-If Scenarios</button>`;
    mh+=`<button onclick="_closeSuggOverlay()" style="background:var(--card);color:var(--text-muted);border:1px solid var(--border)">Close</button>`;
    mh+=`</div>`;
    mh+=`</div>`;

    overlay.innerHTML=mh;
   }catch(err){
    /* Top-level error: remove stuck overlay and alert user */
    _closeSuggOverlay();
    console.error('Spending suggestions error:',err);
    showToast('Error calculating suggestions: '+err.message, 'error');
   }
  },50);
}

/* Apply a suggested spending amount to the withdrawal planner */
window._applySuggestion=function(monthly){
  if(window._closeSuggOverlay) window._closeSuggOverlay();
  const container=document.getElementById('spendPhasesContainer');
  if(container){
    container.innerHTML='';
    const retAge=parseInt(document.getElementById('wdRetire')?.value)||65;
    addSpendPhase(retAge,monthly);
    saveSettings();
    computeWithdrawalPlan();
  }
};

/* Apply suggestions to What-If Scenarios tab */
window._applySuggestionsToScenarios=function(){
  const scenarioData=window._suggestionScenarios;
  if(!scenarioData) return;
  if(window._closeSuggOverlay) window._closeSuggOverlay();
  /* Save scenario presets to localStorage so renderScenarios picks them up.
     Copy ALL withdrawal tab values into shared profile + per-scenario fields
     so nothing is lost or stale from a prior scenarios-tab visit. */
  const raw=localStorage.getItem(SETTINGS_KEY);
  let saved={};try{saved=raw?JSON.parse(raw):{};}catch(e){saved={};}

  /* Sync shared profile fields from withdrawal tab */
  saved.scSharedAge=saved.wdAge||'55';
  saved.scSharedFiling=saved.wdFiling||'mfj';
  saved.scSharedVol=saved.wdVol||'12';
  const savedWdGlideEnabled=saved.wdGlideToggle===true||saved.wdGlideToggle==='true';
  saved.scSharedGlide=savedWdGlideEnabled?'inherit':'fixed';
  saved.scSharedSpouse=saved.wdSpouseToggle===true||saved.wdSpouseToggle==='true';
  if(saved.scSharedSpouse){
    saved.scSharedSpAge=saved.wdSpAge||saved.wdAge||'55';
    saved.scSharedSpLife=saved.wdSpLife||'92';
    saved.scSharedSpSS=saved.wdSpSSIncome||'0';
    saved.scSharedSpSSAge=saved.wdSpSSAge||'67';
  }

  /* Build full per-scenario data from withdrawal tab defaults */
  const retireAge=saved.wdRetire||'65';
  const lifeExp=saved.wdLife||'90';
  const ssIncome=saved.wdSSIncome||'0';
  const ssAge=saved.wdSSAge||'67';
  const retPct=saved.wdReturn||'7';
  const inflPct=saved.wdInflation||'3';
  const convStrat=saved.wdRothConv||'none';
  const stateTax=saved.wdStateTax||'0';
  const customPct=saved.wdCustomPct||'15';
  const convStart=saved.wdConvStartAge||retireAge;
  /* Compute dynamic RMD age to match the suggestion engine's calculation */
  const _curAge=parseInt(saved.wdAge)||55;
  const _birthYr=(new Date()).getFullYear()-_curAge;
  const _dynRmdAge=_birthYr>=1960?75:(_birthYr<=1950?72:73);
  const convEnd=String(Math.min(parseInt(saved.wdConvEndAge)||(_dynRmdAge-1), _dynRmdAge-1));

  const scArr=[];
  scenarioData.forEach((s,i)=>{
    scArr.push({
      Name:s.label,
      retire:retireAge,
      life:lifeExp,
      ss:ssIncome,
      ssAge:ssAge,
      ret:retPct,
      infl:inflPct,
      conv:convStrat,
      stax:stateTax,
      customPct:customPct,
      convStart:convStart,
      convEnd:convEnd,
      iraBasis:saved.wdIRABasis||'0',
      phases:[{age:parseInt(retireAge)||65,amount:s.monthly}],
      _target:s.target,
      _targetMonthly:s.monthly,
      _fp:s._fp,
    });
  });
  saved._scenarios=scArr;
  localStorage.setItem(SETTINGS_KEY,JSON.stringify(saved));
  window._scenResultsCache=''; /* invalidate stale scenario cache */
  /* Switch to scenarios tab */
  const scBtn=document.querySelector('.pivot-tab[data-pivot="scenarios"]');
  if(scBtn) scBtn.click();
};

  const scFiling=saved.scSharedFiling||def.filing;

  const savedWdGlideEnabled=saved.wdGlideToggle===true||saved.wdGlideToggle==='true';
  const savedWdGlideMode=savedWdGlideEnabled?(saved.wdGlideMode||'glidepath'):'fixed';
  const requestedScSharedGlide=saved.scSharedGlide||(savedWdGlideEnabled?'inherit':'fixed');
  const scSharedGlide=(savedWdGlideMode==='fixed'&&requestedScSharedGlide==='inherit')?'fixed':requestedScSharedGlide;
  if(scSharedGlide!==saved.scSharedGlide){

  const scSpouse=saved.scSharedSpouse===true||saved.scSharedSpouse==='true'||saved.wdSpouseToggle===true||saved.wdSpouseToggle==='true';
  const scSpAge=saved.scSharedSpAge!=null?parseInt(saved.scSharedSpAge):(parseInt(saved.wdSpAge)||scAge);
  const scSpLife=saved.scSharedSpLife!=null?parseInt(saved.scSharedSpLife):(parseInt(saved.wdSpLife)||95);
  const scSpSS=saved.scSharedSpSS!=null?parseFloat(saved.scSharedSpSS):(parseFloat(saved.wdSpSSIncome)||0);
  const scSpSSAge=saved.scSharedSpSSAge!=null?parseInt(saved.scSharedSpSSAge):(parseInt(saved.wdSpSSAge)||67);

  html+=`<div style="background:var(--bg-secondary);border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin-bottom:16px">`;

  html+=`<div style="display:flex;flex-wrap:wrap;gap:16px;align-items:end">`;

  html+=`<div class="wd-field" style="margin-bottom:0"><label style="font-size:0.82em;font-weight:500;color:var(--text)">Filing Status</label><select id="scSharedFiling" onchange="saveSettings()" style="padding:5px 6px;border:1px solid var(--border);border-radius:4px;min-width:130px">`;
  html+=`<option value="mfj"${scFiling==='mfj'?' selected':''}>Married Filing Jointly</option><option value="single"${scFiling==='single'?' selected':''}>Single</option></select></div>`;
  html+=`<div class="wd-field" style="margin-bottom:0"><label style="font-size:0.82em;font-weight:500;color:var(--text)">MC Volatility (%)</label><input type="number" id="scSharedVol" value="${scVol}" min="1" max="40" step="1" onchange="saveSettings()" style="width:90px;padding:5px 6px;border:1px solid var(--border);border-radius:4px;text-align:center"></div>`;
  html+=`<div class="wd-field" style="margin-bottom:0"><label style="font-size:0.82em;font-weight:500;color:var(--text)">Glide Path</label><select id="scSharedGlide" onchange="_scGlideChanged();saveSettings()" style="padding:5px 6px;border:1px solid var(--border);border-radius:4px;min-width:130px"><option value="fixed"${scSharedGlide==='fixed'?' selected':''}>Fixed Return</option><option value="inherit"${scSharedGlide==='inherit'?' selected':''}>Use Withdrawals Glide Path</option></select></div>`;
  html+=`<div class="wd-field" style="margin-bottom:0"><label style="font-size:0.82em;font-weight:500;color:var(--text)"><input type="checkbox" id="scSharedSpouse" ${scSpouse?'checked':''} onchange="document.getElementById('scSpouseSection').style.display=this.checked?'flex':'none';saveSettings()" style="margin-right:4px">Include Spouse</label></div>`;
  html+=`</div>`;
  html+=`<div id="scGlideNote" style="display:${scSharedGlide==='inherit'?'block':'none'};margin-top:10px;font-size:0.82em;color:var(--text-muted)">Using the Withdrawals tab glide path disables the Scenario Comparator's Annual Return and MC Volatility inputs because results inherit the age-based return schedule.</div>`;

  html+=`<div class="wd-field" style="margin-bottom:0"><label style="font-size:0.82em;font-weight:500;color:var(--text)">Spouse Age</label><input type="number" id="scSharedSpAge" value="${scSpAge}" min="25" max="85" onchange="saveSettings()" style="width:90px;padding:5px 6px;border:1px solid var(--border);border-radius:4px;text-align:center"></div>`;
  html+=`<div class="wd-field" style="margin-bottom:0"><label style="font-size:0.82em;font-weight:500;color:var(--text)">Spouse Life Expectancy</label><input type="number" id="scSharedSpLife" value="${scSpLife}" min="70" max="105" onchange="saveSettings()" style="width:90px;padding:5px 6px;border:1px solid var(--border);border-radius:4px;text-align:center"></div>`;
  html+=`<div class="wd-field" style="margin-bottom:0"><label style="font-size:0.82em;font-weight:500;color:var(--text)">Spouse Monthly SS ($)</label><input type="number" id="scSharedSpSS" value="${scSpSS}" min="0" max="10000" step="100" onchange="saveSettings()" style="width:100px;padding:5px 6px;border:1px solid var(--border);border-radius:4px;text-align:center"></div>`;

  const defBirthYr=(new Date()).getFullYear()-def.age;
  const defRmdAge=defBirthYr>=1960?75:(defBirthYr<=1950?72:73);
  const defConvEnd=defRmdAge-1;
  const presets=[
    {label:'Base Case', retire:def.retire, spend:def.spend, life:def.life, ss:def.ss, ssAge:def.ssAge, ret:def.ret, infl:def.infl, conv:def.conv, stax:def.stax, customPct:15, convStart:def.retire, convEnd:defConvEnd, phases:[{age:def.retire,amount:def.spend}]},

  ];
  /* Restore saved scenario values if available */
  if(saved._scenarios&&Array.isArray(saved._scenarios)){
    saved._scenarios.forEach((sc,i)=>{
      if(i<3&&sc){
        if(sc.Name) presets[i].label=sc.Name;

      html+=`<span style="font-size:0.75em;color:var(--text-light)">/mo</span>`;
      if(pi>0) html+=`<button onclick="this.parentElement.remove();_scPhaseChanged()" style="border:none;background:none;color:var(--danger);cursor:pointer;font-size:0.9em;padding:0 4px" title="Remove phase">✕</button>`;
      else html+=`<span style="width:22px"></span>`;
      html+=`</div>`;
    });
    html+=`</div>`;
    html+=`<button onclick="_scAddPhase(${i})" style="border:1px dashed var(--border);background:none;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:0.78em;color:var(--text-muted);margin-top:4px">+ Add Phase</button>`;
    html+=`</div>`;
  });
  html+=`</div></div>`;

  html+=`<div style="text-align:center;margin-bottom:24px"><button onclick="runScenarioComparison()" class="wd-btn" style="padding:12px 32px;font-size:1.05em">\u{1F680} Compare Scenarios</button></div>`;
  html+=`<div id="sc-pv-toggle" style="display:none;justify-content:flex-end;align-items:center;gap:8px;margin-bottom:8px">`;
  html+=`<span style="font-size:0.8em;font-weight:600;color:var(--text-muted)">Show values in:</span>`;
