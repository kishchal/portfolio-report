    hoverLine.setAttribute('x1',x.toFixed(1));
    hoverLine.setAttribute('x2',x.toFixed(1));
    hoverLine.style.display='';
    hoverDot.setAttribute('cx',x.toFixed(1));
    hoverDot.setAttribute('cy',y.toFixed(1));
    hoverDot.style.display='';
    const bondPct=(100-point.eqPct).toFixed(0);
    tooltip.innerHTML=`<div style="font-weight:700;margin-bottom:3px;border-bottom:1px solid rgba(255,255,255,.2);padding-bottom:3px">Age ${point.age}</div>`+
      `<div style="display:grid;grid-template-columns:auto auto;gap:1px 10px">`+
      `<span style="color:rgba(255,255,255,.7)">Equity:</span><span style="font-weight:600">${point.eqPct.toFixed(0)}%</span>`+
      `<span style="color:rgba(255,255,255,.7)">Bonds:</span><span style="font-weight:600">${bondPct}%</span>`+
      `<span style="color:rgba(255,255,255,.7)">Return:</span><span style="font-weight:600">${(point.ret*100).toFixed(1)}%</span>`+
      `<span style="color:rgba(255,255,255,.7)">Volatility:</span><span style="font-weight:600">${(point.vol*100).toFixed(1)}%</span></div>`;
    tooltip.style.display='block';
    /* Position tooltip using the same SVG→screen conversion */
    const wrapRect=chartWrap.getBoundingClientRect();
    const svgRect=svg.getBoundingClientRect();
    const screenX=clientPt.clientX-wrapRect.left;
    const ttW=tooltip.offsetWidth||120;
    const ttH=tooltip.offsetHeight||80;
    /* Place tooltip above the dot, centered horizontally, clamped within chart */
    let ttLeft=screenX-ttW/2;
    if(ttLeft<4) ttLeft=4;
    if(ttLeft+ttW>wrapRect.width-4) ttLeft=wrapRect.width-ttW-4;
    /* Vertical: convert SVG y to screen y */
    let screenY;
    try{
      const pt2=svg.createSVGPoint();pt2.x=x;pt2.y=y;
      const ctm2=svg.getScreenCTM();
      if(ctm2){const sp=pt2.matrixTransform(ctm2);screenY=sp.y-wrapRect.top;}
    }catch(e){}
    if(screenY==null) screenY=(y/h)*svgRect.height+(svgRect.top-wrapRect.top);
    let ttTop=screenY-ttH-12;
    if(ttTop<4) ttTop=screenY+18;
    tooltip.style.left=ttLeft+'px';
    tooltip.style.top=ttTop+'px';
  };
  const clearHover=()=>{
    if(hoverLine) hoverLine.style.display='none';
    if(hoverDot) hoverDot.style.display='none';
    if(tooltip) tooltip.style.display='none';
  };
  /* Use the transparent overlay rect for reliable mouse tracking */
  if(hoverRect){
    hoverRect.addEventListener('mousemove',updateHover);
    hoverRect.addEventListener('mouseleave',clearHover);
    hoverRect.addEventListener('touchstart',updateHover,{passive:true});
    hoverRect.addEventListener('touchmove',updateHover,{passive:true});
    hoverRect.addEventListener('touchend',clearHover,{passive:true});
  }
  /* Also allow hovering on the SVG as a whole for areas outside the plot */
  svg?.addEventListener('mouseleave',clearHover);
  toggleBtn?.addEventListener('click',()=>{
    if(!detailsEl) return;
    const showing=detailsEl.style.display==='block';
    detailsEl.style.display=showing?'none':'block';
    toggleBtn.textContent=showing?'Show Details':'Hide Details';
  });
  const retStart=getReturnForAge(schedule,retAge);
  const retEnd=getReturnForAge(schedule,planEndAge);
  previewEl.textContent=`Retirement ages ${retAge}–${planEndAge}: equity ${retStart.eqPct.toFixed(0)}%→${retEnd.eqPct.toFixed(0)}%, return ${(retStart.ret*100).toFixed(1)}%→${(retEnd.ret*100).toFixed(1)}%, vol ${(retStart.vol*100).toFixed(1)}%→${(retEnd.vol*100).toFixed(1)}%`;
}

/* ---- Income & Savings Year-by-Year helpers ---- */
function setContribMode(mode){
  const modeEl=document.getElementById('wdContribMode');
  if(modeEl) modeEl.value=mode;
  const flatPanel=document.getElementById('contribFlatPanel');
  const yearPanel=document.getElementById('contribYearlyPanel');
  const flatBtn=document.getElementById('contribModeFlat');
  const yearBtn=document.getElementById('contribModeYearly');
  if(flatPanel) flatPanel.style.display=mode==='flat'?'':'none';
  if(yearPanel) yearPanel.style.display=mode==='yearly'?'':'none';
  if(flatBtn){ flatBtn.classList.toggle('active', mode==='flat'); flatBtn.style.background=''; flatBtn.style.color=''; }
  if(yearBtn){ yearBtn.classList.toggle('active', mode==='yearly'); yearBtn.style.background=''; yearBtn.style.color=''; }
  /* Auto-populate year rows if switching to yearly and empty */
  if(mode==='yearly'){
    const container=document.getElementById('contribYearlyRows');
    if(container&&container.children.length===0) _populateContribYears();
  }
  saveSettings();
}

function _populateContribYears(){
  const curAge=parseInt(document.getElementById('wdAge')?.value)||50;
  const retAge=parseInt(document.getElementById('wdRetire')?.value)||65;
  const lifeExp=parseInt(document.getElementById('wdLifeExp')?.value)||90;
  /* Pre-fill from flat values */
  const v401k=parseFloat(document.getElementById('wdContrib401k')?.value)||0;
  const vMatch=parseFloat(document.getElementById('wdContribMatch')?.value)||0;
  const vIRA=parseFloat(document.getElementById('wdContribIRA')?.value)||0;
  const vTaxable=parseFloat(document.getElementById('wdContribTaxable')?.value)||0;
  const vHSA=parseFloat(document.getElementById('wdContribHSA')?.value)||0;
  const curYear=new Date().getFullYear();
  /* Populate from current age through retirement (pre-retirement gets full values) */
  for(let age=curAge;age<retAge;age++){
    addContribYear(curYear+(age-curAge),age,v401k,vMatch,vIRA,vTaxable,vHSA,retAge);
  }
  /* Add a few post-retirement years with taxable/side income only */
  const postYears=Math.min(5,lifeExp-retAge);
  for(let i=0;i<postYears;i++){
    addContribYear(curYear+(retAge-curAge)+i,retAge+i,0,0,0,0,0,retAge);
  }
}

function addContribYear(year,age,v401k,vMatch,vIRA,vTaxable,vHSA,retAge){
  const container=document.getElementById('contribYearlyRows');
  if(!container) return;
  const curAge=parseInt(document.getElementById('wdAge')?.value)||50;
  const curYear=new Date().getFullYear();
  const rAge=retAge||parseInt(document.getElementById('wdRetire')?.value)||65;
  /* Default year: max existing year + 1 (not children.length) */
  let defYear=year;
  let defAge=age;
  if(!defYear){
    let maxY=curYear-1;
    container.querySelectorAll('.cy-year').forEach(el=>{const v=parseInt(el.value)||0;if(v>maxY)maxY=v;});
    defYear=maxY+1;
    defAge=curAge+(defYear-curYear);
  }
  if(!defAge) defAge=curAge+(defYear-curYear);
  /* Reject duplicate years */
  for(const el of container.querySelectorAll('.cy-year')){ if(parseInt(el.value)===defYear) return; }
  const isPost=defAge>=rAge;
  const row=document.createElement('div');
  row.className='contrib-year-row';
  row.dataset.year=defYear;
  const postBadge=isPost?`<span class="cy-badge-post">POST-RETIRE</span>`:'';
  row.innerHTML=
    `<div class="cy-badge">` +
    `<span class="cy-badge-year">${defYear}</span>` +
    `<span class="cy-badge-age">Age ${defAge}</span>` +
    postBadge +
    `</div>` +
    `<input type="hidden" class="cy-year" value="${defYear}">` +
    `<input type="hidden" class="cy-age" value="${defAge}">` +
    `<div class="cy-fields">` +
    `<div class="cy-col"><span class="cy-label">401k</span><input type="number" class="cy-401k" value="${v401k||0}" min="0" max="70000" step="500"></div>` +
    `<div class="cy-col"><span class="cy-label">Match</span><input type="number" class="cy-match" value="${vMatch||0}" min="0" max="50000" step="500"></div>` +
    `<div class="cy-col"><span class="cy-label">IRA</span><input type="number" class="cy-ira" value="${vIRA||0}" min="0" max="15000" step="500"></div>` +
    `<div class="cy-col"><span class="cy-label">Taxable</span><input type="number" class="cy-taxable" value="${vTaxable||0}" min="0" step="1000"></div>` +
    `<div class="cy-col"><span class="cy-label">HSA</span><input type="number" class="cy-hsa" value="${vHSA||0}" min="0" max="10000" step="100"></div>` +
    `</div>` +
    `<button type="button" class="spend-phase-del" onclick="this.closest('.contrib-year-row').remove();saveSettings()" title="Remove year">×</button>`;
  /* Insert at sorted position by year */
  let inserted=false;
  for(const child of container.children){
    const childYear=parseInt(child.dataset.year)||0;
    if(childYear>defYear){ container.insertBefore(row,child); inserted=true; break; }
  }
  if(!inserted) container.appendChild(row);
  row.querySelectorAll('input').forEach(inp=>{inp.addEventListener('change',saveSettings);inp.addEventListener('input',saveSettings);});
}

function insertContribYearFromInput(){
  const inp=document.getElementById('contribInsertYearInput');
  const msg=document.getElementById('contribInsertMsg');
  if(!inp) return;
  const yearVal=parseInt(inp.value);
  const minYear=new Date().getFullYear();
  if(!yearVal||yearVal<minYear||yearVal>2100){ if(msg){ msg.textContent=`Enter a valid year (${minYear}–2100)`; msg.style.color='var(--danger)'; } return; }
  /* Check for duplicate */
  const existing=document.querySelectorAll('#contribYearlyRows .cy-year');
  for(const el of existing){ if(parseInt(el.value)===yearVal){ if(msg){ msg.textContent='Year '+yearVal+' already exists'; msg.style.color='var(--danger)'; } return; } }
  /* Calculate age from year */
  const curAge=parseInt(document.getElementById('wdAge')?.value)||50;
  const curYear=new Date().getFullYear();
  const age=curAge+(yearVal-curYear);
  addContribYear(yearVal,age,0,0,0,0,0);
  saveSettings();
  inp.value='';
  if(msg){ msg.textContent='Added '+yearVal; msg.style.color='var(--success)'; setTimeout(()=>{if(msg)msg.textContent='';},2000); }
  /* Scroll the new row into view */
  const newRow=document.querySelector(`#contribYearlyRows .contrib-year-row[data-year="${yearVal}"]`);
  if(newRow) newRow.scrollIntoView({behavior:'smooth',block:'nearest'});
}

/* Refresh POST-RETIRE badges on existing year-by-year rows when retirement age changes */
function refreshContribPostRetireBadges(){
  const rAge=parseInt(document.getElementById('wdRetire')?.value)||65;
  document.querySelectorAll('#contribYearlyRows .contrib-year-row').forEach(row=>{
    const ageEl=row.querySelector('.cy-age');
    if(!ageEl) return;
    const age=parseInt(ageEl.value);
    const badge=row.querySelector('.cy-badge');
    if(!badge) return;
    const existing=badge.querySelector('.cy-badge-post');
    if(age>=rAge&&!existing){
      badge.insertAdjacentHTML('beforeend','<span class="cy-badge-post">POST-RETIRE</span>');
    } else if(age<rAge&&existing){
      existing.remove();
    }
  });
}

function getContribSchedule(){
  /* Returns an array of {year,age,c401k,match,ira,taxable,hsa} for each year */
  const mode=document.getElementById('wdContribMode')?.value||'flat';
  if(mode==='flat') return null; /* null = use flat fields */
  const rows=document.querySelectorAll('#contribYearlyRows .contrib-year-row');
  const schedule=[];
  rows.forEach(r=>{
    schedule.push({
      year:parseInt(r.querySelector('.cy-year')?.value)||0,
      age:parseInt(r.querySelector('.cy-age')?.value)||0,
      c401k:parseFloat(r.querySelector('.cy-401k')?.value)||0,
      match:parseFloat(r.querySelector('.cy-match')?.value)||0,
      ira:parseFloat(r.querySelector('.cy-ira')?.value)||0,
      taxable:parseFloat(r.querySelector('.cy-taxable')?.value)||0,
      hsa:parseFloat(r.querySelector('.cy-hsa')?.value)||0
    });
  });
  schedule.sort((a,b)=>a.year-b.year);
  return schedule;
}

/* Returns annual expense for a given age based on spending phases (in today's dollars) */
function getAnnualExpenseForAge(age,phases){
  if(!phases||phases.length===0) return 0; /* 0 = use 4% rule */
  let applicable=null;
  for(const p of phases){
    if(age>=p.age) applicable=p;
    else break;
  }
  return applicable?applicable.amount*12:0;
}

/* ---- Account Selector helpers ---- */
let _acctSelHandler=null;
let _acctSelEscHandler=null;
function _closeAcctSel(){
  const btn=document.getElementById('acctSelBtn'),drop=document.getElementById('acctSelDrop');
  if(drop) drop.classList.remove('open');
  if(btn){btn.classList.remove('open');btn.setAttribute('aria-expanded','false');}
  if(_acctSelHandler){document.removeEventListener('click',_acctSelHandler,true);_acctSelHandler=null;}
  if(_acctSelEscHandler){document.removeEventListener('keydown',_acctSelEscHandler);_acctSelEscHandler=null;}
}
function toggleAcctSelector(){
  const btn=document.getElementById('acctSelBtn');
  const drop=document.getElementById('acctSelDrop');
  if(_acctSelHandler){document.removeEventListener('click',_acctSelHandler,true);_acctSelHandler=null;}
  if(_acctSelEscHandler){document.removeEventListener('keydown',_acctSelEscHandler);_acctSelEscHandler=null;}
  const isOpen=drop.classList.contains('open');
  drop.classList.toggle('open');btn.classList.toggle('open');
  btn.setAttribute('aria-expanded',!isOpen);
  if(!isOpen){
    setTimeout(()=>{
      _acctSelHandler=e=>{
        if(!drop.contains(e.target)&&!btn.contains(e.target)) _closeAcctSel();
      };
      _acctSelEscHandler=e=>{if(e.key==='Escape'){_closeAcctSel();btn.focus();}};
      document.addEventListener('click',_acctSelHandler,true);
      document.addEventListener('keydown',_acctSelEscHandler);
    },0);
  }
}
function getSelectedAccountNums(){
  const cbs=document.querySelectorAll('.acct-sel-cb');
  const nums=new Set();
  cbs.forEach(cb=>{if(cb.checked) nums.add(cb.value);});
  return nums;
}
function onAcctSelChange(){
  const cbs=document.querySelectorAll('.acct-sel-cb');
  const total=cbs.length;
  let checked=0, selectedVal=0;
  const allAccts=getAllRetirementAccounts();
  const valMap=new Map(allAccts.map(a=>[a.num,a.val]));
  cbs.forEach(cb=>{if(cb.checked){checked++;selectedVal+=(valMap.get(cb.value)||0);}});
  const selAllEl=document.getElementById('acctSelAll');
  selAllEl.checked=checked===total;
  selAllEl.indeterminate=checked>0&&checked<total;
  document.getElementById('acctSelSummary').textContent=`\u{1F4CB} ${checked} of ${total} accounts selected`;
  document.getElementById('acctSelFooter').textContent=`Selected: ${fmt(selectedVal)}`;
  /* Update bucket summary line */
  const selectedNums=getSelectedAccountNums();
  const buckets=getAccountBuckets(selectedNums);
  const sumEl=document.getElementById('acctBucketSummary');
  if(sumEl){
    sumEl.innerHTML=`<span style="color:${buckets.taxable.color}">\u25CF Taxable ${fmt(buckets.taxable.total)}</span> &nbsp; `+
      `<span style="color:${buckets.deferred.color}">\u25CF Tax-Deferred ${fmt(buckets.deferred.total)}</span> &nbsp; `+
      `<span style="color:${buckets.roth.color}">\u25CF Roth ${fmt(buckets.roth.total)}</span> &nbsp; `+
      `<span style="color:${buckets.hsa.color}">\u25CF HSA ${fmt(buckets.hsa.total)}</span>`;
  }
  saveSettings();
  window._scenResultsCache=''; /* invalidate scenario cache when accounts change */
}
function toggleAllAccounts(){
  const selAll=document.getElementById('acctSelAll');
  document.querySelectorAll('.acct-sel-cb').forEach(cb=>{cb.checked=selAll.checked;});
  onAcctSelChange();
}

  const iraBasis=parseFloat(document.getElementById('wdIRABasis').value||'0');
  const hasSpouse=document.getElementById('wdSpouseToggle').checked;
  const spAge=hasSpouse?parseInt(document.getElementById('wdSpAge').value,10):0;
  const spRetAge=hasSpouse?parseInt(document.getElementById('wdSpRetire').value,10):0;
  const spLifeExp=hasSpouse?parseInt(document.getElementById('wdSpLife').value,10):0;
  const spSSMonthly=hasSpouse?(parseFloat(document.getElementById('wdSpSSIncome').value)||0):0;
  const spSSStartAge=hasSpouse?parseInt(document.getElementById('wdSpSSAge').value,10):0;
  const planEndAge=hasSpouse?Math.max(lifeExp,curAge+(spLifeExp-spAge)):lifeExp;
  const glideSchedule=buildGlideSchedule(retAge,Math.max(retAge,planEndAge),glideMode,getGlideWaypoints(),curAge,getGlideInterp());
  const usingGlide=glideMode!=='fixed';
  const glideRetirementPoint=usingGlide&&glideSchedule&&glideSchedule.length?getReturnForAge(glideSchedule,retAge,rawRetPct):null;
  const retPct=usingGlide&&Number.isFinite(glideRetirementPoint?.ret)?glideRetirementPoint.ret:rawRetPct;
  const volPct=usingGlide&&Number.isFinite(glideRetirementPoint?.vol)?glideRetirementPoint.vol:rawVolPct;
  let spendingPhases=getSpendPhases();
  /* If no spending phases or all amounts are 0, auto-populate a default phase */
  if(!spendingPhases.some(p=>p.amount>0)){
    const selectedNums=getSelectedAccountNums();
    const bk=getAccountBuckets(selectedNums.size>0?selectedNums:null);
    const yearsGrow=Math.max(0,(retAge||65)-(curAge||55));
    let projTotal=bk.taxable.total+bk.deferred.total+bk.roth.total+bk.hsa.total;
    for(let y=0;y<yearsGrow;y++){
      const projAge=(curAge||55)+y;
      const projRet=usingGlide?getReturnForAge(glideSchedule,projAge,retPct).ret:(Number.isFinite(retPct)?retPct:0.07);
      projTotal*=1+(Number.isFinite(projRet)?projRet:0.07);
    }
    /* Phase amounts are today's dollars — deflate future-dollar 4% back to today */
    const defaultMonthly=Math.round(projTotal*0.04/12/Math.pow(1+(inflPct||0),yearsGrow)/100)*100;
    const container=document.getElementById('spendPhasesContainer');
    if(container) container.innerHTML='';
    addSpendPhase(retAge||65, defaultMonthly||5000);
    spendingPhases=getSpendPhases();
    saveSettings();
  }
  const hasPhases=spendingPhases.some(p=>p.amount>0);
  const filing=document.getElementById('wdFiling').value;
  const ssMonthly=parseFloat(document.getElementById('wdSSIncome').value)||0;
  const ssStartAge=parseInt(document.getElementById('wdSSAge').value,10);
  const brackets=filing==='mfj'?TAX_BRACKETS_MFJ:TAX_BRACKETS_SINGLE;

  /* ── Comprehensive input validation ── */
  const vErrs=[];
  const vFields={}; /* id → error message, for highlighting */
  function vErr(id,msg){ vErrs.push(msg); if(id) vFields[id]=msg; }

  /* Required numeric checks */
  if(!Number.isFinite(curAge)) vErr('wdAge','Current Age is required');
  if(!Number.isFinite(retAge)) vErr('wdRetire','Retirement Age is required');
  if(!Number.isFinite(lifeExp)) vErr('wdLife','Life Expectancy is required');
  if(!usingGlide&&!Number.isFinite(rawRetPct)) vErr('wdReturn','Expected Return % is required');
  if(!usingGlide&&!Number.isFinite(rawVolPct)) vErr('wdVol','Volatility % is required');
  if(!Number.isFinite(inflPct)) vErr('wdInflation','Inflation % is required');
  if(!Number.isFinite(ssStartAge)) vErr('wdSSAge','SS Starting Age is required');

  /* Range & logic checks — You */
  if(Number.isFinite(curAge)&&(curAge<20||curAge>90)) vErr('wdAge','Current Age must be 20–90');
  if(Number.isFinite(retAge)&&(retAge<25||retAge>95)) vErr('wdRetire','Retirement Age must be 25–95');
  if(Number.isFinite(lifeExp)&&(lifeExp<50||lifeExp>120)) vErr('wdLife','Life Expectancy must be 50–120');
  if(Number.isFinite(curAge)&&Number.isFinite(retAge)&&retAge<curAge) vErr('wdRetire','Retirement Age must be ≥ Current Age ('+curAge+')');
  if(Number.isFinite(retAge)&&Number.isFinite(lifeExp)&&lifeExp<retAge) vErr('wdLife','Life Expectancy must be ≥ Retirement Age ('+retAge+')');
  if(Number.isFinite(ssStartAge)&&ssMonthly>0&&Number.isFinite(lifeExp)&&ssStartAge>lifeExp) vErr('wdSSAge','SS Starting Age ('+ssStartAge+') is after Life Expectancy ('+lifeExp+')');

  /* Market assumptions */
  if(!usingGlide&&Number.isFinite(rawRetPct)&&(rawRetPct<-0.05||rawRetPct>0.25)) vErr('wdReturn','Expected Return should be -5% to 25%');
  if(!usingGlide&&Number.isFinite(rawVolPct)&&(rawVolPct<0||rawVolPct>0.60)) vErr('wdVol','Volatility should be 0–60%');
  if(Number.isFinite(inflPct)&&(inflPct<0||inflPct>0.15)) vErr('wdInflation','Inflation should be 0–15%');
  if(Number.isFinite(retPct)&&Number.isFinite(inflPct)&&retPct<=inflPct) vErr('wdReturn','Expected Return ('+((retPct*100).toFixed(1))+'%) ≤ Inflation ('+((inflPct*100).toFixed(1))+'%). Real returns will be negative');
  if(stateTaxPct<0||stateTaxPct>0.15) vErr('wdStateTax','State Tax should be 0–15%');
  if(iraBasis<0) vErr('wdIRABasis','IRA Basis cannot be negative');

  /* Roth conversion ages */
  const rothConvSel=document.getElementById('wdRothConv').value;
  if(rothConvSel!=='none'){
    const csAge=parseInt(document.getElementById('wdConvStartAge').value);
    const ceAge=parseInt(document.getElementById('wdConvEndAge').value);
    if(Number.isFinite(csAge)&&Number.isFinite(ceAge)&&csAge>ceAge) vErr('wdConvStartAge','Conv. Start Age ('+csAge+') > Conv. End Age ('+ceAge+')');
    if(Number.isFinite(csAge)&&Number.isFinite(retAge)&&csAge<retAge) vErr('wdConvStartAge','Conv. Start Age ('+csAge+') is before Retirement Age ('+retAge+')');
    if(rothConvSel==='custom'){
      const custPct=parseFloat(document.getElementById('wdCustomPct').value);
      if(!Number.isFinite(custPct)||custPct<1||custPct>37) vErr('wdCustomPct','Custom Bracket % must be 1–37');
    }
  }

  /* Spouse validation */
  if(hasSpouse){
    if(!Number.isFinite(spAge)) vErr('wdSpAge','Spouse Current Age is required');
    if(!Number.isFinite(spRetAge)) vErr('wdSpRetire','Spouse Retirement Age is required');
    if(!Number.isFinite(spLifeExp)) vErr('wdSpLife','Spouse Life Expectancy is required');
    if(!Number.isFinite(spSSStartAge)) vErr('wdSpSSAge','Spouse SS Starting Age is required');
    if(Number.isFinite(spAge)&&(spAge<20||spAge>90)) vErr('wdSpAge','Spouse Age must be 20–90');
    if(Number.isFinite(spRetAge)&&(spRetAge<25||spRetAge>95)) vErr('wdSpRetire','Spouse Retirement Age must be 25–95');
    if(Number.isFinite(spLifeExp)&&(spLifeExp<50||spLifeExp>120)) vErr('wdSpLife','Spouse Life Expectancy must be 50–120');
    if(Number.isFinite(spAge)&&Number.isFinite(spRetAge)&&spRetAge<spAge) vErr('wdSpRetire','Spouse Retirement Age must be ≥ Spouse Age ('+spAge+')');
    if(Number.isFinite(spRetAge)&&Number.isFinite(spLifeExp)&&spLifeExp<spRetAge) vErr('wdSpLife','Spouse Life Expectancy must be ≥ Spouse Retirement Age ('+spRetAge+')');
    if(Number.isFinite(spSSStartAge)&&spSSMonthly>0&&Number.isFinite(spLifeExp)&&spSSStartAge>spLifeExp) vErr('wdSpSSAge','Spouse SS Start Age ('+spSSStartAge+') is after Spouse Life Expectancy ('+spLifeExp+')');
  }

  /* Income & Savings Streams validation — only when enabled */
  const contribToggleChecked=document.getElementById('wdContribToggle')?.checked||false;
  if(contribToggleChecked){
    const contribMode=document.getElementById('wdContribMode')?.value||'flat';
    if(contribMode==='flat'){
      const csA=parseInt(document.getElementById('wdContribStartAge')?.value);
      const ceA=parseInt(document.getElementById('wdContribEndAge')?.value);
      if(Number.isFinite(csA)&&Number.isFinite(ceA)&&csA>ceA) vErr('wdContribStartAge','Income From Age ('+csA+') > To Age ('+ceA+')');
      if(Number.isFinite(csA)&&Number.isFinite(curAge)&&csA<curAge) vErr('wdContribStartAge','Income From Age ('+csA+') is before Current Age ('+curAge+')');
      const fc401k=parseFloat(document.getElementById('wdContrib401k')?.value)||0;
      const fcMatch=parseFloat(document.getElementById('wdContribMatch')?.value)||0;
      if(fc401k<0) vErr('wdContrib401k','401k contribution cannot be negative');
      if(fcMatch<0) vErr('wdContribMatch','Employer match cannot be negative');
      if(fc401k>70000) vErr('wdContrib401k','401k contribution exceeds $70,000 limit');
    }
  }

  /* Spending phase validation */
  const spPhases=getSpendPhases();
  if(spPhases.length>0){
    spPhases.forEach((p,i)=>{
      if(Number.isFinite(retAge)&&p.age<retAge) vErr(null,'Spending phase '+(i+1)+': Age '+p.age+' is before Retirement Age '+retAge);
      if(p.amount<0) vErr(null,'Spending phase '+(i+1)+': Amount cannot be negative');
    });
  }

  /* Clear previous highlights */
  document.querySelectorAll('.wd-input-error').forEach(el=>{ el.classList.remove('wd-input-error'); el.title=el.dataset.origTitle||''; });

  /* Apply error highlights */
  Object.keys(vFields).forEach(id=>{
    const el=document.getElementById(id);
    if(el){ el.dataset.origTitle=el.title||''; el.title=vFields[id]; el.classList.add('wd-input-error'); }
  });

  /* Show errors — stop on hard errors (missing/invalid), continue with warnings */
  const hardErrors=vErrs.filter(e=>!e.includes('will be negative')&&!e.includes('is before Retirement Age')&&!e.includes('is after Life Expectancy'));
  if(hardErrors.length>0){
    let errHtml=`<div class="wd-note wd-note-warn"><h3>\u26A0\uFE0F Input Validation Errors</h3><ul style="margin:8px 0 0 16px;font-size:0.9em">`;
    hardErrors.forEach(e=>errHtml+=`<li>${e}</li>`);
    errHtml+=`</ul><p style="margin-top:8px;font-size:0.82em;color:var(--text-muted)">Fix the highlighted fields and try again.</p></div>`;
    document.getElementById('wd-results').innerHTML=errHtml;
    return;
  }
  /* Warn if filing status and spouse toggle are inconsistent */
  const filingSpouseWarn=(filing==='mfj'&&!hasSpouse)||(filing==='single'&&hasSpouse);

  const buckets=getAccountBuckets(getSelectedAccountNums());
  /* SECURE 2.0: RMD age is 73 for born 1951-1959, 75 for born 1960+ */
  const birthYear=(new Date()).getFullYear()-curAge;
  const RMD_START_AGE=birthYear>=1960?75:(birthYear<=1950?72:73);
  const stdDeductionBase=filing==='mfj'?STD_DEDUCTION_MFJ:STD_DEDUCTION_SINGLE;
  const stdDeduction=stdDeductionBase; /* base (for pre-age-65 or places needing a constant) */
  const yearsToRetire=retAge-curAge;
  const yearsInRetirement=planEndAge-retAge+1; /* +1 to include final year through planEndAge */
  const rothConvStrategy=document.getElementById('wdRothConv').value;

  /* Roth conversion bracket limits (2025 bracket thresholds) */
  const CONV_LIMITS={
    none:0,
    conservative:filing==='mfj'?96950:48475,
    moderate:filing==='mfj'?206700:103350,
    aggressive:filing==='mfj'?394600:197300
  };
  /* For custom: find bracket ceiling for the user-entered marginal rate */
  if(rothConvStrategy==='custom'){
    const customPct=parseFloat(document.getElementById('wdCustomPct').value)/100;
    const bkts=filing==='mfj'?TAX_BRACKETS_MFJ:TAX_BRACKETS_SINGLE;
    /* Find the bracket whose rate is the largest rate <= customPct (fill up to that bracket) */
    let customLimit=bkts[0].limit; /* fallback: 10% bracket */
    for(const b of bkts){ if(b.rate<=customPct+0.001) customLimit=b.limit; }
    if(customLimit===Infinity) customLimit=bkts[bkts.length-2].limit;
    CONV_LIMITS.custom=customLimit;
  }
  const convBracketLimit=CONV_LIMITS[rothConvStrategy]||0;

  /* Roth conversion window: start/end ages (defaults: retirement → RMD-1) */
  const convStartAge=rothConvStrategy!=='none'?
    Math.max(retAge,parseInt(document.getElementById('wdConvStartAge').value)||retAge):retAge;
  const convEndAge=rothConvStrategy!=='none'?
    Math.min(RMD_START_AGE-1,parseInt(document.getElementById('wdConvEndAge').value)||RMD_START_AGE-1):RMD_START_AGE-1;
  const convWindowWarn=rothConvStrategy!=='none'&&convStartAge>convEndAge;

  /* Project growth to retirement — with income/savings contributions */
  const contribEnabled=document.getElementById('wdContribToggle')?.checked||false;
  const contribSchedule=contribEnabled?getContribSchedule():null; /* null if flat mode or disabled */
  const contrib401k=contribEnabled?(parseFloat(document.getElementById('wdContrib401k')?.value||'0')):0;
  const contribMatch=contribEnabled?(parseFloat(document.getElementById('wdContribMatch')?.value||'0')):0;
  const contribIRA=contribEnabled?(parseFloat(document.getElementById('wdContribIRA')?.value||'0')):0;
  const contribTaxable=contribEnabled?(parseFloat(document.getElementById('wdContribTaxable')?.value||'0')):0;
  const contribHSA=contribEnabled?(parseFloat(document.getElementById('wdContribHSA')?.value||'0')):0;
  const contribStartAge=contribEnabled?parseInt(document.getElementById('wdContribStartAge')?.value||curAge):curAge;
  const contribEndAge=contribEnabled?parseInt(document.getElementById('wdContribEndAge')?.value||retAge):retAge;
  const hasContribs=contribSchedule?(contribSchedule.some(r=>(r.c401k+r.match+r.ira+r.taxable+r.hsa)>0))
    :(contrib401k+contribMatch+contribIRA+contribTaxable+contribHSA)>0;

  /* Build age-keyed contribution lookup for year-by-year mode */
  const contribByAge={};
  if(contribSchedule){
    contribSchedule.forEach(r=>{ contribByAge[r.age]={c401k:r.c401k,match:r.match,ira:r.ira,taxable:r.taxable,hsa:r.hsa}; });
  }

  /* Helper: get contribution for a given age */
  function getContribForAge(age){
    if(contribSchedule){
      /* Year-by-year: lookup by age */
      return contribByAge[age]||{c401k:0,match:0,ira:0,taxable:0,hsa:0};
    } else {
      /* Flat mode: only apply within start/end age range */
      if(age>=contribStartAge && age<=contribEndAge){
        return {c401k:contrib401k,match:contribMatch,ira:contribIRA,taxable:contribTaxable,hsa:contribHSA};
      }
      return {c401k:0,match:0,ira:0,taxable:0,hsa:0};
    }
  }

  /* Build one-time spendings age-keyed lookup */
  const otsEnabled=document.getElementById('wdOneTimeSpendToggle')?.checked||false;
  const otsSchedule=otsEnabled?getOneTimeSpendSchedule():[];
  const curYear=new Date().getFullYear();
  const oneTimeByAge=buildOneTimeSpendByAge(otsSchedule,curAge,curYear);
  const oneTimeItemsByAge=buildOneTimeItemsByAge(otsSchedule,curAge,curYear);

  /* Validation warnings */
  const contribWarnings=[];
  if(!contribSchedule && contribEndAge>retAge && (contrib401k>0||contribMatch>0)){
    contribWarnings.push('401k/match contributions are set past retirement age — they will be treated as taxable side income for post-retirement years.');
  }
  if(contribSchedule){
    contribSchedule.forEach(r=>{
      if(r.age>=retAge && (r.c401k>0||r.match>0)){
        contribWarnings.push(`Year ${r.year} (age ${r.age}): 401k/match entered for post-retirement — will be added to taxable account as side income.`);
      }
    });
    /* Deduplicate */
    if(contribWarnings.length>2) contribWarnings.length=2;
  }

  /* Year-by-year growth with inflation-adjusted contributions (pre-retirement) */
  let bTaxableInit=buckets.taxable.total, bDeferredInit=buckets.deferred.total, bRothInit=buckets.roth.total, bHSAInit=buckets.hsa.total;
  for(let y=0;y<yearsToRetire;y++){
    const age=curAge+y;
    const inflMult=Math.pow(1+inflPct,y);
    const c=getContribForAge(age);
    const yrRet=glideSchedule?getReturnForAge(glideSchedule,age,retPct).ret:retPct;
    bTaxableInit=bTaxableInit*(1+yrRet)+c.taxable*inflMult;
    bDeferredInit=bDeferredInit*(1+yrRet)+(c.c401k+c.match)*inflMult;
    bRothInit=bRothInit*(1+yrRet)+c.ira*inflMult;
    bHSAInit=bHSAInit*(1+yrRet)+c.hsa*inflMult;
    /* Subtract one-time spendings during accumulation (from taxable first) */
    const otsAccum=oneTimeByAge[age]||0;
    if(otsAccum>0){
      const otsInflated=otsAccum*inflMult;
      const fromTax=Math.min(otsInflated,Math.max(0,bTaxableInit));
      bTaxableInit-=fromTax;
      let otsRem=otsInflated-fromTax;
      if(otsRem>0){ const fromDef=Math.min(otsRem,Math.max(0,bDeferredInit)); bDeferredInit-=fromDef; otsRem-=fromDef; }
      if(otsRem>0){ const fromRoth=Math.min(otsRem,Math.max(0,bRothInit)); bRothInit-=fromRoth; otsRem-=fromRoth; }
      if(otsRem>0){ bHSAInit=Math.max(0,bHSAInit-otsRem); }
    }
  }
  const totalAtRetire=bTaxableInit+bDeferredInit+bRothInit+bHSAInit;

   /* Base withdrawal: phase-based expense or 4% rule */
  const fallbackWithdrawal=totalAtRetire*0.04;
  /* SS annual incomes at FRA (entered as monthly in today's dollars) */
  const ssAnnualFRA=ssMonthly*12;
  const spSSAnnualFRA=spSSMonthly*12;
  /* Age offset: spouse age relative to your timeline */
  const spAgeOffset=hasSpouse?(spAge-curAge):0; /* e.g., if you're 50 and spouse 48, offset=-2 */

  /* Simulation function — runs with or without Roth conversions; optional bracket limit override */
  function runSimulation(enableConversions, overrideConvLimit){
    const simConvLimit = overrideConvLimit!=null ? overrideConvLimit : convBracketLimit;
    let bTaxable=bTaxableInit,bDeferred=bDeferredInit,bRoth=bRothInit,bHSA=bHSAInit;
    let remainingBasis=iraBasis; /* Track remaining after-tax basis in traditional IRA */
    const rows=[];
    let cumTax=0,cumConvTax=0,totalConversions=0,cumSS=0,cumSpSS=0;

  for(let yr=0;yr<yearsInRetirement;yr++){
    const age=retAge+yr;
    const spouseAge=hasSpouse?(age+spAgeOffset):0; /* spouse's current age this year */
    const stdDeduction=getStdDeduction(filing,age,spouseAge,hasSpouse,yr>0?rows[yr-1]._magi:null);
    const inflMult=Math.pow(1+inflPct,yr+yearsToRetire); /* inflate from today */
    const yrRet=glideSchedule?getReturnForAge(glideSchedule,age,retPct).ret:retPct;
    let yourSS=0;
    if(ssAnnualFRA>0&&age>=ssStartAge&&age<=lifeExp){
      yourSS=ssAnnualFRA*(SS_AGE_FACTOR[ssStartAge]||1.0)*inflMult;
    }
    /* Spouse Social Security income */
    let spouseSS=0;
    if(hasSpouse&&spSSAnnualFRA>0&&spouseAge>=spSSStartAge&&spouseAge<=spLifeExp){
      spouseSS=spSSAnnualFRA*(SS_AGE_FACTOR[spSSStartAge]||1.0)*inflMult;
    }
    const ssIncome=yourSS+spouseSS;
    cumSS+=yourSS;
    cumSpSS+=spouseSS;

    /* Post-retirement side income plus any continued Roth/HSA contributions */
    const postRetContrib=getContribForAge(age);
    const postRetIncome=(postRetContrib.c401k+postRetContrib.match+postRetContrib.taxable)*inflMult;
    const postRetRothContrib=postRetContrib.ira*inflMult;
    const postRetHSAContrib=postRetContrib.hsa*inflMult;

    /* Total spending need — phase-based or 4% rule */
    const phaseExpense=getAnnualExpenseForAge(age,spendingPhases);
    const usingPhases=hasPhases;
    /* Phase amounts are today's dollars → inflate from today; 4% rule is retirement dollars → inflate from retirement */
    const baseWithdrawal=usingPhases?phaseExpense:fallbackWithdrawal;
    let totalSpendingNeed=usingPhases?baseWithdrawal*inflMult:baseWithdrawal*Math.pow(1+inflPct,yr);

    /* Guardrails: only apply 3.5%–5.5% guardrails when using 4% rule (not user-specified expenses) */
    const curTotal=bTaxable+bDeferred+bRoth+bHSA;
    if(curTotal<=0){ /* portfolio depleted — SS and side income still provide income */
      const depOrdIncome=postRetIncome;
      const ssTaxable=ssIncome>0?calcSSTaxableAmount(ssIncome,depOrdIncome,filing):0;
      const depTaxableIncome=Math.max(0,depOrdIncome+ssTaxable-stdDeduction);
      const ssTax=(depOrdIncome+ssTaxable)>0?calcTax(depTaxableIncome,brackets):0;
      const depStateTax=stateTaxPct>0&&depTaxableIncome>0?depTaxableIncome*stateTaxPct:0;
      const depNumMedicare=(age>=65&&age<=lifeExp?1:0)+(hasSpouse&&spouseAge>=65&&spouseAge<=spLifeExp?1:0);
      const depMagi=depOrdIncome+ssTaxable;
      const depIrmaaMagi=yr>=2&&rows[yr-2]?rows[yr-2]._magi:depMagi;
      const depIrmaa=depNumMedicare>0?calcIRMAA(depIrmaaMagi,filing,depNumMedicare):0;
      const depTax=ssTax+depStateTax+depIrmaa;
      cumTax+=depTax;
      bRoth=postRetRothContrib; bHSA=postRetHSAContrib;
      rows.push({age,spouseAge,taxableW:0,deferredW:0,rothW:0,hsaW:0,ssIncome,yourSS,spouseSS,postRetIncome,totalW:ssIncome+postRetIncome,tax:depTax,afterTax:ssIncome+postRetIncome-depTax,
        bTaxable:0,bDeferred:0,bRoth:bRoth,bHSA:bHSA,bTotal:bRoth+bHSA,rmd:0,depleted:(bRoth+bHSA)<=0,rothConv:0,convTax:0,convMarginalRate:0,irmaa:depIrmaa,stateTax:depStateTax,_magi:depMagi,otsAmount:0,yrRet});
      continue;
    }
    if(!usingPhases){
      const floor=curTotal*0.035;
      const ceiling=curTotal*0.055;
      totalSpendingNeed=Math.max(floor,Math.min(ceiling,totalSpendingNeed));
    }
    /* Add one-time spendings for this age (today's dollars, inflation-adjusted) */
    const otsForAge=oneTimeByAge[age]||0;
    if(otsForAge>0) totalSpendingNeed+=otsForAge*inflMult;

    /* Portfolio withdrawal = spending need minus SS income minus post-retirement side income */
    const incomeSurplus=Math.max(0,ssIncome+postRetIncome-totalSpendingNeed);
    let targetWithdraw=Math.max(0,totalSpendingNeed-ssIncome-postRetIncome);

    /* Don't withdraw more than available */
    targetWithdraw=Math.min(targetWithdraw,curTotal);

    /* Calculate RMD if applicable */
    let rmd=0;
    if(age>=RMD_START_AGE && bDeferred>0){
      const divisor=RMD_TABLE[age]??(age>120?2.0:Math.max(2.0,120-age));
      rmd=bDeferred/divisor;
    }

    /* Tax-efficient withdrawal sequencing */
    let wTaxable=0,wDeferred=0,wRoth=0,wHSA=0;
    let remaining=targetWithdraw;

    /* HSA: preserve until age 65+ (Medicare age), then use for medical expenses.
       Before 65: no HSA withdrawals (let it grow tax-free — triple tax advantage).
       After 65: modest medical expense allocation (~5K/yr inflation-adjusted).
       HSA is also used as last-resort for any remaining need (taxed as ordinary income after 65). */
    const annualMedical=age>=65?5000*Math.pow(1+inflPct,age-curAge):0;
    if(age>=65&&bHSA>0){
      wHSA=Math.min(annualMedical,bHSA,remaining);
      remaining-=wHSA;
    }

    if(age>=RMD_START_AGE){
      /* RMD years: must take RMD first from tax-deferred */
      const rmdAmount=Math.min(rmd,bDeferred);
      wDeferred=rmdAmount;
      remaining-=wDeferred;

      /* If RMD exceeds target, that's the withdrawal from deferred */
      if(remaining>0){
        /* Then taxable (capital gains rate) */
        const fromTaxable=Math.min(remaining,bTaxable);
        wTaxable=fromTaxable;
        remaining-=fromTaxable;
      }
      if(remaining>0){
        /* Then more from deferred if needed */
        const moreDef=Math.min(remaining,bDeferred-wDeferred);
        wDeferred+=moreDef;
        remaining-=moreDef;
      }
      if(remaining>0){

        const fromRoth=Math.min(remaining,bRoth);
        wRoth=fromRoth;
        remaining-=fromRoth;

      wTaxable=fromTaxable;
      remaining-=fromTaxable;

      if(remaining>0){
        /* Fill up to 22% bracket from deferred for tax efficiency + Roth conversion opportunity */
        const bracketLimit=(filing==='mfj'?206700:103350)+stdDeduction;
        const deferredTarget=Math.min(remaining,bracketLimit,bDeferred);
        wDeferred=deferredTarget;
        remaining-=deferredTarget;
      }
      if(remaining>0){
        const fromRoth=Math.min(remaining,bRoth);
        wRoth=fromRoth;
        remaining-=fromRoth;
      }
      if(remaining>0){
        /* Last resort: more from deferred */
        const moreDef=Math.min(remaining,bDeferred-wDeferred);
        wDeferred+=moreDef;
        remaining-=moreDef;
      }
    }

    /* Last resort: drain remaining HSA beyond medical allocation (taxed as ordinary income after 65, +20% penalty before 65) */
    if(remaining>0&&bHSA>wHSA){
      const moreHSA=Math.min(remaining,bHSA-wHSA);
      wHSA+=moreHSA;
      remaining-=moreHSA;

    /* Roth conversion: fill bracket room in pre-RMD years */

      const ordinaryBeforeConv=wDeferred+postRetIncome+ssTaxableForConv+hsaNonMedForConv;
      /* IRA basis pro-rata — compute before bracket room to size conversion correctly */
      const totalIRA=bDeferred;
      const basisFraction=totalIRA>0?Math.min(1,remainingBasis/totalIRA):0;
      const bracketRoom=Math.max(0,simConvLimit+stdDeduction-ordinaryBeforeConv);
      /* Each $1 converted adds only $(1-F) taxable income, so effective room is larger */
      const effectiveRoom=basisFraction<1?bracketRoom/(1-basisFraction):Infinity;
      rothConv=Math.min(effectiveRoom,bDeferred-wDeferred);

        remainingBasis=Math.max(0,remainingBasis-rothConv*basisFraction);
        /* Compute conv tax using differential method that captures SS re-taxation */
        const ordBase=wDeferred+hsaNonMedForConv+postRetIncome;
        const ssWithout=ssIncome>0?calcSSTaxableAmount(ssIncome,ordBase+wTaxable,filing):0;
        const txWithout=calcTax(Math.max(0,ordBase+ssWithout-stdDeduction),brackets);
        const ssWithConv=ssIncome>0?calcSSTaxableAmount(ssIncome,ordBase+taxableConv+wTaxable,filing):0;

    const ordinaryIncome=wDeferred+taxableConvAmt+hsaNonMedical+postRetIncome;

    /* HSA medical withdrawals and Roth are tax-free; SS after-tax is ssIncome-ssTax portion */

  }
  html+=`<li>Cumulative estimated taxes over retirement: <strong>${fmtK(cumTax)}</strong></li>`;
  html+=`</ul></div>`;

  /* Disclaimer */
  html+=`<div class="sugg-disclaimer"><h3>\u26A0\uFE0F Important Disclaimer</h3><ul>`;
  html+=`<li>This is an <strong>educational projection tool</strong>, not personalized financial advice.</li>`;
  html+=`<li>Actual returns, inflation, tax rates, and spending needs will vary significantly.</li>`;
  html+=`<li>Does not account for: pensions, annuities, state/local taxes, estate taxes, or life changes.${hasSS?'':' Social Security not modeled (enter amount above to include).'}</li>`;
  html+=`<li><strong>Social Security simplifications:</strong> Spousal benefits (up to 50% of higher earner's FRA benefit), survivor benefits, and filing status changes (MFJ → Single) after spouse death are not modeled. SS COLA uses the entered inflation rate as a proxy.</li>`;
  html+=`<li>RMD calculations use the IRS Uniform Lifetime Table (2025). Rules may change.</li>`;
  html+=`<li><strong>Consult a qualified financial advisor and tax professional</strong> for personalized retirement planning.</li>`;
  html+=`</ul></div>`;

  /* Dynamic methodology — uses actual plan inputs and computed results */
  const methBullets=[];

  /* 1) Pre-Retirement Growth — with actual numbers */
  const preRetItems=[];
  preRetItems.push(`Starting portfolio: <strong>${fmtK(buckets.taxable.total+buckets.deferred.total+buckets.roth.total+buckets.hsa.total)}</strong> across ${buckets.taxable.accounts.length+buckets.deferred.accounts.length+buckets.roth.accounts.length+buckets.hsa.accounts.length} accounts (Taxable: ${fmtK(buckets.taxable.total)}, Deferred: ${fmtK(buckets.deferred.total)}, Roth: ${fmtK(buckets.roth.total)}, HSA: ${fmtK(buckets.hsa.total)}).`);
  if(yearsToRetire>0){
    preRetItems.push(glideSchedule
      ?`Over ${yearsToRetire} years to retirement (age ${curAge}→${retAge}), the portfolio is projected to grow to <strong>${fmtK(totalAtRetire)}</strong> using glide path returns (equity ${glideCurStart.eqPct.toFixed(0)}%→${glideRetStart.eqPct.toFixed(0)}%).`
      :`Over ${yearsToRetire} years to retirement (age ${curAge}→${retAge}), the portfolio is projected to grow to <strong>${fmtK(totalAtRetire)}</strong> at ${(retPct*100).toFixed(1)}% annual return.`);
    if(contribEnabled){
      const totalAnnualContrib=contrib401k+contribMatch+contribIRA+contribTaxable+contribHSA;
      if(totalAnnualContrib>0) preRetItems.push(`Annual contributions of ~<strong>${fmtK(totalAnnualContrib)}</strong> (401k: ${fmtK(contrib401k)}, Match: ${fmtK(contribMatch)}, IRA: ${fmtK(contribIRA)}, Taxable: ${fmtK(contribTaxable)}, HSA: ${fmtK(contribHSA)}) accelerate growth during accumulation.`);
    }
  } else {
    preRetItems.push(`Already at or past retirement age — no accumulation phase. Plan begins withdrawals immediately from <strong>${fmtK(totalAtRetire)}</strong>.`);
  }
  methBullets.push({heading:'Pre-Retirement Growth', items:preRetItems});

  /* 2) Withdrawal Strategy — explain the actual approach used */
  const wdItems=[];
  if(hasPhases){
    const phaseDesc=spendingPhases.filter(p=>p.amount>0).map((p,i,arr)=>{
      const endAge=arr[i+1]?arr[i+1].age-1:planEndAge;
      return `ages ${p.age}–${endAge}: ${fmtD(p.amount)}/mo`;
    }).join(', ');
    wdItems.push(`Using your custom spending phases: ${phaseDesc}. These are in today's dollars and grow at ${(inflPct*100).toFixed(1)}% inflation per year.`);
    const firstYearSpend=spendingPhases[0]?spendingPhases[0].amount*12:0;
    const impliedRate=totalAtRetire>0?((firstYearSpend/totalAtRetire)*100).toFixed(1):'N/A';
    wdItems.push(`First-year withdrawal of ${fmtK(firstYearSpend)} implies a <strong>${impliedRate}% initial rate</strong> on the ${fmtK(totalAtRetire)} projected portfolio.${parseFloat(impliedRate)>5?' ⚠️ This is above the commonly cited 4% safe withdrawal rate.':parseFloat(impliedRate)<3?' This is conservative — well below the 4% rule.':''}`);
  } else {
    const fourPctAmt=totalAtRetire*0.04;
    wdItems.push(`Using the <strong>4% rule</strong>: initial withdrawal of ~${fmtK(fourPctAmt)}/year (${fmtD(Math.round(fourPctAmt/12))}/month), inflation-adjusted each year.`);
    wdItems.push(`Guardrails applied: floor at 3.5% and ceiling at 5.5% of current portfolio value each year. This prevents excessive drawdown in bear markets and allows upside in bull markets.`);
  }
  methBullets.push({heading:'Withdrawal Approach', items:wdItems});

  /* 3) Tax-Efficient Withdrawal Ordering — explain WHY this order */
  const orderItems=[];
  orderItems.push(`<strong>Taxable first</strong> (${fmtK(buckets.taxable.total)} today → ~${fmtK(bTaxableInit)} at retirement): Taxable accounts generate capital gains and dividends whether you withdraw or not. Spending them first reduces ongoing tax drag. Withdrawals are taxed at favorable LTCG rates (0%/15%/20%), not ordinary income rates.`);
  orderItems.push(`<strong>Tax-deferred second</strong> (${fmtK(buckets.deferred.total)} today → ~${fmtK(bDeferredInit)} at retirement): 401k/IRA withdrawals are taxed as ordinary income. Drawing these in years with lower income (between taxable depletion and SS start) minimizes the marginal tax rate.`);
  if(bRothInit>0) orderItems.push(`<strong>Roth last</strong> (${fmtK(buckets.roth.total)} today → ~${fmtK(bRothInit)} at retirement): Roth grows tax-free and withdrawals are tax-free. Every year it stays invested, the tax-free compounding benefit grows. Roth withdrawals also don't count toward MAGI for IRMAA or SS taxation.`);
  if(bHSAInit>0) orderItems.push(`<strong>HSA preserved</strong> (${fmtK(buckets.hsa.total)} today → ~${fmtK(bHSAInit)} at retirement): Triple tax advantage — deductible contributions, tax-free growth, tax-free medical withdrawals. Used only for medical expenses or as last resort after age 65.`);
  orderItems.push(`In RMD years (age ${RMD_START_AGE}+), Required Minimum Distributions from tax-deferred accounts take priority regardless of this ordering.`);
  methBullets.push({heading:'Tax-Efficient Withdrawal Order', items:orderItems});

  /* 4) Roth Conversion Strategy — explain if enabled, with actual numbers */
  const convItems=[];
  if(rothConvStrategy!=='none'){
    const bracketNames={conservative:'12%',moderate:'22%',aggressive:'24%',custom:document.getElementById('wdCustomPct')?.value+'%'};
    const convResult=optimizerResults.find(r=>r.key===rothConvStrategy);
    convItems.push(`<strong>Strategy: ${rothConvStrategy.charAt(0).toUpperCase()+rothConvStrategy.slice(1)} (${bracketNames[rothConvStrategy]} bracket)</strong> — converting Traditional IRA/401k to Roth during ages ${convStartAge}–${convEndAge}.`);
    convItems.push(`The "golden window" rationale: Between retirement (age ${retAge}) and RMD age (${RMD_START_AGE}), your taxable income is at its lowest. Filling unused bracket space with conversions pays a known, lower tax rate now to avoid higher rates later when RMDs force larger taxable withdrawals.`);
    if(convResult){
      convItems.push(`Total conversions: <strong>${fmtK(convResult.totalConversions)}</strong> over ${convResult.convYears} years. Conversion tax paid: <strong>${fmtK(convResult.cumConvTax)}</strong>. BETR (Break-Even Tax Rate): <strong>${(convResult.betr*100).toFixed(1)}%</strong> — if your future withdrawal rate exceeds this, conversions save money.`);
      const noneResult=optimizerResults[0];
      const endDiff=convResult.afterTaxEnd-noneResult.afterTaxEnd;
      convItems.push(`After-tax ending balance: <strong>${fmtK(convResult.afterTaxEnd)}</strong> vs ${fmtK(noneResult.afterTaxEnd)} without conversions (${endDiff>=0?'+':''}${fmtK(endDiff)} difference). Ending Roth balance: <strong>${fmtK(convResult.endRoth)}</strong> — this amount passes to heirs tax-free.`);
    }
  } else {
    convItems.push(`No Roth conversions selected. Consider enabling conversions if you have a large tax-deferred balance (${fmtK(buckets.deferred.total)}) — the optimizer table above compares strategies.`);
    if(bDeferredInit>100000){
      const rmdAge73=bDeferredInit*Math.pow(1+retPct,Math.max(0,RMD_START_AGE-retAge));
      const rmdFirst=rmdAge73/(RMD_TABLE[RMD_START_AGE]||24.6);
      convItems.push(`At age ${RMD_START_AGE}, your estimated deferred balance of ~${fmtK(rmdAge73)} would produce RMDs of ~<strong>${fmtK(rmdFirst)}/year</strong>. Without conversions, these are taxed as ordinary income and may push you into higher brackets and trigger IRMAA surcharges.`);
    }
  }
  methBullets.push({heading:'Roth Conversion Reasoning', items:convItems});

  /* 5) Social Security — explain the claiming decision */
  const ssItems=[];
  if(hasSS){
    if(ssMonthly>0){
      const ssAnnual=ssMonthly*12;
      const ssFactorPct=(SS_AGE_FACTOR[ssStartAge]*100).toFixed(0);
      ssItems.push(`You: claiming at age ${ssStartAge} (${ssFactorPct}% of FRA benefit) = <strong>${fmtD(Math.round(ssMonthly))}/month</strong> (${fmtK(ssAnnual)}/year). ${ssStartAge<67?'Early claiming reduces your benefit permanently but provides income sooner.':ssStartAge===67?'Claiming at FRA gives you 100% of your earned benefit.':'Delayed claiming increases your benefit by 8%/year past FRA — maximizing lifetime income if you live past your break-even age.'}`);
    }
    if(hasSpouse&&spSSMonthly>0){
      const spFactorPct=(SS_AGE_FACTOR[spSSStartAge]*100).toFixed(0);
      ssItems.push(`Spouse: claiming at age ${spSSStartAge} (${spFactorPct}% of FRA) = <strong>${fmtD(Math.round(spSSMonthly))}/month</strong>. ${spSSStartAge!==ssStartAge?'Staggering claiming ages can provide income earlier while maximizing the higher earner\'s benefit.':''}`);
    }
    const lifetimeSS=withConv.cumSS+withConv.cumSpSS;
    ssItems.push(`Lifetime SS income: <strong>${fmtK(lifetimeSS)}</strong> (inflation-adjusted). SS reduces needed portfolio withdrawals, extending portfolio longevity.`);
  } else {
    ssItems.push(`Social Security not modeled. If eligible, even a modest benefit (e.g., $2,000/mo) provides ~${fmtK(2000*12*yearsInRetirement*0.5)} in lifetime income (inflation-adjusted) and significantly reduces portfolio drawdown.`);
  }
  methBullets.push({heading:'Social Security Strategy', items:ssItems});

  /* 6) Monte Carlo — explain what the results mean */
  const mcItems=[];
  mcItems.push(`Ran <strong>1,000 simulations</strong> with ${glideSchedule?'glide-path-adjusted':'fixed'} returns (${glideSchedule?'age-based equity blend':(retPct*100).toFixed(1)+'% mean'}) and ${(volPct*100).toFixed(0)}% volatility, sampling random annual returns from a normal distribution.`);
  if(mc){
    mcItems.push(`<strong>Success rate: ${mc.successRate.toFixed(0)}%</strong> — ${mc.successRate>=90?'your plan has a high probability of lasting through your planning horizon.':mc.successRate>=75?'reasonable probability, but consider reducing spending or increasing returns to improve safety margin.':'significant risk of portfolio depletion. Consider reducing spending, delaying retirement, or increasing savings.'}`);
    const mcMedian=percentile(mc.endingBalances,50);
    const mcP10=percentile(mc.endingBalances,10);
    const mcP90=percentile(mc.endingBalances,90);
    mcItems.push(`Median ending balance: <strong>${fmtK(mcMedian)}</strong>. 10th percentile (bad luck): ${fmtK(mcP10)}. 90th percentile (good luck): ${fmtK(mcP90)}. The gap between these shows the range of uncertainty.`);
  }
  mcItems.push(`Monte Carlo captures <em>sequence-of-returns risk</em> — the danger that poor early returns permanently impair your portfolio even if average returns are fine. This is the #1 risk in early retirement.`);
  methBullets.push({heading:'Monte Carlo Analysis', items:mcItems});

  /* 7) Historical Backtest — if available */
  if(hist.nPeriods>0){
    const histItems=[];
    histItems.push(`Replayed your plan across <strong>${hist.nPeriods} rolling ${yearsInRetirement}-year periods</strong> using actual stock, bond, and inflation data from ${HIST_RETURNS[0][0]}–${HIST_RETURNS[HIST_RETURNS.length-1][0]}.`);
    histItems.push(`Historical success rate: <strong>${hist.successRate.toFixed(0)}%</strong>. ${hist.successRate>=95?'Your plan would have survived nearly every historical period, including the Great Depression and stagflation.':hist.successRate>=80?'Most historical periods succeeded, but some stress periods (e.g., 1966-1982 stagflation) caused depletion.':'Several historical periods show depletion — consider adjusting your plan.'}`);
    if(hist.worst5&&hist.worst5[0]) histItems.push(`Worst starting year: <strong>${hist.worst5[0].startYear}</strong>. Best starting year: <strong>${hist.best?hist.best.startYear:'N/A'}</strong>. Historical backtesting shows real-world outcomes but past performance doesn't guarantee future results.`);
    methBullets.push({heading:'Historical Backtest', items:histItems});
  }

  /* 8) Key risks and limitations */
  const riskItems=[];
  riskItems.push(`<strong>Inflation risk:</strong> Using ${(inflPct*100).toFixed(1)}% assumption. If actual inflation exceeds this (as in 2022-2023), spending needs increase faster than modeled.`);
  riskItems.push(`<strong>Longevity risk:</strong> Plan runs to age ${planEndAge}. ${planEndAge>=95?'This provides a conservative buffer.':planEndAge>=90?'Consider extending to 95+ for additional safety margin.':'Consider extending your planning horizon for more safety margin.'}`);
  riskItems.push(`<strong>Tax law changes:</strong> Uses 2025 tax brackets and rules. The 2017 TCJA provisions expire after 2025 — brackets may revert to higher rates, making current Roth conversions more valuable.`);
  riskItems.push(`<strong>Healthcare costs:</strong> Not explicitly modeled beyond IRMAA. Medicare Part B/D premiums, supplemental insurance, and out-of-pocket costs can be $5K–$15K+/year per person in retirement.`);
  methBullets.push({heading:'Key Risks & Limitations', items:riskItems});

  html+=buildMethodologyPanel('Withdrawal Planning — Detailed Reasoning',methBullets);

  _wdSaveUIState();
  document.getElementById('wd-results').innerHTML=html;

  /* Move sections into their tab panels */
  (function(){
    const tabMap={
      overview:['wd-sec-metrics-charts'],
      plan:['wd-sec-wd-schedule'],
      sims:['wd-sec-mc-analysis','wd-sec-hist-backtest'],
      analysis:['wd-sec-ss-rec','wd-sec-ss-breakeven','wd-sec-roth-conv','wd-sec-irmaa','wd-sec-wd-strategy']
    };
    /* Move Suggestions button to Overview */
    const ov=document.getElementById('wd-rtab-overview');
    if(ov){
      const suggBtn=document.querySelector('.sugg-btn-wrap');
      if(suggBtn) ov.appendChild(suggBtn);
    }
    Object.keys(tabMap).forEach(tab=>{
      const panel=document.getElementById('wd-rtab-'+tab);
      if(!panel) return;
      tabMap[tab].forEach(secId=>{
        const el=document.getElementById(secId);
        if(el) panel.appendChild(el);
      });
    });
    /* Move historical context note into Sims tab */
    const simsPanel=document.getElementById('wd-rtab-sims');
    if(simsPanel){
      const histNote=document.querySelector('#wd-results > .wd-note.wd-note-info');
      if(histNote&&histNote.querySelector('h3')&&histNote.querySelector('h3').textContent.includes('Historical')) simsPanel.appendChild(histNote);
    }
  })();

  /* Render the initial table after DOM is ready */
  renderWdTable();
  /* Render interactive metric charts */
  setTimeout(()=>{
    _renderChart('wd-charts');
    _wdRestoreUIState();
    /* Cache results for tab persistence */
    setTimeout(()=>{const r=document.getElementById('wd-results');if(r)window._wdResultsCache=r.innerHTML;},100);
  },0);
  saveSettings();
  } catch(e) { document.getElementById('wd-results').innerHTML=`<div style="color:red;padding:20px;font-family:monospace"><b>Error:</b> ${esc(e.message||'')}<br><pre>${esc(e.stack||'')}</pre></div>`; }
}

/* ---- Editable Withdrawal Table with Recalculation ---- */
function renderWdTable(){
  try{
  const ctx=window._wdCtx;
  if(!ctx) return;
  const {retPct,inflPct,filing,brackets,RMD_START_AGE,hasConv,hasSSData,yearsToRetire,retAge,
    ssAnnualFRA,spSSAnnualFRA,hasSpouse,ssStartAge,spSSStartAge,spAgeOffset,lifeExp,spLifeExp,
    convBracketLimit,rothConvStrategy,spendingPhases,hasPhases,stdDeduction,convStartAge,convEndAge,
    bTaxableInit,bDeferredInit,bRothInit,bHSAInit,iraBasis,glideSchedule,oneTimeByAge}=ctx;
  const overrides=ctx.overrides;
  const fmtK=v=>v>=1e6?'$'+(v/1e6).toFixed(2)+'M':v>=1e3?'$'+(v/1e3).toFixed(0)+'K':'$'+Math.round(v);
  const fmtD=v=>'$'+v.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
  const baseRows=ctx.rows;
  const hasOverrides=Object.keys(overrides).length>0;
  const showRetCol=Array.isArray(glideSchedule)&&glideSchedule.length>0;
  const growthLabel=showRetCol?'Age-based glide path return (see Ret % column)':`${(retPct*100).toFixed(1)}% annual return`;

  /* If no overrides, use stored baseline rows directly (guaranteed correct) */
  let rRows;
  if(!hasOverrides){
    rRows=baseRows.map(r=>Object.assign({},r,{overridden:false}));
  } else {
    /* Re-simulate with overrides: use baseline withdrawal amounts for non-overridden rows,
       override amounts for overridden rows, recalculate taxes & balances from scratch */
    const totalAtRetire=bTaxableInit+bDeferredInit+bRothInit+bHSAInit;
    const fallbackWd=totalAtRetire*0.04;
    let bTaxable=bTaxableInit,bDeferred=bDeferredInit,bRoth=bRothInit,bHSA=bHSAInit;
    let remainingBasis=iraBasis||0;
    rRows=[];

  for(let i=0;i<baseRows.length;i++){
    const br=baseRows[i];
    const age=br.age;
    const spouseAge=br.spouseAge;
    const stdDeduction=getStdDeduction(filing,age,spouseAge,hasSpouse,i>0?rRows[i-1]._magi:null);
    const inflMult=Math.pow(1+inflPct,i+yearsToRetire);
    const yrRet=showRetCol?getReturnForAge(glideSchedule,age,retPct).ret:retPct;
    /* SS */
    let yourSS=0,spouseSS=0;
    if(ssAnnualFRA>0&&age>=ssStartAge&&age<=lifeExp)
      yourSS=ssAnnualFRA*(SS_AGE_FACTOR[ssStartAge]||1)*inflMult;
    if(hasSpouse&&spSSAnnualFRA>0&&spouseAge>=spSSStartAge&&spouseAge<=spLifeExp)
      spouseSS=spSSAnnualFRA*(SS_AGE_FACTOR[spSSStartAge]||1)*inflMult;
    const ssIncome=yourSS+spouseSS;

    /* Post-retirement side income plus any continued Roth/HSA contributions */
    const ovrGetContrib=ctx.getContribForAge||function(){return{c401k:0,match:0,ira:0,taxable:0,hsa:0};};
    const ovrPostRetC=ovrGetContrib(age);
    const ovrPostRetIncome=(ovrPostRetC.c401k+ovrPostRetC.match+ovrPostRetC.taxable)*inflMult;
    const ovrPostRetRothContrib=ovrPostRetC.ira*inflMult;
    const ovrPostRetHSAContrib=ovrPostRetC.hsa*inflMult;

    const curTotal=bTaxable+bDeferred+bRoth+bHSA;
    if(curTotal<=0){
      const rdOrdIncome=ovrPostRetIncome;
      const ssTaxable=ssIncome>0?calcSSTaxableAmount(ssIncome,rdOrdIncome,filing):0;
      const rdTaxableIncome=Math.max(0,rdOrdIncome+ssTaxable-stdDeduction);
      const ssTax=(rdOrdIncome+ssTaxable)>0?calcTax(rdTaxableIncome,brackets):0;
      const rdNumMed=(age>=65&&age<=lifeExp?1:0)+(hasSpouse&&spouseAge>=65&&spouseAge<=spLifeExp?1:0);
      const rdMagi=rdOrdIncome+ssTaxable;
      const rdIrmaaMagi=i>=2&&rRows[i-2]?rRows[i-2]._magi:rdMagi;
      const rdIrmaa=rdNumMed>0?calcIRMAA(rdIrmaaMagi,filing,rdNumMed):0;
      const rdStateTax=ctx.stateTaxPct>0&&rdTaxableIncome>0?rdTaxableIncome*ctx.stateTaxPct:0;
      const rdTax=ssTax+rdStateTax+rdIrmaa;
      bRoth=ovrPostRetRothContrib; bHSA=ovrPostRetHSAContrib;
      rRows.push({age,spouseAge,taxableW:0,deferredW:0,rothW:0,hsaW:0,ssIncome,yourSS,spouseSS,postRetIncome:ovrPostRetIncome,
        totalW:ssIncome+ovrPostRetIncome,tax:rdTax,afterTax:ssIncome+ovrPostRetIncome-rdTax,rothConv:0,convTax:0,convMarginalRate:0,rmd:0,irmaa:rdIrmaa,stateTax:rdStateTax,incomeTax:ssTax,capGainsTax:0,hsaPenalty:0,rmdSurplus:0,otsAmount:0,_magi:rdMagi,
        bTaxable:0,bDeferred:0,bRoth:bRoth,bHSA:bHSA,bTotal:bRoth+bHSA,depleted:(bRoth+bHSA)<=0,overridden:false,yrRet});
      continue;
    }

    /* Check for overrides */
    const ov=overrides[i];
    let wTaxable,wDeferred,wRoth,wHSA,overridden=false;
    const annualMedical=age>=65?5000*inflMult:0;
    if(ov){
      overridden=true;
      wTaxable=Math.min(ov.taxableW!=null?ov.taxableW:br.taxableW,bTaxable);
      wDeferred=Math.min(ov.deferredW!=null?ov.deferredW:br.deferredW,bDeferred);
      wRoth=Math.min(ov.rothW!=null?ov.rothW:br.rothW,bRoth);
      wHSA=Math.min(ov.hsaW!=null?ov.hsaW:br.hsaW,bHSA);
    } else {
      /* Use engine logic (simplified: recompute like original) */
      const phaseExp=getAnnualExpenseForAge(age,spendingPhases);
      const bwRecalc=hasPhases?phaseExp:fallbackWd;
      let need=hasPhases?bwRecalc*inflMult:bwRecalc*Math.pow(1+inflPct,i);
      if(!hasPhases) need=Math.max(curTotal*0.035,Math.min(curTotal*0.055,need));
      const recalcOts=oneTimeByAge?oneTimeByAge[age]:0;
      if(recalcOts>0) need+=recalcOts*inflMult;
      let target=Math.max(0,need-ssIncome-ovrPostRetIncome);
      target=Math.min(target,curTotal);
      let rmd=0;
      if(age>=RMD_START_AGE&&bDeferred>0){
        const div=RMD_TABLE[age]??(age>120?2:Math.max(2,120-age));
        rmd=bDeferred/div;
      }
      wTaxable=0;wDeferred=0;wRoth=0;wHSA=0;
      let rem=target;
      if(age>=65&&bHSA>0){ const med=Math.min(annualMedical,bHSA,rem); wHSA=med; rem-=med; }
      if(age>=RMD_START_AGE){
        wDeferred=Math.min(rmd,bDeferred); rem-=wDeferred;
        if(rem>0){ const f=Math.min(rem,bTaxable); wTaxable=f; rem-=f; }
        if(rem>0){ const m=Math.min(rem,bDeferred-wDeferred); wDeferred+=m; rem-=m; }
        if(rem>0){ const f=Math.min(rem,bRoth); wRoth=f; rem-=f; }
      } else {
        const f=Math.min(rem,bTaxable); wTaxable=f; rem-=f;
        if(rem>0){ const bl=(filing==='mfj'?206700:103350)+stdDeduction; const d=Math.min(rem,bl,bDeferred); wDeferred=d; rem-=d; }
        if(rem>0){ const f2=Math.min(rem,bRoth); wRoth=f2; rem-=f2; }
        if(rem>0){ const m=Math.min(rem,bDeferred-wDeferred); wDeferred+=m; rem-=m; }
      }
      /* Last resort: drain remaining HSA (taxed as ordinary income after 65) */
      if(rem>0&&bHSA>wHSA){ const moreHSA=Math.min(rem,bHSA-wHSA); wHSA+=moreHSA; rem-=moreHSA; }
    }

    /* Roth conversion — compute for all rows (overridden rows still get conversions) */
    let rothConv=0,convTax=0,convMarginalRate=0,taxableConvAmt=0;
    if(rothConvStrategy!=='none'&&age>=convStartAge&&age<=convEndAge&&bDeferred>wDeferred&&convBracketLimit>0){
      const hsaNonMedR=Math.max(0,wHSA-annualMedical);
      const ssTaxForConv=ssIncome>0?calcSSTaxableAmount(ssIncome,wDeferred+wTaxable+hsaNonMedR+ovrPostRetIncome,filing):0;
      const ordBefore=wDeferred+ovrPostRetIncome+ssTaxForConv+hsaNonMedR;
      /* IRA basis pro-rata — compute before bracket room to size conversion correctly */
      const totalIRA=bDeferred;
      const basisFrR=totalIRA>0?Math.min(1,remainingBasis/totalIRA):0;
      const room=Math.max(0,convBracketLimit+stdDeduction-ordBefore);
      const effectiveRoom=basisFrR<1?room/(1-basisFrR):Infinity;
      rothConv=Math.min(effectiveRoom,bDeferred-wDeferred);
      if(rothConv>0){
        const taxableConvR=rothConv*(1-basisFrR);
        taxableConvAmt=taxableConvR;
        remainingBasis=Math.max(0,remainingBasis-rothConv*basisFrR);
        /* Differential method capturing SS re-taxation */
        const ordBaseR=wDeferred+hsaNonMedR+ovrPostRetIncome;
        const ssWithoutR=ssIncome>0?calcSSTaxableAmount(ssIncome,ordBaseR+wTaxable,filing):0;
        const txWithoutR=calcTax(Math.max(0,ordBaseR+ssWithoutR-stdDeduction),brackets);
        const ssWithConvR=ssIncome>0?calcSSTaxableAmount(ssIncome,ordBaseR+taxableConvR+wTaxable,filing):0;
        const txWithConvR=calcTax(Math.max(0,ordBaseR+taxableConvR+ssWithConvR-stdDeduction),brackets);
        convTax=txWithConvR-txWithoutR;
        convMarginalRate=rothConv>0?(convTax+taxableConvR*(ctx.stateTaxPct||0))/rothConv:0;
      }
    }

    /* RMD for display */
    let rmd=0;
    if(age>=RMD_START_AGE&&bDeferred>0){
      const div=RMD_TABLE[age]??(age>120?2:Math.max(2,120-age));
      rmd=bDeferred/div;
    }

    /* Tax — non-medical HSA: +20% penalty before 65, ordinary income after 65 */
    const hsaNonMedical=Math.max(0,wHSA-annualMedical);
    const hsaPenalty=(age<65&&hsaNonMedical>0)?hsaNonMedical*0.20:0;
    const ordInc=wDeferred+taxableConvAmt+hsaNonMedical+ovrPostRetIncome;
    const agiForSS=ordInc+wTaxable;
    const ssTaxAmt=ssIncome>0?calcSSTaxableAmount(ssIncome,agiForSS,filing):0;
    const taxableInc=Math.max(0,ordInc+ssTaxAmt-stdDeduction);
    const incTax=calcTax(taxableInc,brackets);
    const recTotalOrd=ordInc+ssTaxAmt;
    const recLtcgAdj=Math.min(wTaxable,Math.max(0,recTotalOrd+wTaxable-stdDeduction));
    const capTax=calcLTCG(recLtcgAdj,taxableInc,filing);
    const totalTaxPreIR=incTax+capTax+hsaPenalty;
    const recStateTax=ctx.stateTaxPct>0?taxableInc*ctx.stateTaxPct:0;
    const recMagi=agiForSS+ssTaxAmt;
    const recIrmaaMagi=i>=2&&rRows[i-2]?rRows[i-2]._magi:recMagi;
    const recNumMed=(age>=65&&age<=lifeExp?1:0)+(hasSpouse&&spouseAge>=65&&spouseAge<=spLifeExp?1:0);
    const recIrmaa=recNumMed>0?calcIRMAA(recIrmaaMagi,filing,recNumMed):0;
    const totalTax=totalTaxPreIR+recStateTax+recIrmaa;
    const totalW=wTaxable+wDeferred+wRoth+wHSA+ssIncome+ovrPostRetIncome;
    const afterTax=totalW-totalTax;

    /* Reinvest excess RMD surplus into taxable */
    const targetW=wTaxable+wDeferred+wRoth+wHSA;
    const phaseExpR=getAnnualExpenseForAge(age,spendingPhases);
    const curTotalR=bTaxable+bDeferred+bRoth+bHSA;
    let baseNeed=hasPhases?phaseExpR*Math.pow(1+inflPct,i+yearsToRetire):((bTaxableInit+bDeferredInit+bRothInit+bHSAInit)*0.04)*Math.pow(1+inflPct,i);
    if(!hasPhases&&curTotalR>0) baseNeed=Math.max(curTotalR*0.035,Math.min(curTotalR*0.055,baseNeed));
    const reinvOts=oneTimeByAge?oneTimeByAge[age]:0;
    if(reinvOts>0) baseNeed+=reinvOts*Math.pow(1+inflPct,i+yearsToRetire);
    const baseTarget=br?Math.max(0,baseNeed-ssIncome-ovrPostRetIncome):targetW;
    const rmdSurplus=Math.max(0,targetW-Math.max(baseTarget,0));
    const incomeSurplusR=Math.max(0,ssIncome+ovrPostRetIncome-baseNeed);
    const reinvestCashR=rmdSurplus+incomeSurplusR;
    /* Tax drain: cascade across accounts */
    let txRemR=totalTax;
    const drTR=Math.min(txRemR,Math.max(0,bTaxable-wTaxable+reinvestCashR)); txRemR-=drTR;
    const drDR=Math.min(txRemR,Math.max(0,bDeferred-wDeferred-rothConv)); txRemR-=drDR;
    const drRR=Math.min(txRemR,Math.max(0,bRoth-wRoth+rothConv)); txRemR-=drRR;
    const drHR=Math.min(txRemR,Math.max(0,bHSA-wHSA));
    /* Grow + add only true surplus cash */
    bTaxable=Math.max(0,(bTaxable-wTaxable-drTR+reinvestCashR)*(1+yrRet));
    bDeferred=Math.max(0,(bDeferred-wDeferred-rothConv-drDR)*(1+yrRet));
    bRoth=Math.max(0,(bRoth-wRoth+rothConv-drRR)*(1+yrRet)+ovrPostRetRothContrib);
    bHSA=Math.max(0,(bHSA-wHSA-drHR)*(1+yrRet)+ovrPostRetHSAContrib);

    const recOtsNominal=oneTimeByAge?oneTimeByAge[age]:0;
    const recOtsInflAdj=recOtsNominal>0?recOtsNominal*Math.pow(1+inflPct,i+yearsToRetire):0;
    rRows.push({age,spouseAge,taxableW:wTaxable,deferredW:wDeferred,rothW:wRoth,hsaW:wHSA,
      ssIncome,yourSS,spouseSS,postRetIncome:ovrPostRetIncome,totalW,tax:totalTax,afterTax,rothConv,convTax,convMarginalRate,rmd,irmaa:recIrmaa,stateTax:recStateTax,incomeTax:incTax,capGainsTax:capTax,hsaPenalty,rmdSurplus,otsAmount:recOtsInflAdj,_magi:recMagi,
      bTaxable,bDeferred,bRoth,bHSA,bTotal:bTaxable+bDeferred+bRoth+bHSA,depleted:false,overridden,yrRet});

  /* Expose rendered rows for income breakdown dialog */

  t+=`<th title="Total income for the year.\n\nFormula: Taxable + Tax-Deferred + Roth + HSA + SS Income\n\nThis is your gross income before taxes. Includes all sources:\n• Portfolio withdrawals from all 4 account types\n• Social Security benefits (if applicable)\n• Does NOT include Roth conversions (those are account transfers, not income)">Total Income</th>`;
  t+=`<th style="background:var(--warning-bg);color:var(--warning-text);font-size:0.85em" title="Portfolio withdrawal rate for the year.\n\nFormula: (Taxable + Deferred + Roth + HSA withdrawals) ÷ Beginning-of-Year Balance × 100\n\nExcludes Social Security (not a portfolio withdrawal).\nSafe zone: 3–4% | Moderate: 4–5% | Aggressive: 5%+">W/D %</th>`;

  t+=`<th title="Total portfolio balance across all account types.\n\nFormula: Taxable Bal + Deferred Bal + Roth Bal + HSA Bal\n\nThis is your total remaining wealth across all retirement accounts.\nWhen this reaches $0, the portfolio is depleted.">Total Bal</th>`;
  t+=`</tr></thead><tbody>`;

  rRows.forEach((r,i)=>{
    const cls=r.depleted&&r.bTotal<=0?'depletion-row':(r.age>=RMD_START_AGE&&r.bTotal>0?'rmd-row':'');

    if(r.postRetIncome>0) _tiParts.push('Side Income: '+fmtD(Math.round(r.postRetIncome*pv)));
    const _tiTip=_tiParts.length?_tiParts.join('\n'):'No income sources';
    t+=`<td style="${ovStyle};cursor:pointer" title="${_tiTip}" onclick="_wdShowIncomeBreakdown(${i})"><strong>${fmtD(Math.round(r.totalW*pv))}</strong></td>`;
    /* W/D % = portfolio withdrawals / beginning-of-year balance (always nominal) */

  });
  /* Summary footer row — guarded for empty rRows */
  if(rRows.length>0){
  const _lastR=rRows[rRows.length-1];

  const _taxCol=_colCount-8;

function downloadWdTableCSV(){
  const tbl=document.querySelector('#wd-tbl-container .wd-tbl');
  if(!tbl){showToast('No table data to export.','error');return;}
  const rows=[...tbl.querySelectorAll('tr')];
  const csvRows=rows.map(row=>{
    const cells=[...row.querySelectorAll('th,td')];
    return cells.map(c=>{
      let text=c.innerText.replace(/\n/g,' ').trim();
      text=text.replace(/[✦📌⟳✍️↓🔒💰⚡🎯📋📈📊🧠💡🔄📉⏱️🏥]/g,'').trim();
      if(text.includes(',')||text.includes('"')) text='"'+text.replace(/"/g,'""')+'"';
      return text;
    }).join(',');
  });
  const csv=csvRows.join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='withdrawal_schedule.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Withdrawal schedule exported to CSV.','success');
}

    const nonMedP=Math.max(0,r.hsaW-medP);
    if(medP>0) h+=`<tr><td style="padding:4px">Medical (tax-free)</td><td style="padding:4px;text-align:right">${fmtD(medP)}</td></tr>`;
    if(nonMedP>0) h+=`<tr><td style="padding:4px">Non-Medical</td><td style="padding:4px;text-align:right">${fmtD(nonMedP)}</td></tr>`;
  }
  h+=`</table></div>`;

  /* Proportion of total income */
  const totalInc=r.totalW||1;
  const pctInc=(val/totalInc*100);
  h+=`<div style="margin-top:12px">`;
  h+=`<div style="font-size:0.78em;color:var(--text-muted);margin-bottom:4px">${pctInc.toFixed(1)}% of total income (${fmtD(totalInc)})</div>`;
  h+=`<div style="height:10px;border-radius:4px;background:var(--border);overflow:hidden"><div style="width:${Math.min(pctInc,100)}%;height:100%;background:${acct.color};border-radius:4px"></div></div>`;
  h+=`</div>`;

  /* Notes */
  const notes=[];
  if(acctIdx===0){
    notes.push('Withdrawal order: Taxable is used early to preserve tax-deferred growth.');
    if(r.capGainsTax>0) notes.push('Estimated capital gains tax: '+fmtD(r.capGainsTax));
  } else if(acctIdx===1){
    if(r.age>=RMD_START_AGE&&r.rmd>0){
      notes.push('📌 RMD year (age '+r.age+'): minimum distribution of '+fmtD(r.rmd)+' required.');
      if(r.deferredW>r.rmd) notes.push('Voluntary withdrawal of '+fmtD(r.deferredW-r.rmd)+' above RMD.');
    } else { notes.push('Voluntary withdrawal — RMDs begin at age '+RMD_START_AGE+'.'); }
    if(r.rothConv>0) notes.push('Roth conversion of '+fmtD(r.rothConv)+' moved to Roth (taxed at '+((r.convMarginalRate||0)*100).toFixed(1)+'%).');
  } else if(acctIdx===2){
    notes.push('Roth withdrawals are last in the withdrawal order to maximize tax-free growth.');
    if(r.rothConv>0) notes.push('Received '+fmtD(r.rothConv)+' from Roth conversion this year.');
    notes.push('No RMDs required — Roth can grow indefinitely.');
  } else if(acctIdx===3){
    if(r.hsaPenalty>0) notes.push('⚠️ Early withdrawal penalty: '+fmtD(r.hsaPenalty)+' (20% on non-medical before 65).');
    if(r.age>=65) notes.push('Age 65+: non-medical HSA withdrawals penalty-free (taxed as ordinary income).');
    notes.push('Triple tax advantage: tax-free contributions, growth, and medical withdrawals.');
  }
  if(notes.length>0){
    h+=`<div style="margin-top:12px;font-size:0.8em;color:var(--text-muted)">`;
    notes.forEach(n=>h+=`<p style="margin:4px 0">${n}</p>`);
    h+=`</div>`;
  }
  h+=`</div>`;
  const ov=document.createElement('div');
  ov.className='sugg-overlay';
  ov.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999;display:flex;align-items:center;justify-content:center';
  ov.innerHTML=`<div style="background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-lg);max-height:80vh;overflow-y:auto;position:relative">${h}<button onclick="this.closest('.sugg-overlay').remove()" style="position:absolute;top:8px;right:12px;background:none;border:none;font-size:1.4em;cursor:pointer;color:var(--text-muted);line-height:1" title="Close">✕</button></div>`;
  ov.addEventListener('click',e=>{if(e.target===ov) ov.remove();});
  document.body.appendChild(ov);
}

let _wdDebounce=null;
function wdOverride(el){
  try{
    const ctx=window._wdCtx;
    if(!ctx) return;
    /* Capture data from element immediately (before any DOM changes) */
    const row=parseInt(el.dataset.row);
    const field=el.dataset.field;
    let val=Math.max(0,parseFloat(el.value)||0);
    /* If in PV mode, convert input back to future value */
    if(window._wdUIState?.tablePV){
      const pvf=parseFloat(el.dataset.pvf)||1;
      if(pvf>0&&pvf<1) val=val/pvf;
    }
    if(!ctx.overrides[row]) ctx.overrides[row]={};
    /* Store the override; if value matches original, remove override */
    const orig=ctx.rows[row][field];
    if(Math.abs(val-Math.round(orig))<1){
      delete ctx.overrides[row][field];
      if(Object.keys(ctx.overrides[row]).length===0) delete ctx.overrides[row];
    } else {
      ctx.overrides[row][field]=val;
    }
    /* Debounce + defer DOM update to avoid blur/keydown conflict */
    clearTimeout(_wdDebounce);
    _wdDebounce=setTimeout(()=>{
      renderWdTable();
      const newInput=document.querySelector('.wd-ovr[data-row="'+row+'"][data-field="'+field+'"]');
      if(newInput){newInput.focus();newInput.select();}
    },10);
  }catch(e){console.error('wdOverride error:',e);}
}

function _isTLHTaxable(type){ return type==='Taxable Investment'||type==='Custodial (UTMA)'||(type||'').includes('Individual')||(type||'').includes('Joint'); }
const TLH_REPLACEMENT_MAP = {
  // US broad market / S&P 500
  'FXAIX':['VOO','VTI','SCHX'],'VOO':['FXAIX','IVV','SCHX'],'VTI':['FSKAX','ITOT','SCHB'],
  'IVV':['VOO','FXAIX','SCHX'],'FSKAX':['VTI','ITOT','SCHB'],'SCHX':['VOO','IVV','FXAIX'],
