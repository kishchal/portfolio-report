function computeWithdrawalPlan(){
  try {
  saveSettings();
  const curAge=parseInt(document.getElementById('wdAge').value);
  const retAge=parseInt(document.getElementById('wdRetire').value);
  const lifeExp=parseInt(document.getElementById('wdLife').value);
  const retPct=parseFloat(document.getElementById('wdReturn').value)/100;
  const volPct=parseFloat(document.getElementById('wdVol').value)/100;
  const inflPct=parseFloat(document.getElementById('wdInflation').value)/100;
  const stateTaxPct=parseFloat(document.getElementById('wdStateTax').value||'0')/100;
  const iraBasis=parseFloat(document.getElementById('wdIRABasis').value||'0');
  let spendingPhases=getSpendPhases();
  /* If no spending phases or all amounts are 0, auto-populate a default phase */
  if(!spendingPhases.some(p=>p.amount>0)){
    const selectedNums=getSelectedAccountNums();
    const bk=getAccountBuckets(selectedNums.size>0?selectedNums:null);
    const yearsGrow=Math.max(0,(retAge||65)-(curAge||55));
    const projTotal=(bk.taxable.total+bk.deferred.total+bk.roth.total+bk.hsa.total)*Math.pow(1+(retPct||0.07),yearsGrow);
    /* Phase amounts are today's dollars — deflate future-dollar 4% back to today */
    const defaultMonthly=Math.round(projTotal*0.04/12/Math.pow(1+(inflPct||0),yearsGrow)/100)*100;
    const container=document.getElementById('spendPhasesContainer');
    if(container) container.innerHTML='';
    addSpendPhase(retAge||65, defaultMonthly||5000);
    spendingPhases=getSpendPhases();
    saveSettings();
  }
  const hasPhases=spendingPhases.some(p=>p.amount>0);
  const filing=document.getElementById('wdFiling').value;
  const ssMonthly=parseFloat(document.getElementById('wdSSIncome').value)||0;
  const ssStartAge=parseInt(document.getElementById('wdSSAge').value);
  const brackets=filing==='mfj'?TAX_BRACKETS_MFJ:TAX_BRACKETS_SINGLE;

  /* Spouse parameters */
  const hasSpouse=document.getElementById('wdSpouseToggle').checked;
  const spAge=hasSpouse?parseInt(document.getElementById('wdSpAge').value):0;
  const spRetAge=hasSpouse?parseInt(document.getElementById('wdSpRetire').value):0;
  const spLifeExp=hasSpouse?parseInt(document.getElementById('wdSpLife').value):0;
  const spSSMonthly=hasSpouse?(parseFloat(document.getElementById('wdSpSSIncome').value)||0):0;
  const spSSStartAge=hasSpouse?parseInt(document.getElementById('wdSpSSAge').value):0;

  if(!Number.isFinite(curAge)||!Number.isFinite(retAge)||!Number.isFinite(lifeExp)||
     !Number.isFinite(retPct)||!Number.isFinite(inflPct)||!Number.isFinite(ssStartAge)||
     !Number.isFinite(volPct)||
     (hasSpouse&&(!Number.isFinite(spAge)||!Number.isFinite(spRetAge)||!Number.isFinite(spLifeExp)||!Number.isFinite(spSSStartAge)))){
    document.getElementById('wd-results').innerHTML=`<div class="wd-note wd-note-warn"><h3>\u26A0\uFE0F Invalid Inputs</h3><p>Please enter valid numbers for all fields.</p></div>`;
    return;
  }
  if(retAge<curAge||lifeExp<retAge){
    document.getElementById('wd-results').innerHTML=`<div class="wd-note wd-note-warn"><h3>\u26A0\uFE0F Invalid Inputs</h3><p>Retirement age must be greater than or equal to current age, and life expectancy must be greater than or equal to retirement age.</p></div>`;
    return;
  }
  if(hasSpouse&&(spRetAge<spAge||spLifeExp<spRetAge)){
    document.getElementById('wd-results').innerHTML=`<div class="wd-note wd-note-warn"><h3>\u26A0\uFE0F Invalid Spouse Inputs</h3><p>Spouse retirement age must be greater than or equal to spouse current age, and life expectancy must be greater than retirement age.</p></div>`;
    return;
  }
  /* Warn if filing status and spouse toggle are inconsistent */
  const filingSpouseWarn=(filing==='mfj'&&!hasSpouse)||(filing==='single'&&hasSpouse);

  /* Household planning horizon: earliest retirement to latest life expectancy (based on your age timeline) */
  const planEndAge=hasSpouse?Math.max(lifeExp,curAge+(spLifeExp-spAge)):lifeExp;

  const buckets=getAccountBuckets(getSelectedAccountNums());
  /* SECURE 2.0: RMD age is 73 for born 1951-1959, 75 for born 1960+ */
  const birthYear=(new Date()).getFullYear()-curAge;
  const RMD_START_AGE=birthYear>=1960?75:(birthYear<=1950?72:73);
  const stdDeductionBase=filing==='mfj'?STD_DEDUCTION_MFJ:STD_DEDUCTION_SINGLE;
  const stdDeduction=stdDeductionBase; /* base (for pre-age-65 or places needing a constant) */
  const yearsToRetire=retAge-curAge;
  const yearsInRetirement=planEndAge-retAge+1; /* +1 to include final year through planEndAge */
  const rothConvStrategy=document.getElementById('wdRothConv').value;

  /* Roth conversion bracket limits (2025 bracket thresholds) */
  const CONV_LIMITS={
    none:0,
    conservative:filing==='mfj'?96950:48475,
    moderate:filing==='mfj'?206700:103350,
    aggressive:filing==='mfj'?394600:197300
  };
  /* For custom: find bracket ceiling for the user-entered marginal rate */
  if(rothConvStrategy==='custom'){
    const customPct=parseFloat(document.getElementById('wdCustomPct').value)/100;
    const bkts=filing==='mfj'?TAX_BRACKETS_MFJ:TAX_BRACKETS_SINGLE;
    /* Find the bracket whose rate is the largest rate <= customPct (fill up to that bracket) */
    let customLimit=bkts[0].limit; /* fallback: 10% bracket */
    for(const b of bkts){ if(b.rate<=customPct+0.001) customLimit=b.limit; }
    if(customLimit===Infinity) customLimit=bkts[bkts.length-2].limit;
    CONV_LIMITS.custom=customLimit;
  }
  const convBracketLimit=CONV_LIMITS[rothConvStrategy]||0;

  /* Roth conversion window: start/end ages (defaults: retirement → RMD-1) */
  const convStartAge=rothConvStrategy!=='none'?
    Math.max(retAge,parseInt(document.getElementById('wdConvStartAge').value)||retAge):retAge;
  const convEndAge=rothConvStrategy!=='none'?
    Math.min(RMD_START_AGE-1,parseInt(document.getElementById('wdConvEndAge').value)||RMD_START_AGE-1):RMD_START_AGE-1;
  const convWindowWarn=rothConvStrategy!=='none'&&convStartAge>convEndAge;

  /* Project growth to retirement */
  const bTaxableInit=buckets.taxable.total*Math.pow(1+retPct,yearsToRetire);
  const bDeferredInit=buckets.deferred.total*Math.pow(1+retPct,yearsToRetire);
  const bRothInit=buckets.roth.total*Math.pow(1+retPct,yearsToRetire);
  const bHSAInit=buckets.hsa.total*Math.pow(1+retPct,yearsToRetire);
  const totalAtRetire=bTaxableInit+bDeferredInit+bRothInit+bHSAInit;

   /* Base withdrawal: phase-based expense or 4% rule */
  const fallbackWithdrawal=totalAtRetire*0.04;
  /* SS annual incomes at FRA (entered as monthly in today's dollars) */
  const ssAnnualFRA=ssMonthly*12;
  const spSSAnnualFRA=spSSMonthly*12;
  /* Age offset: spouse age relative to your timeline */
  const spAgeOffset=hasSpouse?(spAge-curAge):0; /* e.g., if you're 50 and spouse 48, offset=-2 */

  /* Simulation function — runs with or without Roth conversions; optional bracket limit override */
  function runSimulation(enableConversions, overrideConvLimit){
    const simConvLimit = overrideConvLimit!=null ? overrideConvLimit : convBracketLimit;
    let bTaxable=bTaxableInit,bDeferred=bDeferredInit,bRoth=bRothInit,bHSA=bHSAInit;
    let remainingBasis=iraBasis; /* Track remaining after-tax basis in traditional IRA */
    const rows=[];
    let cumTax=0,cumConvTax=0,totalConversions=0,cumSS=0,cumSpSS=0;

  for(let yr=0;yr<yearsInRetirement;yr++){
    const age=retAge+yr;
    const spouseAge=hasSpouse?(age+spAgeOffset):0; /* spouse's current age this year */
    const stdDeduction=getStdDeduction(filing,age,spouseAge,hasSpouse);
    const inflMult=Math.pow(1+inflPct,yr+yearsToRetire); /* inflate from today */
    let yourSS=0;
    if(ssAnnualFRA>0&&age>=ssStartAge&&age<=lifeExp){
      yourSS=ssAnnualFRA*(SS_AGE_FACTOR[ssStartAge]||1.0)*inflMult;
    }
    /* Spouse Social Security income */
    let spouseSS=0;
    if(hasSpouse&&spSSAnnualFRA>0&&spouseAge>=spSSStartAge&&spouseAge<=spLifeExp){
      spouseSS=spSSAnnualFRA*(SS_AGE_FACTOR[spSSStartAge]||1.0)*inflMult;
    }
    const ssIncome=yourSS+spouseSS;
    cumSS+=yourSS;
    cumSpSS+=spouseSS;
    /* Total spending need — phase-based or 4% rule */
    const phaseExpense=getAnnualExpenseForAge(age,spendingPhases);
    const usingPhases=hasPhases;
    /* Phase amounts are today's dollars → inflate from today; 4% rule is retirement dollars → inflate from retirement */
    const baseWithdrawal=usingPhases?phaseExpense:fallbackWithdrawal;
    let totalSpendingNeed=usingPhases?baseWithdrawal*inflMult:baseWithdrawal*Math.pow(1+inflPct,yr);

    /* Guardrails: only apply 3.5%–5.5% guardrails when using 4% rule (not user-specified expenses) */
    const curTotal=bTaxable+bDeferred+bRoth+bHSA;
    if(curTotal<=0){ /* portfolio depleted — SS still provides income */
      const ssTaxable=ssIncome>0?calcSSTaxableAmount(ssIncome,0,filing):0;
      const ssTax=ssTaxable>0?calcTax(Math.max(0,ssTaxable-stdDeduction),brackets):0;
      const depStateTax=stateTaxPct>0&&ssTaxable>0?Math.max(0,ssTaxable-stdDeduction)*stateTaxPct:0;
      const depNumMedicare=(age>=65&&age<=lifeExp?1:0)+(hasSpouse&&spouseAge>=65&&spouseAge<=spLifeExp?1:0);
      const depIrmaaMagi=yr>=2&&rows[yr-2]?rows[yr-2]._magi:ssTaxable;
      const depIrmaa=depNumMedicare>0?calcIRMAA(depIrmaaMagi,filing,depNumMedicare):0;
      const depTax=ssTax+depStateTax+depIrmaa;
      rows.push({age,spouseAge,taxableW:0,deferredW:0,rothW:0,hsaW:0,ssIncome,yourSS,spouseSS,totalW:ssIncome,tax:depTax,afterTax:ssIncome-depTax,
        bTaxable:0,bDeferred:0,bRoth:0,bHSA:0,bTotal:0,rmd:0,depleted:true,rothConv:0,convTax:0,convMarginalRate:0,irmaa:depIrmaa,stateTax:depStateTax,_magi:ssTaxable});
      continue;
    }
    if(!usingPhases){
      const floor=curTotal*0.035;
      const ceiling=curTotal*0.055;
      totalSpendingNeed=Math.max(floor,Math.min(ceiling,totalSpendingNeed));
    }

    /* Portfolio withdrawal = spending need minus SS income */
    let targetWithdraw=Math.max(0,totalSpendingNeed-ssIncome);

    /* Don't withdraw more than available */
    targetWithdraw=Math.min(targetWithdraw,curTotal);

    /* Calculate RMD if applicable */
    let rmd=0;
    if(age>=RMD_START_AGE && bDeferred>0){
      const divisor=RMD_TABLE[age]??(age>120?2.0:Math.max(2.0,120-age));
      rmd=bDeferred/divisor;
    }

    /* Tax-efficient withdrawal sequencing */
    let wTaxable=0,wDeferred=0,wRoth=0,wHSA=0;
    let remaining=targetWithdraw;

    /* HSA: preserve until age 65+ (Medicare age), then use for medical expenses.
       Before 65: no HSA withdrawals (let it grow tax-free — triple tax advantage).
       After 65: modest medical expense allocation (~5K/yr inflation-adjusted).
       HSA is also used as last-resort for any remaining need (taxed as ordinary income after 65). */
    const annualMedical=age>=65?5000*Math.pow(1+inflPct,age-curAge):0;
    if(age>=65&&bHSA>0){
      wHSA=Math.min(annualMedical,bHSA,remaining);
      remaining-=wHSA;
    }

    if(age>=RMD_START_AGE){
      /* RMD years: must take RMD first from tax-deferred */
      const rmdAmount=Math.min(rmd,bDeferred);
      wDeferred=rmdAmount;
      remaining-=wDeferred;

      /* If RMD exceeds target, that's the withdrawal from deferred */
      if(remaining>0){
        /* Then taxable (capital gains rate) */
        const fromTaxable=Math.min(remaining,bTaxable);
        wTaxable=fromTaxable;
        remaining-=fromTaxable;
      }
      if(remaining>0){
        /* Then more from deferred if needed */
        const moreDef=Math.min(remaining,bDeferred-wDeferred);
        wDeferred+=moreDef;
        remaining-=moreDef;
      }
      if(remaining>0){
        /* Finally Roth */
        const fromRoth=Math.min(remaining,bRoth);
        wRoth=fromRoth;
        remaining-=fromRoth;
      }
    } else {
      /* Pre-RMD: Taxable first, then deferred (fill low brackets), then Roth last */
      const fromTaxable=Math.min(remaining,bTaxable);
      wTaxable=fromTaxable;
      remaining-=fromTaxable;

      if(remaining>0){
        /* Fill up to 22% bracket from deferred for tax efficiency + Roth conversion opportunity */
        const bracketLimit=(filing==='mfj'?206700:103350)+stdDeduction;
        const deferredTarget=Math.min(remaining,bracketLimit,bDeferred);
        wDeferred=deferredTarget;
        remaining-=deferredTarget;
      }
      if(remaining>0){
        const fromRoth=Math.min(remaining,bRoth);
        wRoth=fromRoth;
        remaining-=fromRoth;
      }
      if(remaining>0){
        /* Last resort: more from deferred */
        const moreDef=Math.min(remaining,bDeferred-wDeferred);
        wDeferred+=moreDef;
        remaining-=moreDef;
      }
    }

    /* Last resort: drain remaining HSA beyond medical allocation (taxed as ordinary income after 65, +20% penalty before 65) */
    if(remaining>0&&bHSA>wHSA){
      const moreHSA=Math.min(remaining,bHSA-wHSA);
      wHSA+=moreHSA;
      remaining-=moreHSA;
    }

    /* Roth conversion: fill bracket room in pre-RMD years */
    let rothConv=0,convTax=0,convMarginalRate=0,taxableConvAmt=0;
    const hsaNonMedForConv=Math.max(0,wHSA-annualMedical);
    if(enableConversions&&age>=convStartAge&&age<=convEndAge&&bDeferred>wDeferred&&simConvLimit>0){
      const ssTaxableForConv=ssIncome>0?calcSSTaxableAmount(ssIncome,wDeferred+wTaxable+hsaNonMedForConv,filing):0;
      const ordinaryBeforeConv=wDeferred+ssTaxableForConv+hsaNonMedForConv;
      /* IRA basis pro-rata — compute before bracket room to size conversion correctly */
      const totalIRA=bDeferred;
      const basisFraction=totalIRA>0?Math.min(1,remainingBasis/totalIRA):0;
      const bracketRoom=Math.max(0,simConvLimit+stdDeduction-ordinaryBeforeConv);
      /* Each $1 converted adds only $(1-F) taxable income, so effective room is larger */
      const effectiveRoom=basisFraction<1?bracketRoom/(1-basisFraction):Infinity;
      rothConv=Math.min(effectiveRoom,bDeferred-wDeferred);
      if(rothConv>0){
        const taxableConv=rothConv*(1-basisFraction);
        taxableConvAmt=taxableConv;
        /* Reduce remaining basis proportionally */
        remainingBasis=Math.max(0,remainingBasis-rothConv*basisFraction);
        /* Compute conv tax using differential method that captures SS re-taxation */
        const ordBase=wDeferred+hsaNonMedForConv;
        const ssWithout=ssIncome>0?calcSSTaxableAmount(ssIncome,ordBase+wTaxable,filing):0;
        const txWithout=calcTax(Math.max(0,ordBase+ssWithout-stdDeduction),brackets);
        const ssWithConv=ssIncome>0?calcSSTaxableAmount(ssIncome,ordBase+taxableConv+wTaxable,filing):0;
        const txWithConv=calcTax(Math.max(0,ordBase+taxableConv+ssWithConv-stdDeduction),brackets);
        convTax=txWithConv-txWithout;
        convMarginalRate=rothConv>0?(convTax+taxableConv*stateTaxPct)/rothConv:0;
        totalConversions+=rothConv;
        cumConvTax+=convTax+taxableConv*stateTaxPct;
      }
    }

    /* Tax estimation */
    /* Non-medical HSA withdrawals: taxed as ordinary income; 20% penalty if before 65 */
    const hsaNonMedical=Math.max(0,wHSA-annualMedical);
    const hsaPenalty=(age<65&&hsaNonMedical>0)?hsaNonMedical*0.20:0;
    const ordinaryIncome=wDeferred+taxableConvAmt+hsaNonMedical;
    /* SS taxation: combined income = AGI (incl LTCG) + 50% of SS per IRS Pub 915 */
    const agiForSS=ordinaryIncome+wTaxable; /* LTCG is part of AGI */
    const ssTaxableAmt=ssIncome>0?calcSSTaxableAmount(ssIncome,agiForSS,filing):0;
    const totalOrdinaryIncome=ordinaryIncome+ssTaxableAmt;
    const taxableIncome=Math.max(0,totalOrdinaryIncome-stdDeduction);
    const incomeTax=calcTax(taxableIncome,brackets);
    const capitalGainsTax=calcLTCG(Math.min(wTaxable,Math.max(0,totalOrdinaryIncome+wTaxable-stdDeduction)),taxableIncome,filing); /* LTCG reduced by unused deduction per IRS QD&CG worksheet */
    const totalTaxPreIRMAA=incomeTax+capitalGainsTax+hsaPenalty;
    /* State tax: flat rate on taxable income (simplified — no state-specific deductions) */
    const stateTax=stateTaxPct>0?taxableIncome*stateTaxPct:0;
    /* IRMAA: Medicare surcharge based on MAGI (2-year lookback) */
    const magiForIRMAA=agiForSS+ssTaxableAmt; /* MAGI ≈ total AGI (ordinary + LTCG + taxable SS) */
    const irmaaMagi=yr>=2&&rows[yr-2]?rows[yr-2]._magi:magiForIRMAA; /* 2-year lookback */
    const numMedicare=(age>=65&&age<=lifeExp?1:0)+(hasSpouse&&spouseAge>=65&&spouseAge<=spLifeExp?1:0);
    const irmaa=numMedicare>0?calcIRMAA(irmaaMagi,filing,numMedicare):0;
    const totalTax=totalTaxPreIRMAA+stateTax+irmaa;
    /* HSA medical withdrawals and Roth are tax-free; SS after-tax is ssIncome-ssTax portion */
    const totalWithdraw=wTaxable+wDeferred+wRoth+wHSA+ssIncome;
    const afterTax=totalWithdraw-totalTax;
    cumTax+=totalTax;

    /* Reinvest excess RMD surplus into taxable account (forced distribution beyond spending need) */
    const rmdSurplus=Math.max(0,-(targetWithdraw-wTaxable-wDeferred-wRoth-wHSA));
    /* Tax drain: cascade taxes across accounts (taxable → deferred → roth → HSA) */
    let taxRemain=totalTax;
    const taxAvailT=Math.max(0,bTaxable-wTaxable+rmdSurplus);
    const drainT=Math.min(taxRemain,taxAvailT); taxRemain-=drainT;
    const taxAvailD=Math.max(0,bDeferred-wDeferred-rothConv);
    const drainD=Math.min(taxRemain,taxAvailD); taxRemain-=drainD;
    const taxAvailR=Math.max(0,bRoth-wRoth+rothConv);
    const drainR=Math.min(taxRemain,taxAvailR); taxRemain-=drainR;
    const taxAvailH=Math.max(0,bHSA-wHSA);
    const drainH=Math.min(taxRemain,taxAvailH);
    /* Update balances: subtract withdrawals + conversions + tax drain, then grow */
    bTaxable=Math.max(0,(bTaxable-wTaxable-drainT+rmdSurplus)*(1+retPct));
    bDeferred=Math.max(0,(bDeferred-wDeferred-rothConv-drainD)*(1+retPct));
    bRoth=Math.max(0,(bRoth-wRoth+rothConv-drainR)*(1+retPct)); /* conversion adds to Roth */
    bHSA=Math.max(0,(bHSA-wHSA-drainH)*(1+retPct));

    rows.push({age,spouseAge,taxableW:wTaxable,deferredW:wDeferred,rothW:wRoth,hsaW:wHSA,ssIncome,yourSS,spouseSS,
      totalW:totalWithdraw,tax:totalTax,afterTax,rothConv,convTax,convMarginalRate,rmdSurplus,irmaa,stateTax,_magi:magiForIRMAA,
      bTaxable,bDeferred,bRoth,bHSA,bTotal:bTaxable+bDeferred+bRoth+bHSA,rmd,depleted:false});
  }
  return {rows,cumTax,cumConvTax,totalConversions,cumSS,cumSpSS};
  } /* end runSimulation */

  /* Run selected strategy + all 4 standard strategies for optimizer comparison */
  const withConv=runSimulation(rothConvStrategy!=='none');

  /* Optimizer: run all standard strategies with explicit bracket limits */
  const OPTIMIZER_STRATEGIES=[
    {key:'none',label:'None',bracket:'—',limit:0},
    {key:'conservative',label:'Conservative',bracket:'12%',limit:filing==='mfj'?96950:48475},
    {key:'moderate',label:'Moderate',bracket:'22%',limit:filing==='mfj'?206700:103350},
    {key:'aggressive',label:'Aggressive',bracket:'24%',limit:filing==='mfj'?394600:197300}
  ];
  if(rothConvStrategy==='custom'&&CONV_LIMITS.custom){
    const cpLabel=document.getElementById('wdCustomPct').value+'%';
    OPTIMIZER_STRATEGIES.push({key:'custom',label:'Custom',bracket:cpLabel,limit:CONV_LIMITS.custom});
  }
  const optimizerResults=OPTIMIZER_STRATEGIES.map(s=>{
    const sim=s.limit===0?runSimulation(false):runSimulation(true,s.limit);
    const lastRow=sim.rows[sim.rows.length-1];
    const convYears=sim.rows.filter(r=>r.rothConv>0).length;
    const firstConvAge=sim.rows.find(r=>r.rothConv>0);
    const lastConvAge=[...sim.rows].reverse().find(r=>r.rothConv>0);
    /* BETR: Break-Even Tax Rate — the future withdrawal tax rate where conversion becomes neutral.
       Formula: BETR = 1 - (afterTaxEnd_conv / afterTaxEnd_none) adjusted for tax-free growth benefit.
       Simplified: if total conversions > 0, BETR ≈ cumConvTax / totalConversions (effective rate paid).
       More precise: account for time-value by comparing ending balances. */
    /* BETR: weighted avg effective marginal rate on conversions (federal + state), per Vanguard BETR approach.
       convMarginalRate per row = (fedConvTax + taxableConv×stateTaxPct) / convAmount */
    let betr=0;
    if(sim.totalConversions>0){
      betr=sim.rows.filter(r=>r.rothConv>0).reduce((sum,r)=>sum+r.convMarginalRate*r.rothConv,0)/sim.totalConversions;
    }
    return {...s,sim,cumTax:sim.cumTax,cumConvTax:sim.cumConvTax,totalConversions:sim.totalConversions,
      endRoth:lastRow.bRoth,endTotal:lastRow.bTotal,afterTaxEnd:lastRow.afterTax,
      convYears,firstConvAge:firstConvAge?firstConvAge.age:0,lastConvAge:lastConvAge?lastConvAge.age:0,
      afterTaxLifetime:sim.rows.reduce((s,r)=>s+r.afterTax,0),betr};
  });
  const noneResult=optimizerResults[0];

  const rows=withConv.rows;
  const cumTax=withConv.cumTax;
  let html='';
  if(filingSpouseWarn) html+=`<div class="wd-note wd-note-warn" style="margin-bottom:12px"><strong>\u26A0\uFE0F Filing Status Mismatch:</strong> ${filing==='mfj'&&!hasSpouse?'Filing as Married Filing Jointly but no spouse is modeled. Tax brackets and IRMAA thresholds assume MFJ.':'Filing as Single but spouse is enabled. Consider switching to Married Filing Jointly.'}</div>`;
  if(convWindowWarn) html+=`<div class="wd-note wd-note-warn" style="margin-bottom:12px"><strong>\u26A0\uFE0F Conversion Window Invalid:</strong> Conv. Start Age (${convStartAge}) exceeds End Age (${convEndAge}). No Roth conversions will occur. Adjust the conversion age range.</div>`;
  if(hasSpouse&&planEndAge>lifeExp) html+=`<div class="wd-note" style="margin-bottom:12px"><strong>ℹ️ Extended Horizon:</strong> Spouse's life expectancy extends the plan to your age ${planEndAge} (${planEndAge-lifeExp} year${planEndAge-lifeExp>1?'s':''} beyond your life expectancy). Portfolio must support the surviving spouse.</div>`;
  const fmtK=v=>v>=1e6?'$'+(v/1e6).toFixed(2)+'M':v>=1e3?'$'+(v/1e3).toFixed(0)+'K':'$'+Math.round(v);

  const depleteAge=rows.find(r=>r.depleted&&r.ssIncome<=0); /* truly depleted = no portfolio AND no SS */

  const yr1=rows[0];

  /* Summary cards */
  html+=`<div class="wd-cards">`;

  /* Roth Conversion Optimizer — side-by-side comparison of all strategies */
  if(bDeferredInit>0){

    optimizerResults.forEach(r=>{

    /* Recommendation callout */

    /* Find best BETR among all strategies with conversions */

    const bestBETR=bestBETRStrategy?bestBETRStrategy.betr:0;
    html+=`<div style="margin:12px 0;padding:14px 18px;border-radius:8px;border-left:4px solid #2563eb;background:#eff6ff">`;

    if(bestBETR>0){

      if(favorable){
        html+=`<span style="color:#059669;font-weight:600">✅ Conversions appear beneficial</span> — your future rate (${(estRetireRate*100).toFixed(1)}%) exceeds BETR (${(bestBETR*100).toFixed(1)}%).`;
      } else {
        html+=`<span style="color:#b45309;font-weight:600">⚠️ Conversions may not be optimal</span> — BETR (${(bestBETR*100).toFixed(1)}%) ≥ your estimated future rate (${(estRetireRate*100).toFixed(1)}%).`;

    html+=`</div>`;
    html+=`</div>`;
  }
  if(hasSS){
    /* Helper to build SS age comparison table */
    function buildSSTable(label,fraMonthly,personAge,personLifeExp,color){
      const ages=[62,67,70];
      const scenarios=ages.map(a=>{
        const factor=SS_AGE_FACTOR[a]||1;
        const monthly=fraMonthly*factor;

      });
      const best=scenarios.reduce((a,b)=>b.lifetime>a.lifetime?b:a);

      scenarios.forEach(s=>{
        const isBest=s.age===best.age;

        h+=`<td>${(s.factor*100).toFixed(0)}%</td><td>${s.yearsCollecting}</td><td>${fmtK(s.lifetime)}</td>`;
        h+=`<td>${isBest?'\u2B50 Recommended':''}</td></tr>`;
      });
      h+=`</tbody></table></div>`;

      else if(best.age===67) h+=`<div style="font-size:0.75em;color:var(--text-muted);margin-top:4px"><strong>Recommendation: Claim at FRA (67)</strong> — balances benefit size with collection years.</div>`;

  if(rows.some(r=>r.rothConv>0)) wdChartSeries.push({key:'rothConv',label:'Roth Conversions',color:'#7c3aed',type:'bar'});
  html+=buildMetricCharts(rows,inflPct,retAge,yearsToRetire,'wd-charts',wdChartSeries);

  /* ---- Monte Carlo Simulation ---- */
  const mcParams={nSims:1000,yearsInRetirement,yearsToRetire,retAge,retPct,inflPct,vol:volPct,filing,
    bTaxableInit,bDeferredInit,bRothInit,bHSAInit,totalAtRetire,

  const mc=runMonteCarlo(mcParams);

  /* Year-by-year table with editable overrides */
  /* Store simulation context for recalculation */
  window._wdCtx={rows:JSON.parse(JSON.stringify(rows)),retPct,inflPct,filing,brackets,
    RMD_START_AGE,stdDeduction:stdDeductionBase,stdDeductionBase,hasConv:rows.some(r=>r.rothConv>0),hasSSData:rows.some(r=>r.ssIncome>0),
    yearsToRetire,retAge,ssMonthly,spSSMonthly,hasSpouse,
    ssStartAge,spSSStartAge:hasSpouse?spSSStartAge:0,
    ssAnnualFRA,spSSAnnualFRA:hasSpouse?spSSAnnualFRA:0,
    spAgeOffset:hasSpouse?spAgeOffset:0,lifeExp,spLifeExp:hasSpouse?spLifeExp:0,
    overrides:{}, /* {rowIdx: {taxableW, deferredW, rothW, hsaW}} */
    convBracketLimit,rothConvStrategy,spendingPhases,hasPhases,planEndAge,CONV_LIMITS,convStartAge,convEndAge,
    bTaxableInit,bDeferredInit,bRothInit,bHSAInit,noneCumTax:noneResult.cumTax,stateTaxPct,iraBasis};

  /* "See Suggestions" button — above withdrawal table */
  html+=`<div class="sugg-btn-wrap" style="text-align:center;margin:18px 0 8px"><button onclick="showWithdrawalSuggestions()" style="padding:10px 28px;font-size:1em;font-weight:600;border:2px solid #7c3aed;background:linear-gradient(135deg,#7c3aed 0%,#6d28d9 100%);color:white;border-radius:8px;cursor:pointer;transition:all 0.2s;box-shadow:0 2px 8px rgba(124,58,237,0.25)"
  onmouseover="this.style.transform='translateY(-1px)';this.style.boxShadow='0 4px 16px rgba(124,58,237,0.35)'"
  onmouseout="this.style.transform='';this.style.boxShadow='0 2px 8px rgba(124,58,237,0.25)'"
  >\u{1F4A1} See Spending Suggestions</button></div>`;

  html+=`<div class="wd-section"><div class="wd-h2">\u{1F4CB} Year-by-Year Withdrawal Schedule <span style="font-size:0.6em;font-weight:400;color:var(--text-muted)">— click withdrawal cells to override</span></div>`;
  html+=`<div id="wd-tbl-container">`;
  html+=`</div>`;
  /* Render initial table */
  const hasConv=rows.some(r=>r.rothConv>0);
  html+=`<div style="font-size:0.75em;color:var(--text-muted);margin-top:6px">\u{1F4CC} = RMD required year &nbsp; * = includes Required Minimum Distribution &nbsp; Blue rows = RMD years &nbsp; Red rows = portfolio depleted${hasConv?' &nbsp; Green border = Roth conversion year':''} &nbsp; <span style="color:#7c3aed">Purple (PV) = present value in today's dollars (discounted at ${inflPct*100}% inflation)</span> &nbsp; <span style="color:#b45309">\u{270F}\uFE0F Orange = user override (edit to recalculate)</span></div>`;
  html+=`</div>`;

  html+=`<div class="wd-section"><div class="wd-h2">\u{1F3B2} Monte Carlo Analysis <span style="font-size:0.65em;font-weight:400;color:var(--text-muted)">(${mc.nSims} simulations)</span></div>`;
  html+=`<p class="wd-desc">Each simulation randomizes annual market returns using a log-normal distribution (mean ${retPct*100}%, volatility ${volPct*100}%). This shows the range of possible outcomes rather than a single deterministic projection.</p>`;

  /* MC Summary cards */
  const mcEndSorted=[...mc.endingBalances].sort((a,b)=>a-b);
  function pctile(arr,p){ const n=arr.length; if(!n) return 0; const idx=(n-1)*p; const lo=Math.floor(idx); const hi=Math.ceil(idx); return lo===hi?arr[lo]:arr[lo]*(hi-idx)+arr[hi]*(idx-lo); }
  const mcMedian=pctile(mcEndSorted,0.5);
  const mc10=pctile(mcEndSorted,0.1);
  const mc90=pctile(mcEndSorted,0.9);
  const successColor=mc.successRate>=90?'#059669':mc.successRate>=75?'#d97706':'#dc2626';
  const successLabel=mc.successRate>=90?'Excellent':mc.successRate>=75?'Good':mc.successRate>=50?'Moderate':'At Risk';

  /* Present value discount factor: discount future values to today's dollars */
  const pvFactor=1/Math.pow(1+inflPct,planEndAge-curAge);
  const pvMedian=mcMedian*pvFactor, pv10=mc10*pvFactor, pv90=mc90*pvFactor;

  html+=`<div class="wd-cards">`;
  /* Success rate with ring */
  html+=`<div class="wd-card" style="border-top:3px solid ${successColor}"><div class="wd-card-label">Success Rate</div>`;
  html+=`<div style="display:flex;align-items:center;justify-content:center;gap:12px">`;
  const circumf=2*Math.PI*34;
  const dashOffset=circumf*(1-mc.successRate/100);
  html+=`<div class="mc-success-ring"><svg width="80" height="80"><circle cx="40" cy="40" r="34" fill="none" stroke="#e5e7eb" stroke-width="7"/><circle cx="40" cy="40" r="34" fill="none" stroke="${successColor}" stroke-width="7" stroke-dasharray="${circumf}" stroke-dashoffset="${dashOffset}" stroke-linecap="round"/></svg><div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.1em;font-weight:700;color:${successColor}">${mc.successRate.toFixed(0)}%</div></div>`;
  html+=`</div><div class="wd-card-sub">${successLabel} — portfolio lasts in ${mc.successRate.toFixed(0)}% of scenarios</div></div>`;
  html+=`<div class="wd-card wd-card-blue"><div class="wd-card-label">Median Ending Balance</div><div class="wd-card-value">${fmtK(mcMedian)}</div><div style="color:#7c3aed;font-size:0.85em;font-weight:600">PV: ${fmtK(pvMedian)}</div><div class="wd-card-sub">50th percentile at age ${planEndAge}</div></div>`;
  html+=`<div class="wd-card wd-card-amber"><div class="wd-card-label">Pessimistic (10th pctl)</div><div class="wd-card-value">${fmtK(mc10)}</div><div style="color:#7c3aed;font-size:0.85em;font-weight:600">PV: ${fmtK(pv10)}</div><div class="wd-card-sub">Bad luck scenario</div></div>`;
  html+=`<div class="wd-card wd-card-green"><div class="wd-card-label">Optimistic (90th pctl)</div><div class="wd-card-value">${fmtK(mc90)}</div><div style="color:#7c3aed;font-size:0.85em;font-weight:600">PV: ${fmtK(pv90)}</div><div class="wd-card-sub">Good luck scenario</div></div>`;
  html+=`</div>`;

  html+=`<div style="margin:16px 0"><div style="font-weight:600;font-size:0.88em;margin-bottom:8px">Portfolio Balance Percentile Bands</div>`;
  const svgW=1400,svgH=200,padL=60,padR=20,padT=10,padB=30;
  const plotW=svgW-padL-padR,plotH=svgH-padT-padB;
  /* Find max value across all percentile bands */
  const allBandVals=mc.bands.flat();
  const mcMaxVal=Math.max(...allBandVals,totalAtRetire);
  const xScale=yr=>padL+(yr/Math.max(yearsInRetirement-1,1))*plotW;
  const yScale=v=>padT+plotH-(v/Math.max(mcMaxVal,1))*plotH;

  html+=`<svg viewBox="0 0 ${svgW} ${svgH}" class="mc-fan" preserveAspectRatio="xMidYMid meet">`;
  /* Grid lines */

  html+=`</svg>`;
  html+=`<div style="display:flex;gap:16px;font-size:0.75em;color:var(--text-muted);margin-top:4px">`;
  html+=`<span><span style="display:inline-block;width:24px;height:3px;background:#3b82f6;vertical-align:middle;border-radius:2px;opacity:0.25;margin-right:4px"></span>10th–90th percentile</span>`;
  html+=`<span><span style="display:inline-block;width:24px;height:3px;background:#3b82f6;vertical-align:middle;border-radius:2px;opacity:0.5;margin-right:4px"></span>25th–75th percentile</span>`;
  html+=`<span><span style="display:inline-block;width:24px;height:3px;background:#2563eb;vertical-align:middle;border-radius:2px;margin-right:4px"></span>Median (50th)</span>`;
  html+=`<span><span style="display:inline-block;width:24px;height:3px;background:#f59e0b;vertical-align:middle;border-radius:2px;border-top:1px dashed #f59e0b;margin-right:4px"></span>Deterministic (${retPct*100}% fixed)</span>`;
  html+=`</div></div>`;

  /* Outcome distribution histogram */
  html+=`<div style="margin:16px 0"><div style="font-weight:600;font-size:0.88em;margin-bottom:8px">Ending Balance Distribution</div>`;
  const nBins=20;
  const minEnd=Math.min(...mc.endingBalances);

  const binWidth=(maxEnd-minEnd)/nBins||1;
  const bins=Array(nBins).fill(0);
  mc.endingBalances.forEach(v=>{
    const b=Math.min(Math.floor((v-minEnd)/binWidth),nBins-1);

  const maxBin=Math.max(...bins);
  html+=`<div class="mc-hist-wrap">`;
  bins.forEach((count,i)=>{
    const h=maxBin>0?(count/maxBin*100):0;

  });
  html+=`</div>`;
  html+=`<div style="display:flex;justify-content:space-between;font-size:0.7em;color:var(--text-muted)"><span>${fmtK(minEnd)}</span><span>Ending Portfolio Balance</span><span>${fmtK(maxEnd)}</span></div>`;
  html+=`</div>`;

  /* MC interpretation */
  html+=`<div class="wd-note wd-note-info"><h3>\u{1F4CA} How to Read These Results</h3><ul>`;
  html+=`<li><strong>Success rate of ${mc.successRate.toFixed(0)}%</strong> means your portfolio lasted through age ${planEndAge} in ${mc.successRate.toFixed(0)} out of every 100 simulated market scenarios.</li>`;
  html+=`<li><strong>The fan chart</strong> shows the range of portfolio balances. The darker inner band (25th–75th percentile) is where your balance lands in half the scenarios. The lighter outer band covers 80% of scenarios.</li>`;
  html+=`<li><strong>The dashed orange line</strong> is the deterministic projection (fixed ${retPct*100}% annual return every year). It assumes no market variability and may diverge from the median (P50) when sequence-of-returns risk is significant.</li>`;
  html+=`<li><strong>The ending balance histogram</strong> shows how much money you'd have left at age ${planEndAge} across all ${mc.nSims} simulations. Each bar represents a range of ending balances — taller bars mean more simulations landed there. <span style="color:#ef4444">Red bars</span> indicate simulations where you ran out of money. Unlike the year-by-year table (which assumes one fixed return), this reveals <em>sequence-of-returns risk</em> — even with the same average return, bad markets early in retirement can deplete your portfolio far sooner than the deterministic projection suggests.</li>`;
  if(mc.successRate<75) html+=`<li style="color:#dc2626"><strong>\u26A0\uFE0F Consider:</strong> A success rate below 75% suggests risk of running out of money. Consider: lower withdrawal rate, delaying retirement, increasing savings, or adding Social Security income.</li>`;
  else if(mc.successRate<90) html+=`<li><strong>\u{1F4A1} Tip:</strong> A success rate of 75–90% is reasonable but has room for improvement. Consider slightly lower spending, adding SS income, or a more conservative withdrawal rate.</li>`;
  html+=`<li><strong>Assumptions:</strong> Returns follow a log-normal distribution (mean ${retPct*100}%, volatility ${volPct*100}%). Inflation, tax brackets, and withdrawal logic are identical to the deterministic model. ${mc.nSims} independent simulations.</li>`;
  html+=`</ul></div>`;
  html+=`</div>`;

  /* Strategy notes */
  html+=`<div class="wd-section"><div class="wd-h2">\u{1F4A1} Withdrawal Strategy Explained</div>`;

  html+=`<div class="wd-note wd-note-info"><h3>\u{1F3AF} Withdrawal Order</h3><ul>`;
  html+=`<li><strong>Ages ${retAge}–${Math.min(RMD_START_AGE-1,lifeExp)}${retAge<RMD_START_AGE?' (Pre-RMD)':''}:</strong> Withdraw from <strong>Taxable accounts first</strong> (capital gains taxed at 15% vs up to 37% ordinary income). Then fill lower tax brackets with Tax-Deferred withdrawals. Roth preserved for last — grows tax-free.</li>`;

  html+=`<li><strong>Roth IRA:</strong> Withdrawn last — no RMDs, tax-free growth, excellent for legacy/estate planning.</li>`;
  if(hasSS){
    let ssNote=`<li><strong>Social Security:</strong> `;
    if(ssMonthly>0) ssNote+=`You: age ${ssStartAge} (${(SS_AGE_FACTOR[ssStartAge]*100).toFixed(0)}% of FRA). `;
    if(hasSpouse&&spSSMonthly>0) ssNote+=`Spouse: age ${spSSStartAge} (${(SS_AGE_FACTOR[spSSStartAge]*100).toFixed(0)}% of FRA). `;
    ssNote+=`Combined SS income reduces portfolio withdrawals each year, extending portfolio longevity. Up to 85% of SS may be taxable.</li>`;

  html+=`</ul></div>`;

  /* Roth conversion window */
  if(retAge<RMD_START_AGE){

    const bracketName=bracketNames[rothConvStrategy]||'';
    html+=`<div class="wd-note wd-note-tip"><h3>\u{2728} Roth Conversion Strategy${rothConvStrategy!=='none'?' — Active':' — Opportunity Window'} (Ages ${convStartAge}–${convEndAge})</h3><ul>`;
    html+=`<li>The years between retirement and RMD age (${RMD_START_AGE}) are a <strong>golden window for Roth conversions</strong>. Your conversion window: ages ${convStartAge}–${convEndAge}.</li>`;
    if(convRows.length>0){
      html+=`<li><strong>Your plan converts ${fmtK(withConv.totalConversions)} over ${convRows.length} years</strong> (ages ${convRows[0].age}–${convRows[convRows.length-1].age}), filling up to the <strong>${bracketName} bracket</strong>.</li>`;
      html+=`<li>Conversion tax paid: <strong>${fmtK(withConv.cumConvTax)}</strong> now, but saves <strong>${fmtK(Math.max(0,noneResult.cumTax-withConv.cumTax))}</strong> in lifetime taxes.</li>`;
      html+=`<li>Average annual conversion: <strong>${fmtK(withConv.totalConversions/convRows.length)}</strong> &middot; Year 1 conversion: <strong>${fmtK(convRows[0].rothConv)}</strong></li>`;
    } else {
      html+=`<li>Convert Tax-Deferred funds to Roth while in lower tax brackets — pay taxes now at lower rates to avoid higher RMDs later.</li>`;
      html+=`<li>Strategy: Convert enough each year to fill up to the <strong>${filing==='mfj'?'22%':'22%'} bracket (${fmtD(CONV_LIMITS.moderate)} ${filing==='mfj'?'MFJ':'Single'})</strong> without spilling into the next bracket.</li>`;
    }
    html+=`<li>Each conversion has a <strong>5-year holding period</strong> before penalty-free withdrawal (if under 59½).</li>`;
    html+=`<li>Conversions reduce future RMDs, lower Medicare IRMAA surcharges, and create more tax-free income in later years.</li>`;
    html+=`</ul></div>`;
  }

  /* IRMAA Impact Section */
  const irmaaRows=rows.filter(r=>r.irmaa>0);
  if(irmaaRows.length>0){
    const lifetimeIRMAA=irmaaRows.reduce((s,r)=>s+r.irmaa,0);
    const firstIrmaaAge=irmaaRows[0].age;
    const maxIrmaa=Math.max(...irmaaRows.map(r=>r.irmaa));
    html+=`<div class="wd-section"><div class="wd-h2">\u{1FA7A} Medicare IRMAA Impact</div>`;
    html+=`<div class="roth-opt-rec" style="border-left-color:#d97706;background:#fffbeb">`;
    html+=`<strong>\u26A0\uFE0F IRMAA surcharges detected:</strong> ${irmaaRows.length} years trigger Medicare premium surcharges, `;
    html+=`totaling <strong>${fmtK(lifetimeIRMAA)}</strong> in additional healthcare costs over retirement. `;
    html+=`First triggered at age ${firstIrmaaAge}. Peak annual surcharge: <strong>${fmtD(Math.round(maxIrmaa))}</strong>.`;
    html+=`</div>`;
    /* IRMAA bracket table */
    const irmaaBrackets=filing==='mfj'?IRMAA_BRACKETS_MFJ:IRMAA_BRACKETS_SINGLE;
    html+=`<div style="overflow-x:auto;margin:12px 0"><table class="roth-opt-table"><thead><tr>`;
    html+=`<th>MAGI Threshold (${filing==='mfj'?'MFJ':'Single'})</th><th>Part B/mo</th><th>Part D/mo</th><th>Annual / Person</th><th>Your Years in Bracket</th></tr></thead><tbody>`;
    for(let bi=0;bi<irmaaBrackets.length;bi++){
      const b=irmaaBrackets[bi];
      const prevLimit=bi>0?irmaaBrackets[bi-1].magi:0;
      const yrsInBracket=rows.filter(r=>{
        const m=r._magi||0;
        return r.irmaa>0&&m>prevLimit&&m<=b.magi;
      }).length;
      const rangeLabel=b.magi===Infinity?'> '+fmtD(irmaaBrackets[bi-1].magi):(bi===0?'≤ '+fmtD(b.magi):fmtD(prevLimit+1)+' – '+fmtD(b.magi));
      const rowCls=yrsInBracket>0?'style="background:#fef3c7;font-weight:600"':'';
      html+=`<tr ${rowCls}><td>${rangeLabel}</td><td>${b.partB>0?'$'+b.partB.toFixed(2):'$0'}</td>`;
      html+=`<td>${b.partD>0?'$'+b.partD.toFixed(2):'$0'}</td>`;
      html+=`<td>${fmtD(Math.round((b.partB+b.partD)*12))}</td>`;
      html+=`<td>${yrsInBracket>0?yrsInBracket+' yr'+(yrsInBracket>1?'s':''):'—'}</td></tr>`;
    }
    html+=`</tbody></table></div>`;
    /* Roth conversion interaction */
    const convIrmaaRows=rows.filter(r=>r.irmaa>0&&r.rothConv>0);
    if(convIrmaaRows.length>0){
      const convIrmaaTotal=convIrmaaRows.reduce((s,r)=>s+r.irmaa,0);
      html+=`<div class="roth-opt-rec" style="border-left-color:#ef4444;background:#fef2f2">`;
      html+=`<strong>\u{1F6A8} Roth conversion × IRMAA interaction:</strong> ${convIrmaaRows.length} years have both Roth conversions AND IRMAA surcharges. `;
      html+=`Conversions increase MAGI, which can push you into higher IRMAA brackets. `;
      html+=`Consider smaller annual conversions to stay below IRMAA thresholds.`;
      html+=`</div>`;
    }
    html+=`</div>`;
  }

  /* Tax efficiency notes */
  html+=`<div class="wd-note wd-note-warn"><h3>\u{1F4B0} Tax Efficiency Notes</h3><ul>`;
  html+=`<li><strong>Taxable account withdrawals</strong> are taxed at long-term capital gains rates (assumed 15%) — much lower than ordinary income rates on Tax-Deferred withdrawals.</li>`;
  html+=`<li><strong>Tax-Deferred withdrawals</strong> (401k, Traditional IRA, Rollover IRA) are taxed as ordinary income — ${filing==='mfj'?'10% to 37% (MFJ)':'10% to 37% (Single)'}.</li>`;
  html+=`<li><strong>Roth withdrawals</strong> are completely tax-free (contributions + growth) — no impact on tax brackets or Medicare premiums.</li>`;
  html+=`<li><strong>HSA medical withdrawals</strong> are tax-free for qualified medical expenses. Non-medical withdrawals before age 65 incur a <strong>20% penalty</strong> plus ordinary income tax. After 65, non-medical withdrawals are penalty-free but taxed as ordinary income.</li>`;
  const stdDedAge65=getStdDeduction(filing,65,hasSpouse?65:0,hasSpouse);
  html+=`<li><strong>Standard deduction:</strong> Base 2025 deduction: <strong>${fmtD(stdDeductionBase)}</strong> (${filing==='mfj'?'MFJ':'Single'}). At age 65+, increases to <strong>${fmtD(stdDedAge65)}</strong> (additional ${fmtD((filing==='mfj'?EXTRA_STD_DED_MFJ:EXTRA_STD_DED_SINGLE)+OBBBA_SENIOR_DED)} per person 65+, incl. OBBBA §101 $${OBBBA_SENIOR_DED.toLocaleString()}). The Est. Tax column adjusts by age.</li>`;
  html+=`<li><strong>How Est. Tax is calculated:</strong> <em>Ordinary income</em> (tax-deferred + Roth conversions + non-medical HSA) plus <em>taxable SS</em> (IRS Pub 915), minus the standard deduction, taxed at 2025 federal brackets. Plus 15% LTCG on taxable account withdrawals. Plus 20% HSA penalty if applicable. Taxable withdrawals (LTCG) are also included in AGI for determining how much Social Security is taxable.</li>`;
  html+=`<li><strong>Social Security taxation:</strong> Up to 85% of SS benefits may be taxable depending on "combined income" (AGI + 50% of SS). ${filing==='mfj'?'MFJ: 0% taxable below $32K, 50% at $32K–$44K, 85% above $44K':'Single: 0% taxable below $25K, 50% at $25K–$34K, 85% above $34K'}. SS income also affects Roth conversion bracket room.</li>`;
  html+=`<li><strong>Medicare IRMAA:</strong> High income in retirement triggers Medicare Part B + Part D premium surcharges (IRMAA). The Est. Tax column includes IRMAA costs (marked with ⚕). IRMAA uses a <strong>2-year lookback</strong> on MAGI — a large Roth conversion at age 64 triggers surcharges at age 66. Roth withdrawals do NOT count toward MAGI, making them IRMAA-invisible.</li>`;
  html+=`</ul></div>`;

  /* Assumptions */
  const curTotal=buckets.taxable.total+buckets.deferred.total+buckets.roth.total+buckets.hsa.total;
  html+=`<div class="wd-note"><h3>\u{1F4DD} Assumptions & Methodology</h3><ul>`;
  html+=`<li><strong>Current portfolio:</strong> ${fmtK(curTotal)} → projected to <strong>${fmtK(totalAtRetire)}</strong> at retirement (${retPct*100}% annual return over ${yearsToRetire} years)</li>`;
  if(hasSpouse) html+=`<li><strong>Planning horizon:</strong> Your age ${retAge}–${planEndAge} (${yearsInRetirement} years). Spouse age ${spAge+(retAge-curAge)}–${spAge+(planEndAge-curAge)}. Plan extends to the longer-surviving spouse.</li>`;
  if(hasPhases){
    html+=`<li><strong>Spending phases:</strong> `;
    spendingPhases.filter(p=>p.amount>0).forEach((p,i,arr)=>{
      const nextAge=arr[i+1]?arr[i+1].age-1:'end';
      html+=`Ages ${p.age}–${nextAge}: ${fmtD(p.amount)}/mo (${fmtD(p.amount*12)}/yr)`;
      if(i<arr.length-1) html+=` → `;
    });
    html+=` (today's dollars, inflation-adjusted at ${inflPct*100}%/yr). No guardrails applied — fixed expense targets.</li>`;
  } else {
    html+=`<li><strong>Withdrawal rate:</strong> 4% initial (inflation-adjusted), with guardrails: floor 3.5%, ceiling 5.5% of current portfolio</li>`;
  }

  html+=`<li><strong>Tax brackets:</strong> 2025 federal ${filing==='mfj'?'Married Filing Jointly':'Single'} with base deduction ${fmtD(stdDeductionBase)} + age 65+ add-on (not inflation-adjusted in projection)</li>`;
  html+=`<li><strong>RMD start age:</strong> ${RMD_START_AGE} (SECURE 2.0: ${birthYear>=1960?'born 1960+ → age 75':'born before 1960 → age 73'})</li>`;
  html+=`<li><strong>Taxable account:</strong> Tiered LTCG rates: 0% up to ${filing==='mfj'?'$96,700':'$48,350'}, 15% up to ${filing==='mfj'?'$600,050':'$533,400'}, 20% above (stacked on ordinary income)</li>`;
  html+=`<li><strong>HSA pre-65 penalty:</strong> Non-medical HSA withdrawals before age 65 incur 20% penalty + ordinary income tax</li>`;
  html+=`<li><strong>Excess RMD:</strong> When RMD exceeds spending needs, surplus is reinvested in taxable brokerage account</li>`;
  html+=`<li><strong>No additional contributions</strong> assumed after current date</li>`;
  html+=`<li><strong>Medicare IRMAA:</strong> 2025 surcharge brackets applied per Medicare-eligible person (age 65+). Uses 2-year MAGI lookback (first 2 retirement years use projected current-year MAGI as fallback). Brackets are not inflation-adjusted in projection.</li>`;
  if(hasSS){
    let ssAssump=`<li><strong>Social Security:</strong> `;
    if(ssMonthly>0) ssAssump+=`You: ${fmtD(Math.round(ssMonthly))}/mo @ age ${ssStartAge} (${(SS_AGE_FACTOR[ssStartAge]*100).toFixed(0)}% FRA). `;
    if(hasSpouse&&spSSMonthly>0) ssAssump+=`Spouse: ${fmtD(Math.round(spSSMonthly))}/mo @ age ${spSSStartAge} (${(SS_AGE_FACTOR[spSSStartAge]*100).toFixed(0)}% FRA). `;
    const lifetimeSS=withConv.cumSS+withConv.cumSpSS;

    const customLimitLabel=rothConvStrategy==='custom'?document.getElementById('wdCustomPct').value+'% ('+fmtD(convBracketLimit)+')':'';
    const bracketNames={conservative:'12% ('+fmtD(CONV_LIMITS.conservative)+')',moderate:'22% ('+fmtD(CONV_LIMITS.moderate)+')',aggressive:'24% ('+fmtD(CONV_LIMITS.aggressive)+')',custom:customLimitLabel};
    html+=`<li><strong>Roth conversions:</strong> Filling to top of ${bracketNames[rothConvStrategy]} bracket ages ${convStartAge}–${convEndAge}. Conversion tax included in Est. Tax column. Bracket-room is single-pass (SS tax torpedo interaction not iterated).</li>`;
  }
  html+=`<li>Cumulative estimated taxes over retirement: <strong>${fmtK(cumTax)}</strong></li>`;
  html+=`</ul></div>`;

  /* Disclaimer */
  html+=`<div class="sugg-disclaimer"><h3>\u26A0\uFE0F Important Disclaimer</h3><ul>`;
  html+=`<li>This is an <strong>educational projection tool</strong>, not personalized financial advice.</li>`;
  html+=`<li>Actual returns, inflation, tax rates, and spending needs will vary significantly.</li>`;
  html+=`<li>Does not account for: pensions, annuities, state/local taxes, estate taxes, or life changes.${hasSS?'':' Social Security not modeled (enter amount above to include).'}</li>`;
  html+=`<li><strong>Social Security simplifications:</strong> Spousal benefits (up to 50% of higher earner's FRA benefit), survivor benefits, and filing status changes (MFJ → Single) after spouse death are not modeled. SS COLA uses the entered inflation rate as a proxy.</li>`;
  html+=`<li>RMD calculations use the IRS Uniform Lifetime Table (2025). Rules may change.</li>`;
  html+=`<li><strong>Consult a qualified financial advisor and tax professional</strong> for personalized retirement planning.</li>`;
  html+=`</ul></div>`;

  document.getElementById('wd-results').innerHTML=html;
  /* Render the initial table after DOM is ready */
  renderWdTable();
  /* Render interactive metric charts */
  setTimeout(()=>{
    _renderChart('wd-charts');
    /* Cache results for tab persistence */
    setTimeout(()=>{const r=document.getElementById('wd-results');if(r)window._wdResultsCache=r.innerHTML;},100);
  },0);
  saveSettings();
  } catch(e) { document.getElementById('wd-results').innerHTML=`<div style="color:red;padding:20px;font-family:monospace"><b>Error:</b> ${esc(e.message||'')}<br><pre>${esc(e.stack||'')}</pre></div>`; }
}

/* ---- Editable Withdrawal Table with Recalculation ---- */
function renderWdTable(){
  try{
  const ctx=window._wdCtx;
  if(!ctx) return;
  const {retPct,inflPct,filing,brackets,RMD_START_AGE,hasConv,hasSSData,yearsToRetire,retAge,
    ssAnnualFRA,spSSAnnualFRA,hasSpouse,ssStartAge,spSSStartAge,spAgeOffset,lifeExp,spLifeExp,
    convBracketLimit,rothConvStrategy,spendingPhases,hasPhases,stdDeduction,convStartAge,convEndAge,
    bTaxableInit,bDeferredInit,bRothInit,bHSAInit,iraBasis}=ctx;
  const overrides=ctx.overrides;
  const fmtK=v=>v>=1e6?'$'+(v/1e6).toFixed(2)+'M':v>=1e3?'$'+(v/1e3).toFixed(0)+'K':'$'+Math.round(v);
  const fmtD=v=>'$'+v.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
  const baseRows=ctx.rows;
  const hasOverrides=Object.keys(overrides).length>0;

  /* If no overrides, use stored baseline rows directly (guaranteed correct) */
  let rRows;
  if(!hasOverrides){
    rRows=baseRows.map(r=>Object.assign({},r,{overridden:false}));
  } else {
    /* Re-simulate with overrides: use baseline withdrawal amounts for non-overridden rows,
       override amounts for overridden rows, recalculate taxes & balances from scratch */
    const totalAtRetire=bTaxableInit+bDeferredInit+bRothInit+bHSAInit;
    const fallbackWd=totalAtRetire*0.04;
    let bTaxable=bTaxableInit,bDeferred=bDeferredInit,bRoth=bRothInit,bHSA=bHSAInit;
    let remainingBasis=iraBasis||0;
    rRows=[];

  for(let i=0;i<baseRows.length;i++){
    const br=baseRows[i];
    const age=br.age;
    const spouseAge=br.spouseAge;
    const stdDeduction=getStdDeduction(filing,age,spouseAge,hasSpouse);
    const inflMult=Math.pow(1+inflPct,i+yearsToRetire);
    /* SS */
    let yourSS=0,spouseSS=0;
    if(ssAnnualFRA>0&&age>=ssStartAge&&age<=lifeExp)
      yourSS=ssAnnualFRA*(SS_AGE_FACTOR[ssStartAge]||1)*inflMult;
    if(hasSpouse&&spSSAnnualFRA>0&&spouseAge>=spSSStartAge&&spouseAge<=spLifeExp)
      spouseSS=spSSAnnualFRA*(SS_AGE_FACTOR[spSSStartAge]||1)*inflMult;
    const ssIncome=yourSS+spouseSS;

    const curTotal=bTaxable+bDeferred+bRoth+bHSA;
    if(curTotal<=0){
      const ssTaxable=ssIncome>0?calcSSTaxableAmount(ssIncome,0,filing):0;
      const ssTax=ssTaxable>0?calcTax(Math.max(0,ssTaxable-stdDeduction),brackets):0;
      const rdNumMed=(age>=65&&age<=lifeExp?1:0)+(hasSpouse&&spouseAge>=65&&spouseAge<=spLifeExp?1:0);
      const rdIrmaaMagi=i>=2&&rRows[i-2]?rRows[i-2]._magi:ssTaxable;
      const rdIrmaa=rdNumMed>0?calcIRMAA(rdIrmaaMagi,filing,rdNumMed):0;
      const rdStateTax=ctx.stateTaxPct>0&&ssTaxable>0?Math.max(0,ssTaxable-stdDeduction)*ctx.stateTaxPct:0;
      const rdTax=ssTax+rdStateTax+rdIrmaa;
      rRows.push({age,spouseAge,taxableW:0,deferredW:0,rothW:0,hsaW:0,ssIncome,yourSS,spouseSS,
        totalW:ssIncome,tax:rdTax,afterTax:ssIncome-rdTax,rothConv:0,convTax:0,rmd:0,irmaa:rdIrmaa,stateTax:rdStateTax,_magi:ssTaxable,
        bTaxable:0,bDeferred:0,bRoth:0,bHSA:0,bTotal:0,depleted:true,overridden:false});
      continue;
    }

    /* Check for overrides */
    const ov=overrides[i];
    let wTaxable,wDeferred,wRoth,wHSA,overridden=false;
    const annualMedical=age>=65?5000*inflMult:0;
    if(ov){
      overridden=true;
      wTaxable=Math.min(ov.taxableW!=null?ov.taxableW:br.taxableW,bTaxable);
      wDeferred=Math.min(ov.deferredW!=null?ov.deferredW:br.deferredW,bDeferred);
      wRoth=Math.min(ov.rothW!=null?ov.rothW:br.rothW,bRoth);
      wHSA=Math.min(ov.hsaW!=null?ov.hsaW:br.hsaW,bHSA);
    } else {
      /* Use engine logic (simplified: recompute like original) */
      const phaseExp=getAnnualExpenseForAge(age,spendingPhases);
      const bwRecalc=hasPhases?phaseExp:fallbackWd;
      let need=hasPhases?bwRecalc*inflMult:bwRecalc*Math.pow(1+inflPct,i);
      if(!hasPhases) need=Math.max(curTotal*0.035,Math.min(curTotal*0.055,need));
      let target=Math.max(0,need-ssIncome);
      target=Math.min(target,curTotal);
      let rmd=0;
      if(age>=RMD_START_AGE&&bDeferred>0){
        const div=RMD_TABLE[age]??(age>120?2:Math.max(2,120-age));
        rmd=bDeferred/div;
      }
      wTaxable=0;wDeferred=0;wRoth=0;wHSA=0;
      let rem=target;
      if(age>=65&&bHSA>0){ const med=Math.min(annualMedical,bHSA,rem); wHSA=med; rem-=med; }
      if(age>=RMD_START_AGE){
        wDeferred=Math.min(rmd,bDeferred); rem-=wDeferred;
        if(rem>0){ const f=Math.min(rem,bTaxable); wTaxable=f; rem-=f; }
        if(rem>0){ const m=Math.min(rem,bDeferred-wDeferred); wDeferred+=m; rem-=m; }
        if(rem>0){ const f=Math.min(rem,bRoth); wRoth=f; rem-=f; }
      } else {
        const f=Math.min(rem,bTaxable); wTaxable=f; rem-=f;
        if(rem>0){ const bl=(filing==='mfj'?206700:103350)+stdDeduction; const d=Math.min(rem,bl,bDeferred); wDeferred=d; rem-=d; }
        if(rem>0){ const f2=Math.min(rem,bRoth); wRoth=f2; rem-=f2; }
        if(rem>0){ const m=Math.min(rem,bDeferred-wDeferred); wDeferred+=m; rem-=m; }
      }
      /* Last resort: drain remaining HSA (taxed as ordinary income after 65) */
      if(rem>0&&bHSA>wHSA){ const moreHSA=Math.min(rem,bHSA-wHSA); wHSA+=moreHSA; rem-=moreHSA; }
    }

    /* Roth conversion — compute for all rows (overridden rows still get conversions) */
    let rothConv=0,convTax=0,convMarginalRate=0,taxableConvAmt=0;
    if(rothConvStrategy!=='none'&&age>=convStartAge&&age<=convEndAge&&bDeferred>wDeferred&&convBracketLimit>0){
      const hsaNonMedR=Math.max(0,wHSA-annualMedical);
      const ssTaxForConv=ssIncome>0?calcSSTaxableAmount(ssIncome,wDeferred+wTaxable+hsaNonMedR,filing):0;
      const ordBefore=wDeferred+ssTaxForConv+hsaNonMedR;
      /* IRA basis pro-rata — compute before bracket room to size conversion correctly */
      const totalIRA=bDeferred;
      const basisFrR=totalIRA>0?Math.min(1,remainingBasis/totalIRA):0;
      const room=Math.max(0,convBracketLimit+stdDeduction-ordBefore);
      const effectiveRoom=basisFrR<1?room/(1-basisFrR):Infinity;
      rothConv=Math.min(effectiveRoom,bDeferred-wDeferred);
      if(rothConv>0){
        const taxableConvR=rothConv*(1-basisFrR);
        taxableConvAmt=taxableConvR;
        remainingBasis=Math.max(0,remainingBasis-rothConv*basisFrR);
        /* Differential method capturing SS re-taxation */
        const ordBaseR=wDeferred+hsaNonMedR;
        const ssWithoutR=ssIncome>0?calcSSTaxableAmount(ssIncome,ordBaseR+wTaxable,filing):0;
        const txWithoutR=calcTax(Math.max(0,ordBaseR+ssWithoutR-stdDeduction),brackets);
        const ssWithConvR=ssIncome>0?calcSSTaxableAmount(ssIncome,ordBaseR+taxableConvR+wTaxable,filing):0;
        const txWithConvR=calcTax(Math.max(0,ordBaseR+taxableConvR+ssWithConvR-stdDeduction),brackets);
        convTax=txWithConvR-txWithoutR;
        convMarginalRate=rothConv>0?(convTax+taxableConvR*(ctx.stateTaxPct||0))/rothConv:0;
      }
    }

    /* RMD for display */
    let rmd=0;
    if(age>=RMD_START_AGE&&bDeferred>0){
      const div=RMD_TABLE[age]??(age>120?2:Math.max(2,120-age));
      rmd=bDeferred/div;
    }

    /* Tax — non-medical HSA: +20% penalty before 65, ordinary income after 65 */
    const hsaNonMedical=Math.max(0,wHSA-annualMedical);
    const hsaPenalty=(age<65&&hsaNonMedical>0)?hsaNonMedical*0.20:0;
    const ordInc=wDeferred+taxableConvAmt+hsaNonMedical;
    const agiForSS=ordInc+wTaxable;
    const ssTaxAmt=ssIncome>0?calcSSTaxableAmount(ssIncome,agiForSS,filing):0;
    const taxableInc=Math.max(0,ordInc+ssTaxAmt-stdDeduction);
    const incTax=calcTax(taxableInc,brackets);
    const recTotalOrd=ordInc+ssTaxAmt;
    const recLtcgAdj=Math.min(wTaxable,Math.max(0,recTotalOrd+wTaxable-stdDeduction));
    const capTax=calcLTCG(recLtcgAdj,taxableInc,filing);
    const totalTaxPreIR=incTax+capTax+hsaPenalty;
    const recStateTax=ctx.stateTaxPct>0?taxableInc*ctx.stateTaxPct:0;
    const recMagi=agiForSS+ssTaxAmt;
    const recIrmaaMagi=i>=2&&rRows[i-2]?rRows[i-2]._magi:recMagi;
    const recNumMed=(age>=65&&age<=lifeExp?1:0)+(hasSpouse&&spouseAge>=65&&spouseAge<=spLifeExp?1:0);
    const recIrmaa=recNumMed>0?calcIRMAA(recIrmaaMagi,filing,recNumMed):0;
    const totalTax=totalTaxPreIR+recStateTax+recIrmaa;
    const totalW=wTaxable+wDeferred+wRoth+wHSA+ssIncome;
    const afterTax=totalW-totalTax;

    /* Reinvest excess RMD surplus into taxable */
    const targetW=wTaxable+wDeferred+wRoth+wHSA;
    const phaseExpR=getAnnualExpenseForAge(age,spendingPhases);
    const baseTarget=br?Math.max(0,(hasPhases?phaseExpR*Math.pow(1+inflPct,i+yearsToRetire):((bTaxableInit+bDeferredInit+bRothInit+bHSAInit)*0.04)*Math.pow(1+inflPct,i))-ssIncome):targetW;
    const rmdSurplus=Math.max(0,targetW-Math.max(baseTarget,0));
    /* Tax drain: cascade across accounts */
    let txRemR=totalTax;
    const drTR=Math.min(txRemR,Math.max(0,bTaxable-wTaxable+rmdSurplus)); txRemR-=drTR;
    const drDR=Math.min(txRemR,Math.max(0,bDeferred-wDeferred-rothConv)); txRemR-=drDR;
    const drRR=Math.min(txRemR,Math.max(0,bRoth-wRoth+rothConv)); txRemR-=drRR;
    const drHR=Math.min(txRemR,Math.max(0,bHSA-wHSA));
    /* Grow */
    bTaxable=Math.max(0,(bTaxable-wTaxable-drTR+rmdSurplus)*(1+retPct));
    bDeferred=Math.max(0,(bDeferred-wDeferred-rothConv-drDR)*(1+retPct));
    bRoth=Math.max(0,(bRoth-wRoth+rothConv-drRR)*(1+retPct));
    bHSA=Math.max(0,(bHSA-wHSA-drHR)*(1+retPct));

    rRows.push({age,spouseAge,taxableW:wTaxable,deferredW:wDeferred,rothW:wRoth,hsaW:wHSA,
      ssIncome,yourSS,spouseSS,totalW,tax:totalTax,afterTax,rothConv,convTax,convMarginalRate,rmd,irmaa:recIrmaa,_magi:recMagi,
      bTaxable,bDeferred,bRoth,bHSA,bTotal:bTaxable+bDeferred+bRoth+bHSA,depleted:false,overridden});
  }
  } /* end hasOverrides else */

  /* Build table HTML */
  let t=`<div class="wd-tbl-wrap"><table class="wd-tbl"><thead><tr>`;
  t+=`<th title="Your age in each retirement year.\n\nYears before retirement age show pre-retirement (SS-only income).\nHighlighted rows indicate RMD years (age ${RMD_START_AGE}+).">Age</th>`;
  if(ctx.hasSpouse) t+=`<th title="Spouse's age in each retirement year.\n\nDerived from your age and spouse's current age.">Sp. Age</th>`;
  t+=`<th title="Withdrawal from taxable brokerage accounts.\n\nFormula: min(remaining spending need, available taxable balance)\nTax treatment: Long-term capital gains rate (15%)\nWithdrawal order: Used before tax-deferred (pre-RMD) to preserve lower tax brackets.\n\nTaxable withdrawals are included in AGI for Social Security taxation.">Taxable</th>`;
  t+=`<th title="Withdrawal from tax-deferred accounts (401k, Traditional IRA, DCP).\n\nFormula:\n• Before age ${RMD_START_AGE}: min(remaining need, available balance) — voluntary\n• Age ${RMD_START_AGE}+: max(RMD, spending need from deferred)\n• RMD = Deferred Balance ÷ IRS Uniform Lifetime Table divisor\n\nTax treatment: Taxed as ordinary income (2025 federal brackets)\nWithdrawal order: After taxable (pre-RMD); mandatory first during RMD years.">Tax-Deferred</th>`;
  if(hasConv){ const cl=ctx.CONV_LIMITS||{}; t+=`<th style="background:#ecfdf5;color:#065f46" title="Roth conversion — amount moved from Tax-Deferred to Roth.\n\nFormula: min(bracket room, available deferred balance)\nBracket room = conversion bracket ceiling − (ordinary income + SS taxable − standard deduction)\nConversion bracket ceiling (${ctx.filing==='mfj'?'MFJ':'Single'}):\n  Aggressive=${cl.aggressive?fmtD(cl.aggressive):'N/A'}\n  Moderate=${cl.moderate?fmtD(cl.moderate):'N/A'}\n  Conservative=${cl.conservative?fmtD(cl.conservative):'N/A'}\n\nTax: Taxed as ordinary income in the conversion year.\nBenefit: Grows tax-free in Roth; reduces future RMDs.\nConversion window: ages ${ctx.convStartAge||ctx.retAge}–${ctx.convEndAge||RMD_START_AGE-1}.">Roth Conv</th>`; t+=`<th style="background:#ecfdf5;color:#065f46;font-size:0.85em" title="Effective marginal tax rate on Roth conversions (federal + state).\n\nFormula: (Federal tax on conversion income + State tax) / Conversion amount\n\nThis is the actual rate paid on conversions — compare to your expected future withdrawal rate.\nIf your future rate > this rate, the conversion saves money (per Vanguard BETR research).">Conv %</th>`; }
  t+=`<th title="Withdrawal from Roth accounts — completely tax-free.\n\nFormula: min(remaining spending need after other sources, available Roth balance)\nTax treatment: $0 tax — both contributions and earnings are tax-free.\nWithdrawal order: Used last to maximize tax-free growth.\n\n✦ Tax-free withdrawal — not included in AGI or ordinary income.">Roth <span style="cursor:help;font-size:0.75em;color:#059669">✦</span></th>`;
  t+=`<th title="Withdrawal from Health Savings Account (HSA).\n\nFormula:\n• Age 65+: up to $5,000/yr (inflation-adjusted) for medical expenses — tax-free\n• Remaining need: additional HSA used as last resort\n\nTax treatment:\n• Medical expenses: Tax-free (no income tax, no penalty)\n• Non-medical, age 65+: Taxed as ordinary income (no penalty)\n• Non-medical, before 65: Taxed as ordinary income + 20% penalty\n\n✦ Medical portion is tax-free — not included in ordinary income.">HSA <span style="cursor:help;font-size:0.75em;color:#059669">✦</span></th>`;
  if(hasSSData) t+=`<th style="background:#eef2ff;color:#3730a3" title="Social Security income (inflation-adjusted).\n\nFormula: Monthly benefit × 12 × age factor × inflation adjustment\n• Age factor: 70% at 62, scaling to 124% at 70 (relative to FRA at 67)\n• Inflation: benefit × (1 + inflation%)^(years from start)\n\nSS Taxation (IRS Pub 915):\n• Combined Income = AGI + 50% of SS benefit\n• Combined < $32K (MFJ): 0% of SS taxable\n• $32K–$44K: up to 50% taxable\n• > $44K: up to 85% taxable\n\nThe taxable portion is added to ordinary income before applying tax brackets.">SS Income</th>`;
  t+=`<th title="Total income for the year.\n\nFormula: Taxable + Tax-Deferred + Roth + HSA + SS Income\n\nThis is your gross income before taxes. Includes all sources:\n• Portfolio withdrawals from all 4 account types\n• Social Security benefits (if applicable)\n• Does NOT include Roth conversions (those are account transfers, not income)">Total Income</th>`;
  t+=`<th style="background:#fef3c7;color:#92400e;font-size:0.85em" title="Portfolio withdrawal rate for the year.\n\nFormula: (Taxable + Deferred + Roth + HSA withdrawals) ÷ Beginning-of-Year Balance × 100\n\nExcludes Social Security (not a portfolio withdrawal).\nSafe zone: 3–4% | Moderate: 4–5% | Aggressive: 5%+">W/D %</th>`;
  t+=`<th title="Estimated federal tax calculation:\n\n1. Ordinary Income = Tax-Deferred withdrawal + Roth conversions + non-medical HSA\n2. AGI = Ordinary Income + Taxable (LTCG)\n3. SS Taxable = IRS Pub 915 formula using AGI + 50% of SS\n4. Taxable Income = Ordinary Income + SS Taxable − Standard Deduction ($${ctx.stdDeduction?ctx.stdDeduction.toLocaleString():(filing==='mfj'?'31,500':'15,750')})\n5. Income Tax = 2025 federal brackets on Taxable Income\n6. Capital Gains Tax = Taxable withdrawal × 15%\n7. HSA Penalty = 20% on non-medical HSA withdrawals before age 65\n8. IRMAA = Medicare Part B+D surcharge if MAGI exceeds thresholds (age 65+, per person, 2-year lookback)\n\nEst. Tax = Income Tax + Capital Gains Tax + HSA Penalty + IRMAA">Est. Tax</th>`;
  t+=`<th title="After-tax income = Total Income − Est. Tax\n\nThis is your actual spendable income after all federal taxes.\n• Roth withdrawals: included in full (tax-free)\n• HSA medical: included in full (tax-free)\n• Tax-Deferred: reduced by ordinary income tax\n• Taxable: reduced by 15% LTCG\n• SS Income: partially taxed per Pub 915 rules">After-Tax</th>`;
  t+=`<th style="background:#f5f3ff;color:#6d28d9" title="After-tax income in today's purchasing power.\n\nFormula: After-Tax ÷ (1 + inflation%)^years\n\nDiscounts future dollars to present value using your inflation rate (${(inflPct*100).toFixed(1)}%).\nHelps you compare future income to today's spending power.\nA declining PV means your real purchasing power is eroding.">After-Tax (PV)</th>`;
  t+=`<th title="Remaining balance in taxable brokerage accounts.\n\nFormula: (Previous Balance − Withdrawal + RMD Surplus) × (1 + return%)\n\n• RMD Surplus: If forced RMD exceeds spending need, the excess is reinvested here\n• Growth rate: ${(retPct*100).toFixed(1)}% annual return\n• Withdrawals are taxed at 15% LTCG rate">Taxable Bal</th>`;
  t+=`<th title="Remaining balance in tax-deferred accounts (401k, IRA, DCP).\n\nFormula: (Previous Balance − Withdrawal − Roth Conversions) × (1 + return%)\n\n• Reduced by both withdrawals AND Roth conversions\n• RMDs are mandatory at age ${RMD_START_AGE}+ (IRS Uniform Lifetime Table)\n• Growth rate: ${(retPct*100).toFixed(1)}% annual return\n• All withdrawals taxed as ordinary income">Deferred Bal</th>`;
  t+=`<th title="Remaining balance in Roth accounts.\n\nFormula: (Previous Balance − Withdrawal + Roth Conversions) × (1 + return%)\n\n• Increased by Roth conversions from tax-deferred\n• Growth rate: ${(retPct*100).toFixed(1)}% annual return\n• All growth and withdrawals are tax-free\n• No RMDs required — can grow indefinitely">Roth Bal</th>`;
  t+=`<th title="Remaining balance in HSA.\n\nFormula: (Previous Balance − Withdrawal) × (1 + return%)\n\n• Growth rate: ${(retPct*100).toFixed(1)}% annual return\n• Triple tax advantage: tax-free contributions, growth, and medical withdrawals\n• After 65: non-medical withdrawals penalty-free (taxed as ordinary income)\n• Before 65: non-medical withdrawals incur 20% penalty + income tax">HSA Bal</th>`;
  t+=`<th title="Total portfolio balance across all account types.\n\nFormula: Taxable Bal + Deferred Bal + Roth Bal + HSA Bal\n\nThis is your total remaining wealth across all retirement accounts.\nWhen this reaches $0, the portfolio is depleted.">Total Bal</th>`;
  t+=`<th style="background:#f5f3ff;color:#6d28d9" title="Total portfolio balance in today's purchasing power.\n\nFormula: Total Bal ÷ (1 + inflation%)^years\n\nShows what your future portfolio balance is worth in today's dollars.\nUseful for understanding if your wealth is truly growing or just keeping pace with inflation.">Total Bal (PV)</th>`;
  t+=`</tr></thead><tbody>`;

  rRows.forEach((r,i)=>{
    const cls=r.depleted&&r.bTotal<=0?'depletion-row':(r.age>=RMD_START_AGE&&r.bTotal>0?'rmd-row':'');
    const convBorder=r.rothConv>0?'border-left:3px solid #10b981;':'';
    const pvFactor=1/Math.pow(1+inflPct,i+yearsToRetire);
    const ovBg=r.overridden?'background:#fffbeb;':'';
    const ovStyle=r.overridden?'color:#b45309;font-weight:700':'';
    /* Editable input helper */
    const mkInput=(field,val)=>`<input type="number" class="wd-ovr" data-row="${i}" data-field="${field}" value="${Math.round(val)}" style="width:90px;padding:2px 4px;border:1px solid ${r.overridden&&overrides[i]&&overrides[i][field]!=null?'#f59e0b':'#e2e8f0'};border-radius:4px;font-size:0.85em;text-align:right;background:${r.overridden&&overrides[i]&&overrides[i][field]!=null?'#fffbeb':'transparent'}" onchange="wdOverride(this)" onkeydown="if(event.key==='Enter'){event.preventDefault();wdOverride(this);}">`;

    t+=`<tr class="${cls}" style="${convBorder}${ovBg}">`;
    t+=`<td>${r.age}${r.age>=RMD_START_AGE&&r.bTotal>0?' \u{1F4CC}':''}</td>`;
    if(ctx.hasSpouse) t+=`<td>${r.spouseAge||''}</td>`;
    t+=`<td>${mkInput('taxableW',r.taxableW)}</td>`;
    t+=`<td>${mkInput('deferredW',r.deferredW)}${r.rmd>0?' *':''}</td>`;
    if(hasConv){
      const convChanged=r.overridden&&Math.abs(r.rothConv-(baseRows[i]?baseRows[i].rothConv:r.rothConv))>1;
      t+=`<td style="color:#059669;font-weight:600;background:${r.rothConv>0?'#ecfdf5':'transparent'}">${r.rothConv>0?fmtD(Math.round(r.rothConv)):'-'}${convChanged?' <span title="Roth conversion auto-adjusted to fill bracket — tax stays the same because ordinary income (deferred + conversion) is unchanged" style="cursor:help;color:#d97706;font-size:0.75em">⟳</span>':''}</td>`;
      t+=`<td style="background:${r.rothConv>0?'#ecfdf5':'transparent'};font-size:0.85em;color:#065f46">${r.convMarginalRate>0?(r.convMarginalRate*100).toFixed(1)+'%':'-'}</td>`;
    }
    t+=`<td>${mkInput('rothW',r.rothW)}</td>`;
    t+=`<td>${mkInput('hsaW',r.hsaW)}</td>`;
    if(hasSSData) t+=`<td style="color:#4338ca;background:${r.ssIncome>0?'#eef2ff':'transparent'}">${r.ssIncome>0?fmtD(Math.round(r.ssIncome)):'-'}</td>`;
    t+=`<td style="${ovStyle}"><strong>${fmtD(Math.round(r.totalW))}</strong></td>`;
    /* W/D % = portfolio withdrawals / beginning-of-year balance */
    const beginBal=i===0?(bTaxableInit+bDeferredInit+bRothInit+bHSAInit):(rRows[i-1].bTotal);
    const portfolioW=r.taxableW+r.deferredW+r.rothW+r.hsaW;
    const wdPct=beginBal>0?(portfolioW/beginBal*100):0;
    const wdColor=wdPct>5?'#dc2626':wdPct>4?'#d97706':'#065f46';
    t+=`<td style="background:#fef3c7;color:${wdColor};font-size:0.85em;text-align:center">${beginBal>0?wdPct.toFixed(1)+'%':'-'}</td>`;
    const irmaaNote=r.irmaa>0?` title="Includes IRMAA: ${fmtD(Math.round(r.irmaa))}"`:'';
    t+=`<td style="color:#dc2626"${irmaaNote}>${fmtD(Math.round(r.tax))}${r.irmaa>0?' <span style="color:#d97706;font-size:0.75em" title="Medicare IRMAA surcharge: '+fmtD(Math.round(r.irmaa))+'">⚕</span>':''}</td>`;
    t+=`<td style="color:#059669"><strong>${fmtD(Math.round(r.afterTax))}</strong></td>`;
    t+=`<td style="color:#7c3aed;background:#faf5ff">${fmtD(Math.round(r.afterTax*pvFactor))}</td>`;
    t+=`<td>${fmtK(r.bTaxable)}</td><td>${fmtK(r.bDeferred)}</td><td>${fmtK(r.bRoth)}</td><td>${fmtK(r.bHSA)}</td>`;
    t+=`<td><strong>${fmtK(r.bTotal)}</strong></td>`;
    t+=`<td style="color:#7c3aed;background:#faf5ff"><strong>${fmtK(r.bTotal*pvFactor)}</strong></td>`;
    t+=`</tr>`;
  });
  t+=`</tbody></table></div>`;
  t+=`<div style="font-size:0.8em;color:#6b7280;margin-top:6px;padding:0 4px"><span style="color:#059669">✦</span> Tax-free — Roth &amp; HSA withdrawals do not affect income tax. &nbsp; <span style="color:#d97706">⟳</span> Roth conversion auto-adjusted to fill tax bracket — total ordinary income unchanged, so tax stays the same.</div>`;

  const container=document.getElementById('wd-tbl-container');
  if(container) container.innerHTML=t;
  }catch(e){console.error('renderWdTable error:',e);const c=document.getElementById('wd-tbl-container');if(c) c.innerHTML='<div style="color:red;padding:10px">Recalc Error: '+esc(e.message||'')+'<br>'+esc(e.stack||'')+'</div>';}
}

let _wdDebounce=null;
function wdOverride(el){
  try{
    const ctx=window._wdCtx;
    if(!ctx) return;
    /* Capture data from element immediately (before any DOM changes) */
    const row=parseInt(el.dataset.row);
    const field=el.dataset.field;
    const val=Math.max(0,parseFloat(el.value)||0);
    if(!ctx.overrides[row]) ctx.overrides[row]={};
    /* Store the override; if value matches original, remove override */
    const orig=ctx.rows[row][field];
    if(Math.abs(val-Math.round(orig))<1){
      delete ctx.overrides[row][field];
      if(Object.keys(ctx.overrides[row]).length===0) delete ctx.overrides[row];
    } else {
      ctx.overrides[row][field]=val;
    }
    /* Debounce + defer DOM update to avoid blur/keydown conflict */
    clearTimeout(_wdDebounce);
    _wdDebounce=setTimeout(()=>{
      renderWdTable();
      const newInput=document.querySelector('.wd-ovr[data-row="'+row+'"][data-field="'+field+'"]');
      if(newInput){newInput.focus();newInput.select();}
    },10);
  }catch(e){console.error('wdOverride error:',e);}
}

  'FXAIX':['VOO','VTI','SCHX'],'VOO':['FXAIX','IVV','SCHX'],'VTI':['FSKAX','ITOT','SCHB'],

function renderTaxLoss(){
  const el=document.getElementById('drilldown');
  const insEl=document.getElementById('insightsContainer');
  document.getElementById('allocOverview').style.display='none';
  if(insEl) insEl.parentElement.style.display='none';

  // Gather all positions with gain/loss data across all accounts
  const positions=[];
  DATA.forEach(d=>{
    d.accounts.forEach(a=>{
      const isTaxable=TLH_TAXABLE_TYPES.includes(a.type);
      a.tickers.forEach(t=>{
        if(t.gl!==null && t.gl!==undefined){
          positions.push({sym:t.sym,name:t.name,val:t.val,gl:t.gl,glPct:t.glPct,cb:t.cb,
            acctNum:a.num,acctName:a.name,acctType:a.type,isTaxable:isTaxable,cat:d.cat});
        }
      });
    });
  });

  // Separate taxable losses and gains
  const taxableLosses=positions.filter(p=>p.isTaxable && p.gl<0).sort((a,b)=>a.gl-b.gl);
  const taxableGains=positions.filter(p=>p.isTaxable && p.gl>0).sort((a,b)=>b.gl-a.gl);
  const allLosses=positions.filter(p=>p.gl<0);
  const totalTaxableLoss=taxableLosses.reduce((s,p)=>s+p.gl,0);
  const totalTaxableGain=taxableGains.reduce((s,p)=>s+p.gl,0);
  const netTaxable=totalTaxableGain+totalTaxableLoss;

  // Cross-account wash sale check: same symbol in multiple accounts
  const symAccts={};
  positions.forEach(p=>{
    if(!symAccts[p.sym]) symAccts[p.sym]=new Set();
    symAccts[p.sym].add(p.acctNum);
  });
  const washRiskSyms=new Set();
  taxableLosses.forEach(p=>{if(symAccts[p.sym]&&symAccts[p.sym].size>1) washRiskSyms.add(p.sym);});

  // Tax rate assumptions
  const LTCG_RATE=0.15, ORD_RATE=0.22, ORD_OFFSET=3000;

  // Calculate potential savings (IRS: losses offset gains first, then up to $3K ordinary)
  const harvestable=Math.abs(totalTaxableLoss);
  const ltcgOffset=Math.min(harvestable,totalTaxableGain);
  const ltcgSavings=ltcgOffset*LTCG_RATE;
  const netLossAfterGains=Math.max(0,harvestable-ltcgOffset);
  const ordOffset=Math.min(netLossAfterGains,ORD_OFFSET);
  const ordSavings=ordOffset*ORD_RATE;
  const totalSavings=ordSavings+ltcgSavings;

  html+=`<div class="wd-summary-cards" style="margin-bottom:24px">`;

  if(ordOffset>0) html+=`<tr><td style="padding:4px 8px">Ordinary income offset: ${fmt2(ordOffset)} × ${(ORD_RATE*100)}% (up to $3,000/yr)</td><td style="text-align:right;font-weight:600">${fmt2(ordSavings)}</td></tr>`;

  // Disclaimer

  html+=`</div>`;

  html+=`</div>`;
  el.innerHTML=html;
}
