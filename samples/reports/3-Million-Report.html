function showWithdrawalSuggestions(){
  /* Prevent duplicate overlays (e.g., double-click) */
  if(document.getElementById('sugg-overlay')) return;

  /* Read current withdrawal context */
  const ctx=window._wdCtx;
  if(!ctx){alert('Please run Calculate Withdrawal Plan first.');return;}

  const raw=localStorage.getItem(SETTINGS_KEY);
  let saved={};try{saved=raw?JSON.parse(raw):{};}catch(e){saved={};}

  const curAge=parseInt(saved.wdAge)||55;
  const retAge=parseInt(saved.wdRetire)||65;
  const lifeExp=parseInt(saved.wdLife)||90;
  const retPct=parseFloat(saved.wdReturn||'7')/100;
  const inflPct=parseFloat(saved.wdInflation||'3')/100;
  const filing=saved.wdFiling||'mfj';
  const ssMonthly=parseFloat(saved.wdSSIncome||'0');
  const ssStartAge=parseInt(saved.wdSSAge||'67');
  const conv=saved.wdRothConv||'none';
  const stax=parseFloat(saved.wdStateTax||'0')/100;
  const iraBasis=parseFloat(saved.wdIRABasis||'0');
  const hasSpouse=saved.wdSpouseToggle===true||saved.wdSpouseToggle==='true';
  const spAge=hasSpouse?parseInt(saved.wdSpAge||curAge):0;
  const spLifeExp=hasSpouse?parseInt(saved.wdSpLife||'92'):0;
  const spSSMonthly=hasSpouse?parseFloat(saved.wdSpSSIncome||'0'):0;
  const spSSStartAge=hasSpouse?parseInt(saved.wdSpSSAge||'67'):67;

  const yearsToRetire=retAge-curAge;
  const bTI=ctx.bTaxableInit, bDI=ctx.bDeferredInit, bRI=ctx.bRothInit, bHI=ctx.bHSAInit;
  const totalAtRetire=bTI+bDI+bRI+bHI;
  /* Compute planEndAge from fresh localStorage values (not stale ctx) to avoid mismatch
     if user changed life expectancy without recalculating the withdrawal plan */
  const planEndAge=hasSpouse?Math.max(lifeExp,curAge+(spLifeExp-spAge)):lifeExp;
  const yearsInRetirement=planEndAge-retAge+1;

  /* Determine target ending balances (present value) scaled to portfolio size.
     Use percentage-based targets (25% and 50%) so spending is always meaningful —
     absolute targets like "$10M" fail when portfolio is ~$10M (yields $0 spending). */
  const pvTotal=totalAtRetire/Math.pow(1+inflPct,yearsToRetire); /* portfolio in today's dollars */
  const fmtK=v=>v>=1e6?'$'+(v/1e6).toFixed(2)+'M':v>=1e3?'$'+(v/1e3).toFixed(0)+'K':'$'+Math.round(v);
  function _roundNice(v){ if(v>=1e6) return Math.round(v/500000)*500000; if(v>=100000) return Math.round(v/100000)*100000; if(v>=10000) return Math.round(v/10000)*10000; return Math.round(v/1000)*1000; }
  const t2raw=pvTotal*0.25, t3raw=pvTotal*0.50;
  const t2=_roundNice(t2raw), t3=_roundNice(t3raw);
  const targets=[
    {label:'Die with Zero',target:0,color:'#dc2626',icon:'🎯'},
    {label:'Leave '+fmtK(t2)+' Legacy',target:t2,color:'#7c3aed',icon:'🏠'},
    {label:'Leave '+fmtK(t3)+' Legacy',target:t3,color:'#059669',icon:'🏦'},
  ];

  /* Compute custom bracket limit if applicable */
  const customPct=parseFloat(saved.wdCustomPct||'15');
  const customBracketLimitVal=conv==='custom'?_computeCustomBracketLimit(customPct,filing):0;
  const birthYr=(new Date()).getFullYear()-curAge;
  const dynRmdAge=birthYr>=1960?75:(birthYr<=1950?72:73);
  const convStartAge=conv!=='none'?Math.max(retAge,parseInt(saved.wdConvStartAge||retAge)):retAge;
  const convEndAge=conv!=='none'?Math.min(dynRmdAge-1,parseInt(saved.wdConvEndAge||(dynRmdAge-1))):dynRmdAge-1;

  /* MC-aware solver: binary search for spending where ≥80% of Monte Carlo sims
     end with balance ≥ targetFV.  Uses 200 sims during search for speed. */
  const MC_TARGET_RATE=80; /* 80% success threshold */
  const vol=parseFloat(saved.wdVol||'12')/100;
  const brackets=filing==='mfj'?TAX_BRACKETS_MFJ:TAX_BRACKETS_SINGLE;
  const CONV_LIMITS_MC={none:0,conservative:filing==='mfj'?96950:48475,moderate:filing==='mfj'?206700:103350,aggressive:filing==='mfj'?394600:197300};
  const mcConvLimit=conv==='custom'?customBracketLimitVal:(CONV_LIMITS_MC[conv]||0);
  const _mcBaseParams={
    yearsInRetirement,yearsToRetire,retAge,retPct,inflPct,vol,filing,
    bTaxableInit:bTI,bDeferredInit:bDI,bRothInit:bRI,bHSAInit:bHI,totalAtRetire,
    ssAnnualFRA:ssMonthly*12,ssStartAge,spSSAnnualFRA:spSSMonthly*12,spSSStartAge,
    hasSpouse,spAgeOffset:hasSpouse?(spAge-curAge):0,lifeExp,spLifeExp,
    curAge,spAge,
    rothConvStrategy:conv,convBracketLimit:mcConvLimit,brackets,
    RMD_START_AGE:dynRmdAge,stateTaxPct:stax,
  };

  function _mcSuccessRate(monthly,targetFV,nSims){
    const phases=[{age:retAge,amount:monthly}];
    const mc=runMonteCarlo({..._mcBaseParams,nSims,spendingPhases:phases,hasPhases:true});
    /* For "Die with Zero" (targetFV=0): success = portfolio didn't deplete (endBal > 0).
       For legacy targets: success = ending balance meets or exceeds target. */
    const successes=mc.endingBalances.filter(b=>targetFV===0?b>0:b>=targetFV).length;
    return {rate:(successes/nSims)*100, mc};
  }

  /* Deterministic legacy solver: binary search for spending where _scenarioSim()
     ending balance ≈ targetFV on the expected-return path.  Like the DWZ solver,
     this uses deterministic simulation so results are identical every time the
     popup is opened with the same inputs.  MC is computed separately for display. */
  function solveForSpending(targetPV){
    if(totalAtRetire<=0) return 0;
    const targetFV=targetPV*Math.pow(1+inflPct,planEndAge-curAge);
    const _simP={
      curAge,retAge,lifeExp,retPct,inflPct,filing,
      ssMonthly,ssStartAge,
      rothConvStrategy:conv==='custom'?'custom':conv,
      convStartAge,convEndAge:Math.min(convEndAge,dynRmdAge-1),
      bTaxableInit:bTI,bDeferredInit:bDI,bRothInit:bRI,bHSAInit:bHI,
      hasSpouse,spAge,spLifeExp,spSSMonthly,spSSStartAge,
      stateTaxPct:stax,customBracketLimit:customBracketLimitVal,iraBasis,
    };
    const _ssBoost=Math.round((ssMonthly||0)+(hasSpouse?(spSSMonthly||0):0));
    let hi=Math.max(Math.round(totalAtRetire*0.12/12),Math.round(totalAtRetire/(Math.max(yearsInRetirement,1)*12)*2))+_ssBoost;
    if(hi<1000) hi=10000;
    let lo=0;
    for(let iter=0;iter<35;iter++){
      const mid=Math.round((lo+hi)/2);
      if(mid<=0) break;
      const sim=_scenarioSim({..._simP,spendPhases:[{age:retAge,amount:mid}]});
      const last=sim.rows[sim.rows.length-1];
      const bal=last?(last.bTaxable+last.bDeferred+last.bRoth+last.bHSA):0;
      if(bal>=targetFV) lo=mid; else hi=mid;
      if(hi-lo<=10) break;
    }
    const raw=(lo+hi)/2;
    if(raw>=500) return Math.round(raw/100)*100;
    if(raw>=50) return Math.round(raw/10)*10;
    return Math.round(raw);
  }

  /* Deterministic DWZ solver: binary search for spending where _scenarioSim()
     ending balance ≈ $0.  This ensures "Die with Zero" spending is consistent
     across the popup, withdrawals page, and scenario comparison charts.
     MC success rate is computed separately as an informational risk metric. */
  function solveForDWZDeterministic(){
    /* Guard: if portfolio is already empty, no spending is possible */
    if(totalAtRetire<=0) return 0;
    const _simP={
      curAge,retAge,lifeExp,retPct,inflPct,filing,
      ssMonthly,ssStartAge,
      rothConvStrategy:conv==='custom'?'custom':conv,
      convStartAge,convEndAge:Math.min(convEndAge,dynRmdAge-1),
      bTaxableInit:bTI,bDeferredInit:bDI,bRothInit:bRI,bHSAInit:bHI,
      hasSpouse,spAge,spLifeExp,spSSMonthly,spSSStartAge,
      stateTaxPct:stax,customBracketLimit:customBracketLimitVal,iraBasis,
    };
    /* Upper bound: portfolio draw + SS income (SS covers part of spending, so max
       spend can exceed portfolio-only draw rate) */
    const _ssBoost=Math.round((ssMonthly||0)+(hasSpouse?(spSSMonthly||0):0));
    let hi=Math.max(Math.round(totalAtRetire*0.12/12),Math.round(totalAtRetire/(Math.max(yearsInRetirement,1)*12)*2))+_ssBoost;
    if(hi<1000) hi=10000;
    let lo=0;
    for(let iter=0;iter<35;iter++){
      const mid=Math.round((lo+hi)/2);
      if(mid<=0) break;
      const sim=_scenarioSim({..._simP,spendPhases:[{age:retAge,amount:mid}]});
      const last=sim.rows[sim.rows.length-1];
      const bal=last?(last.bTaxable+last.bDeferred+last.bRoth+last.bHSA):0;
      if(bal>0) lo=mid; else hi=mid;
      if(hi-lo<=10) break;
    }
    const raw=(lo+hi)/2;
    if(raw>=500) return Math.round(raw/100)*100;
    if(raw>=50) return Math.round(raw/10)*10;
    return Math.round(raw);
  }

  /* Show loading overlay immediately */
  let overlay=document.createElement('div');
  overlay.className='sugg-overlay';
  overlay.id='sugg-overlay';
  overlay.innerHTML=`<div class="sugg-modal" style="text-align:center;padding:60px"><div style="font-size:2em;margin-bottom:12px">⏳</div><div style="color:#64748b;font-size:1.1em">Calculating optimal spending levels...</div><div style="color:#94a3b8;font-size:0.85em;margin-top:6px">Running simulations for 3 scenarios</div></div>`;
  document.body.appendChild(overlay);
  /* Helper: remove overlay + clean up Escape listener in one place */
  function _closeSuggOverlay(){const el=document.getElementById('sugg-overlay');if(el)el.remove();document.removeEventListener('keydown',window._suggEscHandler);}
  window._closeSuggOverlay=_closeSuggOverlay;
  overlay.addEventListener('click',e=>{if(e.target===overlay)_closeSuggOverlay();});
  /* Escape key closes the modal */
  window._suggEscHandler=function(e){if(e.key==='Escape')_closeSuggOverlay();};
  document.addEventListener('keydown',window._suggEscHandler);

  setTimeout(()=>{
   try{
    /* Solve for each target */
    const results=[];
    targets.forEach(t=>{
      const targetFV=t.target*Math.pow(1+inflPct,planEndAge-curAge);
      /* DWZ uses deterministic solver (ending balance = $0 on the expected-return path).
         Legacy targets use MC solver (80% of random paths meet the target). */
      const monthly=t.target===0?solveForDWZDeterministic():solveForSpending(t.target);
      const phases=[{age:retAge,amount:monthly}];
      try{
        /* Deterministic sim for detailed metrics (taxes, conversions, year-by-year) */
        const sim=_scenarioSim({
          curAge,retAge,lifeExp,retPct,inflPct,filing,
          ssMonthly,ssStartAge,
          rothConvStrategy:conv==='custom'?'custom':conv,
          convStartAge,convEndAge:Math.min(convEndAge,dynRmdAge-1),
          bTaxableInit:bTI,bDeferredInit:bDI,bRothInit:bRI,bHSAInit:bHI,
          hasSpouse,spAge,spLifeExp,spSSMonthly,spSSStartAge,
          spendPhases:phases,stateTaxPct:stax,
          customBracketLimit:customBracketLimitVal,iraBasis,
        });
        const last=sim.rows[sim.rows.length-1];
        const endBal=last?(last.bTaxable+last.bDeferred+last.bRoth+last.bHSA):0;
        const pvFactor=1/Math.pow(1+inflPct,planEndAge-curAge);
        const totalAfterTax=sim.rows.reduce((s,r)=>s+(r.afterTax||0),0);
        const depleted=sim.rows.find(r=>(r.bTaxable+r.bDeferred+r.bRoth+r.bHSA)<=0);

      /* Final high-quality MC run (500 sims) with custom success threshold */
      const {rate:mcSuccess,mc}=_mcSuccessRate(monthly,targetFV,500);

      /* Compute additional metrics so we can cache EVERYTHING for the scenario tab.
         This ensures exact match between the popup and "Compare in What-If Scenarios". */
      const yr1=sim.rows.find(r=>r.age===retAge);
      const yr1Income=yr1?(yr1.afterTax):0;
      const effRate=yr1&&yr1.totalIncome>0?(yr1.tax/yr1.totalIncome*100):0;
      const betr=sim.totalConversions>0?sim.cumConvTax/sim.totalConversions:0;
      const cumConvTax=sim.cumConvTax||0;
      const mcEndSorted=[...mc.endingBalances].sort((a,b)=>a-b);
      function _pctile(arr,p){ const n=arr.length; if(!n) return 0; const idx=(n-1)*p; const lo=Math.floor(idx); const hi=Math.ceil(idx); return lo===hi?arr[lo]:arr[lo]*(hi-idx)+arr[hi]*(idx-lo); }
      const mcMedian=_pctile(mcEndSorted,0.5), mc10=_pctile(mcEndSorted,0.1), mc90=_pctile(mcEndSorted,0.9);

      results.push({...t,monthly,endBal:targetFV,endBalPV:t.target,totalAfterTax,
        lifetimeTax:sim.cumTax,mcSuccess,depleted:depleted?depleted.age:null,
        totalConversions:sim.totalConversions||0,cumConvTax,
        yr1Income,effRate,betr,mcMedian,mc10,mc90,pvFactor});
      }catch(e){
        results.push({...t,monthly,endBal:0,endBalPV:0,totalAfterTax:0,
          lifetimeTax:0,mcSuccess:0,depleted:null,totalConversions:0,error:e.message});
      }
    });

    /* Current spending for comparison */
    const curPhases=ctx.spendingPhases||[];
    const curSpend=curPhases.length>0?curPhases[0].amount:0;

    /* Build modal HTML */
    let mh=`<div class="sugg-modal">`;
    mh+=`<button class="sugg-modal-close" onclick="_closeSuggOverlay()" title="Close">&times;</button>`;
    mh+=`<h2 style="margin:0 0 4px;font-size:1.3em">\u{1F4A1} Spending Suggestions</h2>`;
    mh+=`<p style="color:#64748b;margin:0 0 6px;font-size:0.9em">Based on your portfolio of <strong>${fmtK(totalAtRetire)}</strong> at retirement (age ${retAge}), here's how much you can spend each month under different legacy goals. All targets use deterministic simulation at ${(retPct*100).toFixed(0)}% return; Monte Carlo success rate shown as a risk indicator.</p>`;
    if(curSpend>0) mh+=`<p style="color:#64748b;margin:0 0 12px;font-size:0.85em">Your current plan: <strong>$${curSpend.toLocaleString()}/mo</strong></p>`;

    /* Scenario cards */
    mh+=`<div class="sugg-scenario-grid">`;
    results.forEach((r,i)=>{
      mh+=`<div class="sugg-scenario-card" style="border-color:${r.color};${i===0?'border-width:3px':''}">`;
      mh+=`<h4 style="color:${r.color}">${r.icon} ${esc(r.label)}</h4>`;
      mh+=`<div class="sugg-spend-highlight" style="color:${r.color}">$${r.monthly.toLocaleString()}<span style="font-size:0.4em;font-weight:400;color:#64748b">/month</span></div>`;
      if(r.target>0) mh+=`<div style="font-size:0.82em;color:#64748b;margin-bottom:10px">Target: leave ${fmtK(r.target)} (today's $) at age ${planEndAge}</div>`;
      else mh+=`<div style="font-size:0.82em;color:#64748b;margin-bottom:10px">Spend it all by age ${planEndAge}</div>`;

      if(curSpend>0){
        const diff=r.monthly-curSpend;
        const pct=Math.abs(diff/curSpend*100).toFixed(0);
        const arrow=diff>0?'↑':'↓';
        const diffColor=diff>0?'#059669':'#dc2626';
        mh+=`<div style="font-size:0.85em;margin-bottom:10px;padding:4px 8px;background:${diff>0?'#ecfdf5':'#fef2f2'};border-radius:4px;color:${diffColor};font-weight:600">${arrow} $${Math.abs(diff).toLocaleString()}/mo (${pct}%) vs current plan</div>`;
      }

      mh+=`<div class="sugg-metric"><span class="sugg-metric-label">MC Success Rate</span><span class="sugg-metric-value" style="color:${r.mcSuccess>=90?'#059669':r.mcSuccess>=75?'#d97706':'#dc2626'}">${r.mcSuccess.toFixed(0)}%</span></div>`;
      if(r.target===0&&r.mcSuccess<MC_TARGET_RATE) mh+=`<div style="font-size:0.73em;color:#d97706;margin:-2px 0 4px;padding:2px 6px;background:#fffbeb;border-radius:3px">⚠️ Calibrated for $0 ending balance — higher spending means more market risk</div>`;
      mh+=`<div class="sugg-metric"><span class="sugg-metric-label">Ending Balance</span><span class="sugg-metric-value">${fmtK(r.endBal)}</span></div>`;
      mh+=`<div class="sugg-metric"><span class="sugg-metric-label">Ending Balance (PV)</span><span class="sugg-metric-value" style="color:#7c3aed">${fmtK(r.endBalPV)}</span></div>`;
      mh+=`<div class="sugg-metric"><span class="sugg-metric-label">Lifetime After-Tax</span><span class="sugg-metric-value">${fmtK(r.totalAfterTax)}</span></div>`;
      mh+=`<div class="sugg-metric"><span class="sugg-metric-label">Lifetime Taxes</span><span class="sugg-metric-value" style="color:#dc2626">${fmtK(r.lifetimeTax)}</span></div>`;
      mh+=`<div class="sugg-metric"><span class="sugg-metric-label">Portfolio Lasts</span><span class="sugg-metric-value">${r.depleted?'Age '+r.depleted:'✅ Lifetime'}</span></div>`;
      if(r.totalConversions>0) mh+=`<div class="sugg-metric"><span class="sugg-metric-label">Roth Converted</span><span class="sugg-metric-value">${fmtK(r.totalConversions)}</span></div>`;

      mh+=`<div style="margin-top:12px;text-align:center"><button onclick="_applySuggestion(${r.monthly})" style="padding:6px 18px;background:${r.color};color:white;border:none;border-radius:5px;font-size:0.82em;font-weight:600;cursor:pointer">Apply $${r.monthly.toLocaleString()}/mo</button></div>`;
      mh+=`</div>`;
    });
    mh+=`</div>`;

    /* Withdrawal rate context */
    const rates=results.map(r=>({label:r.label,rate:(r.monthly*12/pvTotal*100).toFixed(1)}));
    mh+=`<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:14px 18px;margin-top:16px;font-size:0.88em">`;
    mh+=`<strong>📊 Withdrawal Rate Context:</strong> `;
    rates.forEach(r=>mh+=`${r.label}: <strong>${r.rate}%</strong> &nbsp;|&nbsp; `);
    mh+=`<span style="color:#64748b">Safe zone: 3-4% &nbsp;|&nbsp; Moderate: 4-5% &nbsp;|&nbsp; Aggressive: 5%+</span>`;
    mh+=`</div>`;

    /* AI-Powered Tax Optimization Tips */
    mh+=`<div class="sugg-tips">`;
    mh+=`<h3>🧠 Tax Optimization Tips</h3>`;
    mh+=`<div class="sugg-tip-item"><span class="sugg-tip-icon">🔄</span><div class="sugg-tip-text"><strong>Start Roth Conversions Early (Golden Window):</strong> The years between retirement and Social Security/RMDs are your lowest-tax years. Convert aggressively in this window — your taxable income is minimal, leaving large bracket room. Starting earlier can save $1-3M in lifetime taxes for large portfolios.</div></div>`;
    mh+=`<div class="sugg-tip-item"><span class="sugg-tip-icon">📉</span><div class="sugg-tip-text"><strong>Flatten the Tax Mountain:</strong> Without optimization, taxes spike after age 70 when SS + RMDs + dividends stack up. Spreading conversions across earlier years keeps you in the 22-24% bracket instead of 32-37%. This is the single biggest tax optimization available.</div></div>`;
    mh+=`<div class="sugg-tip-item"><span class="sugg-tip-icon">💰</span><div class="sugg-tip-text"><strong>Spend Taxable First:</strong> Use taxable accounts for living expenses while converting tax-deferred to Roth. This reduces future dividend/capital gains income, lowers AGI, and reduces Medicare IRMAA surcharges and SS taxation.</div></div>`;
    mh+=`<div class="sugg-tip-item"><span class="sugg-tip-icon">⏱️</span><div class="sugg-tip-text"><strong>Stop Conversions Before SS Begins:</strong> Once Social Security starts (especially at 70), your taxable income rises significantly. Continuing conversions then may push you into higher brackets. Aim to finish the bulk of conversions by age 68-69.</div></div>`;
    mh+=`<div class="sugg-tip-item"><span class="sugg-tip-icon">🏥</span><div class="sugg-tip-text"><strong>Watch IRMAA Thresholds:</strong> Medicare surcharges use 2-year-old MAGI. Large conversions near age 63+ can trigger higher Part B/D premiums at 65. Plan conversion amounts to stay below IRMAA cliff thresholds ($206K MFJ / $103K single).</div></div>`;
    mh+=`<div class="sugg-tip-item"><span class="sugg-tip-icon">📋</span><div class="sugg-tip-text"><strong>Optimal Spending Phases:</strong> Consider a "Go-Go, Slow-Go, No-Go" approach: spend more in early retirement (travel, activities), reduce at 75+, and further at 85+. Your portfolio can support higher early spending that declines naturally with age.</div></div>`;
    mh+=`</div>`;

    /* Compare in Scenarios button */
    /* Fingerprint all parameters so cache is invalidated if user changes ANY assumption */
    const _suggFp=[retPct*100,inflPct*100,ssMonthly,ssStartAge,conv,retAge,lifeExp,stax*100].join('|');
    window._suggestionScenarios=results.map(r=>({monthly:r.monthly,label:r.label,target:r.target,
      mcSuccess:r.mcSuccess,totalAfterTax:r.totalAfterTax,lifetimeTax:r.lifetimeTax,
      totalConversions:r.totalConversions,cumConvTax:r.cumConvTax,
      depleted:r.depleted,yr1Income:r.yr1Income,effRate:r.effRate,betr:r.betr,
      mcMedian:r.mcMedian,mc10:r.mc10,mc90:r.mc90,pvFactor:r.pvFactor,
      endBal:r.endBal,endBalPV:r.endBalPV,_fp:_suggFp}));
    mh+=`<div class="sugg-actions">`;
    mh+=`<button onclick="_applySuggestionsToScenarios()" style="background:#2563eb;color:white;border:none">🔍 Compare in What-If Scenarios</button>`;
    mh+=`<button onclick="_closeSuggOverlay()" style="background:white;color:#64748b;border:1px solid #cbd5e1">Close</button>`;
    mh+=`</div>`;
    mh+=`</div>`;

    overlay.innerHTML=mh;
   }catch(err){
    /* Top-level error: remove stuck overlay and alert user */
    _closeSuggOverlay();
    console.error('Spending suggestions error:',err);
    alert('Error calculating suggestions: '+err.message);
   }
  },50);
}

/* Apply a suggested spending amount to the withdrawal planner */
window._applySuggestion=function(monthly){
  if(window._closeSuggOverlay) window._closeSuggOverlay();
  const container=document.getElementById('spendPhasesContainer');
  if(container){
    container.innerHTML='';
    const retAge=parseInt(document.getElementById('wdRetire')?.value)||65;
    addSpendPhase(retAge,monthly);
    saveSettings();
    computeWithdrawalPlan();
  }
};

/* Apply suggestions to What-If Scenarios tab */
window._applySuggestionsToScenarios=function(){
  const scenarioData=window._suggestionScenarios;
  if(!scenarioData) return;
  if(window._closeSuggOverlay) window._closeSuggOverlay();
  /* Save scenario presets to localStorage so renderScenarios picks them up.
     Copy ALL withdrawal tab values into shared profile + per-scenario fields
     so nothing is lost or stale from a prior scenarios-tab visit. */
  const raw=localStorage.getItem(SETTINGS_KEY);
  let saved={};try{saved=raw?JSON.parse(raw):{};}catch(e){saved={};}

  /* Sync shared profile fields from withdrawal tab */
  saved.scSharedAge=saved.wdAge||'55';
  saved.scSharedFiling=saved.wdFiling||'mfj';
  saved.scSharedVol=saved.wdVol||'12';
  saved.scSharedSpouse=saved.wdSpouseToggle===true||saved.wdSpouseToggle==='true';
  if(saved.scSharedSpouse){
    saved.scSharedSpAge=saved.wdSpAge||saved.wdAge||'55';
    saved.scSharedSpLife=saved.wdSpLife||'92';
    saved.scSharedSpSS=saved.wdSpSSIncome||'0';
    saved.scSharedSpSSAge=saved.wdSpSSAge||'67';
  }

  /* Build full per-scenario data from withdrawal tab defaults */
  const retireAge=saved.wdRetire||'65';
  const lifeExp=saved.wdLife||'90';
  const ssIncome=saved.wdSSIncome||'0';
  const ssAge=saved.wdSSAge||'67';
  const retPct=saved.wdReturn||'7';
  const inflPct=saved.wdInflation||'3';
  const convStrat=saved.wdRothConv||'none';
  const stateTax=saved.wdStateTax||'0';
  const customPct=saved.wdCustomPct||'15';
  const convStart=saved.wdConvStartAge||retireAge;
  /* Compute dynamic RMD age to match the suggestion engine's calculation */
  const _curAge=parseInt(saved.wdAge)||55;
  const _birthYr=(new Date()).getFullYear()-_curAge;
  const _dynRmdAge=_birthYr>=1960?75:(_birthYr<=1950?72:73);
  const convEnd=String(Math.min(parseInt(saved.wdConvEndAge)||(_dynRmdAge-1), _dynRmdAge-1));

  const scArr=[];
  scenarioData.forEach((s,i)=>{
    scArr.push({
      Name:s.label,
      retire:retireAge,
      life:lifeExp,
      ss:ssIncome,
      ssAge:ssAge,
      ret:retPct,
      infl:inflPct,
      conv:convStrat,
      stax:stateTax,
      customPct:customPct,
      convStart:convStart,
      convEnd:convEnd,
      iraBasis:saved.wdIRABasis||'0',
      phases:[{age:parseInt(retireAge)||65,amount:s.monthly}],
      _target:s.target,
      _targetMonthly:s.monthly,
    });
  });
  saved._scenarios=scArr;
  localStorage.setItem(SETTINGS_KEY,JSON.stringify(saved));
  /* Switch to scenarios tab */
  const scBtn=document.querySelector('.pivot-tab[data-pivot="scenarios"]');
  if(scBtn) scBtn.click();
};

/* ==================================================================
   SCENARIO COMPARATOR TAB

  let html=`<div style="text-align:right;margin:0 0 10px"><button class="export-pdf-btn" onclick="exportTabToPDF('scenarios')"><svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>Export PDF</button></div>`;
  html+=`<div class="wd-panel" style="padding:24px">`;

  html+=`<p style="color:#64748b;margin-bottom:20px">Compare up to 3 retirement scenarios side-by-side. Each scenario uses your current portfolio. Adjust the key variables below to see how different choices affect your retirement outcome.</p>`;

  /* Shared profile section — these apply to all scenarios */
  const scAge=parseInt(saved.scSharedAge)||def.age;
  const scFiling=saved.scSharedFiling||def.filing;
  const scVol=saved.scSharedVol!=null?parseFloat(saved.scSharedVol):(parseFloat(saved.wdVol)||12);
  const scSpouse=saved.scSharedSpouse===true||saved.scSharedSpouse==='true'||saved.wdSpouseToggle===true||saved.wdSpouseToggle==='true';
  const scSpAge=saved.scSharedSpAge!=null?parseInt(saved.scSharedSpAge):(parseInt(saved.wdSpAge)||scAge);
  const scSpLife=saved.scSharedSpLife!=null?parseInt(saved.scSharedSpLife):(parseInt(saved.wdSpLife)||95);
  const scSpSS=saved.scSharedSpSS!=null?parseFloat(saved.scSharedSpSS):(parseFloat(saved.wdSpSSIncome)||0);
  const scSpSSAge=saved.scSharedSpSSAge!=null?parseInt(saved.scSharedSpSSAge):(parseInt(saved.wdSpSSAge)||67);

  html+=`<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:14px 18px;margin-bottom:16px">`;
  html+=`<div style="font-weight:600;font-size:0.95em;margin-bottom:10px">👤 Your Profile <span style="font-weight:400;color:#64748b;font-size:0.85em">(shared across all scenarios)</span></div>`;
  html+=`<div style="display:flex;flex-wrap:wrap;gap:16px;align-items:end">`;

function _scenarioSim(p){
  const {curAge,retAge,lifeExp,retPct,inflPct,filing,ssMonthly,ssStartAge,
    rothConvStrategy,convStartAge,convEndAge,bTaxableInit,bDeferredInit,bRothInit,bHSAInit,
    hasSpouse,spAge,spLifeExp,spSSMonthly,spSSStartAge,spendPhases,customBracketLimit,iraBasis}=p;
  const brackets=filing==='mfj'?TAX_BRACKETS_MFJ:TAX_BRACKETS_SINGLE;
  const birthYear=(new Date()).getFullYear()-curAge;
  const RMD_AGE=birthYear>=1960?75:(birthYear<=1950?72:73);
  const yearsToRetire=retAge-curAge;
  const planEndAge=hasSpouse?Math.max(lifeExp,curAge+(spLifeExp-spAge)):lifeExp;
  const yearsInRetirement=planEndAge-retAge+1;
  const CONV_LIMITS={none:0,conservative:filing==='mfj'?96950:48475,moderate:filing==='mfj'?206700:103350,aggressive:filing==='mfj'?394600:197300};
  const convLimit=rothConvStrategy==='custom'?(customBracketLimit||0):(CONV_LIMITS[rothConvStrategy]||0);
  const ssAnnualFRA=ssMonthly*12;
  const spSSAnnualFRA=(spSSMonthly||0)*12;
  const spAgeOffset=hasSpouse?(spAge-curAge):0;
  const hasPhases=spendPhases&&spendPhases.some(ph=>ph.amount>0);
  const totalAtRetire=bTaxableInit+bDeferredInit+bRothInit+bHSAInit;
  const fallbackW=totalAtRetire*0.04;
  let bT=bTaxableInit,bD=bDeferredInit,bR=bRothInit,bH=bHSAInit;
  let remainingBasis=iraBasis||0;
  const rows=[];let cumTax=0,totalConversions=0,cumConvTax=0;
  for(let yr=0;yr<yearsInRetirement;yr++){
    const age=retAge+yr;
    const spouseAge=hasSpouse?(age+spAgeOffset):0;
    const stdDed=getStdDeduction(filing,age,spouseAge,hasSpouse);
    const inflMult=Math.pow(1+inflPct,yr+yearsToRetire);
    let yourSS=0;
    if(ssAnnualFRA>0&&age>=ssStartAge&&age<=lifeExp) yourSS=ssAnnualFRA*(SS_AGE_FACTOR[ssStartAge]||1.0)*inflMult;
    let spSS=0;
    if(hasSpouse&&spSSAnnualFRA>0&&spouseAge>=(spSSStartAge||67)&&spouseAge<=spLifeExp) spSS=spSSAnnualFRA*(SS_AGE_FACTOR[spSSStartAge||67]||1.0)*inflMult;
    const ssIncome=yourSS+spSS;
    const phaseExp=getAnnualExpenseForAge(age,spendPhases||[]);
    const baseW=hasPhases?phaseExp:fallbackW;
    let totalNeed=hasPhases?baseW*inflMult:baseW*Math.pow(1+inflPct,yr);
    const curTot=bT+bD+bR+bH;
    if(curTot<=0){
      /* Portfolio depleted — still tax SS income */
      let depTax=0;
      if(ssIncome>0){
        const depSTax=calcSSTaxableAmount(ssIncome,0,filing);
        const depTI=Math.max(0,depSTax-stdDed);
        depTax=calcTax(depTI,brackets);
        if(p.stateTaxPct>0) depTax+=depTI*p.stateTaxPct;
        const depNMed=(age>=65&&age<=lifeExp?1:0)+(hasSpouse&&spouseAge>=65&&spouseAge<=spLifeExp?1:0);
        const depIrmaaMagi=yr>=2&&rows[yr-2]?rows[yr-2]._magi:depSTax;
        if(depNMed>0) depTax+=calcIRMAA(depIrmaaMagi,filing,depNMed);
      }
      cumTax+=depTax;
      rows.push({age,spouseAge,afterTax:ssIncome-depTax,tax:depTax,bTaxable:0,bDeferred:0,bRoth:0,bHSA:0,totalIncome:ssIncome,_magi:ssIncome>0?calcSSTaxableAmount(ssIncome,0,filing):0});
      continue;
    }
    if(!hasPhases){totalNeed=Math.max(curTot*0.035,Math.min(curTot*0.055,totalNeed));}
    let target=Math.max(0,Math.min(totalNeed-ssIncome,curTot));
    let rmd=0;
    if(age>=RMD_AGE&&bD>0){const div=RMD_TABLE[age]??(age>120?2:Math.max(2,120-age));rmd=bD/div;}
    let wTx=0,wDf=0,wRo=0,wHs=0,rem=target;
    const annMed=age>=65?5000*Math.pow(1+inflPct,age-curAge):0;
    if(age>=65&&bH>0){wHs=Math.min(annMed,bH,rem);rem-=wHs;}
    if(age>=RMD_AGE){wDf=Math.min(rmd,bD);rem-=wDf;if(rem>0){const ft=Math.min(rem,bT);wTx=ft;rem-=ft;}if(rem>0){const md=Math.min(rem,bD-wDf);wDf+=md;rem-=md;}if(rem>0){const fr=Math.min(rem,bR);wRo=fr;rem-=fr;}}
    else{const ft=Math.min(rem,bT);wTx=ft;rem-=ft;if(rem>0){const bl=(filing==='mfj'?206700:103350)+stdDed;const dt=Math.min(rem,bl,bD);wDf=dt;rem-=dt;}if(rem>0){const fr=Math.min(rem,bR);wRo=fr;rem-=fr;}if(rem>0){const md=Math.min(rem,bD-wDf);wDf+=md;rem-=md;}}
    if(rem>0&&bH>wHs){const mh=Math.min(rem,bH-wHs);wHs+=mh;rem-=mh;}
    let rothConv=0,taxableConvAmt=0;
    const hsaNM=Math.max(0,wHs-annMed);
    if(rothConvStrategy!=='none'&&age>=convStartAge&&age<=convEndAge&&bD>wDf&&convLimit>0){
      const stFC=ssIncome>0?calcSSTaxableAmount(ssIncome,wDf+wTx+hsaNM,filing):0;
      const ordBC=wDf+stFC+hsaNM;
      /* IRA basis pro-rata — size conversion correctly for basis */
      const totalIRA=bD;
      const basisFr=totalIRA>0?Math.min(1,remainingBasis/totalIRA):0;
      const room=Math.max(0,convLimit+stdDed-ordBC);
      const effectiveRoom=basisFr<1?room/(1-basisFr):Infinity;
      rothConv=Math.min(effectiveRoom,bD-wDf);
      if(rothConv>0){
        const taxableConv=rothConv*(1-basisFr);
        taxableConvAmt=taxableConv;
        remainingBasis=Math.max(0,remainingBasis-rothConv*basisFr);
        totalConversions+=rothConv;
        /* Estimate conv tax using differential method with SS re-taxation */
        const ordBase=wDf+hsaNM;
        const ssWithout=ssIncome>0?calcSSTaxableAmount(ssIncome,ordBase+wTx,filing):0;
        const txWithout=calcTax(Math.max(0,ordBase+ssWithout-stdDed),brackets);
        const ssWithConv=ssIncome>0?calcSSTaxableAmount(ssIncome,ordBase+taxableConv+wTx,filing):0;
        const txWith=calcTax(Math.max(0,ordBase+taxableConv+ssWithConv-stdDed),brackets);
        cumConvTax+=(txWith-txWithout)+taxableConv*(p.stateTaxPct||0);
      }
    }
    const hsaPen=(age<65&&hsaNM>0)?hsaNM*0.20:0;
    const ordInc=wDf+taxableConvAmt+hsaNM;
    const agiSS=ordInc+wTx;
    const ssTxAmt=ssIncome>0?calcSSTaxableAmount(ssIncome,agiSS,filing):0;
    const totOrd=ordInc+ssTxAmt;
    const txInc=Math.max(0,totOrd-stdDed);
    const incTax=calcTax(txInc,brackets);
    const capTax=calcLTCG(Math.min(wTx,Math.max(0,totOrd+wTx-stdDed)),txInc,filing);
    const magi=agiSS+ssTxAmt;
    const irmaaMagi=yr>=2&&rows[yr-2]?rows[yr-2]._magi:magi;
    const nMed=(age>=65&&age<=lifeExp?1:0)+(hasSpouse&&spouseAge>=65&&spouseAge<=spLifeExp?1:0);
    const irmaa=nMed>0?calcIRMAA(irmaaMagi,filing,nMed):0;
    const totTax=incTax+capTax+hsaPen+irmaa+(p.stateTaxPct>0?txInc*p.stateTaxPct:0);
    const totalW=wTx+wDf+wRo+wHs+ssIncome;
    const afterTax=totalW-totTax;
    cumTax+=totTax;
    const surplus=Math.max(0,-(target-wTx-wDf-wRo-wHs));
    /* Tax drain cascade: subtract taxes from accounts (taxable→deferred→roth→HSA) */
    let txRem=totTax;
    const drT=Math.min(txRem,Math.max(0,bT-wTx+surplus));txRem-=drT;
    const drD=Math.min(txRem,Math.max(0,bD-wDf-rothConv));txRem-=drD;
    const drR=Math.min(txRem,Math.max(0,bR-wRo+rothConv));txRem-=drR;
    const drH=Math.min(txRem,Math.max(0,bH-wHs));
    bT=Math.max(0,(bT-wTx-drT+surplus)*(1+retPct));
    bD=Math.max(0,(bD-wDf-rothConv-drD)*(1+retPct));
    bR=Math.max(0,(bR-wRo+rothConv-drR)*(1+retPct));
    bH=Math.max(0,(bH-wHs-drH)*(1+retPct));
    rows.push({age,spouseAge,afterTax,tax:totTax,bTaxable:bT,bDeferred:bD,bRoth:bR,bHSA:bH,totalIncome:totalW,rothConv,_magi:magi});
  }
  return {rows,cumTax,totalConversions,cumConvTax};
}

/* Compute bracket limit for custom percentage Roth conversion */
function _computeCustomBracketLimit(pct, filing){
  const brackets=filing==='mfj'?TAX_BRACKETS_MFJ:TAX_BRACKETS_SINGLE;
  /* Match the approach used in the Withdrawals tab: find largest rate <= pct */
  const rate=pct/100;
  let customLimit=brackets[0].limit;
  for(const b of brackets){ if(b.rate<=rate+0.001&&isFinite(b.limit)) customLimit=b.limit; }
  return customLimit;
}

function runScenarioComparison(){
  const resultsEl=document.getElementById('scenResults');
  if(!resultsEl) return;
  resultsEl.innerHTML='<div style="text-align:center;padding:40px;color:#64748b"><div style="font-size:2em">⏳</div>Running 3 scenarios (1,000 Monte Carlo sims each)...</div>';

  setTimeout(()=>{
    /* Clear stale scenario chart entries from registry */
    if(window._chartRegistry){ Object.keys(window._chartRegistry).forEach(k=>{if(k.startsWith('sc-chart-')) delete window._chartRegistry[k];}); }
    const raw=localStorage.getItem(SETTINGS_KEY);
    let saved={};try{saved=raw?JSON.parse(raw):{};}catch(e){saved={};}
    /* Get selected accounts: prefer DOM checkboxes if present, else use saved selection, else all */
    let selectedNums=null;
    const acctCbs=document.querySelectorAll('.acct-sel-cb');
    if(acctCbs.length>0){ selectedNums=getSelectedAccountNums(); }
    else if(saved._selectedAccounts&&saved._selectedAccounts.length>0){ selectedNums=new Set(saved._selectedAccounts); }
    let buckets=getAccountBuckets(selectedNums);
    /* If saved selection yields zero balances (e.g., stale account numbers from a different report), fall back to all accounts */
    if(selectedNums&&(buckets.taxable.total+buckets.deferred.total+buckets.roth.total+buckets.hsa.total)<=0){
      selectedNums=null;
      buckets=getAccountBuckets(null);
    }
    if(!buckets||((buckets.taxable.total+buckets.deferred.total+buckets.roth.total+buckets.hsa.total)<=0)){resultsEl.innerHTML='<p style="color:#dc2626">Error: No retirement account balances found. Ensure your portfolio has accounts with holdings.</p>';return;}

    const results=[];
    const colors=['#2563eb','#7c3aed','#ea580c'];

    for(let i=0;i<3;i++){
      const retire=parseInt(document.getElementById('scretire'+i)?.value)||65;
      const life=parseInt(document.getElementById('sclife'+i)?.value)||95;
      const ssAge=parseInt(document.getElementById('scssAge'+i)?.value)||67;
      const ret=parseFloat(document.getElementById('scret'+i)?.value)||7;
      const infl=parseFloat(document.getElementById('scinfl'+i)?.value)||3;
      const conv=document.getElementById('scconv'+i)?.value||'none';
      const stax=parseFloat(document.getElementById('scstax'+i)?.value)||0;
      const customPct=parseFloat(document.getElementById('sccustomPct'+i)?.value)||15;
      const convStartIn=parseInt(document.getElementById('scconvStart'+i)?.value);
      const convEndIn=parseInt(document.getElementById('scconvEnd'+i)?.value);
      const name=document.getElementById('scName'+i)?.value||'Scenario '+'ABC'[i];

      /* Read spending phases for this scenario */
      const phAges=document.querySelectorAll(`#scPhasesList${i} .sc-phase-age`);
      const phAmts=document.querySelectorAll(`#scPhasesList${i} .sc-phase-amt`);
      let phases=[];
      phAges.forEach((el,pi)=>{
        const a=parseInt(el.value), m=parseInt(phAmts[pi]?.value);
        if(!isNaN(a)&&!isNaN(m)) phases.push({age:a,amount:m});
      });
      if(phases.length===0) phases=[{age:retire,amount:5000}];
      /* Sort phases by age */
      phases.sort((a,b)=>a.age-b.age);
      const spend=phases[0].amount;

      const age=parseInt(document.getElementById('scSharedAge')?.value)||55;
      if(age>retire){results.push({name:name,color:colors[i],error:'Current age ('+age+') must be ≤ retirement age ('+retire+').'});continue;}
      if(life<retire){results.push({name:name,color:colors[i],error:'Life expectancy ('+life+') must be ≥ retirement age ('+retire+').'});continue;}
      const ss=parseFloat(document.getElementById('scss'+i)?.value)||0;
      const filing=document.getElementById('scSharedFiling')?.value||'mfj';
      const hasSpouse=document.getElementById('scSharedSpouse')?.checked||false;
      const spAge=parseInt(document.getElementById('scSharedSpAge')?.value)||age;
      const spLife=parseInt(document.getElementById('scSharedSpLife')?.value)||life;
      const spSS=parseFloat(document.getElementById('scSharedSpSS')?.value)||0;
      const spSSAge=parseInt(document.getElementById('scSharedSpSSAge')?.value)||67;
      const yearsToRetire=retire-age;
      const retPct=ret/100;

      const bTI=buckets.taxable.total*Math.pow(1+retPct,yearsToRetire);
      const bDI=buckets.deferred.total*Math.pow(1+retPct,yearsToRetire);
      const bRI=buckets.roth.total*Math.pow(1+retPct,yearsToRetire);
      const bHI=buckets.hsa.total*Math.pow(1+retPct,yearsToRetire);

      /* Compute custom bracket limit for custom strategy */
      const birthYr=(new Date()).getFullYear()-age;
      const dynRmdAge=birthYr>=1960?75:(birthYr<=1950?72:73);
      const customBracketLimitVal=conv==='custom'?_computeCustomBracketLimit(customPct,filing):0;
      const scConvStart=conv==='custom'&&!isNaN(convStartIn)?convStartIn:retire;
      const scConvEnd=conv==='custom'&&!isNaN(convEndIn)?convEndIn:(dynRmdAge-1);

      try{
        const sim=_scenarioSim({
          curAge:age,retAge:retire,lifeExp:life,retPct:retPct,inflPct:infl/100,filing:filing,
          ssMonthly:ss,ssStartAge:ssAge,rothConvStrategy:conv==='custom'?'custom':conv,
          convStartAge:scConvStart,
          convEndAge:Math.min(scConvEnd,dynRmdAge-1),
          bTaxableInit:bTI,bDeferredInit:bDI,bRothInit:bRI,bHSAInit:bHI,
          hasSpouse:hasSpouse,spAge:spAge,spLifeExp:spLife,
          spSSMonthly:spSS,spSSStartAge:spSSAge,spendPhases:phases,
          stateTaxPct:stax/100,
          customBracketLimit:customBracketLimitVal,
          iraBasis:parseFloat(saved.wdIRABasis||document.getElementById('wdIRABasis')?.value||'0'),
        });

        const rows=sim.rows;
        const totalAfterTax=rows.reduce((s,r)=>s+(r.afterTax||0),0);
        const totalTax=sim.cumTax;
        const depleteAge=rows.find(r=>(r.bTaxable+r.bDeferred+r.bRoth+r.bHSA)<=0);
        const lastRow=rows[rows.length-1];
        const endBal=lastRow?(lastRow.bTaxable+lastRow.bDeferred+lastRow.bRoth+lastRow.bHSA):0;
        const yr1=rows.find(r=>r.age===retire);
        const effRate=yr1&&yr1.totalIncome>0?(yr1.tax/yr1.totalIncome*100):0;

        /* Run Monte Carlo for this scenario */
        const vol=parseFloat(document.getElementById('scSharedVol')?.value)||12;
        const birthYear=(new Date()).getFullYear()-age;
        const mcRMD=birthYear>=1960?75:(birthYear<=1950?72:73);
        const brackets=filing==='mfj'?TAX_BRACKETS_MFJ:TAX_BRACKETS_SINGLE;
        const CONV_LIMITS={none:0,conservative:filing==='mfj'?96950:48475,moderate:filing==='mfj'?206700:103350,aggressive:filing==='mfj'?394600:197300};
        const mcConvLimit=conv==='custom'?customBracketLimitVal:(CONV_LIMITS[conv]||0);
        const totalAtRetire=bTI+bDI+bRI+bHI;
        const planEndAge=hasSpouse?Math.max(life,age+(spLife-spAge)):life;
        const mc=runMonteCarlo({
          nSims:1000, yearsInRetirement:planEndAge-retire+1, yearsToRetire:yearsToRetire,
          retAge:retire, retPct:retPct, inflPct:infl/100, vol:vol/100, filing:filing,
          bTaxableInit:bTI, bDeferredInit:bDI, bRothInit:bRI, bHSAInit:bHI, totalAtRetire:totalAtRetire,
          ssAnnualFRA:ss*12, ssStartAge:ssAge, spSSAnnualFRA:spSS*12, spSSStartAge:spSSAge,
          hasSpouse:hasSpouse, spAgeOffset:hasSpouse?(spAge-age):0, lifeExp:life, spLifeExp:spLife,
          curAge:age, spAge:spAge,
          rothConvStrategy:conv, convBracketLimit:mcConvLimit, brackets:brackets,
          RMD_START_AGE:mcRMD, spendingPhases:phases, hasPhases:phases.some(p=>p.amount>0),
          stateTaxPct:stax/100,
        });

        /* MC percentile data */
        const mcEndSorted=[...mc.endingBalances].sort((a,b)=>a-b);
        function scPctile(arr,p){ const n=arr.length; if(!n) return 0; const idx=(n-1)*p; const lo=Math.floor(idx); const hi=Math.ceil(idx); return lo===hi?arr[lo]:arr[lo]*(hi-idx)+arr[hi]*(idx-lo); }
        let mcMedian=scPctile(mcEndSorted,0.5), mc10=scPctile(mcEndSorted,0.1), mc90=scPctile(mcEndSorted,0.9);
        const scPvFactor=1/Math.pow(1+infl/100,planEndAge-age);

        /* If this scenario came from Spending Suggestions, use the target for ending balance
           so the values match exactly between views (no MC randomness).
           Also recompute MC success rate using the same formula as the popup:
           DWZ (target=0): success = endBal > 0  |  Legacy (target>0): success = endBal >= targetFV */
        const _scMeta=saved._scenarios&&saved._scenarios[i];
        const _scTarget=_scMeta&&_scMeta._target;
        const _scTargetMonthly=_scMeta&&_scMeta._targetMonthly;
        /* Only apply target override when spending still matches the original suggestion */
        const _hasTarget=_scTarget!==undefined&&_scTarget!==null&&_scTargetMonthly&&Math.abs(_scTargetMonthly-spend)<1;
        const _targetFV=_hasTarget?_scTarget*Math.pow(1+infl/100,planEndAge-age):0;
        const scEndBal=_hasTarget?_targetFV:scPctile(mcEndSorted,0.2);
        let mcSuccessRate=mc.successRate;
        if(_hasTarget&&_scTarget>0){
          const tgtSuccesses=mc.endingBalances.filter(b=>b>=_targetFV).length;
          mcSuccessRate=(tgtSuccesses/mc.nSims)*100;
        }

        /* Use cached popup metrics so ALL display values match exactly between
           Spending Suggestions popup and What-If Scenarios comparison.
           The in-memory global window._suggestionScenarios is set by the popup and
           survives the tab switch. Spending amount is validated to detect stale cache. */
        const _popup=window._suggestionScenarios&&window._suggestionScenarios[i];
        const _scenFp=[ret,infl,ss,ssAge,conv,retire,life,stax].join('|');
        const _useCache=_popup&&Math.abs(_popup.monthly-spend)<1&&_popup._fp===_scenFp;
        results.push({
          name:name, color:colors[i], retire:retire, life:life, spend:spend, ss:ss, ssAge:ssAge,
          ret:ret, infl:infl, conv:conv, stax:stax, phases:phases,
          _fromSuggestions:!!_useCache||!!_hasTarget,
          depleteAge:_useCache?(_popup.depleted!=null?_popup.depleted:life+'+'):(depleteAge?depleteAge.age:life+'+'),
          endBal:_useCache?_popup.endBal:scEndBal,
          totalAfterTax:_useCache?_popup.totalAfterTax:totalAfterTax,
          totalTax:_useCache?_popup.lifetimeTax:totalTax,
          effRate:_useCache?_popup.effRate:effRate,
          mcSuccess:_useCache?_popup.mcSuccess:mcSuccessRate,
          yr1Income:_useCache?_popup.yr1Income:(yr1?(yr1.afterTax):0),
          mcMedian:_useCache?_popup.mcMedian:mcMedian, mc10:_useCache?_popup.mc10:mc10, mc90:_useCache?_popup.mc90:mc90,
          pvFactor:_useCache?_popup.pvFactor:scPvFactor,
          rows:rows,
          betr:_useCache?_popup.betr:(sim.totalConversions>0?sim.cumConvTax/sim.totalConversions:0),
          totalConversions:_useCache?_popup.totalConversions:(sim.totalConversions||0),
          cumConvTax:_useCache?_popup.cumConvTax:(sim.cumConvTax||0),
        });
      }catch(e){
        results.push({name:name,color:colors[i],error:e.message});
      }
    }

    // Build comparison output
    let out=``;

    // Comparison table
    out+=`<h3 style="margin-bottom:12px">\u{1F4CA} Side-by-Side Comparison</h3>`;
    out+=`<div style="overflow-x:auto"><table class="wd-tbl" style="font-size:0.9em"><thead><tr><th style="min-width:200px">Metric</th>`;
    results.forEach(r=>out+=`<th style="text-align:center;background:${r.color};color:white">${esc(r.name)}</th>`);
    out+=`</tr></thead><tbody>`;

    const metrics=[
      {label:'⚠️ Status',               fn:r=>r.error?'<span style="color:#dc2626;font-size:0.85em">'+esc(r.error)+'</span>':'✅ OK'},
      {label:'Retirement Age',          fn:r=>r.error?'—':r.retire},
      {label:'Life Expectancy',          fn:r=>r.error?'—':r.life},
      {label:'Spending Plan',           fn:r=>{if(r.error)return '—';if(!r.phases||r.phases.length<=1)return '$'+r.spend.toLocaleString()+'/mo';return r.phases.map(p=>'Age '+p.age+': $'+p.amount.toLocaleString()+'/mo').join('<br>');}},
      {label:'SS Claiming Age',         fn:r=>r.error?'—':r.ssAge},
      {label:'Monthly SS Income',       fn:r=>r.error?'—':'$'+r.ss.toLocaleString()},
      {label:'Annual Return',           fn:r=>r.error?'—':r.ret+'%'},
      {label:'Inflation',               fn:r=>r.error?'—':r.infl+'%'},
      {label:'Roth Strategy',           fn:r=>r.error?'—':(r.conv==='custom'?'Custom':r.conv)},
      {label:'State Tax Rate',           fn:r=>r.error?'—':r.stax+'%'},
      {label:'Portfolio Lasts Until',   fn:r=>r.error?'Error':'Age '+r.depleteAge, best:'max'},
      {label:'Monte Carlo Success',     fn:r=>r.error?'—':r.mcSuccess.toFixed(0)+'%', best:'max'},
      {label:'🎯 Ending Balance',       fn:r=>r.error?'—':fmt2(r.endBal)+' <span style="color:#7c3aed;font-size:0.85em">(PV: '+fmt2(r.endBal*r.pvFactor)+')</span>'+(r._fromSuggestions?' <span style="color:#059669;font-size:0.75em">✓ from suggestions</span>':''), best:'max'},
      {label:'Year 1 After-Tax Income', fn:r=>r.error?'—':fmt2(r.yr1Income), best:'max'},
      {label:'Lifetime After-Tax Income',fn:r=>r.error?'—':fmt2(r.totalAfterTax), best:'max'},
      {label:'Lifetime Taxes Paid',     fn:r=>r.error?'—':fmt2(r.totalTax), best:'min'},
      {label:'Effective Tax Rate (Yr 1)',fn:r=>r.error?'—':r.effRate.toFixed(1)+'%', best:'min'},
      {label:'Total Roth Converted',    fn:r=>r.error||!r.totalConversions?'—':fmt2(r.totalConversions)},
      {label:'Conversion Tax Paid',     fn:r=>r.error||!r.totalConversions?'—':fmt2(r.cumConvTax), best:'min', numFn:r=>r.totalConversions?r.cumConvTax:null},
      {label:'📊 BETR (Break-Even Rate)',fn:r=>r.error||!r.betr?'—':'<span style="color:#065f46;font-weight:600">'+(r.betr*100).toFixed(1)+'%</span>', best:'min', numFn:r=>r.totalConversions?r.betr:null},
      {section:'📊 Monte Carlo Distribution'},
      {label:'MC Median Ending',        fn:r=>r.error?'—':fmt2(r.mcMedian)+' <span style="color:#7c3aed;font-size:0.85em">(PV: '+fmt2(r.mcMedian*r.pvFactor)+')</span>', best:'max', numFn:r=>r.mcMedian},
      {label:'MC Pessimistic (10th)',   fn:r=>r.error?'—':fmt2(r.mc10)+' <span style="color:#7c3aed;font-size:0.85em">(PV: '+fmt2(r.mc10*r.pvFactor)+')</span>', best:'max', numFn:r=>r.mc10},
      {label:'MC Optimistic (90th)',    fn:r=>r.error?'—':fmt2(r.mc90)+' <span style="color:#7c3aed;font-size:0.85em">(PV: '+fmt2(r.mc90*r.pvFactor)+')</span>', best:'max', numFn:r=>r.mc90},
    ];

    metrics.forEach(m=>{
      if(m.section){
        out+=`<tr><td colspan="${results.length+1}" style="font-weight:600;background:#f1f5f9;padding:8px 12px;font-size:0.85em;color:#475569;border-top:2px solid #e2e8f0">${m.section}</td></tr>`;
        return;
      }
      out+=`<tr><td style="font-weight:500">${m.label}</td>`;
      /* Find best value for highlighting */
      let bestIdx=-1;
      if(m.best){
        const numVals=results.map((r,i)=>{
          if(r.error) return null;
          if(m.numFn) return m.numFn(r);
          if(m.best==='max') return m.label.includes('Lasts')?(typeof r.depleteAge==='string'?Infinity:r.depleteAge):m.label.includes('Monte Carlo')?r.mcSuccess:m.label.includes('Yr 1 After')?r.yr1Income:m.label.includes('Lifetime After')?r.totalAfterTax:m.label.includes('Ending')?r.endBal:0;
          else return m.label.includes('Taxes')?r.totalTax:m.label.includes('Eff')?r.effRate:0;
        });
        let bestVal=null;
        numVals.forEach((v,i)=>{
          if(v===null) return;
          if(bestVal===null||(m.best==='max'?v>bestVal:v<bestVal)){bestVal=v;bestIdx=i;}
        });
      }
      results.forEach((r,i)=>{
        const v=m.fn(r);
        const isBest=bestIdx===i&&!r.error;
        const style=r.error?'color:#dc2626':(isBest?'background:#dcfce7;font-weight:600':'');
        out+=`<td style="text-align:center;${style}">${v}</td>`;
      });
      out+=`</tr>`;
    });
    out+=`</tbody></table></div>`;

    // Per-scenario interactive metric charts
    const validResults=results.filter(r=>!r.error && r.rows && r.rows.length>0);
    if(validResults.length>0){
      /* Global vs Individual chart control toggle */
      const chartLabels=['Total Balance','Annual Taxes','After-Tax Income','Account Balances'];
      out+=`<h3 style="margin:24px 0 8px">\u{1F4CA} Chart Controls</h3>`;
      out+=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;flex-wrap:wrap">`;
      out+=`<button id="sc-global-btn" onclick="_scToggleGlobalCharts(true)" style="padding:4px 14px;border-radius:4px;border:1px solid #cbd5e1;font-size:0.82em;font-weight:600;cursor:pointer;background:#1e40af;color:white">Apply to All</button>`;
      out+=`<button id="sc-indiv-btn" onclick="_scToggleGlobalCharts(false)" style="padding:4px 14px;border-radius:4px;border:1px solid #cbd5e1;font-size:0.82em;font-weight:600;cursor:pointer;background:white;color:#64748b">Individual</button>`;
      out+=`</div>`;
      /* Global controls (shown by default — Apply to All is default) */
      out+=`<div id="sc-global-chart-ctrl" style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:12px;padding:10px 14px;background:#f1f5f9;border-radius:6px;border:1px solid #e2e8f0">`;
      out+=`<span style="font-size:0.8em;font-weight:600;color:var(--text-muted)">Show values in:</span>`;
      out+=`<button id="sc-global-fv-btn" onclick="_scGlobalTogglePV(false)" style="padding:4px 12px;border-radius:4px;border:1px solid #cbd5e1;font-size:0.8em;font-weight:600;cursor:pointer;background:#1e40af;color:white">Future Value</button>`;
      out+=`<button id="sc-global-pv-btn" onclick="_scGlobalTogglePV(true)" style="padding:4px 12px;border-radius:4px;border:1px solid #cbd5e1;font-size:0.8em;font-weight:600;cursor:pointer;background:white;color:#64748b">Present Value</button>`;
      out+=`<span style="margin-left:12px;font-size:0.8em;font-weight:600;color:var(--text-muted)">Chart:</span>`;
      chartLabels.forEach((lbl,idx)=>{
        out+=`<button class="sc-global-tab" onclick="_scGlobalSwitchChart(${idx})" style="padding:4px 12px;border-radius:4px;border:none;font-size:0.78em;font-weight:600;cursor:pointer;background:${idx===0?'#1e40af':'#e2e8f0'};color:${idx===0?'white':'#64748b'}">${lbl}</button>`;
      });
      out+=`</div>`;

      /* Per-scenario interactive metric charts */
      validResults.forEach((r,ri)=>{
        const scAge=parseInt(document.getElementById('scSharedAge')?.value)||55;
        const scYearsToRetire=r.retire-scAge;
        const scInflPct=r.infl/100;
        const scSeries=[
          {key:row=>row.bTaxable+row.bDeferred+row.bRoth+row.bHSA,label:'Total Balance',color:r.color,type:'line'},
          {key:'tax',label:'Annual Taxes',color:'#dc2626',type:'bar'},
          {key:'afterTax',label:'After-Tax Income',color:'#059669',type:'line'},
          {type:'stacked',label:'Account Balances',stack:[
            {key:'bTaxable',label:'Taxable',color:'#f59e0b'},
            {key:'bDeferred',label:'Deferred',color:'#3b82f6'},
            {key:'bRoth',label:'Roth',color:'#10b981'},
            {key:'bHSA',label:'HSA',color:'#ec4899'},
          ]},
        ];
        out+=`<div style="margin-top:20px"><h4 style="margin-bottom:6px;color:${r.color}">\u{1F4CA} ${esc(r.name)} — Detailed Charts</h4>`;
        /* Add note when scenario came from spending suggestions */
        if(r._fromSuggestions){
          const isZero=r.endBal===0;
          out+=`<div style="background:${isZero?'#fef3c7':'#eff6ff'};border:1px solid ${isZero?'#f59e0b':'#93c5fd'};border-radius:6px;padding:8px 12px;margin-bottom:10px;font-size:0.82em;color:#374151">`;
          if(isZero) out+=`<strong>\u{1F3AF} Die with Zero:</strong> Spending of $${r.spend.toLocaleString()}/mo is calibrated so your portfolio reaches $0 at age ${r.life} on the expected ${r.ret}% return path. Monte Carlo shows a ${r.mcSuccess.toFixed(0)}% chance of not running out of money before then.`;
          else out+=`<strong>\u{1F3AF} Legacy Target:</strong> Spending of $${r.spend.toLocaleString()}/mo is calibrated for ~${r.mcSuccess.toFixed(0)}% Monte Carlo confidence. The chart shows a deterministic ${r.ret}% fixed return path. The <span style="color:#dc2626;font-weight:600">dashed red line</span> shows your target ending balance.`;
          out+=`</div>`;
        }
        const chartHtml=buildMetricCharts(r.rows,scInflPct,r.retire,scYearsToRetire,'sc-chart-'+ri,scSeries);
        /* Set target line on chart registry for Total Balance chart */
        if(r._fromSuggestions && r.endBal!==undefined){
          const cReg=window._chartRegistry['sc-chart-'+ri];
          if(cReg){
            cReg.targetLine=r.endBal;
            cReg.targetLinePV=r.endBal*r.pvFactor;
          }
        }
        /* Wrap the FV/PV + tabs controls in sc-per-chart-ctrl for global toggle */
        const containerIdx=chartHtml.indexOf('<div id="sc-chart-'+ri+'-label"');
        if(containerIdx>0){
          out+=`<div class="sc-per-chart-ctrl" style="display:none">${chartHtml.substring(0,containerIdx)}</div>${chartHtml.substring(containerIdx)}`;
        } else {
          out+=chartHtml;
        }
        out+=`</div>`;
      });
    }

    // Strategy notes
    out+=`<div style="background:#f1f5f9;border-radius:8px;padding:16px;margin-top:24px;font-size:0.85em;color:#64748b">`;
    out+=`<strong>Notes:</strong> Each scenario independently projects your portfolio using its own parameters. `;
    out+=`Monte Carlo runs 1,000 simulations per scenario. Tax calculations use 2025 federal brackets. `;
    out+=`Roth conversion window runs from retirement age to RMD age (custom strategies use the ages you specify). `;
    out+=`Spending amounts are in today's dollars and inflation-adjusted forward.`;
    out+=`</div>`;

    resultsEl.innerHTML=out;
    /* Render per-scenario metric charts */
    setTimeout(()=>{
      validResults.forEach((r,ri)=>_renderChart('sc-chart-'+ri));
      /* Cache results for tab persistence */
      window._scenChartCount=validResults.length;
      setTimeout(()=>{const r=document.getElementById('scenResults');if(r)window._scenResultsCache=r.innerHTML;},100);
    },0);
  },50);
}

/* ---- Tab switching with state caching ---- */
const _tabCache={};
const _renderedTabs=new Set();
function _saveTab(key){
  /* Don't cache tabs with interactive elements — they break when restored via innerHTML */
  if(key==='withdrawals'||key==='suggestions'||key==='taxloss'||key==='scenarios'||!_renderedTabs.has(key)) return;
  _tabCache[key]={
    drill:document.getElementById('drilldown').innerHTML,
    alloc:document.getElementById('allocOverview').style.display,
    insights:(document.querySelector('.insights')||{}).style?.display||'',
    allocBar:document.getElementById('allocBar').innerHTML,
    legend:document.getElementById('legend').innerHTML
  };
}
function _restoreTab(key){
  const c=_tabCache[key];
  document.getElementById('drilldown').innerHTML=c.drill;
  document.getElementById('allocOverview').style.display=c.alloc;
  const insEl=document.querySelector('.insights');
  if(insEl) insEl.style.display=c.insights;
  document.getElementById('allocBar').innerHTML=c.allocBar;
  document.getElementById('legend').innerHTML=c.legend;
  if(key==='withdrawals') document.querySelectorAll('#drilldown input, #drilldown select').forEach(el=>{el.addEventListener('change',saveSettings);el.addEventListener('input',saveSettings);});
}
let _activeTab='acctName';

document.querySelectorAll('.pivot-tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    /* Save withdrawal settings while elements still exist in DOM */
    if(_activeTab==='withdrawals') saveSettings();
    /* Save current tab state */
    _saveTab(_activeTab);
    document.querySelectorAll('.pivot-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const newTab=btn.dataset.pivot;

    /* Restore or render */
    const insSwitch=document.querySelector('.insights');
    if(insSwitch) insSwitch.style.display='';
    document.getElementById('allocOverview').style.display='';
    if(_tabCache[newTab]){
      _restoreTab(newTab);
    } else {
      if(newTab==='acctType') renderAcctTypePivot();
      else if(newTab==='acctName') renderAcctNamePivot();
      else if(newTab==='suggestions') renderSuggestions();
      else if(newTab==='withdrawals') renderWithdrawals();
      else if(newTab==='taxloss') renderTaxLoss();
      else if(newTab==='scenarios') renderScenarios();
      else renderCategoryPivot();
    }
    _renderedTabs.add(newTab);
    _activeTab=newTab;
    saveSettings();
  });
});

/* Default view — restore saved tab if available */
(function(){
  try{
    const raw=localStorage.getItem(SETTINGS_KEY);
    if(raw){
      const s=JSON.parse(raw);
      if(s._activeTab&&s._activeTab!=='acctName'){
        const btn=document.querySelector(`.pivot-tab[data-pivot="${s._activeTab}"]`);
        if(btn){
          /* Render default tab first so _saveTab has content, then switch */
          renderAcctNamePivot();
          _renderedTabs.add('acctName');
          btn.click();
          return;
        }
      }
    }
  }catch(e){}
  renderAcctNamePivot();
  _renderedTabs.add('acctName');
})();

/* Auto-save on page close/refresh — ensures no input values are lost */
window.addEventListener('beforeunload',()=>saveSettings());

function toggleCat(el){
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}
function toggleAcct(el,e){
  e.stopPropagation();
  el.classList.toggle('open');
  document.getElementById('tb-'+el.dataset.id).classList.toggle('open');
}

/* ---- Portfolio Risk Insights Engine ---- */
function computeInsights(pivot){
  const insights = [];
  const p = v => (v/GRAND*100).toFixed(1);
  const fmt2 = v => '$'+(v/1e3).toFixed(0)+'K';

  // Flatten all tickers
  const allHoldings = [];
  DATA.forEach(d => d.accounts.forEach(a => a.tickers.forEach(t => {
    allHoldings.push({...t, acctName:a.name, acctNum:a.num, acctType:a.type, cat:d.cat});
  })));
  const bySymbol = {};
  allHoldings.forEach(h => { bySymbol[h.sym] = (bySymbol[h.sym]||0) + h.val; });
  const sorted = Object.entries(bySymbol).sort((a,b) => b[1]-a[1]);

  /* ==========================================================
     SHARED — Concentration Risk (shown for both pivots)
     ========================================================== */
  const concItems = [];
  const top5 = sorted.slice(0,5), top5total = top5.reduce((s,x)=>s+x[1],0);
  const top10 = sorted.slice(0,10), top10total = top10.reduce((s,x)=>s+x[1],0);
  if(top5total/GRAND > 0.3) concItems.push(`Top 5 holdings represent <strong>${p(top5total)}%</strong> of portfolio (${top5.map(x=>esc(x[0])).join(', ')}) — significant concentration risk.`);
  if(top10total/GRAND > 0.5) concItems.push(`Top 10 holdings represent <strong>${p(top10total)}%</strong> of portfolio.`);
  sorted.filter(x => x[1]/GRAND > 0.10).forEach(([sym,val]) => {
    concItems.push(`<strong>${esc(sym)}</strong> alone is ${p(val)}% of total portfolio (${fmt2(val)}) — consider if this aligns with your risk tolerance.`);
  });
  if(concItems.length) insights.push({title:'Concentration Risk', icon:'⚠️', sev:'high', items:concItems});

  /* ==========================================================
     BY ACCOUNT TYPE pivot — tax efficiency, per-type risk
     ========================================================== */
  if(pivot === 'acctType') {
    // Tax Efficiency
    const acctItems = [];
    const typeTotals = {};
    ACCT_DATA.forEach(g => { typeTotals[g.type] = g.total; });
    const taxablePct = ((typeTotals['Taxable Investment']||0)+(typeTotals['Custodial (UTMA)']||0))/GRAND*100;
    const taxDefPct = (typeTotals['Tax-Deferred Savings']||0)/GRAND*100;
    const rothPct = (typeTotals['Roth']||0)/GRAND*100;
    const hsaPct = (typeTotals['HSA']||0)/GRAND*100;

    if(taxablePct > 50) acctItems.push(`Taxable accounts hold <strong>${taxablePct.toFixed(1)}%</strong> — majority of portfolio is in tax-inefficient wrappers. Distributions, dividends, and capital gains are taxed annually.`);
    if(rothPct < 10) acctItems.push(`Roth accounts are only <strong>${rothPct.toFixed(1)}%</strong> — consider maximizing Roth contributions for tax-free growth and withdrawals.`);
    if(taxDefPct > 60) acctItems.push(`Tax-deferred accounts hold <strong>${taxDefPct.toFixed(1)}%</strong> — heavy RMD obligations after age 73–75 (SECURE 2.0). Consider Roth conversion ladder strategy.`);
    else if(taxDefPct > 40) acctItems.push(`Tax-deferred accounts hold <strong>${taxDefPct.toFixed(1)}%</strong> — be mindful of future RMD obligations starting at age 73–75 (SECURE 2.0).`);
    if(hsaPct > 0) acctItems.push(`HSA at <strong>${hsaPct.toFixed(1)}%</strong> — triple tax advantage. Maximize contributions ($4,300 individual / $8,550 family for 2026).`);
    if(acctItems.length) insights.push({title:'Tax Efficiency', icon:'🏦', sev:'med', items:acctItems});

    // Per Account Type — risk & allocation
    const typeItems = [];
    ACCT_DATA.forEach(g => {
      const tickers = [];
      g.accounts.forEach(a => a.tickers.forEach(t => tickers.push(t)));
      const riskBuckets = {};
      tickers.filter(t=>t.risk).forEach(t => { riskBuckets[t.risk] = (riskBuckets[t.risk]||0)+t.val; });
      const tTotal = tickers.reduce((s,t)=>s+t.val,0);
      const hrVal = riskBuckets['High Risk / Speculative']||0;
      const hrP = hrVal/tTotal*100;
      const grVal = riskBuckets['Growth']||0;
      const grP = grVal/tTotal*100;

      if(g.type === 'Taxable Investment' || g.type.startsWith('Tax-Deferred')) {
        if(hrP > 10) typeItems.push(`<strong>${esc(g.type)}</strong>: ${hrP.toFixed(1)}% in High Risk/Speculative (${fmt2(hrVal)}) — consider keeping speculative bets in Roth accounts where losses don\u0027t waste tax advantages.`);
        if(grP > 60) typeItems.push(`<strong>${esc(g.type)}</strong>: ${grP.toFixed(1)}% in Growth stocks — heavy growth tilt; tax-inefficient due to low dividends and potential high capital gains.`);
      }
      if(g.type === 'Roth') {
        if(hrP < 5 && grP < 30) typeItems.push(`<strong>Roth</strong>: Only ${(hrP+grP).toFixed(1)}% in Growth + High Risk — Roth is ideal for aggressive/high-growth holdings since gains are tax-free. Consider moving growth stocks here.`);
      }
    });
    if(typeItems.length) insights.push({title:'Account Type Optimization', icon:'🔄', sev:'med', items:typeItems});

    // Account Dominance
    const domItems = [];
    const acctByVal = {};
    DATA.forEach(d=>d.accounts.forEach(a=>{ acctByVal[a.num]=(acctByVal[a.num]||{name:a.name,val:0}); acctByVal[a.num].val+=a.val; }));
    Object.entries(acctByVal).sort((a,b)=>b[1].val-a[1].val).forEach(([num,o])=>{
      if(o.val/GRAND>0.20) domItems.push(`Account <strong>${esc(o.name)}</strong> (#${esc(num)}) holds ${p(o.val)}% — if this account has limited beneficiary protections, consider diversifying across accounts.`);
    });
    if(domItems.length) insights.push({title:'Account Concentration', icon:'📋', sev:'low', items:domItems});
  }

  /* ==========================================================
     BY CATEGORY pivot — allocation benchmarks & recommendations
     ========================================================== */
  if(pivot === 'category') {
    const catTotals = {};
    DATA.forEach(d => { catTotals[d.cat] = d.total; });

    // Compute actual %
    const actual = {};
    const cats = ['Individual Stocks','US Index Funds','International Funds','Bond Funds','Tech Sector Fund','Growth / Leveraged ETFs','Target-Date / Balanced','Cash / Money Market'];
    cats.forEach(c => { actual[c] = (catTotals[c]||0)/GRAND*100; });
    const equityPct = (actual['Individual Stocks']||0)+(actual['US Index Funds']||0)+(actual['Tech Sector Fund']||0)+(actual['Growth / Leveraged ETFs']||0);
    const intlPct = actual['International Funds']||0;
    const bondPct = actual['Bond Funds']||0;
    const cashPct = actual['Cash / Money Market']||0;
    const tdPct = actual['Target-Date / Balanced']||0;
    const sectorPct = (actual['Tech Sector Fund']||0)+(actual['Growth / Leveraged ETFs']||0);

    // Recommended ranges (moderate-aggressive growth investor)
    const benchItems = [];
    benchItems.push(`<strong>Your allocation:</strong> Equities ${equityPct.toFixed(1)}% · International ${intlPct.toFixed(1)}% · Bonds ${bondPct.toFixed(1)}% · Cash ${cashPct.toFixed(1)}%`);

    // Equity allocation
    if(equityPct > 80) {
      benchItems.push(`⚠️ <strong>Equities at ${equityPct.toFixed(1)}%</strong> — well above the typical 60-70% recommendation. Excellent for growth but high drawdown risk in corrections. A moderate portfolio targets 60-70% equities.`);
    } else if(equityPct > 70) {
      benchItems.push(`Equities at <strong>${equityPct.toFixed(1)}%</strong> — slightly aggressive but within range for a growth-oriented investor. Recommended: 60-70%.`);
    } else if(equityPct < 50) {
      benchItems.push(`Equities at only <strong>${equityPct.toFixed(1)}%</strong> — below recommended 60-70%. May limit long-term growth potential.`);
    } else {
      benchItems.push(`✅ Equities at <strong>${equityPct.toFixed(1)}%</strong> — within the recommended 60-70% range for a balanced growth portfolio.`);
    }

    // Individual stocks vs funds
    if(actual['Individual Stocks'] > 30) {
      benchItems.push(`⚠️ <strong>Individual stocks at ${actual['Individual Stocks'].toFixed(1)}%</strong> — most advisors recommend ≤20% in individual stocks vs diversified funds. High idiosyncratic risk.`);
    } else if(actual['Individual Stocks'] > 20) {
      benchItems.push(`Individual stocks at <strong>${actual['Individual Stocks'].toFixed(1)}%</strong> — at the upper end of the recommended ≤20% guideline.`);
    } else if(actual['Individual Stocks'] > 0) {
      benchItems.push(`✅ Individual stocks at <strong>${actual['Individual Stocks'].toFixed(1)}%</strong> — within the recommended ≤20% range.`);
    }

    // International
    if(intlPct < 10) {
      benchItems.push(`⚠️ <strong>International at ${intlPct.toFixed(1)}%</strong> — well below the recommended 15-25%. US-only portfolios miss global diversification. Consider broad international index funds.`);
    } else if(intlPct < 15) {
      benchItems.push(`International at <strong>${intlPct.toFixed(1)}%</strong> — slightly below the recommended 15-25% of total portfolio. Consider increasing for geographic diversification.`);
    } else if(intlPct <= 25) {
      benchItems.push(`✅ International at <strong>${intlPct.toFixed(1)}%</strong> — within the recommended 15-25% range.`);
    } else {
      benchItems.push(`International at <strong>${intlPct.toFixed(1)}%</strong> — above the typical 15-25% range. Adds diversification but introduces currency and geopolitical risk.`);
    }

    // Bonds
    if(bondPct < 5) {
      benchItems.push(`⚠️ <strong>Bonds at ${bondPct.toFixed(1)}%</strong> — well below the recommended 15-30%. Very limited downside protection. In a market crash, bonds provide critical ballast.`);
    } else if(bondPct < 15) {
      benchItems.push(`⚠️ <strong>Bonds at ${bondPct.toFixed(1)}%</strong> — below the recommended 15-30%. Consider increasing for stability and income, especially as retirement approaches.`);
    } else if(bondPct <= 30) {
      benchItems.push(`✅ Bonds at <strong>${bondPct.toFixed(1)}%</strong> — within the recommended 15-30% range for a growth portfolio.`);
    } else {
      benchItems.push(`Bonds at <strong>${bondPct.toFixed(1)}%</strong> — above 30% is conservative. Fine for capital preservation but may limit long-term growth.`);
    }

    // Cash
    if(cashPct > 10) {
      benchItems.push(`⚠️ <strong>Cash at ${cashPct.toFixed(1)}%</strong> — above the recommended 3-5%. Significant drag on returns. Consider deploying into index funds or bonds.`);
    } else if(cashPct > 5) {
      benchItems.push(`Cash at <strong>${cashPct.toFixed(1)}%</strong> — slightly above the typical 3-5% recommendation. Provides flexibility but has opportunity cost.`);
    } else if(cashPct >= 2) {
      benchItems.push(`✅ Cash at <strong>${cashPct.toFixed(1)}%</strong> — within the recommended 3-5% liquidity buffer.`);
    } else {
      benchItems.push(`Cash at only <strong>${cashPct.toFixed(1)}%</strong> — below the recommended 3-5% minimum. May want to maintain an emergency buffer.`);
    }

    insights.push({title:'Asset Allocation vs Recommended Ranges', icon:'📊', sev: (equityPct>80||bondPct<5)?'high':'med', items:benchItems});

    // Per-category deep dive
    const catDeep = [];
    // US Index Funds
    if(actual['US Index Funds']>0) {
      const pct = actual['US Index Funds'];
      if(pct > 40) catDeep.push(`<strong>US Index Funds</strong> at ${pct.toFixed(1)}% — heavy reliance on US equities. Provides strong growth exposure but may be correlated with your individual stock picks.`);
      else catDeep.push(`<strong>US Index Funds</strong> at ${pct.toFixed(1)}% — provides broad US market exposure through diversified funds.`);
    }
    // Sector/Thematic (Tech Sector + Growth/Leveraged)
    if(sectorPct>0) {
      if(sectorPct > 10) catDeep.push(`⚠️ <strong>Sector/Thematic</strong> at ${sectorPct.toFixed(1)}% — above recommended ≤10%. Concentrated sector bets amplify volatility.`);
      else catDeep.push(`✅ <strong>Sector/Thematic</strong> at ${sectorPct.toFixed(1)}% — within the recommended ≤10% allocation.`);
    }
    // Target-Date
    if(tdPct > 0) {
      catDeep.push(`<strong>Target-Date/Balanced</strong> at ${tdPct.toFixed(1)}% — these auto-rebalance over time. Watch for overlap with your other holdings which could create unintended overweights.`);
    }
    if(catDeep.length) insights.push({title:'Category Deep Dive', icon:'🔍', sev:'low', items:catDeep});

    // Risk profile within stocks category
    const riskItems = [];
    const riskTotals = {};
    const stockTotal = allHoldings.filter(h=>h.risk).reduce((s,h)=>s+h.val,0);
    allHoldings.filter(h=>h.risk).forEach(h => { riskTotals[h.risk]=(riskTotals[h.risk]||0)+h.val; });
    if(stockTotal > 0) {
      const hr = (riskTotals['High Risk / Speculative']||0)/stockTotal*100;
      const gr = (riskTotals['Growth']||0)/stockTotal*100;
      const dv = (riskTotals['Dividend / Value']||0)/stockTotal*100;
      const bc = (riskTotals['Blue Chip / Core']||0)/stockTotal*100;

      riskItems.push(`<strong>Stock risk breakdown:</strong> Growth ${gr.toFixed(1)}% · Blue Chip ${bc.toFixed(1)}% · Dividend/Value ${dv.toFixed(1)}% · High Risk ${hr.toFixed(1)}%`);
      if(gr > 50) riskItems.push(`⚠️ Growth stocks dominate at <strong>${gr.toFixed(1)}%</strong> — recommended: ≤40% Growth for balanced risk. Vulnerable to interest rate hikes and market rotation.`);
      if(hr > 10) riskItems.push(`⚠️ High Risk/Speculative at <strong>${hr.toFixed(1)}%</strong> — recommended: ≤10%. Consider trimming speculative positions.`);
      if(dv < 15) riskItems.push(`Dividend/Value at only <strong>${dv.toFixed(1)}%</strong> — recommended: ≥20% for income stability and downside protection.`);
      if(bc < 20) riskItems.push(`Blue Chip/Core at <strong>${bc.toFixed(1)}%</strong> — recommended: ≥25% for portfolio stability.`);

      // Sector concentration
      const sectorSyms = {tech:['MSFT','AAPL','NVDA','AVGO','AMD','META','GOOGL','GOOG','AMZN','NFLX','CRM','ORCL','NOW','ADBE','INTU'],
        finance:['JPM','GS','BAC','WFC','MS','C','BLK','SCHW','COF','USB','PNC','AXP','MA','V','ICE','MCO']};
      const techVal = sorted.filter(([s])=>sectorSyms.tech.includes(s)).reduce((sum,[,v])=>sum+v,0);
      const finVal = sorted.filter(([s])=>sectorSyms.finance.includes(s)).reduce((sum,[,v])=>sum+v,0);
      const techP = techVal/GRAND*100, finP = finVal/GRAND*100;
      if(techP > 20) riskItems.push(`⚠️ Tech mega-caps alone are <strong>${techP.toFixed(1)}%</strong> of total portfolio — recommended sector cap: ≤20%. High correlation risk.`);
      if(finP > 15) riskItems.push(`Financials at <strong>${finP.toFixed(1)}%</strong> — monitor for interest rate sensitivity and credit cycle exposure.`);
    }
    if(riskItems.length) insights.push({title:'Stock Risk Profile', icon:'🔴', sev:'med', items:riskItems});
  }

  /* ==========================================================
     SHARED — Diversification (shown for both pivots)
     ========================================================== */
  const divItems = [];
  const uniqueStocks = sorted.filter(([s])=> !s.endsWith('**') && s.length<=5).length;
  if(uniqueStocks > 150) divItems.push(`Portfolio holds <strong>${uniqueStocks} individual stocks</strong> — very broad but may be difficult to monitor. Consider consolidating into index funds for similar exposure with less management overhead.`);
  if(divItems.length) insights.push({title:'Diversification', icon:'📋', sev:'low', items:divItems});

  // Render
  const el = document.getElementById('insightsContainer');
  const label = pivot==='acctType' ? 'By Account Type' : pivot==='acctName' ? 'By Account' : 'By Investment Category';
  if(!insights.length){ el.innerHTML='<div class="insight-card"><p style="color:var(--text-muted);font-size:0.88em">No significant risk flags detected.</p></div>'; return; }
  el.innerHTML = insights.map(ins => `
    <div class="insight-card insight-sev-${ins.sev}">
      <h3><span class="icon">${ins.icon}</span>${ins.title}</h3>
      <ul class="insight-items">${ins.items.map(i=>`<li>${i}</li>`).join('')}</ul>
    </div>`).join('');
}
</script>
</body>
</html>
