name: portfolio-report
description: Generate an interactive HTML portfolio allocation report from a Fidelity CSV export. Five pivot views (By Account Type, By Investment Category, By Account, Suggestions, Withdrawals) with 3-level drill-down, data-driven risk classification via yfinance, allocation bar, auto-inferred account types, pivot-aware risk insights, investment suggestions with model portfolios and account guidance, and a dual-participant retirement withdrawal planner with Social Security income modeling and Monte Carlo analysis.
version: 3.8.0

triggers:
  - "generate portfolio report"
  - "portfolio allocation report"
  - "analyze portfolio CSV"
  - "investment breakdown report"
  - "drill-down portfolio report"
  - "portfolio analysis"
  - "retirement withdrawal plan"
  - "withdrawal strategy"

inputs:
  - name: csv_path
    description: Full path to the Fidelity portfolio positions CSV file
    required: true
  - name: output_path
    description: Full path for the output HTML report (default: same directory as CSV with _Report suffix)
    required: false
  - name: refresh_risk
    description: When set, fetches fresh financial metrics from Yahoo Finance via yfinance to update the risk classification cache
    required: false
  - name: refresh_suggestions
    description: When set, fetches fresh fund performance metrics from Yahoo Finance for the Suggestions tab
    required: false

output:
  description: Interactive HTML report with five pivot views (Account Type / Investment Category / Account / Suggestions / Withdrawals), 3-level drill-down, data-driven risk classification, allocation bar, pivot-aware risk insights, investment suggestions with model portfolios and tax-efficient account guidance, and retirement withdrawal planner with Social Security income modeling

runtime:
  type: python
  entry: main.py
  alt:
    powershell: main.ps1
